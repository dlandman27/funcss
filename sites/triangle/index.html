<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>89 Degree Triangle</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #f2ede2;
            color: #201a17;
            user-select: none;
            -webkit-user-select: none;
            font-family: Georgia, 'Times New Roman', serif;
        }

        canvas {
            position: fixed;
            inset: 0;
            display: block;
            touch-action: none;
            cursor: ns-resize;
        }

        #title {
            position: fixed;
            top: 18px;
            left: 20px;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(24px, 5vw, 42px);
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: #f0563e;
            -webkit-text-stroke: 6px #201a17;
            paint-order: stroke fill;
            transform: rotate(-2deg);
            pointer-events: none;
        }

        #sub {
            position: fixed;
            top: calc(18px + clamp(34px, 6.4vw, 56px));
            left: 24px;
            font-style: italic;
            font-size: clamp(13px, 2.6vw, 16px);
            color: #201a17;
            opacity: 0.75;
            pointer-events: none;
        }

        #plaque {
            position: fixed;
            left: 20px;
            bottom: 96px;
            max-width: min(340px, 70vw);
            background: #fff8ef;
            border: 2px solid #201a17;
            box-shadow: 3px 3px 0 #201a17;
            border-radius: 10px;
            padding: 10px 14px;
            font-style: italic;
            font-size: 14px;
            line-height: 1.45;
            transform: rotate(-1deg);
            pointer-events: none;
        }

        #pill {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(32, 26, 23, 0.82);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 999px;
            padding: 10px 18px;
            color: #fff8ef;
            font-size: 13px;
            white-space: nowrap;
            max-width: calc(100vw - 24px);
        }
        #pill label { font-style: italic; opacity: 0.85; }
        #len {
            width: min(240px, 38vw);
            accent-color: #f0563e;
            cursor: pointer;
        }
        #lenLabel {
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 13px;
            min-width: 86px;
            text-align: right;
        }

        #stamp {
            position: fixed;
            top: 46%;
            left: 50%;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(26px, 6vw, 48px);
            text-transform: uppercase;
            color: #201a17;
            background: #f7c948;
            border: 4px solid #201a17;
            box-shadow: 6px 6px 0 #201a17;
            border-radius: 14px;
            padding: 12px 26px;
            transform: translate(-50%, -50%) rotate(-8deg) scale(0);
            pointer-events: none;
        }
        #stamp.show { animation: thunk 0.45s cubic-bezier(0.2, 1.6, 0.4, 1) forwards; }
        @keyframes thunk {
            0%   { transform: translate(-50%, -50%) rotate(-8deg) scale(0.2); }
            70%  { transform: translate(-50%, -50%) rotate(-8deg) scale(1.15); }
            100% { transform: translate(-50%, -50%) rotate(-8deg) scale(1); }
        }

        #foot {
            position: fixed;
            right: 16px;
            bottom: 14px;
            font-style: italic;
            font-size: 12px;
            opacity: 0.55;
            pointer-events: none;
        }

        @media (max-width: 560px) {
            #plaque { bottom: 110px; font-size: 13px; }
            #pill { gap: 8px; padding: 9px 14px; }
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="title">The 89&deg; Triangle</div>
    <div id="sub">so close to right. so far from right.</div>
    <div id="plaque">It looks fine. It is not fine.</div>
    <div id="pill">
        <label for="len">extend the edge</label>
        <input id="len" type="range" min="0" max="8.5848" step="0.001" value="0">
        <span id="lenLabel">1 m</span>
    </div>
    <div id="stamp">Certified Right</div>
    <div id="foot">diagram not to scale. the angle, however, is exactly what it says.</div>

    <script>
        'use strict';

        const INK = '#201a17', CORAL = '#f0563e', GOLD = '#f7c948', CREAM = '#fff8ef', PURPLE = '#a98fd0';

        // one triangle in thirty-three is secretly right. tell no one.
        const ANGLE = Math.random() < 0.03 ? 90 : 89;
        const DEV = (90 - ANGLE) * Math.PI / 180;   // deviation from vertical, radians
        const TAN = Math.tan(DEV);
        const SIN = Math.sin(DEV);

        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('len');
        const lenLabel = document.getElementById('lenLabel');
        const plaque = document.getElementById('plaque');
        const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

        let W = 0, H = 0, popScale = reduceMotion ? 1 : 0.2, popStart = 0;
        let L = 1; // edge length in meters

        function fmt(m) {
            if (m === 0) return '0';
            if (m < 0.01) return (m * 1000).toFixed(1) + ' mm';
            if (m < 1) return (m * 100).toFixed(1) + ' cm';
            if (m < 1000) return m.toFixed(1) + ' m';
            return Math.round(m / 1000).toLocaleString() + ' km';
        }

        function comparison(d) {
            if (d === 0) return 'it misses by nothing. this one is perfect.';
            if (d < 0.03) return 'about the width of two fingers';
            if (d < 0.2) return 'about one banana';
            if (d < 0.6) return 'about one house cat';
            if (d < 2.2) return 'about one tall adult';
            if (d < 6) return 'about one parked car';
            if (d < 25) return 'about one bowling lane';
            if (d < 130) return 'about one city block';
            if (d < 500) return 'about one Eiffel Tower, lying down';
            if (d < 2500) return 'about twenty football fields';
            if (d < 25000) return 'about the length of Manhattan';
            if (d < 3474000) return 'about the width of a small country';
            return 'wider than the entire Moon';
        }

        function caption(len) {
            if (ANGLE === 90) return 'wait. this triangle is actually 90 degrees. one in thirty-three of them is. tell no one.';
            if (len < 10) return 'It looks fine. It is not fine.';
            if (len < 1000) return 'One degree doesn’t sound like much. Keep going.';
            if (len < 100000) return 'It adds up.';
            if (len < 10000000) return 'This is why bridges have inspectors.';
            return 'At Moon distance, this triangle misses the Moon.';
        }

        function stickerPath(pts) {
            ctx.beginPath();
            ctx.moveTo(pts[0][0], pts[0][1]);
            for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
            ctx.closePath();
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            const vx = W * (W < 560 ? 0.3 : 0.26);
            const vy = H * 0.8;
            const base = Math.min(W, H) * 0.5;
            const edge = Math.min(W, H) * 0.62;

            // edge direction: 1 degree right of straight up (or exactly up, if lucky)
            const dx = Math.sin(DEV), dy = -Math.cos(DEV);

            ctx.save();
            ctx.translate(vx, vy);
            ctx.scale(popScale, popScale);
            ctx.translate(-vx, -vy);

            const B = [vx + base, vy];
            const T = [vx + dx * edge, vy + dy * edge];
            const tri = [[vx, vy], B, T];

            // sticker treatment: hard offset shadow, flat fill, ink outline
            ctx.save();
            ctx.translate(6, 6);
            stickerPath(tri);
            ctx.fillStyle = INK;
            ctx.fill();
            ctx.restore();
            stickerPath(tri);
            ctx.fillStyle = CORAL;
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.lineJoin = 'round';
            ctx.strokeStyle = INK;
            ctx.stroke();

            // the edge, extended off the top of the screen
            ctx.beginPath();
            ctx.moveTo(vx, vy);
            ctx.lineTo(vx + dx * (H * 1.4), vy + dy * (H * 1.4));
            ctx.lineWidth = 4;
            ctx.strokeStyle = INK;
            ctx.stroke();

            // ghost: where 90 degrees would have gone
            ctx.beginPath();
            ctx.setLineDash([10, 8]);
            ctx.moveTo(vx, vy);
            ctx.lineTo(vx, vy - H * 1.4);
            ctx.lineWidth = 3;
            ctx.strokeStyle = PURPLE;
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.font = 'italic 14px Georgia, serif';
            ctx.fillStyle = INK;
            ctx.textAlign = 'left';
            if (ANGLE === 89) ctx.fillText('where 90° would be', vx - 150, vy - edge * 0.55);

            // angle arc + label chip
            const arcR = 52;
            ctx.beginPath();
            ctx.arc(vx, vy, arcR, -Math.PI / 2 + DEV, 0);
            ctx.lineWidth = 3;
            ctx.strokeStyle = INK;
            ctx.stroke();

            const midA = (-Math.PI / 2 + DEV) / 2;
            const cx = vx + Math.cos(midA) * (arcR + 34);
            const cy = vy + Math.sin(midA) * (arcR + 34);
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(-0.08);
            const chipTxt = ANGLE + '°';
            ctx.font = '900 17px "Arial Black", Arial, sans-serif';
            const tw = ctx.measureText(chipTxt).width;
            ctx.translate(3, 3);
            roundRect(-tw / 2 - 10, -15, tw + 20, 30, 999);
            ctx.fillStyle = INK;
            ctx.fill();
            ctx.translate(-3, -3);
            roundRect(-tw / 2 - 10, -15, tw + 20, 30, 999);
            ctx.fillStyle = ANGLE === 90 ? GOLD : CREAM;
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = INK;
            ctx.stroke();
            ctx.fillStyle = INK;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(chipTxt, 0, 1);
            ctx.restore();

            ctx.restore(); // pop scale

            // the gap bracket, up top where the two lines have drifted apart
            const yTop = 56;
            const gapPx = (vy - yTop) * TAN;
            const xGhost = vx, xReal = vx + gapPx;
            const miss = L * SIN;

            ctx.strokeStyle = INK;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(xGhost, yTop);
            ctx.lineTo(xReal, yTop);
            ctx.moveTo(xGhost, yTop - 6); ctx.lineTo(xGhost, yTop + 6);
            ctx.moveTo(xReal, yTop - 6); ctx.lineTo(xReal, yTop + 6);
            ctx.stroke();

            ctx.font = 'italic 15px Georgia, serif';
            ctx.fillStyle = INK;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            const label = ANGLE === 90
                ? 'the gap: 0. exactly 0.'
                : 'the gap: ' + fmt(miss) + ' — ' + comparison(miss);
            const lx = Math.max(xReal, xGhost) + 12;
            wrapText(label, Math.min(lx, W - 200), yTop, W - lx - 16);
        }

        function wrapText(txt, x, y, maxW) {
            const words = txt.split(' ');
            let line = '', yy = y;
            for (const w of words) {
                const test = line ? line + ' ' + w : w;
                if (ctx.measureText(test).width > Math.max(maxW, 120) && line) {
                    ctx.fillText(line, x, yy);
                    line = w;
                    yy += 20;
                } else line = test;
            }
            ctx.fillText(line, x, yy);
        }

        function roundRect(x, y, w, h, r) {
            r = Math.min(r, h / 2, w / 2);
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        function update() {
            L = Math.pow(10, parseFloat(slider.value));
            lenLabel.textContent = fmt(L);
            plaque.textContent = caption(L);
            draw();
        }

        // pop-in on load, then the loop sleeps
        function popIn(t0) {
            function step(t) {
                const p = Math.min((t - t0) / 450, 1);
                popScale = p < 0.7 ? 0.2 + (p / 0.7) * 0.95 : 1.15 - ((p - 0.7) / 0.3) * 0.15;
                draw();
                if (p < 1) requestAnimationFrame(step);
                else { popScale = 1; draw(); }
            }
            requestAnimationFrame(step);
        }

        // ── input: slider, wheel, vertical drag ──
        slider.addEventListener('input', update);

        addEventListener('wheel', e => {
            slider.value = Math.min(8.5848, Math.max(0, parseFloat(slider.value) + (e.deltaY > 0 ? 0.1 : -0.1)));
            update();
        }, { passive: true });

        let dragging = false, lastY = 0;
        canvas.addEventListener('pointerdown', e => {
            dragging = true; lastY = e.clientY;
            canvas.setPointerCapture(e.pointerId);
        });
        canvas.addEventListener('pointermove', e => {
            if (!dragging) return;
            slider.value = Math.min(8.5848, Math.max(0, parseFloat(slider.value) - (e.clientY - lastY) * 0.006));
            lastY = e.clientY;
            update();
        });
        canvas.addEventListener('pointerup', () => dragging = false);
        canvas.addEventListener('pointercancel', () => dragging = false);

        // ── resize ──
        let resizeT = null;
        function resize() {
            const dpr = Math.min(devicePixelRatio || 1, 2);
            W = innerWidth; H = innerHeight;
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            draw();
        }
        addEventListener('resize', () => {
            clearTimeout(resizeT);
            resizeT = setTimeout(resize, 100);
        });

        resize();
        update();
        if (!reduceMotion) popIn(performance.now());

        if (ANGLE === 90) {
            setTimeout(() => document.getElementById('stamp').classList.add('show'), 1400);
        }
    </script>
</body>
</html>
