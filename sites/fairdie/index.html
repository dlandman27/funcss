<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fair Die</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --coral: #f0563e;
            --sky: #5aa0db;
            --lime: #b7ce3c;
            --purple: #a98fd0;
            --gold: #f7c948;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            background-color: var(--paper);
            background-image: radial-gradient(rgba(32, 26, 23, 0.06) 2px, transparent 2.2px);
            background-size: 22px 22px;
            font-family: Georgia, 'Times New Roman', serif;
            color: var(--ink);
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        h1 {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(26px, 5.5vw, 44px);
            letter-spacing: 0.02em;
            transform: rotate(-1.5deg);
            -webkit-text-stroke: 1.5px var(--ink);
            paint-order: stroke fill;
            color: var(--coral);
            text-shadow: 4px 4px 0 var(--ink);
        }

        /* certification sticker */
        .cert {
            position: relative;
            background: var(--lime);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 5px 16px;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-size: clamp(10px, 1.6vw, 13px);
            font-weight: 900;
            letter-spacing: 0.14em;
            transform: rotate(2deg);
        }

        .cert.void::after {
            content: 'VOID';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-14deg);
            font-size: 1.7em;
            color: #c0392b;
            border: 3px solid #c0392b;
            border-radius: 6px;
            padding: 0 8px;
            opacity: 0.9;
            background: rgba(242, 237, 226, 0.65);
        }

        /* ---- the die ---- */

        .die-area {
            position: relative;
            padding: 10px;
        }

        .die {
            width: min(200px, 44vw);
            height: min(200px, 44vw);
            background: #fff8ef;
            border: 4px solid var(--ink);
            border-radius: 18%;
            box-shadow: 8px 8px 0 var(--ink);
            cursor: grab;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 14%;
            position: relative;
            transition: box-shadow 0.15s ease;
        }

        .die:active { cursor: grabbing; }

        .die .pip {
            width: 70%;
            height: 70%;
            margin: auto;
            border-radius: 50%;
            background: var(--ink);
            opacity: 0;
            transform: scale(0.3);
            transition: opacity 0.05s linear, transform 0.12s ease;
        }

        .die .pip.on {
            opacity: 1;
            transform: scale(1);
        }

        .die.landing { animation: land 0.35s cubic-bezier(0.2, 2.4, 0.4, 1); }

        @keyframes land {
            0% { transform: scale(1.25, 0.75); }
            50% { transform: scale(0.92, 1.1); }
            100% { transform: scale(1, 1); }
        }

        @keyframes page-shake {
            0%, 100% { transform: translate(0, 0); }
            30% { transform: translate(-5px, 3px); }
            60% { transform: translate(4px, -3px); }
        }

        body.shake { animation: page-shake 0.2s linear; }

        .hint {
            font-style: italic;
            font-size: clamp(13px, 1.9vw, 16px);
            color: rgba(32, 26, 23, 0.5);
            min-height: 1.4em;
        }

        /* ---- history & histogram ---- */

        .history {
            display: flex;
            gap: 8px;
            min-height: 34px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90vw;
        }

        .chip {
            width: 32px;
            height: 32px;
            background: #fff8ef;
            border: 2px solid var(--ink);
            border-radius: 8px;
            box-shadow: 2px 2px 0 var(--ink);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 4px;
            transform: rotate(var(--tilt, 0deg));
            animation: chipIn 0.3s cubic-bezier(0.22, 1.6, 0.36, 1);
        }

        @keyframes chipIn {
            from { transform: scale(0.2) rotate(var(--tilt)); }
            to { transform: scale(1) rotate(var(--tilt)); }
        }

        .chip i {
            border-radius: 50%;
            background: var(--ink);
            width: 100%;
            height: 100%;
            visibility: hidden;
        }

        .chip i.on { visibility: visible; }

        .histo {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            height: 74px;
        }

        .histo .col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: clamp(26px, 5vw, 38px);
        }

        .histo .bar {
            width: 100%;
            border: 2px solid var(--ink);
            border-radius: 5px 5px 0 0;
            box-shadow: 2px 2px 0 var(--ink);
            min-height: 3px;
            transition: height 0.25s ease;
        }

        .histo .lbl {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-size: 11px;
            font-weight: 900;
        }

        .tally {
            font-style: italic;
            font-size: clamp(11px, 1.5vw, 13px);
            color: rgba(32, 26, 23, 0.4);
            font-variant-numeric: tabular-nums;
        }

        /* ---- calibration ---- */

        #calBtn {
            position: fixed;
            bottom: 18px;
            right: 18px;
            background: var(--purple);
            color: var(--ink);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 9px 18px;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        #calBtn:hover { transform: translate(-2px, -2px) rotate(-2deg); }
        #calBtn:active { transform: translate(2px, 2px); }

        #calPanel {
            position: fixed;
            bottom: 68px;
            right: 18px;
            width: min(320px, calc(100vw - 36px));
            background: #fff8ef;
            border: 2px solid var(--ink);
            border-radius: 14px;
            box-shadow: 5px 5px 0 var(--ink);
            padding: 16px;
            display: none;
            z-index: 5;
        }

        #calPanel.open { display: block; }

        #calPanel h3 {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-size: 14px;
            margin-bottom: 4px;
        }

        #calPanel .fine-print {
            font-style: italic;
            font-size: 11px;
            color: rgba(32, 26, 23, 0.5);
            margin-bottom: 12px;
        }

        .cal-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .cal-row .face {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            width: 16px;
            text-align: center;
        }

        .cal-row input[type="range"] {
            flex: 1;
            accent-color: var(--coral);
        }

        .cal-row .pct {
            width: 42px;
            text-align: right;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
        }

        #recert {
            width: 100%;
            margin-top: 10px;
            padding: 9px;
            background: var(--lime);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 2px 2px 0 var(--ink);
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 13px;
            cursor: pointer;
        }

        #recert:active { transform: translate(1px, 1px); }
    </style>
</head>
<body>
    <h1>FAIR DIE</h1>
    <div class="cert" id="cert">CERTIFIED FAIR &#10003;</div>

    <div class="die-area">
        <div class="die" id="die"></div>
    </div>

    <div class="hint" id="hint">click to roll &mdash; or grab it and give it a proper throw</div>

    <div class="history" id="history"></div>
    <div class="histo" id="histo"></div>
    <div class="tally" id="tally"></div>

    <button id="calBtn">calibration&hellip;</button>
    <div id="calPanel">
        <h3>CALIBRATION</h3>
        <div class="fine-print">for maintenance purposes only. nobody needs to know.</div>
        <div id="calRows"></div>
        <button id="recert">re-certify as fair (we ask no questions)</button>
    </div>

    <script>
        const PIP_MAP = {
            1: [4], 2: [0, 8], 3: [0, 4, 8], 4: [0, 2, 6, 8], 5: [0, 2, 4, 6, 8], 6: [0, 2, 3, 5, 6, 8],
        };
        const BAR_COLORS = ['#f0563e', '#5aa0db', '#b7ce3c', '#a98fd0', '#f47b28', '#f7c948'];

        const die = document.getElementById('die');
        const cert = document.getElementById('cert');
        const hint = document.getElementById('hint');
        const historyEl = document.getElementById('history');
        const histoEl = document.getElementById('histo');
        const tallyEl = document.getElementById('tally');

        // die face pips
        const pips = [];
        for (let i = 0; i < 9; i++) {
            const p = document.createElement('div');
            p.className = 'pip';
            die.appendChild(p);
            pips.push(p);
        }

        function showFace(n) {
            const on = PIP_MAP[n];
            pips.forEach((p, i) => p.classList.toggle('on', on.includes(i)));
        }

        // ---- state ----

        let weights = [1, 1, 1, 1, 1, 1];
        let counts = [0, 0, 0, 0, 0, 0];
        let rolls = 0;
        const history = [];

        try {
            const saved = JSON.parse(localStorage.getItem('fairdie'));
            if (saved) {
                weights = saved.weights || weights;
                counts = saved.counts || counts;
                rolls = saved.rolls || 0;
            }
        } catch (e) {}

        function save() {
            try { localStorage.setItem('fairdie', JSON.stringify({ weights, counts, rolls })); } catch (e) {}
        }

        const isRigged = () => {
            const total = weights.reduce((a, b) => a + b, 0);
            return weights.some(w => Math.abs(w / total - 1 / 6) > 0.02);
        };

        function updateCert() {
            cert.classList.toggle('void', isRigged());
        }

        // ---- rolling ----

        let rolling = false;

        function pickResult() {
            const total = weights.reduce((a, b) => a + b, 0) || 1;
            let r = Math.random() * total;
            for (let i = 0; i < 6; i++) {
                r -= weights[i];
                if (r <= 0) return i + 1;
            }
            return 6;
        }

        function roll(power) {
            if (rolling) return;
            rolling = true;
            hint.textContent = '';

            const result = pickResult();
            const duration = Math.max(500, Math.min(2000, 500 + power));
            let rot = 0;
            const spinVel = 14 + power * 0.02;
            const start = performance.now();
            let lastFlip = 0;

            function tumble(now) {
                const t = (now - start) / duration;
                if (t >= 1) {
                    die.style.transform = '';
                    showFace(result);
                    die.classList.remove('landing');
                    void die.offsetWidth;
                    die.classList.add('landing');
                    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                        document.body.classList.remove('shake');
                        void document.body.offsetWidth;
                        document.body.classList.add('shake');
                    }
                    finish(result);
                    return;
                }
                const ease = 1 - Math.pow(t, 2.2);   // decelerate
                rot += spinVel * ease;
                die.style.transform = `rotate(${rot}deg) scale(${1 + 0.08 * Math.sin(t * 14)})`;
                if (now - lastFlip > 70 + t * 160) {   // faces flip slower as it settles
                    showFace(1 + ((Math.random() * 6) | 0));
                    lastFlip = now;
                }
                requestAnimationFrame(tumble);
            }
            requestAnimationFrame(tumble);
        }

        function finish(result) {
            rolling = false;
            rolls++;
            counts[result - 1]++;
            history.unshift(result);
            if (history.length > 12) history.pop();
            save();
            renderHistory();
            renderHisto();
            tallyEl.textContent = `${rolls.toLocaleString()} rolls on record`;
        }

        function renderHistory() {
            historyEl.textContent = '';
            for (const n of history) {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.style.setProperty('--tilt', ((Math.random() - 0.5) * 10).toFixed(1) + 'deg');
                for (let i = 0; i < 9; i++) {
                    const dot = document.createElement('i');
                    if (PIP_MAP[n].includes(i)) dot.className = 'on';
                    chip.appendChild(dot);
                }
                historyEl.appendChild(chip);
            }
        }

        function renderHisto() {
            histoEl.textContent = '';
            const max = Math.max(1, ...counts);
            for (let i = 0; i < 6; i++) {
                const col = document.createElement('div');
                col.className = 'col';
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = Math.round((counts[i] / max) * 56) + 'px';
                bar.style.background = BAR_COLORS[i];
                bar.title = `${counts[i]} times`;
                const lbl = document.createElement('div');
                lbl.className = 'lbl';
                lbl.textContent = i + 1;
                col.appendChild(bar);
                col.appendChild(lbl);
                histoEl.appendChild(col);
            }
        }

        // ---- grab & throw ----

        let dragging = false;
        let startX = 0, startY = 0, lastX = 0, lastY = 0;
        let travelled = 0, lastSpeed = 0;

        die.addEventListener('pointerdown', (e) => {
            if (rolling) return;
            dragging = true;
            startX = lastX = e.clientX;
            startY = lastY = e.clientY;
            travelled = 0;
            die.setPointerCapture(e.pointerId);
            die.style.transition = 'none';
        });

        die.addEventListener('pointermove', (e) => {
            if (!dragging) return;
            lastSpeed = Math.hypot(e.clientX - lastX, e.clientY - lastY);
            travelled += lastSpeed;
            lastX = e.clientX;
            lastY = e.clientY;
            const ox = Math.max(-60, Math.min(60, (e.clientX - startX) * 0.5));
            const oy = Math.max(-60, Math.min(60, (e.clientY - startY) * 0.5));
            die.style.transform = `translate(${ox}px, ${oy}px) rotate(${ox * 0.25}deg)`;
        });

        function releaseDie() {
            if (!dragging) return;
            dragging = false;
            die.style.transition = '';
            die.style.transform = '';
            if (travelled < 8) roll(200);                       // a click
            else roll(Math.min(1500, travelled * 3 + lastSpeed * 30));   // a throw
        }

        die.addEventListener('pointerup', releaseDie);
        die.addEventListener('pointercancel', releaseDie);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                roll(400);
            }
        });

        // ---- calibration ----

        const calBtn = document.getElementById('calBtn');
        const calPanel = document.getElementById('calPanel');
        const calRows = document.getElementById('calRows');
        const sliders = [];

        for (let i = 0; i < 6; i++) {
            const row = document.createElement('div');
            row.className = 'cal-row';
            const face = document.createElement('div');
            face.className = 'face';
            face.textContent = i + 1;
            const slider = document.createElement('input');
            slider.type = 'range';
            slider.min = '0';
            slider.max = '100';
            const pct = document.createElement('div');
            pct.className = 'pct';
            slider.addEventListener('input', () => {
                weights[i] = parseInt(slider.value, 10);
                if (weights.every(w => w === 0)) weights[i] = 1;
                refreshPcts();
                updateCert();
                save();
            });
            row.appendChild(face);
            row.appendChild(slider);
            row.appendChild(pct);
            calRows.appendChild(row);
            sliders.push({ slider, pct });
        }

        function refreshPcts() {
            const total = weights.reduce((a, b) => a + b, 0) || 1;
            sliders.forEach(({ slider, pct }, i) => {
                slider.value = weights[i];
                pct.textContent = Math.round((weights[i] / total) * 100) + '%';
            });
        }

        calBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            calPanel.classList.toggle('open');
        });

        document.addEventListener('pointerdown', (e) => {
            if (!calPanel.contains(e.target) && e.target !== calBtn) {
                calPanel.classList.remove('open');
            }
        });

        document.getElementById('recert').addEventListener('click', () => {
            weights = [1, 1, 1, 1, 1, 1];
            refreshPcts();
            updateCert();
            save();
        });

        // ---- init ----

        showFace(1 + ((Math.random() * 6) | 0));
        refreshPcts();
        updateCert();
        renderHisto();
        if (rolls > 0) tallyEl.textContent = `${rolls.toLocaleString()} rolls on record`;
    </script>
</body>
</html>
