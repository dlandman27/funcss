<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>It's 5 O'Clock Somewhere</title>
    <meta name="description" content="It is always, provably, 5 o'clock somewhere. Here's where.">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #201a17;
            --cream: #fff8ef;
            --gold: #f7c948;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            background: linear-gradient(180deg, #3a2417 0%, #241610 60%, #170e0a 100%);
            font-family: Georgia, 'Times New Roman', serif;
            color: var(--cream);
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 20px;
            padding: 30px 16px;
        }

        h1 {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(20px, 4.4vw, 36px);
            transform: rotate(-1.5deg);
            -webkit-text-stroke: 1.2px var(--ink);
            paint-order: stroke fill;
            color: var(--gold);
            text-shadow: 4px 4px 0 var(--ink);
            text-align: center;
        }

        /* ---- the beer ---- */

        .mug-area {
            position: relative;
            width: 120px;
            height: 130px;
            animation: sway 4s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        .mug {
            position: absolute;
            bottom: 0;
            left: 10px;
            width: 74px;
            height: 96px;
            background: linear-gradient(180deg, #f9d976 0%, #f7c948 40%, #e8a92a 100%);
            border: 3.5px solid var(--ink);
            border-radius: 8px 8px 12px 12px;
            box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .mug .shine {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 12px;
            height: 70px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.35);
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid rgba(32, 26, 23, 0.35);
            background: rgba(255, 255, 255, 0.3);
            animation: rise var(--t) linear infinite;
        }

        @keyframes rise {
            from { transform: translateY(0); opacity: 0.9; }
            to { transform: translateY(-80px); opacity: 0; }
        }

        .handle {
            position: absolute;
            bottom: 26px;
            left: 78px;
            width: 34px;
            height: 46px;
            border: 3.5px solid var(--ink);
            border-left: none;
            border-radius: 0 16px 16px 0;
            background: transparent;
        }

        .foam {
            position: absolute;
            top: 12px;
            left: 0;
            display: flex;
        }

        .foam i {
            width: 26px;
            height: 26px;
            background: var(--cream);
            border: 3px solid var(--ink);
            border-radius: 50%;
            margin-left: -8px;
        }

        .foam i:nth-child(2) { margin-top: -8px; }
        .foam i:nth-child(3) { margin-top: -3px; }
        .foam i:nth-child(4) { margin-top: -9px; }

        /* ---- the verdict card ---- */

        .card {
            background: var(--cream);
            color: var(--ink);
            border: 3px solid var(--ink);
            border-radius: 18px;
            box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.45);
            padding: clamp(22px, 4.5vw, 40px) clamp(28px, 6vw, 56px);
            text-align: center;
            transform: rotate(0.6deg);
            max-width: min(94vw, 560px);
        }

        .its {
            font-style: italic;
            font-size: clamp(15px, 2.4vw, 20px);
            color: rgba(32, 26, 23, 0.6);
        }

        .big-time {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(44px, 10vw, 84px);
            line-height: 1.1;
            color: #f0563e;
            -webkit-text-stroke: 1.5px var(--ink);
            paint-order: stroke fill;
            text-shadow: 4px 4px 0 var(--ink);
            font-variant-numeric: tabular-nums;
        }

        .place {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(22px, 4.6vw, 40px);
            margin-top: 6px;
            animation: pop 0.4s cubic-bezier(0.22, 1.5, 0.36, 1);
        }

        @keyframes pop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .zone-chip {
            display: inline-block;
            margin-top: 12px;
            background: var(--gold);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 2px 2px 0 var(--ink);
            padding: 5px 16px;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transform: rotate(-2deg);
        }

        .also {
            font-style: italic;
            font-size: clamp(12px, 1.8vw, 15px);
            color: rgba(32, 26, 23, 0.55);
            margin-top: 14px;
        }

        .buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        .pill {
            background: var(--cream);
            color: var(--ink);
            border: 2.5px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 11px 24px;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .pill.primary { background: var(--gold); }
        .pill:hover { transform: translate(-2px, -2px) rotate(-1.5deg); }
        .pill:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }

        .you-line {
            font-style: italic;
            font-size: clamp(12px, 1.8vw, 15px);
            color: rgba(255, 248, 239, 0.5);
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>IT'S 5 O'CLOCK SOMEWHERE</h1>

    <div class="mug-area">
        <div class="mug">
            <div class="shine"></div>
            <div class="bubble" style="left:20px; bottom:6px; width:6px; height:6px; --t:2.4s"></div>
            <div class="bubble" style="left:40px; bottom:2px; width:4px; height:4px; --t:3.1s; animation-delay:0.6s"></div>
            <div class="bubble" style="left:55px; bottom:10px; width:5px; height:5px; --t:2.7s; animation-delay:1.2s"></div>
        </div>
        <div class="handle"></div>
        <div class="foam"><i></i><i></i><i></i><i></i></div>
    </div>

    <div class="card">
        <div class="its">right now it is</div>
        <div class="big-time" id="time">&hellip;</div>
        <div class="place" id="place">consulting the globe</div>
        <div class="zone-chip" id="zone"></div>
        <div class="also" id="also"></div>
    </div>

    <div class="buttons">
        <button class="pill primary" id="elsewhereBtn">somewhere else, please</button>
        <button class="pill" id="formatBtn">24-hour</button>
    </div>

    <div class="you-line" id="youLine"></div>

    <script>
        // the real timezone database — it is ALWAYS 17:xx somewhere in it
        const ZONES = Intl.supportedValuesOf('timeZone');
        const fmtCache = new Map();

        function hourFmt(tz) {
            if (!fmtCache.has(tz)) {
                fmtCache.set(tz, new Intl.DateTimeFormat('en-US', {
                    timeZone: tz, hour: 'numeric', minute: 'numeric', hour12: false,
                }));
            }
            return fmtCache.get(tz);
        }

        function partsIn(tz) {
            const parts = hourFmt(tz).formatToParts(new Date());
            const get = (type) => parseInt(parts.find(p => p.type === type).value, 10);
            return { hour: get('hour') % 24, minute: get('minute') };
        }

        const pretty = (tz) => tz.split('/').pop().replace(/_/g, ' ');

        function fiveOClockZones() {
            const matches = [];
            for (const tz of ZONES) {
                try {
                    if (partsIn(tz).hour === 17) matches.push(tz);
                } catch (e) {}
            }
            return matches;
        }

        let is24 = false;
        let current = null;

        function fmtDisplay(tz) {
            return new Date().toLocaleTimeString('en-US', {
                timeZone: tz, hour12: !is24, hour: 'numeric', minute: '2-digit',
            });
        }

        function render(pickNew) {
            const matches = fiveOClockZones();
            if (!matches.length) {
                // mathematically impossible, but the bar stays open
                document.getElementById('place').textContent = 'the void between time zones';
                return;
            }
            if (pickNew || !current || !matches.includes(current)) {
                const others = matches.filter(z => z !== current);
                current = others[(Math.random() * others.length) | 0] || matches[0];
            }

            document.getElementById('time').textContent = fmtDisplay(current);
            const place = document.getElementById('place');
            if (place.textContent !== pretty(current)) {
                place.textContent = pretty(current);
                place.style.animation = 'none';
                void place.offsetWidth;
                place.style.animation = '';
            }
            document.getElementById('zone').textContent = current;

            const othersCount = matches.length - 1;
            document.getElementById('also').textContent = othersCount > 0
                ? `along with ${othersCount} other place${othersCount === 1 ? '' : 's'} currently observing happy hour`
                : 'and only there. savor it.';

            const you = new Date().toLocaleTimeString('en-US', {
                hour12: !is24, hour: 'numeric', minute: '2-digit',
            });
            const yourHour = new Date().getHours();
            const remark = yourHour === 17 ? "that's you. cheers."
                : yourHour > 17 || yourHour < 4 ? 'no judgment here either way.'
                : "we won't tell anyone.";
            document.getElementById('youLine').textContent =
                `where you are it's ${you}. ${remark}`;
        }

        document.getElementById('elsewhereBtn').addEventListener('click', () => render(true));
        document.getElementById('formatBtn').addEventListener('click', function () {
            is24 = !is24;
            this.textContent = is24 ? '12-hour' : '24-hour';
            render(false);
        });

        render(true);
        setInterval(() => render(false), 10000);
    </script>
</body>
</html>
