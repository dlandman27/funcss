<!DOCTYPE html>
<html lang="en">
<head>
  <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coastline</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #17466b;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #map {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }

    #map.dragging { cursor: grabbing; }

    #survey {
      position: fixed;
      top: 18px;
      left: 18px;
      max-width: min(78vw, 340px);
      padding: 14px 18px;
      border-radius: 10px;
      background: rgba(248, 244, 232, 0.92);
      border: 1px solid rgba(60, 50, 30, 0.25);
      box-shadow: 0 4px 18px rgba(0, 20, 40, 0.3);
      font-family: Georgia, 'Times New Roman', serif;
      color: #3d3527;
      pointer-events: none;
    }

    #survey .heading {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #8a7d63;
      margin-bottom: 6px;
    }

    #survey .length {
      font-size: clamp(20px, 3vw, 26px);
      font-variant-numeric: tabular-nums;
      color: #26374a;
    }

    #survey .ruler {
      font-size: 13px;
      font-style: italic;
      margin-top: 4px;
      color: #6b6049;
      font-variant-numeric: tabular-nums;
    }

    #survey .note {
      font-size: 12px;
      font-style: italic;
      margin-top: 8px;
      color: #93876c;
    }

    #hint {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 5vh;
      text-align: center;
      font-family: Georgia, serif;
      font-style: italic;
      font-size: clamp(14px, 2vw, 18px);
      color: rgba(255, 250, 235, 0.75);
      text-shadow: 0 1px 8px rgba(0, 20, 40, 0.6);
      letter-spacing: 0.05em;
      pointer-events: none;
      transition: opacity 2.5s ease;
    }

    #hint.hidden { opacity: 0; }
  </style>
</head>
<body>
  <canvas id="map"></canvas>

  <div id="survey">
    <div class="heading">Coastal Survey</div>
    <div class="length" id="length">—</div>
    <div class="ruler" id="ruler">—</div>
    <div class="note">the closer you look, the longer it gets</div>
  </div>

  <div id="hint">scroll to look closer &mdash; drag to follow the shore</div>

  <script>
    const canvas = document.getElementById('map');
    const ctx = canvas.getContext('2d');
    const lengthEl = document.getElementById('length');
    const rulerEl = document.getElementById('ruler');
    const hint = document.getElementById('hint');

    let W, H, dpr;

    // ---- View: world units are kilometers ----

    const SEG = 400;                 // base segment length, km
    const ROUGH = 0.18;              // fractal roughness
    const view = { cx: 200, cy: 0, scale: 2.2 };   // scale = px per km

    const MIN_SCALE = 0.004;
    const MAX_SCALE = 220000;        // ~0.5 m per 100 px

    // ---- Deterministic randomness ----

    function hash32(n) {
      n = (n ^ 61) ^ (n >>> 16);
      n = (n + (n << 3)) | 0;
      n = n ^ (n >>> 4);
      n = Math.imul(n, 0x27d4eb2d);
      n = n ^ (n >>> 15);
      return (n >>> 0) / 4294967296;
    }

    const mix = (a, b) => (Math.imul(a ^ 0x9e3779b9, 0x85ebca6b) ^ Math.imul(b ^ 0xc2b2ae35, 0x27d4eb2d)) | 0;

    // base coastline endpoint elevations (long swells + local variation)
    function baseY(i) {
      return (hash32(mix(i, 11)) - 0.5) * 0.5 * SEG
           + (hash32(mix(Math.floor(i / 4), 23)) - 0.5) * 1.4 * SEG
           + (hash32(mix(Math.floor(i / 16), 37)) - 0.5) * 3.2 * SEG;
    }

    // ---- Recursive coastline ----

    const points = [];
    const MAX_DEPTH = 46;
    const MIN_FEATURE = 0.0004;      // km — about 40 cm

    function subdivide(x0, y0, x1, y1, seed, depth) {
      const lenX = x1 - x0;
      const screenLen = Math.hypot(x1 - x0, y1 - y0) * view.scale;

      // cull whole branches far outside the view (displacement stays within ~0.6 × length)
      const margin = Math.abs(lenX) * 0.8;
      const viewL = view.cx - (W / 2) / view.scale;
      const viewR = view.cx + (W / 2) / view.scale;
      if (x1 + margin < viewL || x0 - margin > viewR) {
        points.push(x1, y1);
        return;
      }

      if (screenLen < 3 || depth >= MAX_DEPTH || Math.abs(lenX) < MIN_FEATURE) {
        points.push(x1, y1);
        return;
      }

      const mx = (x0 + x1) / 2;
      const my = (y0 + y1) / 2;
      const len = Math.hypot(x1 - x0, y1 - y0);
      const r = hash32(mix(seed, depth * 2654435761)) - 0.5;
      // displace midpoint perpendicular to the segment
      const nx = -(y1 - y0) / len;
      const ny = (x1 - x0) / len;
      const d = r * 2 * ROUGH * len;
      const px = mx + nx * d;
      const py = my + ny * d;

      subdivide(x0, y0, px, py, mix(seed, 1296827), depth + 1);
      subdivide(px, py, x1, y1, mix(seed, 7395263), depth + 1);
    }

    function buildCoast() {
      points.length = 0;
      const viewL = view.cx - (W / 2) / view.scale;
      const viewR = view.cx + (W / 2) / view.scale;
      // generous margin: big swells can push the coast sideways into view
      const i0 = Math.floor(viewL / SEG) - 2;
      const i1 = Math.ceil(viewR / SEG) + 2;

      points.push(i0 * SEG, baseY(i0));
      for (let i = i0; i < i1; i++) {
        subdivide(i * SEG, baseY(i), (i + 1) * SEG, baseY(i + 1), mix(i, 424243), 0);
      }
    }

    // ---- Render ----

    const toSX = (x) => (x - view.cx) * view.scale + W / 2;
    const toSY = (y) => (y - view.cy) * view.scale + H / 2;

    function render() {
      // sea
      const sea = ctx.createLinearGradient(0, 0, 0, H);
      sea.addColorStop(0, '#1d5580');
      sea.addColorStop(1, '#123a5c');
      ctx.fillStyle = sea;
      ctx.fillRect(0, 0, W, H);

      buildCoast();
      if (points.length < 4) return;

      // land (below the coast)
      ctx.beginPath();
      ctx.moveTo(toSX(points[0]), toSY(points[1]));
      for (let i = 2; i < points.length; i += 2) {
        ctx.lineTo(toSX(points[i]), toSY(points[i + 1]));
      }
      ctx.lineTo(W + 60, H + 60);
      ctx.lineTo(-60, H + 60);
      ctx.closePath();

      const land = ctx.createLinearGradient(0, 0, 0, H);
      land.addColorStop(0, '#b3a26e');
      land.addColorStop(0.25, '#8fa065');
      land.addColorStop(1, '#5d7a4c');
      ctx.fillStyle = land;
      ctx.fill();

      // beach edge
      ctx.strokeStyle = 'rgba(232, 216, 168, 0.9)';
      ctx.lineWidth = 3;
      strokeCoast();

      // foam line just offshore
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.55)';
      ctx.lineWidth = 1.2;
      ctx.save();
      ctx.translate(0, -2.5);
      strokeCoast();
      ctx.restore();

      updateSurvey();
    }

    function strokeCoast() {
      ctx.beginPath();
      ctx.moveTo(toSX(points[0]), toSY(points[1]));
      for (let i = 2; i < points.length; i += 2) {
        ctx.lineTo(toSX(points[i]), toSY(points[i + 1]));
      }
      ctx.stroke();
    }

    // ---- The paradox meter ----

    // expected length growth per subdivision level, computed numerically
    let growth = 1;
    (function () {
      let sum = 0;
      const n = 2000;
      for (let i = 0; i < n; i++) {
        const d = ((i + 0.5) / n - 0.5) * 2 * ROUGH;
        sum += Math.sqrt(0.25 + d * d);
      }
      growth = 2 * (sum / n);
    })();

    function fmtKm(km) {
      if (km >= 1e7) return (km / 1e6).toPrecision(3) + ' million km';
      if (km >= 1000) return Math.round(km).toLocaleString() + ' km';
      if (km >= 1) return km.toPrecision(3) + ' km';
      if (km >= 0.001) return (km * 1000).toPrecision(3) + ' m';
      return (km * 100000).toPrecision(3) + ' cm';
    }

    function updateSurvey() {
      // your measuring stick is 100 screen pixels long
      const rulerKm = 100 / view.scale;
      const levels = Math.max(0, Math.min(MAX_DEPTH, Math.log2(SEG / rulerKm)));
      // measured length of a 100-segment reference coast at this ruler size
      const base = 100 * SEG * 1.04;
      const measured = base * Math.pow(growth, levels);
      lengthEl.textContent = fmtKm(measured);
      rulerEl.textContent = `measured with a ${fmtKm(rulerKm)} stick`;
    }

    // ---- Pan & zoom ----

    function zoomAt(sx, sy, factor) {
      const wx = (sx - W / 2) / view.scale + view.cx;
      const wy = (sy - H / 2) / view.scale + view.cy;
      view.scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, view.scale * factor));
      view.cx = wx - (sx - W / 2) / view.scale;
      view.cy = wy - (sy - H / 2) / view.scale;
      dirty = true;
      hint.classList.add('hidden');
    }

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.0016));
    }, { passive: false });

    const pointers = new Map();
    let lastPinch = null;

    canvas.addEventListener('pointerdown', (e) => {
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      canvas.setPointerCapture(e.pointerId);
      canvas.classList.add('dragging');
    });

    canvas.addEventListener('pointermove', (e) => {
      const p = pointers.get(e.pointerId);
      if (!p) return;

      if (pointers.size === 1) {
        view.cx -= (e.clientX - p.x) / view.scale;
        view.cy -= (e.clientY - p.y) / view.scale;
        dirty = true;
        hint.classList.add('hidden');
      }
      p.x = e.clientX;
      p.y = e.clientY;

      if (pointers.size === 2) {
        const [a, b] = [...pointers.values()];
        const d = Math.hypot(a.x - b.x, a.y - b.y);
        const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
        if (lastPinch) zoomAt(mx, my, d / lastPinch);
        lastPinch = d;
      }
    });

    function endPointer(e) {
      pointers.delete(e.pointerId);
      if (pointers.size < 2) lastPinch = null;
      if (pointers.size === 0) canvas.classList.remove('dragging');
    }
    canvas.addEventListener('pointerup', endPointer);
    canvas.addEventListener('pointercancel', endPointer);

    // ---- Loop ----

    let dirty = true;
    function frame() {
      if (dirty) {
        render();
        dirty = false;
      }
      requestAnimationFrame(frame);
    }

    function setup() {
      dpr = Math.min(2, window.devicePixelRatio || 1);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.lineJoin = 'round';
      dirty = true;
    }

    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(setup, 150);
    });

    setup();
    requestAnimationFrame(frame);
    setTimeout(() => hint.classList.add('hidden'), 10000);
  </script>
</body>
</html>
