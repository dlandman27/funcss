<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <meta name="description" content="The Password Mint — passwords struck one character tile at a time.">
    <style>
        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --coral: #f0563e;
            --sky: #5aa0db;
            --lime: #b7ce3c;
            --purple: #a98fd0;
            --gold: #f7c948;
            --teal: #2fb0a3;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            background: var(--paper);
            color: var(--ink);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.2rem 1rem 9rem;
            font-family: Georgia, 'Times New Roman', serif;
            user-select: none;
            -webkit-user-select: none;
        }

        header {
            text-align: center;
            margin-bottom: 1.6rem;
        }

        header .dept {
            font-style: italic;
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            opacity: 0.7;
        }

        header h1 {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            font-size: clamp(1.6rem, 6vw, 2.4rem);
            margin: 0.2rem 0 0;
            transform: rotate(-1.5deg);
            display: inline-block;
            background: var(--gold);
            border: 3px solid var(--ink);
            border-radius: 12px;
            box-shadow: 5px 5px 0 var(--ink);
            padding: 0.2em 0.6em;
        }

        #tray {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 7px;
            max-width: 720px;
            min-height: 60px;
            margin-bottom: 1.3rem;
        }

        .tile {
            width: clamp(30px, 8vw, 44px);
            height: clamp(38px, 10vw, 54px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(1rem, 4.4vw, 1.5rem);
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 8px;
            box-shadow: 3px 3px 0 var(--ink);
            cursor: pointer;
            animation: strike 0.32s cubic-bezier(0.2, 1.6, 0.4, 1) backwards;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .tile:hover {
            transform: translate(-2px, -2px) rotate(var(--tilt)) !important;
            box-shadow: 5px 5px 0 var(--ink);
        }

        .tile:active {
            transform: translate(2px, 2px) rotate(var(--tilt)) !important;
            box-shadow: 1px 1px 0 var(--ink);
        }

        @keyframes strike {
            0%   { transform: scale(0.2) rotate(24deg); opacity: 0; }
            60%  { transform: scale(1.18) rotate(calc(var(--tilt) * -1.5)); opacity: 1; }
            100% { transform: scale(1) rotate(var(--tilt)); opacity: 1; }
        }

        .tile.upper  { background: var(--sky); }
        .tile.lower  { background: var(--cream); }
        .tile.digit  { background: var(--gold); }
        .tile.symbol { background: var(--coral); color: var(--cream); -webkit-text-stroke: 1.5px var(--ink); paint-order: stroke fill; }
        .tile.misprint { transform: rotate(180deg) !important; filter: saturate(0.55); }

        #plaque {
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 8px;
            box-shadow: 4px 4px 0 var(--ink);
            padding: 0.55rem 1.2rem;
            font-style: italic;
            font-size: clamp(0.78rem, 2.6vw, 0.95rem);
            text-align: center;
            line-height: 1.5;
            max-width: min(90vw, 480px);
        }

        #plaque b { font-style: normal; }

        .hintline {
            font-style: italic;
            font-size: 0.8rem;
            opacity: 0.6;
            margin-top: 0.7rem;
            transition: opacity 2s ease;
        }

        .hintline.gone { opacity: 0; }

        /* ---------- control pill ---------- */
        #controls {
            position: fixed;
            left: 50%;
            bottom: max(14px, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            background: rgba(32, 26, 23, 0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--ink);
            border-radius: 20px;
            box-shadow: 4px 4px 0 var(--ink);
            padding: 0.7rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            align-items: center;
            width: min(94vw, 540px);
            z-index: 5;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            width: 100%;
        }

        #lenlabel {
            color: var(--cream);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 0.9rem;
            min-width: 8.5ch;
            text-align: right;
        }

        #length {
            flex: 1;
            min-width: 120px;
            accent-color: var(--gold);
            height: 6px;
        }

        .toggle {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 0.78rem;
            padding: 0.3rem 0.8rem;
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 2px 2px 0 var(--ink);
            cursor: pointer;
            color: var(--ink);
            transition: transform 0.1s, opacity 0.15s;
        }

        .toggle[data-on="0"] {
            opacity: 0.35;
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        .toggle:nth-of-type(1) { background: var(--sky); transform: rotate(-3deg); }
        .toggle:nth-of-type(2) { background: var(--cream); transform: rotate(2deg); }
        .toggle:nth-of-type(3) { background: var(--gold); transform: rotate(-2deg); }
        .toggle:nth-of-type(4) { background: var(--coral); transform: rotate(3deg); }

        .action {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            padding: 0.45rem 1.2rem;
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            cursor: pointer;
            color: var(--ink);
            transition: transform 0.12s, box-shadow 0.12s;
        }

        .action:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--ink); }
        .action:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }

        #strike { background: var(--lime); transform: rotate(-2deg); }
        #strike:hover { transform: translate(-2px, -2px) rotate(-2deg); }
        #strike:active { transform: translate(2px, 2px) rotate(-2deg); }
        #copy { background: var(--teal); transform: rotate(1.5deg); }
        #copy:hover { transform: translate(-2px, -2px) rotate(1.5deg); }
        #copy:active { transform: translate(2px, 2px) rotate(1.5deg); }

        #copystamp {
            position: fixed;
            top: 18%;
            left: 50%;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            font-size: clamp(1.6rem, 7vw, 2.6rem);
            background: var(--gold);
            border: 4px double var(--ink);
            border-radius: 12px;
            box-shadow: 5px 5px 0 var(--ink);
            padding: 0.3em 0.7em;
            transform: translateX(-50%) rotate(-7deg);
            visibility: hidden;
            z-index: 10;
            pointer-events: none;
        }

        #copystamp.slam {
            visibility: visible;
            animation: slam 1.6s cubic-bezier(0.25, 1.4, 0.5, 1) forwards;
        }

        @keyframes slam {
            0%   { transform: translateX(-50%) scale(3) rotate(3deg); opacity: 0; }
            12%  { transform: translateX(-50%) scale(1) rotate(-7deg); opacity: 1; }
            75%  { opacity: 1; }
            100% { transform: translateX(-50%) scale(1) rotate(-7deg); opacity: 0; }
        }

        #ledger {
            position: fixed;
            top: 12px;
            right: 14px;
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 0.3rem 0.9rem;
            font-style: italic;
            font-size: 0.85rem;
            transform: rotate(2deg);
            pointer-events: none;
        }

        @media (prefers-reduced-motion: reduce) {
            .tile { animation: none; }
            #copystamp.slam { animation: none; visibility: visible; opacity: 1; }
        }
    </style>
</head>
<body>
    <header>
        <div class="dept">bureau of engraving &amp; entropy</div>
        <h1>The Password Mint</h1>
    </header>

    <div id="tray"></div>
    <div id="plaque"></div>
    <div id="hint" class="hintline">tap any tile to re-strike that character</div>

    <div id="controls">
        <div class="row">
            <span id="lenlabel">16 chars</span>
            <input id="length" type="range" min="8" max="64" value="16" aria-label="password length">
        </div>
        <div class="row">
            <button class="toggle" data-set="upper" data-on="1">A–Z</button>
            <button class="toggle" data-set="lower" data-on="1">a–z</button>
            <button class="toggle" data-set="digit" data-on="1">0–9</button>
            <button class="toggle" data-set="symbol" data-on="1">#!?</button>
        </div>
        <div class="row">
            <button id="strike" class="action">Strike Again</button>
            <button id="copy" class="action">Copy</button>
        </div>
    </div>

    <div id="copystamp">Copied</div>
    <div id="ledger">passwords struck: <span id="struck">0</span></div>

    <script>
        (() => {
            const SETS = {
                upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
                lower: 'abcdefghijklmnopqrstuvwxyz',
                digit: '0123456789',
                symbol: '!@#$%^&*()_+-=[]{};:,.?/'
            };

            const tray = document.getElementById('tray');
            const plaque = document.getElementById('plaque');
            const lengthSlider = document.getElementById('length');
            const lenLabel = document.getElementById('lenlabel');
            const strikeBtn = document.getElementById('strike');
            const copyBtn = document.getElementById('copy');
            const copyStamp = document.getElementById('copystamp');
            const struckEl = document.getElementById('struck');
            const hint = document.getElementById('hint');
            const toggles = [...document.querySelectorAll('.toggle')];
            const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

            let struck = 0;
            try { struck = parseInt(localStorage.getItem('mint-struck')) || 0; } catch (e) {}
            struckEl.textContent = struck;

            let password = [];

            // unbiased random int in [0, n) via rejection sampling
            function randInt(n) {
                const limit = Math.floor(0x100000000 / n) * n;
                const buf = new Uint32Array(1);
                let v;
                do { crypto.getRandomValues(buf); v = buf[0]; } while (v >= limit);
                return v % n;
            }

            function activeSets() {
                return toggles.filter(t => t.dataset.on === '1').map(t => t.dataset.set);
            }

            function classOf(ch) {
                for (const key in SETS) if (SETS[key].includes(ch)) return key;
                return 'lower';
            }

            function poolOf(keys) {
                return keys.map(k => SETS[k]).join('');
            }

            function mint(countIt) {
                const keys = activeSets();
                if (keys.length === 0) {
                    tray.innerHTML = '';
                    password = [];
                    plaque.innerHTML = 'the mint requires at least one alloy. select a character set.';
                    return;
                }
                const len = parseInt(lengthSlider.value, 10);
                const pool = poolOf(keys);

                // one guaranteed character per active set, rest from the full pool
                password = keys.map(k => SETS[k][randInt(SETS[k].length)]);
                while (password.length < len) password.push(pool[randInt(pool.length)]);
                password = password.slice(0, len);

                // crypto Fisher–Yates so the guaranteed chars aren't stuck up front
                for (let i = password.length - 1; i > 0; i--) {
                    const j = randInt(i + 1);
                    [password[i], password[j]] = [password[j], password[i]];
                }

                renderTiles(true);

                if (countIt) {
                    struck++;
                    struckEl.textContent = struck;
                    try { localStorage.setItem('mint-struck', struck); } catch (e) {}
                }
                appraise();
            }

            function renderTiles(stagger) {
                tray.innerHTML = '';
                password.forEach((ch, i) => {
                    const tile = document.createElement('button');
                    tile.className = 'tile ' + classOf(ch);
                    tile.textContent = ch;
                    const tilt = (randInt(9) - 4) + 'deg';
                    tile.style.setProperty('--tilt', tilt);
                    tile.style.transform = 'rotate(' + tilt + ')';
                    if (stagger && !reduced) tile.style.animationDelay = (i * 28) + 'ms';
                    if (randInt(100) < 3) tile.classList.add('misprint');
                    tile.setAttribute('aria-label', 're-strike character ' + (i + 1));
                    tile.addEventListener('click', () => restrike(i, tile));
                    tray.appendChild(tile);
                });
            }

            function restrike(i, tile) {
                const keys = activeSets();
                if (keys.length === 0) return;
                hint.classList.add('gone');
                const pool = poolOf(keys);
                const ch = pool[randInt(pool.length)];
                password[i] = ch;
                const fresh = document.createElement('button');
                fresh.className = 'tile ' + classOf(ch);
                fresh.textContent = ch;
                const tilt = (randInt(9) - 4) + 'deg';
                fresh.style.setProperty('--tilt', tilt);
                fresh.style.transform = 'rotate(' + tilt + ')';
                if (randInt(100) < 3) fresh.classList.add('misprint');
                fresh.setAttribute('aria-label', 're-strike character ' + (i + 1));
                fresh.addEventListener('click', () => restrike(i, fresh));
                tile.replaceWith(fresh);
                appraise();
            }

            function appraise() {
                const keys = activeSets();
                const poolSize = poolOf(keys).length;
                const bits = Math.round(password.length * Math.log2(poolSize));
                plaque.innerHTML =
                    'specimen no. ' + String(struck).padStart(4, '0') +
                    ' · alloy of ' + poolSize + ' characters · <b>' + bits + ' bits</b> of entropy<br>' +
                    'estimated time to crack: <b>' + crackTime(bits) + '</b>';
            }

            function crackTime(bits) {
                // 10 billion guesses/sec, average case = half the keyspace
                const seconds = Math.pow(2, bits - 1) / 1e10;
                const YEAR = 31557600;
                if (seconds < 1) return 'instantly. condolences.';
                if (seconds < 60) return Math.ceil(seconds) + ' seconds';
                if (seconds < 3600) return Math.ceil(seconds / 60) + ' minutes';
                if (seconds < 86400) return Math.ceil(seconds / 3600) + ' hours';
                if (seconds < YEAR) return Math.ceil(seconds / 86400) + ' days';
                const years = seconds / YEAR;
                if (years < 1e3) return Math.ceil(years) + ' years';
                if (years < 1e6) return Math.round(years / 1e3) + ' thousand years';
                if (years < 1e9) return Math.round(years / 1e6) + ' million years';
                if (years < 1e12) return Math.round(years / 1e9) + ' billion years';
                if (years < 1e15) return Math.round(years / 1e12) + ' trillion years';
                return 'longer than the universe intends to be here';
            }

            function copy() {
                if (!password.length) return;
                navigator.clipboard.writeText(password.join('')).then(() => {
                    copyStamp.classList.remove('slam');
                    void copyStamp.offsetWidth;
                    copyStamp.classList.add('slam');
                }).catch(() => {
                    plaque.innerHTML = 'the clipboard declined. select the tiles by hand.';
                });
            }

            toggles.forEach(t => t.addEventListener('click', () => {
                const others = toggles.filter(x => x !== t && x.dataset.on === '1');
                if (t.dataset.on === '1' && others.length === 0) return; // keep one alloy
                t.dataset.on = t.dataset.on === '1' ? '0' : '1';
                mint(false);
            }));

            lengthSlider.addEventListener('input', () => {
                lenLabel.textContent = lengthSlider.value + ' chars';
                mint(false);
            });

            strikeBtn.addEventListener('click', () => mint(true));
            copyBtn.addEventListener('click', copy);

            setTimeout(() => hint.classList.add('gone'), 10000);
            mint(true);
        })();
    </script>
</body>
</html>
