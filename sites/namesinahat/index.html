<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Names in a Hat</title>
    <meta name="description" content="Put names in the hat. Tap the hat. The hat decides.">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --gold: #f7c948;
            --coral: #f0563e;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            background-color: var(--paper);
            background-image: radial-gradient(rgba(32, 26, 23, 0.06) 2px, transparent 2.2px);
            background-size: 22px 22px;
            font-family: Georgia, 'Times New Roman', serif;
            color: var(--ink);
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            gap: 18px;
            padding: 24px 16px;
        }

        h1 {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(24px, 5.5vw, 44px);
            transform: rotate(-1.5deg);
            -webkit-text-stroke: 1.2px var(--ink);
            paint-order: stroke fill;
            color: var(--coral);
            text-shadow: 4px 4px 0 var(--ink);
        }

        /* ---- the hat ---- */

        .hat-area {
            position: relative;
            width: 260px;
            height: 210px;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .hat {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.15s ease;
        }

        .hat-area:hover .hat { transform: rotate(-2deg) scale(1.03); }
        .hat.wobble { animation: wobble 0.7s ease; }

        @keyframes wobble {
            0%, 100% { transform: rotate(0); }
            15% { transform: rotate(-9deg) translateX(-6px); }
            35% { transform: rotate(8deg) translateX(6px); }
            55% { transform: rotate(-6deg); }
            75% { transform: rotate(4deg); }
        }

        .crown {
            position: absolute;
            bottom: 38px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 130px;
            background: var(--ink);
            border-radius: 14px 14px 4px 4px;
            box-shadow: inset -14px 0 0 rgba(255, 248, 239, 0.08);
        }

        .band {
            position: absolute;
            bottom: 44px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 26px;
            background: var(--gold);
            border-top: 3px solid var(--ink);
            border-bottom: 3px solid var(--ink);
        }

        .brim {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 44px;
            background: var(--ink);
            border-radius: 50%;
            box-shadow: 6px 6px 0 rgba(32, 26, 23, 0.25);
        }

        /* paper slips peeking out of the hat */
        .peek {
            position: absolute;
            bottom: 160px;
            width: 26px;
            height: 22px;
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 3px;
        }

        .hat-count {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--gold);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 2px 2px 0 var(--ink);
            padding: 5px 13px;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: 13px;
            transform: rotate(4deg);
            font-variant-numeric: tabular-nums;
        }

        .hat-hint {
            position: absolute;
            bottom: -26px;
            left: 0;
            right: 0;
            text-align: center;
            font-style: italic;
            font-size: 13px;
            color: rgba(32, 26, 23, 0.5);
        }

        /* a slip falling INTO the hat when you add a name */
        .drop-slip {
            position: fixed;
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 4px;
            padding: 4px 12px;
            font-style: italic;
            font-size: 14px;
            pointer-events: none;
            z-index: 60;
            animation: dropIn 0.6s cubic-bezier(0.5, 0, 0.8, 0.4) forwards;
        }

        @keyframes dropIn {
            0% { transform: translate(-50%, 0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(-50%, var(--fall)) rotate(140deg) scale(0.3); opacity: 0; }
        }

        /* ---- input + roster ---- */

        .input-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #nameInput {
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 11px 20px;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 15px;
            background: var(--cream);
            outline: none;
            width: min(60vw, 240px);
            -webkit-user-select: text;
            user-select: text;
        }

        #nameInput.shake { animation: shakeX 0.4s ease; }

        @keyframes shakeX {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .pill {
            background: var(--cream);
            color: var(--ink);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 11px 22px;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .pill.primary { background: var(--gold); }
        .pill:hover { transform: translate(-2px, -2px) rotate(-1.5deg); }
        .pill:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }

        .roster {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: min(92vw, 640px);
        }

        .name-chip {
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 2px 2px 0 var(--ink);
            padding: 7px 16px;
            font-style: italic;
            font-size: 14px;
            cursor: pointer;
            transform: rotate(var(--tilt));
            transition: transform 0.15s ease, background 0.15s ease;
            animation: chipIn 0.3s cubic-bezier(0.22, 1.6, 0.36, 1);
        }

        @keyframes chipIn {
            from { transform: rotate(var(--tilt)) scale(0.2); }
            to { transform: rotate(var(--tilt)) scale(1); }
        }

        .name-chip:hover {
            background: #ffd9d4;
            transform: rotate(var(--tilt)) scale(1.06);
        }

        .name-chip.drawn {
            opacity: 0.45;
            text-decoration: line-through;
        }

        .roster-note {
            font-style: italic;
            font-size: 12px;
            color: rgba(32, 26, 23, 0.45);
        }

        /* ---- the drawn slip / winner ---- */

        #winnerOverlay {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            z-index: 100;
            background: rgba(242, 237, 226, 0.9);
            backdrop-filter: blur(3px);
            padding: 20px;
        }

        #winnerOverlay.show { display: flex; }

        .winner-slip {
            background: var(--cream);
            border: 3px solid var(--ink);
            border-radius: 12px;
            box-shadow: 8px 8px 0 var(--ink);
            padding: clamp(26px, 5vw, 50px) clamp(34px, 7vw, 70px);
            transform: rotate(-2deg);
            animation: slipOut 0.7s cubic-bezier(0.22, 1.5, 0.36, 1);
            position: relative;
            text-align: center;
        }

        .winner-slip::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 2px dashed rgba(32, 26, 23, 0.2);
            border-radius: 8px;
            pointer-events: none;
        }

        @keyframes slipOut {
            0% { transform: translateY(45vh) rotate(30deg) scale(0.2); opacity: 0; }
            60% { transform: translateY(-20px) rotate(-5deg) scale(1.08); opacity: 1; }
            100% { transform: translateY(0) rotate(-2deg) scale(1); }
        }

        .winner-label {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 0.2em;
            color: rgba(32, 26, 23, 0.45);
            margin-bottom: 8px;
        }

        #winnerName {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(34px, 8vw, 76px);
            color: var(--coral);
            -webkit-text-stroke: 1.5px var(--ink);
            paint-order: stroke fill;
            text-shadow: 4px 4px 0 var(--ink);
            max-width: 84vw;
            overflow-wrap: break-word;
        }

        .winner-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        /* results */
        #results { display: none; flex-direction: column; align-items: center; gap: 14px; }
        #results.show { display: flex; }

        .order-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 46vh;
            overflow-y: auto;
            padding: 4px;
        }

        .order-item {
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 2px 2px 0 var(--ink);
            padding: 8px 24px;
            font-size: 15px;
            transform: rotate(var(--tilt));
        }

        .order-item b { font-family: 'Arial Black', 'Segoe UI', sans-serif; margin-right: 8px; }

        #fx { position: fixed; inset: 0; pointer-events: none; z-index: 150; }

        #toast {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg) scale(0);
            background: #ffd9d4;
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 9px 22px;
            font-style: italic;
            font-size: 14px;
            z-index: 200;
            pointer-events: none;
        }

        #toast.show { animation: toastIn 1.8s ease forwards; }

        @keyframes toastIn {
            0% { transform: translateX(-50%) rotate(-2deg) scale(0); }
            15% { transform: translateX(-50%) rotate(-2deg) scale(1.05); }
            22% { transform: translateX(-50%) rotate(-2deg) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <h1>NAMES IN A HAT</h1>

    <div class="hat-area" id="hatArea" title="tap the hat to draw a name">
        <div class="hat" id="hat">
            <div class="peeks" id="peeks"></div>
            <div class="crown"></div>
            <div class="band"></div>
            <div class="brim"></div>
        </div>
        <div class="hat-count" id="hatCount">0</div>
        <div class="hat-hint" id="hatHint">add names below, then tap the hat</div>
    </div>

    <div class="input-row">
        <input type="text" id="nameInput" maxlength="24" placeholder="toss a name in&hellip;" autocomplete="off">
        <button class="pill primary" id="addBtn">in it goes</button>
        <button class="pill" id="clearBtn">empty the hat</button>
    </div>

    <div class="roster" id="roster"></div>
    <div class="roster-note" id="rosterNote"></div>

    <div id="winnerOverlay">
        <div class="winner-slip" id="winnerSlip">
            <div class="winner-label">THE HAT HAS CHOSEN</div>
            <div id="winnerName"></div>
        </div>
        <div class="winner-buttons" id="winnerButtons">
            <button class="pill primary" id="keepOutBtn">they're out &mdash; draw the next</button>
            <button class="pill" id="putBackBtn">put them back in</button>
            <button class="pill" id="doneBtn">done</button>
        </div>
        <div id="results">
            <div class="winner-label">THE ORDER OF THE HAT</div>
            <div class="order-list" id="orderList"></div>
            <button class="pill primary" id="newRoundBtn">refill the hat</button>
        </div>
    </div>

    <canvas id="fx"></canvas>
    <div id="toast"></div>

    <script>
        const INK = '#201a17';
        const CONFETTI = ['#f7c948', '#f0563e', '#5aa0db', '#b7ce3c', '#a98fd0', '#ff7fa5'];
        const jit = (n) => (Math.random() - 0.5) * n;

        let names = [];       // {name, drawn}
        let order = [];

        try {
            const saved = JSON.parse(localStorage.getItem('namesinahat'));
            if (saved && Array.isArray(saved.names)) {
                names = saved.names;
                order = saved.order || [];
            }
        } catch (e) {}

        function save() {
            try { localStorage.setItem('namesinahat', JSON.stringify({ names, order })); } catch (e) {}
        }

        const inHat = () => names.filter(n => !n.drawn);

        // ---- rendering ----

        function render() {
            const roster = document.getElementById('roster');
            roster.textContent = '';
            for (const entry of names) {
                const chip = document.createElement('div');
                chip.className = 'name-chip' + (entry.drawn ? ' drawn' : '');
                chip.textContent = entry.name;
                chip.title = 'tap to remove';
                chip.style.setProperty('--tilt', jit(6).toFixed(1) + 'deg');
                chip.addEventListener('click', () => {
                    names = names.filter(n => n !== entry);
                    save();
                    render();
                });
                roster.appendChild(chip);
            }
            document.getElementById('rosterNote').textContent =
                names.length ? 'tap a name to remove it' : '';
            document.getElementById('hatCount').textContent = inHat().length;
            document.getElementById('hatHint').textContent =
                inHat().length ? 'tap the hat to draw' : 'add names below, then tap the hat';

            // slips peeking out of the crown
            const peeks = document.getElementById('peeks');
            peeks.textContent = '';
            const n = Math.min(6, inHat().length);
            for (let i = 0; i < n; i++) {
                const p = document.createElement('div');
                p.className = 'peek';
                p.style.left = 62 + i * 24 + jit(6) + 'px';
                p.style.transform = `rotate(${jit(30)}deg)`;
                peeks.appendChild(p);
            }
        }

        // ---- adding names ----

        function addName() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            if (!name) {
                input.classList.remove('shake');
                void input.offsetWidth;
                input.classList.add('shake');
                return;
            }
            if (names.length >= 50) { toast('the hat is at capacity. it is a hat.'); return; }
            if (names.some(n => n.name.toLowerCase() === name.toLowerCase())) {
                toast(`${name} is already in the hat`);
                input.select();
                return;
            }
            names.push({ name, drawn: false });
            input.value = '';
            input.focus();
            save();
            render();

            // a slip visibly falls into the hat
            const hatRect = document.getElementById('hatArea').getBoundingClientRect();
            const slip = document.createElement('div');
            slip.className = 'drop-slip';
            slip.textContent = name;
            slip.style.left = hatRect.left + hatRect.width / 2 + 'px';
            slip.style.top = hatRect.top - 30 + 'px';
            slip.style.setProperty('--fall', hatRect.height * 0.55 + 'px');
            document.body.appendChild(slip);
            setTimeout(() => slip.remove(), 650);
        }

        document.getElementById('addBtn').addEventListener('click', addName);
        document.getElementById('nameInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addName();
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            names = [];
            order = [];
            save();
            render();
        });

        // ---- drawing from the hat ----

        let current = null;

        document.getElementById('hatArea').addEventListener('click', () => {
            const pool = inHat();
            if (!pool.length) {
                toast(names.length ? 'the hat is empty. refill it.' : 'the hat needs names first');
                return;
            }
            const hat = document.getElementById('hat');
            hat.classList.remove('wobble');
            void hat.offsetWidth;
            hat.classList.add('wobble');

            setTimeout(() => {
                current = pool[(Math.random() * pool.length) | 0];
                document.getElementById('winnerName').textContent = current.name;
                document.getElementById('winnerButtons').style.display = 'flex';
                document.getElementById('winnerSlip').style.display = 'block';
                document.getElementById('results').classList.remove('show');
                document.getElementById('winnerOverlay').classList.add('show');
                const slip = document.getElementById('winnerSlip');
                slip.style.animation = 'none';
                void slip.offsetWidth;
                slip.style.animation = '';
                burst(window.innerWidth / 2, window.innerHeight * 0.35, 34);
            }, 500);
        });

        function closeOverlayAndMaybeContinue(drawNext) {
            if (!inHat().length) {
                showResults();
                return;
            }
            document.getElementById('winnerOverlay').classList.remove('show');
            if (drawNext) setTimeout(() => document.getElementById('hatArea').click(), 250);
        }

        document.getElementById('keepOutBtn').addEventListener('click', () => {
            current.drawn = true;
            order.push(current.name);
            save();
            render();
            closeOverlayAndMaybeContinue(true);
        });

        document.getElementById('putBackBtn').addEventListener('click', () => {
            document.getElementById('winnerOverlay').classList.remove('show');
        });

        document.getElementById('doneBtn').addEventListener('click', () => {
            if (current && !current.drawn) {
                current.drawn = true;
                order.push(current.name);
                save();
                render();
            }
            document.getElementById('winnerOverlay').classList.remove('show');
        });

        function showResults() {
            document.getElementById('winnerSlip').style.display = 'none';
            document.getElementById('winnerButtons').style.display = 'none';
            const list = document.getElementById('orderList');
            list.textContent = '';
            order.forEach((name, i) => {
                const item = document.createElement('div');
                item.className = 'order-item';
                item.style.setProperty('--tilt', jit(3).toFixed(1) + 'deg');
                item.innerHTML = `<b>${i + 1}.</b>${name}`;
                list.appendChild(item);
            });
            document.getElementById('results').classList.add('show');
            burst(window.innerWidth / 2, window.innerHeight * 0.3, 60);
        }

        document.getElementById('newRoundBtn').addEventListener('click', () => {
            for (const n of names) n.drawn = false;
            order = [];
            save();
            render();
            document.getElementById('winnerOverlay').classList.remove('show');
        });

        // ---- confetti + toast ----

        const fxCanvas = document.getElementById('fx');
        const fxCtx = fxCanvas.getContext('2d');
        const bits = [];
        let raf = null;

        function sizeFx() {
            fxCanvas.width = window.innerWidth;
            fxCanvas.height = window.innerHeight;
        }

        function burst(x, y, n) {
            for (let i = 0; i < n; i++) {
                const a = Math.random() * Math.PI * 2;
                const v = 2 + Math.random() * 5;
                bits.push({
                    x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v - 3, g: 0.14,
                    w: 5 + Math.random() * 4, h: 3 + Math.random() * 3,
                    rot: Math.random() * Math.PI, vrot: jit(0.3),
                    color: CONFETTI[(Math.random() * CONFETTI.length) | 0],
                    life: 1, decay: 0.012,
                });
            }
            if (!raf) raf = requestAnimationFrame(loop);
        }

        function loop() {
            raf = null;
            fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
            for (let i = bits.length - 1; i >= 0; i--) {
                const p = bits[i];
                p.life -= p.decay;
                if (p.life <= 0) { bits.splice(i, 1); continue; }
                p.vy += p.g;
                p.x += p.vx;
                p.y += p.vy;
                p.rot += p.vrot;
                fxCtx.save();
                fxCtx.translate(p.x, p.y);
                fxCtx.rotate(p.rot);
                fxCtx.globalAlpha = Math.min(1, p.life * 1.5);
                fxCtx.fillStyle = p.color;
                fxCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                fxCtx.lineWidth = 1.3;
                fxCtx.strokeStyle = INK;
                fxCtx.strokeRect(-p.w / 2, -p.h / 2, p.w, p.h);
                fxCtx.restore();
            }
            fxCtx.globalAlpha = 1;
            if (bits.length) raf = requestAnimationFrame(loop);
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('show');
            void t.offsetWidth;
            t.classList.add('show');
        }

        window.addEventListener('resize', sizeFx);
        sizeFx();
        render();
    </script>
</body>
</html>
