<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Affirmations</title>
    <meta name="description" content="Take a number at the municipal office of morale — affirmations, notarized.">
    <style>
        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --gold: #f7c948;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            background: var(--paper);
            color: var(--ink);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: clamp(2rem, 8vh, 4.5rem) 1.2rem 3rem;
            font-family: Georgia, 'Times New Roman', serif;
        }

        header {
            text-align: center;
            margin-bottom: 2.2rem;
        }

        header .dept {
            font-style: italic;
            font-size: 0.78rem;
            letter-spacing: 0.18em;
            opacity: 0.45;
        }

        header h1 {
            font-weight: normal;
            font-variant: small-caps;
            letter-spacing: 0.12em;
            font-size: clamp(1.5rem, 5vw, 2.1rem);
            margin: 0.4rem 0 0;
            opacity: 0.9;
        }

        header .rule {
            width: 64px;
            border: none;
            border-top: 1px solid rgba(32, 26, 23, 0.35);
            margin: 1rem auto 0;
        }

        #pull {
            font-family: Georgia, 'Times New Roman', serif;
            font-style: italic;
            font-size: 1rem;
            letter-spacing: 0.08em;
            color: var(--ink);
            background: var(--cream);
            border: 1px solid rgba(32, 26, 23, 0.4);
            border-radius: 3px;
            padding: 0.75rem 2.2rem;
            cursor: pointer;
            margin-bottom: 2.4rem;
            transition: background 0.3s, border-color 0.3s;
            box-shadow: 0 1px 0 rgba(32, 26, 23, 0.15);
        }

        #pull:hover {
            background: #fff;
            border-color: rgba(32, 26, 23, 0.65);
        }

        #pull:active { transform: translateY(1px); }

        #tickets {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.1rem;
            width: 100%;
        }

        .ticket {
            background: var(--cream);
            border: 1px solid rgba(32, 26, 23, 0.3);
            border-radius: 2px;
            width: min(92vw, 430px);
            padding: 1.1rem 1.5rem 1rem;
            position: relative;
            box-shadow: 0 1px 2px rgba(32, 26, 23, 0.08);
            animation: settle 0.9s ease both;
        }

        /* perforated top edge, like a pulled tab */
        .ticket::before {
            content: '';
            position: absolute;
            top: 0;
            left: 8px;
            right: 8px;
            border-top: 1px dashed rgba(32, 26, 23, 0.3);
        }

        .ticket.gold {
            background: linear-gradient(180deg, #fdf3d3, var(--cream) 85%);
        }

        .ticket.gold .stampline::after {
            content: ' · valid forever';
        }

        @keyframes settle {
            0%   { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .ticket .serialrow {
            display: flex;
            justify-content: space-between;
            font-size: 0.68rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            opacity: 0.4;
            padding-bottom: 0.55rem;
            margin-bottom: 0.7rem;
            border-bottom: 1px solid rgba(32, 26, 23, 0.12);
        }

        .ticket .words {
            font-size: clamp(1rem, 3.2vw, 1.15rem);
            line-height: 1.65;
            font-style: italic;
            text-align: center;
            padding: 0 0.2rem;
            opacity: 0.92;
        }

        .ticket .stampline {
            text-align: right;
            font-size: 0.62rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            opacity: 0.35;
            margin-top: 0.8rem;
        }

        .ticket.old { opacity: 0.55; animation: none; }

        #ledger {
            position: fixed;
            top: 16px;
            right: 20px;
            font-style: italic;
            font-size: 0.78rem;
            opacity: 0.35;
            pointer-events: none;
        }

        @media (prefers-reduced-motion: reduce) {
            .ticket { animation: none; }
        }
    </style>
</head>
<body>
    <header>
        <div class="dept">municipal office of morale · window 4</div>
        <h1>Daily Affirmations</h1>
        <hr class="rule">
    </header>

    <button id="pull">take a number</button>

    <div id="tickets"></div>

    <div id="ledger">tickets issued: <span id="issued">0</span></div>

    <script>
        (() => {
            const AFFIRMATIONS = [
                "You are doing better than the paperwork suggests.",
                "Your presence today has been noted, and appreciated.",
                "The office finds no evidence that you are behind in life.",
                "Whatever you didn't finish yesterday has been rolled over without penalty.",
                "You have survived one hundred percent of your difficult days. The record stands.",
                "Rest is a sanctioned activity.",
                "Your best was sufficient today, per section 4.",
                "No comparison to others is required at this window.",
                "You may proceed at your own pace. The queue will hold.",
                "Growth confirmed since your last visit. No further inspection needed.",
                "You are allowed to take up space. This permit does not expire.",
                "Today's mistakes have been filed under 'learning'. Case closed.",
                "The committee reviewed your worries. Most were dismissed for lack of evidence.",
                "Drink some water. It's in the regulations.",
                "Being a work in progress is a valid filing status.",
                "Your feelings have been received and are considered legitimate.",
                "Kindness rendered to yourself qualifies for full reimbursement.",
                "The standard you hold yourself to has been ruled unreasonably high.",
                "Nothing is wrong with you that isn't also on file for everyone else.",
                "Permission to be proud of small things: granted.",
                "Your existence continues to meet all requirements.",
                "It is officially acceptable to not know yet.",
                "The deadline you're afraid of is softer than it looks.",
                "You were missed while you were away. This is on record.",
                "Asking for help is listed as a strength in the current edition.",
                "Your progress is real, even where it is not visible from the street.",
                "The person you were five years ago would be impressed. We checked.",
                "Breathing counts as doing something.",
                "You have been approved for one (1) unearned good day.",
                "Somebody thought about you today. This office cannot disclose who.",
                "Your track record of getting through things remains unbroken.",
                "'Enough' has been recertified to include you.",
                "The plans you abandoned were disposed of properly. No fines were assessed.",
                "You may put it down now. It will still be here tomorrow.",
                "An audit of your worth found no deficiencies.",
                "Trying again is fully covered under your existing policy.",
                "You noticed something beautiful recently. That has been counted.",
                "Feeling behind is a clerical illusion. The schedule was never real.",
                "This ticket entitles the bearer to one deep breath, redeemable immediately.",
                "This office has no record of anyone doing this perfectly."
            ];

            const pullBtn = document.getElementById('pull');
            const tickets = document.getElementById('tickets');
            const issuedEl = document.getElementById('issued');
            const MAX_ON_DESK = 6;

            let issued = 0;
            try { issued = parseInt(localStorage.getItem('morale-issued')) || 0; } catch (e) {}
            issuedEl.textContent = issued;

            // deterministic per-day pick for the first ticket of the visit
            function mulberry32(a) {
                return function () {
                    a |= 0; a = a + 0x6D2B79F5 | 0;
                    let t = Math.imul(a ^ a >>> 15, 1 | a);
                    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                    return ((t ^ t >>> 14) >>> 0) / 4294967296;
                };
            }

            function todaySeed() {
                const d = new Date();
                return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
            }

            function todayStamp() {
                const d = new Date();
                const p = v => String(v).padStart(2, '0');
                return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
            }

            let pullsToday = 0;

            function pickAffirmation() {
                if (pullsToday === 0) {
                    const rng = mulberry32(todaySeed());
                    return AFFIRMATIONS[Math.floor(rng() * AFFIRMATIONS.length)];
                }
                return AFFIRMATIONS[Math.floor(Math.random() * AFFIRMATIONS.length)];
            }

            function issueTicket() {
                const words = pickAffirmation();
                issued++;
                pullsToday++;
                issuedEl.textContent = issued;
                try { localStorage.setItem('morale-issued', issued); } catch (e) {}

                const t = document.createElement('div');
                t.className = 'ticket';
                if (Math.random() < 0.03) t.classList.add('gold');
                t.innerHTML =
                    '<div class="serialrow"><span>no. ' + String(issued).padStart(6, '0') + '</span>' +
                    '<span>' + todayStamp() + '</span></div>' +
                    '<div class="words">' + words + '</div>' +
                    '<div class="stampline">' + (pullsToday === 1 ? 'affirmation of the day · ' : '') +
                    'issued without appointment</div>';

                [...tickets.children].forEach(c => c.classList.add('old'));
                tickets.prepend(t);
                while (tickets.children.length > MAX_ON_DESK) {
                    tickets.lastChild.remove();
                }
            }

            pullBtn.addEventListener('click', issueTicket);
        })();
    </script>
</body>
</html>
