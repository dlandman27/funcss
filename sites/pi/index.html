<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Digit Distribution</title>
    <meta name="description" content="A census of the first million digits of π — sweep the count and watch the digits jockey.">
    <style>
        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --coral: #f0563e;
            --sky: #5aa0db;
            --lime: #b7ce3c;
            --purple: #a98fd0;
            --orange: #f47b28;
            --pink: #ff7fa5;
            --teal: #2fb0a3;
            --gold: #f7c948;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            background: var(--paper);
            color: var(--ink);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.2rem 0.8rem 8.5rem;
            font-family: Georgia, 'Times New Roman', serif;
            user-select: none;
            -webkit-user-select: none;
        }

        header {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        header .dept {
            font-style: italic;
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            opacity: 0.7;
        }

        header h1 {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            font-size: clamp(1.3rem, 5.5vw, 2rem);
            margin: 0.25rem 0 0;
            display: inline-block;
            background: var(--sky);
            border: 3px solid var(--ink);
            border-radius: 12px;
            box-shadow: 5px 5px 0 var(--ink);
            padding: 0.2em 0.6em;
            transform: rotate(-1.5deg);
        }

        #chart {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: clamp(4px, 1.4vw, 12px);
            height: min(44vh, 340px);
            width: min(96vw, 700px);
            margin-bottom: 0.4rem;
        }

        .col {
            flex: 1;
            max-width: 58px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
            position: relative;
        }

        .pct {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: clamp(0.55rem, 1.8vw, 0.78rem);
            margin-bottom: 4px;
            white-space: nowrap;
        }

        .bar {
            width: 100%;
            border: 2px solid var(--ink);
            border-radius: 7px 7px 3px 3px;
            box-shadow: 3px 3px 0 var(--ink);
            min-height: 6px;
            transition: height 0.12s linear;
        }

        .crown {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%) rotate(-8deg);
            background: var(--gold);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 2px 2px 0 var(--ink);
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 0.55rem;
            padding: 0.15em 0.55em;
            text-transform: uppercase;
            visibility: hidden;
            z-index: 2;
        }

        .crown.on {
            visibility: visible;
            animation: pop 0.3s cubic-bezier(0.2, 1.6, 0.4, 1);
        }

        @keyframes pop {
            0%   { transform: translateX(-50%) scale(0.2) rotate(20deg); }
            60%  { transform: translateX(-50%) scale(1.15) rotate(-10deg); }
            100% { transform: translateX(-50%) scale(1) rotate(-8deg); }
        }

        .digitchip {
            margin-top: 8px;
            width: clamp(24px, 6vw, 36px);
            height: clamp(24px, 6vw, 36px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(0.8rem, 2.6vw, 1.1rem);
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 8px;
            box-shadow: 2px 2px 0 var(--ink);
        }

        #plaque {
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 8px;
            box-shadow: 4px 4px 0 var(--ink);
            padding: 0.55rem 1.2rem;
            font-style: italic;
            font-size: clamp(0.78rem, 2.6vw, 0.95rem);
            text-align: center;
            line-height: 1.5;
            max-width: min(94vw, 560px);
            margin-top: 1.4rem;
        }

        #plaque b { font-style: normal; }

        #feynman {
            font-style: italic;
            font-size: 0.78rem;
            opacity: 0;
            margin-top: 0.6rem;
            transition: opacity 1.2s ease;
            text-align: center;
            max-width: 90vw;
        }

        #feynman.on { opacity: 0.75; }

        /* ---------- control pill ---------- */
        #controls {
            position: fixed;
            left: 50%;
            bottom: max(14px, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            background: rgba(32, 26, 23, 0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--ink);
            border-radius: 20px;
            box-shadow: 4px 4px 0 var(--ink);
            padding: 0.7rem 1.1rem;
            display: flex;
            gap: 0.9rem;
            align-items: center;
            width: min(94vw, 520px);
            z-index: 5;
        }

        #play {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            padding: 0.45rem 1.1rem;
            background: var(--lime);
            color: var(--ink);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            cursor: pointer;
            transform: rotate(-2deg);
            transition: transform 0.12s, box-shadow 0.12s;
            white-space: nowrap;
        }

        #play:hover { transform: translate(-2px, -2px) rotate(-2deg); box-shadow: 5px 5px 0 var(--ink); }
        #play:active { transform: translate(2px, 2px) rotate(-2deg); box-shadow: 1px 1px 0 var(--ink); }

        .sliderwrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        #count {
            color: var(--cream);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 0.82rem;
            text-align: center;
        }

        #n {
            width: 100%;
            accent-color: var(--gold);
            height: 6px;
        }
    </style>
</head>
<body>
    <header>
        <div class="dept">bureau of irrational statistics</div>
        <h1>The Digit Census of π</h1>
    </header>

    <div id="chart"></div>
    <div id="plaque">the census office is opening its ledgers…</div>
    <div id="feynman">footnote: positions 762–767 read 999999. the bureau double-checked. π was not joking.</div>

    <div id="controls">
        <button id="play">Run Census</button>
        <div class="sliderwrap">
            <div id="count">1,000 digits</div>
            <input id="n" type="range" min="0" max="1000" value="250" aria-label="number of digits counted">
        </div>
    </div>

    <script>
        (() => {
            const COLORS = ['#f0563e', '#5aa0db', '#b7ce3c', '#a98fd0', '#f47b28',
                            '#ff7fa5', '#2fb0a3', '#f7c948', '#cfc8ba', '#fff8ef'];
            const MIN_N = 100, MAX_N = 1000000;

            const chart = document.getElementById('chart');
            const plaque = document.getElementById('plaque');
            const feynman = document.getElementById('feynman');
            const playBtn = document.getElementById('play');
            const slider = document.getElementById('n');
            const countEl = document.getElementById('count');

            let digits = '';
            const counts = new Array(10).fill(0);
            let counted = 0;        // how many digits are currently in `counts`
            let leader = -1;
            let playing = false;
            let rafId = null;

            // build the ten columns
            const cols = [];
            for (let d = 0; d <= 9; d++) {
                const col = document.createElement('div');
                col.className = 'col';
                col.innerHTML =
                    '<div class="crown">leader</div>' +
                    '<div class="pct">–</div>' +
                    '<div class="bar" style="background:' + COLORS[d] + ';height:6px"></div>' +
                    '<div class="digitchip">' + d + '</div>';
                chart.appendChild(col);
                cols.push({
                    crown: col.querySelector('.crown'),
                    pct: col.querySelector('.pct'),
                    bar: col.querySelector('.bar')
                });
            }

            // slider is logarithmic: 0..1000 -> 100..1,000,000
            function sliderToN(v) {
                return Math.round(MIN_N * Math.pow(MAX_N / MIN_N, v / 1000));
            }
            function nToSlider(n) {
                return Math.round(1000 * Math.log(n / MIN_N) / Math.log(MAX_N / MIN_N));
            }

            // move the running tally to exactly n digits — incremental both ways
            function setCounted(n) {
                n = Math.max(MIN_N, Math.min(MAX_N, n));
                while (counted < n) counts[digits.charCodeAt(counted++) - 48]++;
                while (counted > n) counts[digits.charCodeAt(--counted) - 48]--;
            }

            function render() {
                const chipZone = 60;   // px reserved under the bars
                const maxH = chart.clientHeight - chipZone;
                const max = Math.max(...counts);
                const min = Math.min(...counts);
                const span = Math.max(max - min, 1);

                let lead = 0;
                for (let d = 1; d <= 9; d++) if (counts[d] > counts[lead]) lead = d;

                for (let d = 0; d <= 9; d++) {
                    // zoomed range so the race is visible even at a million digits
                    const t = (counts[d] - min) / span;
                    cols[d].bar.style.height = Math.round(maxH * (0.25 + 0.75 * t)) + 'px';
                    cols[d].pct.textContent = (counts[d] / counted * 100).toFixed(counted > 20000 ? 2 : 1) + '%';
                    if (d !== lead) cols[d].crown.classList.remove('on');
                }
                if (leader !== lead) {
                    cols[lead].crown.classList.remove('on');
                    void cols[lead].crown.offsetWidth;
                }
                cols[lead].crown.classList.add('on');
                leader = lead;

                const sorted = [...counts].sort((a, b) => b - a);
                const marginVotes = sorted[0] - sorted[1];
                const runnerUp = counts.indexOf(sorted[1]);
                plaque.innerHTML =
                    '<b>' + counted.toLocaleString() + '</b> digits interviewed. ' +
                    'digit <b>' + lead + '</b> leads with <b>' + counts[lead].toLocaleString() +
                    '</b> residents — ahead of digit ' + runnerUp + ' by ' + marginVotes.toLocaleString() + '.<br>' +
                    'in a fair universe each digit holds 10%. the gaps below are magnified for drama.';

                feynman.classList.toggle('on', counted >= 768);
                countEl.textContent = counted.toLocaleString() + ' digits';
            }

            function jumpTo(n) {
                setCounted(n);
                render();
            }

            // ---------- the sweep ----------
            function sweep() {
                if (!playing) return;
                const next = Math.min(MAX_N, Math.max(counted + 1, Math.round(counted * 1.035)));
                setCounted(next);
                slider.value = nToSlider(counted);
                render();
                if (counted >= MAX_N) {
                    stopSweep();
                    plaque.innerHTML += '<br><b>census complete.</b> one million digits accounted for. none missing.';
                } else {
                    rafId = requestAnimationFrame(sweep);
                }
            }

            function startSweep() {
                if (counted >= MAX_N) jumpTo(MIN_N);
                playing = true;
                playBtn.textContent = 'Pause';
                rafId = requestAnimationFrame(sweep);
            }

            function stopSweep() {
                playing = false;
                playBtn.textContent = 'Run Census';
                cancelAnimationFrame(rafId);
            }

            playBtn.addEventListener('click', () => playing ? stopSweep() : startSweep());

            slider.addEventListener('input', () => {
                stopSweep();
                jumpTo(sliderToN(parseInt(slider.value, 10)));
            });

            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(render, 150);
            });

            // ---------- load π ----------
            fetch('pi.txt')
                .then(r => {
                    if (!r.ok) throw new Error(r.status);
                    return r.text();
                })
                .then(t => {
                    digits = t.replace(/[^0-9]/g, '');
                    jumpTo(sliderToN(parseInt(slider.value, 10)));
                })
                .catch(() => {
                    plaque.textContent = 'π did not respond to the census. it is irrational like that. refresh to re-issue the summons.';
                    playBtn.disabled = true;
                });
        })();
    </script>
</body>
</html>
