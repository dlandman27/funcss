<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Meters</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #080808;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ring fills the smallest viewport dimension */
        .ring-wrap {
            position: relative;
            width: 100vmin;
            height: 100vmin;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Center clock */
        .center-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .c-time {
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            font-size: clamp(1rem, 4.5vmin, 2.8rem);
            font-weight: 100;
            letter-spacing: 0.06em;
            color: rgba(255,255,255,0.85);
            font-variant-numeric: tabular-nums;
        }

        .c-date {
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            font-size: clamp(0.45rem, 1.4vmin, 0.75rem);
            color: rgba(255,255,255,0.22);
            letter-spacing: 0.2em;
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* Hint text — fades after load */
        .hint {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.22);
            pointer-events: none;
            transition: opacity 1s ease;
        }

        /* Info bar — slides up on hover / tap */
        .info-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 18px 36px 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            background: rgba(12, 12, 16, 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255,255,255,0.07);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .info-bar.visible {
            transform: translateY(0);
        }

        .info-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .info-name {
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: 600;
            letter-spacing: 0.06em;
            color: #fff;
        }

        .info-pct {
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-left: auto;
        }

        .info-rem {
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            font-size: clamp(0.65rem, 1.5vw, 0.85rem);
            color: rgba(255,255,255,0.38);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            margin-left: 12px;
        }
    </style>
</head>
<body>

<div class="ring-wrap">
    <svg viewBox="0 0 800 800" id="svg"></svg>
    <div class="center-overlay">
        <div class="c-time" id="c-time">--:--:--</div>
        <div class="c-date"  id="c-date"></div>
    </div>
</div>

<div class="hint" id="hint">tap a ring</div>

<div class="info-bar" id="info-bar">
    <div class="info-dot" id="info-dot"></div>
    <div class="info-name" id="info-name"></div>
    <div class="info-pct"  id="info-pct"></div>
    <div class="info-rem"  id="info-rem"></div>
</div>

<script>
const RINGS = [
    { id: 'day',        label: 'Day',        color: '#FF4B6E' },
    { id: 'week',       label: 'Week',       color: '#34D399' },
    { id: 'month',      label: 'Month',      color: '#60A5FA' },
    { id: 'year',       label: 'Year',       color: '#C084FC' },
    { id: 'decade',     label: 'Decade',     color: '#FB923C' },
    { id: 'century',    label: 'Century',    color: '#22D3EE' },
    { id: 'millennium', label: 'Millennium', color: '#FDE047' },
];

const CX = 400, CY = 400;
const SW  = 30;   // stroke width
const GAP = 47;   // ring spacing
const R0  = 58;   // innermost radius
const NS  = 'http://www.w3.org/2000/svg';

const svg     = document.getElementById('svg');
const infoBar = document.getElementById('info-bar');
const hint    = document.getElementById('hint');

// Layers
function makeG(rot) {
    const g = document.createElementNS(NS, 'g');
    if (rot) g.setAttribute('transform', `rotate(-90 ${CX} ${CY})`);
    svg.appendChild(g);
    return g;
}
const trackG = makeG(true);
const arcG   = makeG(true);
const tipG   = makeG(false);  // visual coords
const hitG   = makeG(false);  // hit areas, no rotation needed (full circles)

let activeRing = null;
let hideTimer  = null;

RINGS.forEach((ring, i) => {
    const r   = R0 + i * GAP;
    ring.r    = r;
    ring.circ = 2 * Math.PI * r;

    // Track
    const track = document.createElementNS(NS, 'circle');
    track.setAttribute('cx', CX); track.setAttribute('cy', CY); track.setAttribute('r', r);
    track.setAttribute('fill', 'none');
    track.setAttribute('stroke', ring.color);
    track.setAttribute('stroke-width', SW);
    track.setAttribute('stroke-opacity', '0.1');
    trackG.appendChild(track);

    // Arc
    const arc = document.createElementNS(NS, 'circle');
    arc.setAttribute('cx', CX); arc.setAttribute('cy', CY); arc.setAttribute('r', r);
    arc.setAttribute('fill', 'none');
    arc.setAttribute('stroke', ring.color);
    arc.setAttribute('stroke-width', SW);
    arc.setAttribute('stroke-linecap', 'round');
    arc.setAttribute('stroke-dasharray', ring.circ);
    arc.setAttribute('stroke-dashoffset', ring.circ);
    arc.style.filter = `drop-shadow(0 0 7px ${ring.color}bb) drop-shadow(0 0 20px ${ring.color}55)`;
    arc.style.transition = 'stroke-dashoffset 1s cubic-bezier(0.16, 1, 0.3, 1), stroke-width 0.2s ease, opacity 0.2s ease';
    arcG.appendChild(arc);
    ring.arc = arc;

    // Tip dot
    const tip = document.createElementNS(NS, 'circle');
    tip.setAttribute('r', SW / 2 + 2);
    tip.setAttribute('cx', CX); tip.setAttribute('cy', CY - r);
    tip.setAttribute('fill', '#fff');
    tip.style.filter = `drop-shadow(0 0 6px ${ring.color}) drop-shadow(0 0 16px ${ring.color})`;
    tip.style.opacity = '0';
    tip.style.transition = 'opacity 0.2s ease';
    tipG.appendChild(tip);
    ring.tip = tip;

    // Hit area — full invisible circle ring (no rotation needed)
    const hit = document.createElementNS(NS, 'circle');
    hit.setAttribute('cx', CX); hit.setAttribute('cy', CY); hit.setAttribute('r', r);
    hit.setAttribute('fill', 'none');
    hit.setAttribute('stroke', 'transparent');
    hit.setAttribute('stroke-width', SW + 24);
    hit.style.cursor = 'pointer';

    const enter = () => showRing(ring);
    const leave = () => scheduleHide();

    hit.addEventListener('mouseenter', enter);
    hit.addEventListener('mouseleave', leave);
    hit.addEventListener('click', () => {
        if (activeRing === ring) { hideInfo(); } else { showRing(ring); }
    });
    hit.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (activeRing === ring) { hideInfo(); } else { showRing(ring); }
    }, { passive: false });

    hitG.appendChild(hit);
    ring.hit = hit;
});

// Dismiss hint after 3s
setTimeout(() => { hint.style.opacity = '0'; }, 3000);
setTimeout(() => { hint.style.display = 'none'; }, 4200);

function showRing(ring) {
    clearTimeout(hideTimer);
    activeRing = ring;

    // Dim others, highlight active
    RINGS.forEach(r => {
        const isActive = r === ring;
        r.arc.style.opacity = isActive ? '1' : '0.3';
        r.arc.setAttribute('stroke-width', isActive ? SW + 4 : SW);
        r.tip.style.opacity = isActive && r.progress > 0.004 ? '1' : '0';
    });

    // Update info bar
    document.getElementById('info-dot').style.background  = ring.color;
    document.getElementById('info-dot').style.boxShadow   = `0 0 10px ${ring.color}`;
    document.getElementById('info-name').textContent      = ring.label;
    document.getElementById('info-pct').textContent       = ring.pctText || '—';
    document.getElementById('info-pct').style.color       = ring.color;
    document.getElementById('info-rem').textContent       = ring.remaining || '';

    infoBar.classList.add('visible');
}

function scheduleHide() {
    clearTimeout(hideTimer);
    hideTimer = setTimeout(hideInfo, 800);
}

function hideInfo() {
    clearTimeout(hideTimer);
    activeRing = null;
    infoBar.classList.remove('visible');
    RINGS.forEach(r => {
        r.arc.style.opacity = '1';
        r.arc.setAttribute('stroke-width', SW);
        r.tip.style.opacity = r.progress > 0.004 ? '1' : '0';
    });
}

// Tap outside rings hides info
svg.addEventListener('click', (e) => {
    if (e.target === svg) hideInfo();
});

// ─── Helpers ─────────────────────────────────────────────────────────────────
function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function isLeap(y) { return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0; }
function dayOfYear(d) { return Math.ceil((d - new Date(d.getFullYear(), 0, 1)) / 86400000); }

const WD = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmt(s) {
    if (s <= 0) return 'complete';
    s = Math.floor(s);
    const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600),
          m = Math.floor((s % 3600) / 60), sec = s % 60;
    if (d > 547) return `${Math.floor(d / 365.25)}y left`;
    if (d > 60)  return `${Math.floor(d / 30.44)}mo left`;
    if (d > 0)   return `${d}d ${h}h left`;
    if (h > 0)   return `${h}h ${m}m left`;
    if (m > 0)   return `${m}m ${sec}s left`;
    return `${sec}s left`;
}

function applyRing(ring, p) {
    p = Math.min(Math.max(p, 0), 0.9999);
    ring.progress = p;
    ring.pctText  = `${(p * 100).toFixed(2)}%`;

    ring.arc.setAttribute('stroke-dashoffset', ring.circ * (1 - p));

    // Tip: visual coords (clockwise from top)
    const angle = p * 2 * Math.PI - Math.PI / 2;
    ring.tip.setAttribute('cx', CX + ring.r * Math.cos(angle));
    ring.tip.setAttribute('cy', CY + ring.r * Math.sin(angle));

    if (activeRing !== ring) {
        ring.tip.style.opacity = p < 0.004 ? '0' : '1';
    }

    // Keep info bar live if this ring is active
    if (activeRing === ring) {
        document.getElementById('info-pct').textContent = ring.pctText;
        document.getElementById('info-rem').textContent = ring.remaining;
    }
}

// ─── Update ──────────────────────────────────────────────────────────────────
function update() {
    const now = new Date();
    const Y = now.getFullYear(), Mo = now.getMonth(), D = now.getDate();
    const H = now.getHours(), Mi = now.getMinutes(), S = now.getSeconds();
    const ts = H * 3600 + Mi * 60 + S;

    document.getElementById('c-time').textContent =
        `${String(H).padStart(2,'0')}:${String(Mi).padStart(2,'0')}:${String(S).padStart(2,'0')}`;
    document.getElementById('c-date').textContent =
        `${WD[now.getDay()]} ${MO[Mo]} ${D}`;

    const dayP = ts / 86400;
    RINGS[0].remaining = fmt(86400 - ts);
    applyRing(RINGS[0], dayP);

    const wkD  = now.getDay() === 0 ? 6 : now.getDay() - 1;
    const wkS  = wkD * 86400 + ts;
    const wkP  = wkS / (7 * 86400);
    RINGS[1].remaining = fmt(7 * 86400 - wkS);
    applyRing(RINGS[1], wkP);

    const dim = daysInMonth(Y, Mo), moS = (D - 1) * 86400 + ts;
    const moP = moS / (dim * 86400);
    RINGS[2].remaining = fmt(dim * 86400 - moS);
    applyRing(RINGS[2], moP);

    const doy = dayOfYear(now), diy = isLeap(Y) ? 366 : 365;
    const yrS = (doy - 1) * 86400 + ts;
    const yrP = yrS / (diy * 86400);
    RINGS[3].remaining = fmt(diy * 86400 - yrS);
    applyRing(RINGS[3], yrP);

    const dStart = Math.floor(Y / 10) * 10;
    const dSt = +new Date(dStart, 0, 1), dEn = +new Date(dStart + 10, 0, 1);
    const decP = (now - dSt) / (dEn - dSt);
    RINGS[4].remaining = fmt((dEn - now) / 1000);
    applyRing(RINGS[4], decP);

    const cSt = +new Date(2000, 0, 1), cEn = +new Date(2100, 0, 1);
    const cenP = (now - cSt) / (cEn - cSt);
    RINGS[5].remaining = fmt((cEn - now) / 1000);
    applyRing(RINGS[5], cenP);

    const mSt = +new Date(2000, 0, 1), mEn = +new Date(3000, 0, 1);
    const milP = (now - mSt) / (mEn - mSt);
    RINGS[6].remaining = fmt((mEn - now) / 1000);
    applyRing(RINGS[6], milP);
}

update();
setInterval(update, 1000);
</script>
</body>
</html>
