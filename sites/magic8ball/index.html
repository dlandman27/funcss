<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <title>Magic 8 Ball</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ask the Magic 8 Ball a question, then shake it like you mean it">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            min-height: 100%;
            background: linear-gradient(135deg, #0d0314, #1a0627);
            font-family: Georgia, 'Times New Roman', serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 22px;
            touch-action: none;
        }

        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        h1 {
            color: #e8e2f8;
            font-weight: normal;
            font-style: italic;
            font-size: clamp(1.6em, 6vw, 2.6em);
            letter-spacing: 2px;
            text-shadow: 0 0 24px rgba(138, 43, 226, 0.6);
            z-index: 1;
        }

        #question {
            z-index: 1;
            width: min(86vw, 420px);
            padding: 12px 20px;
            border-radius: 999px;
            border: 1px solid rgba(180, 140, 255, 0.35);
            background: rgba(30, 12, 50, 0.65);
            color: #e8e2f8;
            font-family: inherit;
            font-style: italic;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            -webkit-user-select: text;
            user-select: text;
        }

        #question:focus {
            border-color: rgba(200, 160, 255, 0.8);
            box-shadow: 0 0 18px rgba(138, 43, 226, 0.35);
        }

        #question::placeholder { color: rgba(200, 185, 230, 0.45); }

        /* ---- the ball ---- */

        .ball-area {
            position: relative;
            z-index: 1;
        }

        .magic8ball {
            width: min(520px, 88vw, 62vh);
            height: min(520px, 88vw, 62vh);
            border-radius: 50%;
            position: relative;
            cursor: grab;
            background:
                radial-gradient(circle at 32% 26%, #3a3a44 0%, #17171d 34%, #060608 78%);
            box-shadow:
                inset -14px -18px 50px rgba(0, 0, 0, 0.85),
                inset 10px 12px 30px rgba(255, 255, 255, 0.06),
                0 30px 50px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(138, 43, 226, 0.12);
        }

        .magic8ball.dragging { cursor: grabbing; }

        .gloss {
            position: absolute;
            top: 7%;
            left: 14%;
            width: 34%;
            height: 20%;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.35), transparent 70%);
            transform: rotate(-24deg);
            pointer-events: none;
        }

        .window {
            width: 47%;
            height: 47%;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            overflow: hidden;
            background: radial-gradient(circle at 45% 35%, #241048, #12062b 62%, #0a0318);
            box-shadow:
                inset 0 6px 18px rgba(0, 0, 0, 0.9),
                inset 0 -4px 12px rgba(120, 70, 200, 0.15),
                0 0 0 6px #0a0a0d,
                0 0 0 8px rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* liquid parallax while you shake */
        .window .inner {
            position: absolute;
            inset: -12%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translate(calc(var(--sx, 0px) * -0.35), calc(var(--sy, 0px) * -0.35));
        }

        /* ---- the die ---- */

        .die {
            width: 74%;
            aspect-ratio: 1 / 0.92;
            clip-path: polygon(50% 4%, 96% 92%, 4% 92%);
            background:
                linear-gradient(160deg, #2a55c0 0%, #16307f 42%, #0a1a52 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 0 14px var(--glow, rgba(80, 130, 255, 0.45)));
            transition:
                transform 1.1s cubic-bezier(0.18, 0.9, 0.32, 1.15),
                filter 1.1s ease,
                opacity 0.9s ease;
            animation: bob 4.5s ease-in-out infinite;
        }

        .die.hidden {
            transform: translateY(130%) scale(0.6) rotate(14deg);
            filter: blur(9px) drop-shadow(0 0 0 transparent);
            opacity: 0;
            animation: none;
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0) rotate(-1.2deg); }
            50% { transform: translateY(-4px) rotate(1.4deg); }
        }

        .die span {
            width: 62%;
            margin-top: 26%;
            text-align: center;
            color: #dfe9ff;
            font-size: clamp(10px, 2.6vw, 14px);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1.35;
            text-shadow: 0 0 8px rgba(160, 200, 255, 0.8);
        }

        /* ---- bubbles ---- */

        .bubble {
            position: absolute;
            bottom: -12px;
            border-radius: 50%;
            border: 1px solid rgba(190, 160, 255, 0.5);
            background: rgba(160, 120, 255, 0.12);
            animation: rise var(--t) ease-in forwards;
            pointer-events: none;
        }

        @keyframes rise {
            from { transform: translateY(0) translateX(0); opacity: 0.9; }
            to { transform: translateY(-160px) translateX(var(--drift)); opacity: 0; }
        }

        /* click-without-drag fallback wobble */
        .magic8ball.autoshake { animation: autoShake 0.8s ease-in-out; }

        @keyframes autoShake {
            0%, 100% { transform: translate(0, 0) rotate(0); }
            15% { transform: translate(-16px, 6px) rotate(-9deg); }
            30% { transform: translate(15px, -8px) rotate(8deg); }
            45% { transform: translate(-12px, -5px) rotate(-6deg); }
            60% { transform: translate(10px, 7px) rotate(5deg); }
            80% { transform: translate(-5px, -3px) rotate(-2deg); }
        }

        .instruction {
            z-index: 1;
            color: rgba(200, 185, 230, 0.55);
            font-style: italic;
            font-size: clamp(0.95em, 3vw, 1.1em);
            text-align: center;
            min-height: 1.4em;
            transition: color 0.3s ease;
        }

        .instruction.urge { color: #d9b6ff; }

        .tally {
            z-index: 1;
            color: rgba(160, 145, 190, 0.35);
            font-style: italic;
            font-size: 0.8em;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <h1>Magic 8 Ball</h1>
    <input id="question" type="text" maxlength="120" placeholder="ask a yes-or-no question&hellip;" autocomplete="off">

    <div class="ball-area">
        <div class="magic8ball" id="ball">
            <div class="gloss"></div>
            <div class="window">
                <div class="inner" id="inner">
                    <div class="die hidden" id="die"><span id="answer"></span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="instruction" id="instruction">grab the ball and shake it &mdash; like you mean it</div>
    <div class="tally" id="tally"></div>

    <script>
        // [text, sentiment] — sentiment tints the die's glow
        const ANSWERS = [
            ['It is certain', 'yes'], ['It is decidedly so', 'yes'], ['Without a doubt', 'yes'],
            ['Yes, definitely', 'yes'], ['You may rely on it', 'yes'], ['As I see it, yes', 'yes'],
            ['Most likely', 'yes'], ['Outlook good', 'yes'], ['Yes', 'yes'], ['Signs point to yes', 'yes'],
            ['Ask again later', 'meh'], ['Better not tell you now', 'meh'],
            ['Cannot predict now', 'meh'], ['Concentrate and ask again', 'meh'],
            ["Don't count on it", 'no'], ['My reply is no', 'no'], ['My sources say no', 'no'],
            ['Outlook not so good', 'no'], ['Very doubtful', 'no'],
        ];
        const RARE = [
            ['How should I know?', 'meh'], ['Ask your mother', 'meh'],
            ['I was asleep', 'meh'], ['Outlook hazy, try coffee', 'meh'],
            ['No comment', 'meh'], ['You already know', 'yes'],
        ];
        const GLOW = {
            yes: 'rgba(90, 220, 160, 0.55)',
            meh: 'rgba(255, 200, 100, 0.5)',
            no: 'rgba(255, 95, 107, 0.55)',
        };

        const ball = document.getElementById('ball');
        const inner = document.getElementById('inner');
        const die = document.getElementById('die');
        const answerEl = document.getElementById('answer');
        const instruction = document.getElementById('instruction');
        const tallyEl = document.getElementById('tally');
        const questionEl = document.getElementById('question');

        let asked = 0;
        try { asked = parseInt(localStorage.getItem('8ball-asked'), 10) || 0; } catch (e) {}

        function updateTally() {
            if (asked > 0) {
                tallyEl.textContent = `the ball has been consulted ${asked.toLocaleString()} time${asked === 1 ? '' : 's'}`;
            }
        }

        // ---- the reveal ----

        let revealing = false;

        function reveal() {
            if (revealing) return;
            revealing = true;

            die.classList.add('hidden');
            bubbles(4);

            setTimeout(() => {
                const pool = Math.random() < 0.06 ? RARE : ANSWERS;
                const [text, sentiment] = pool[(Math.random() * pool.length) | 0];
                answerEl.textContent = text;
                die.style.setProperty('--glow', GLOW[sentiment]);
                die.classList.remove('hidden');
                bubbles(8);

                asked++;
                try { localStorage.setItem('8ball-asked', String(asked)); } catch (e) {}
                updateTally();
                instruction.classList.remove('urge');
                instruction.textContent = 'shake again to ask again';
                revealing = false;
            }, 650);
        }

        function bubbles(n) {
            const win = ball.querySelector('.window');
            for (let i = 0; i < n; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                const size = 4 + Math.random() * 9;
                b.style.width = size + 'px';
                b.style.height = size + 'px';
                b.style.left = 15 + Math.random() * 70 + '%';
                b.style.setProperty('--t', 0.8 + Math.random() * 0.9 + 's');
                b.style.setProperty('--drift', (Math.random() - 0.5) * 40 + 'px');
                b.style.animationDelay = Math.random() * 0.4 + 's';
                win.appendChild(b);
                setTimeout(() => b.remove(), 2400);
            }
        }

        // ---- grab & shake ----

        const SHAKE_NEEDED = 700;
        let dragging = false;
        let startX = 0, startY = 0;
        let lastX = 0, lastY = 0, lastVX = 0, lastVY = 0;
        let energy = 0;
        let travelled = 0;

        ball.addEventListener('pointerdown', (e) => {
            dragging = true;
            startX = lastX = e.clientX;
            startY = lastY = e.clientY;
            energy = 0;
            travelled = 0;
            ball.classList.add('dragging');
            ball.style.transition = 'none';
            ball.setPointerCapture(e.pointerId);
            if (!revealing) {
                die.classList.add('hidden');   // the die sinks while you shake
            }
        });

        ball.addEventListener('pointermove', (e) => {
            if (!dragging) return;
            const vx = e.clientX - lastX;
            const vy = e.clientY - lastY;
            const speed = Math.hypot(vx, vy);
            travelled += speed;
            energy += speed;
            // direction reversals are what shaking IS — reward them
            if (vx * lastVX + vy * lastVY < 0) energy += 60;
            lastVX = vx; lastVY = vy;
            lastX = e.clientX; lastY = e.clientY;

            // rubber-band the ball around its home
            const ox = Math.max(-70, Math.min(70, (e.clientX - startX) * 0.55));
            const oy = Math.max(-70, Math.min(70, (e.clientY - startY) * 0.55));
            ball.style.transform = `translate(${ox}px, ${oy}px) rotate(${ox * 0.1}deg)`;
            ball.style.setProperty('--sx', ox + 'px');
            ball.style.setProperty('--sy', oy + 'px');

            if (energy > SHAKE_NEEDED * 0.55 && energy < SHAKE_NEEDED) {
                instruction.classList.add('urge');
                instruction.textContent = 'harder…';
            }
        });

        function release(e) {
            if (!dragging) return;
            dragging = false;
            ball.classList.remove('dragging');
            ball.style.transition = 'transform 0.55s cubic-bezier(0.2, 2.2, 0.4, 1)';
            ball.style.transform = 'translate(0, 0) rotate(0)';
            ball.style.setProperty('--sx', '0px');
            ball.style.setProperty('--sy', '0px');

            if (travelled < 8) {
                // a plain click: the ball shakes itself
                ball.classList.remove('autoshake');
                void ball.offsetWidth;
                ball.classList.add('autoshake');
                setTimeout(reveal, 550);
            } else if (energy >= SHAKE_NEEDED) {
                reveal();
            } else {
                instruction.classList.add('urge');
                instruction.textContent = 'that was barely a jiggle. shake it.';
                if (!revealing && answerEl.textContent) {
                    // bring the old answer back up
                    setTimeout(() => die.classList.remove('hidden'), 300);
                }
            }
        }

        ball.addEventListener('pointerup', release);
        ball.addEventListener('pointercancel', release);
        ball.addEventListener('animationend', () => ball.classList.remove('autoshake'));

        // enter in the question box = a polite shake
        questionEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                questionEl.blur();
                ball.classList.remove('autoshake');
                void ball.offsetWidth;
                ball.classList.add('autoshake');
                setTimeout(reveal, 550);
            }
        });

        // ---- stars ----

        const stars = document.querySelector('.stars');
        for (let i = 0; i < 90; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = 0.5 + Math.random() * 2.2;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.setProperty('--duration', 3 + Math.random() * 4 + 's');
            star.style.animationDelay = Math.random() * 4 + 's';
            stars.appendChild(star);
        }

        updateTally();
    </script>
</body>
</html>
