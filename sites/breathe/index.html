<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathe</title>
    <meta name="description" content="A circle that breathes. Match it — box, 4-7-8, or resonant pace.">
    <style>
        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --breath: #2fb0a3;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: var(--paper);
            color: var(--ink);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Georgia, 'Times New Roman', serif;
        }

        #stage {
            position: relative;
            width: min(78vmin, 460px);
            height: min(78vmin, 460px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* soft halo that trails the circle */
        #halo {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(47, 176, 163, 0.16) 55%, rgba(47, 176, 163, 0) 72%);
            transform: scale(0.66);
            will-change: transform;
        }

        #circle {
            position: absolute;
            width: 72%;
            height: 72%;
            border-radius: 50%;
            background: radial-gradient(circle at 42% 38%, rgba(47, 176, 163, 0.34), rgba(47, 176, 163, 0.22));
            border: 1px solid rgba(32, 26, 23, 0.18);
            transform: scale(0.62);
            will-change: transform;
        }

        #prompt {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            pointer-events: none;
            text-align: center;
        }

        #phase {
            font-style: italic;
            font-size: clamp(1.1rem, 4vmin, 1.5rem);
            letter-spacing: 0.14em;
            opacity: 0.85;
        }

        #countdown {
            font-size: clamp(0.85rem, 2.6vmin, 1rem);
            font-style: italic;
            opacity: 0.4;
            min-height: 1.3em;
            font-variant-numeric: tabular-nums;
        }

        #hint {
            position: fixed;
            bottom: 18%;
            left: 0;
            right: 0;
            text-align: center;
            font-style: italic;
            font-size: clamp(0.85rem, 2.6vmin, 1rem);
            opacity: 0.5;
            transition: opacity 2s ease;
            padding: 0 1rem;
            pointer-events: none;
        }

        #hint.gone { opacity: 0; }

        #ledger {
            position: fixed;
            top: 16px;
            right: 20px;
            font-style: italic;
            font-size: 0.78rem;
            opacity: 0.35;
            pointer-events: none;
        }

        #controls {
            position: fixed;
            left: 50%;
            bottom: max(22px, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            display: flex;
            gap: 1.6rem;
            align-items: center;
            transition: opacity 1.5s ease;
        }

        #controls.faded { opacity: 0.14; }
        #controls:hover { opacity: 1; }

        .pattern {
            background: none;
            border: none;
            padding: 0.3rem 0.2rem;
            font-family: Georgia, 'Times New Roman', serif;
            font-style: italic;
            font-size: 0.88rem;
            letter-spacing: 0.1em;
            color: var(--ink);
            opacity: 0.42;
            cursor: pointer;
            border-bottom: 1px solid transparent;
            transition: opacity 0.3s, border-color 0.3s;
            white-space: nowrap;
        }

        .pattern:hover { opacity: 0.8; }

        .pattern.on {
            opacity: 0.9;
            border-bottom-color: rgba(32, 26, 23, 0.45);
        }

        @media (prefers-reduced-motion: reduce) {
            #circle { transform: scale(0.82) !important; }
            #halo { transform: scale(0.86) !important; }
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="halo"></div>
        <div id="circle"></div>
        <div id="prompt">
            <div id="phase">breathe</div>
            <div id="countdown"></div>
        </div>
    </div>

    <div id="hint">tap the circle to begin</div>

    <div id="ledger">breaths on record: <span id="breaths">0</span></div>

    <div id="controls">
        <button class="pattern on" data-p="box">box 4·4·4·4</button>
        <button class="pattern" data-p="478">4·7·8</button>
        <button class="pattern" data-p="resonant">resonant</button>
    </div>

    <script>
        (() => {
            // phases: [label, seconds, from-scale, to-scale]
            const PATTERNS = {
                box: [
                    ['breathe in', 4, 0.62, 1.0],
                    ['hold', 4, 1.0, 1.0],
                    ['breathe out', 4, 1.0, 0.62],
                    ['hold', 4, 0.62, 0.62]
                ],
                '478': [
                    ['breathe in', 4, 0.62, 1.0],
                    ['hold', 7, 1.0, 1.0],
                    ['breathe out', 8, 1.0, 0.62]
                ],
                resonant: [
                    ['breathe in', 5.5, 0.62, 1.0],
                    ['breathe out', 5.5, 1.0, 0.62]
                ]
            };

            const circle = document.getElementById('circle');
            const halo = document.getElementById('halo');
            const stage = document.getElementById('stage');
            const phaseEl = document.getElementById('phase');
            const countdownEl = document.getElementById('countdown');
            const hint = document.getElementById('hint');
            const breathsEl = document.getElementById('breaths');
            const controls = document.getElementById('controls');
            const patternBtns = [...document.querySelectorAll('.pattern')];
            const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

            let breaths = 0;
            try { breaths = parseInt(localStorage.getItem('breathe-breaths')) || 0; } catch (e) {}
            breathsEl.textContent = breaths;

            let pattern = PATTERNS.box;
            let running = false;
            let rafId = null;
            let phaseIndex = 0;
            let phaseStart = 0;
            let fadeTimer = null;

            const easeInOut = t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

            function enterPhase(i, now) {
                const wrapped = i >= pattern.length;
                phaseIndex = wrapped ? 0 : i;
                phaseStart = now;
                phaseEl.textContent = pattern[phaseIndex][0];
                if (wrapped) {
                    breaths++;
                    breathsEl.textContent = breaths;
                    try { localStorage.setItem('breathe-breaths', breaths); } catch (e) {}
                }
            }

            function frame(now) {
                if (!running) return;
                const [, dur, from, to] = pattern[phaseIndex];
                const elapsed = (now - phaseStart) / 1000;

                if (elapsed >= dur) {
                    enterPhase(phaseIndex + 1, now);
                } else {
                    if (!reduced) {
                        const t = easeInOut(Math.min(elapsed / dur, 1));
                        const s = from + (to - from) * t;
                        circle.style.transform = 'scale(' + s.toFixed(4) + ')';
                        halo.style.transform = 'scale(' + (s * 1.06).toFixed(4) + ')';
                    }
                    countdownEl.textContent = Math.ceil(dur - elapsed);
                }
                rafId = requestAnimationFrame(frame);
            }

            function start() {
                if (running) return;
                running = true;
                hint.classList.add('gone');
                phaseIndex = 0;
                phaseStart = performance.now();
                phaseEl.textContent = pattern[0][0];
                rafId = requestAnimationFrame(frame);
                clearTimeout(fadeTimer);
                fadeTimer = setTimeout(() => controls.classList.add('faded'), 6000);
            }

            function stop() {
                running = false;
                cancelAnimationFrame(rafId);
                phaseEl.textContent = 'paused';
                countdownEl.textContent = '';
                controls.classList.remove('faded');
                clearTimeout(fadeTimer);
            }

            stage.addEventListener('click', () => running ? stop() : start());

            patternBtns.forEach(btn => btn.addEventListener('click', () => {
                patternBtns.forEach(b => b.classList.toggle('on', b === btn));
                pattern = PATTERNS[btn.dataset.p];
                if (running) {
                    phaseIndex = 0;
                    phaseStart = performance.now();
                    phaseEl.textContent = pattern[0][0];
                } else {
                    phaseEl.textContent = 'breathe';
                }
            }));

            document.addEventListener('visibilitychange', () => {
                if (document.hidden && running) stop();
            });
        })();
    </script>
</body>
</html>
