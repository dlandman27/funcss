<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrollympics</title>
    <meta name="description" content="Your scrolling, measured in real-world distances. Career records kept.">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --gold: #f7c948;
        }

        html {
            background-color: var(--paper);
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            color: var(--ink);
            min-height: 1000vh;
            background-image:
                radial-gradient(rgba(32, 26, 23, 0.06) 2px, transparent 2.2px);
            background-size: 22px 22px;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        header {
            padding: 60px 20px 10px;
            text-align: center;
        }

        h1 {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(30px, 7vw, 60px);
            transform: rotate(-1.5deg);
            -webkit-text-stroke: 1.5px var(--ink);
            paint-order: stroke fill;
            color: #5aa0db;
            text-shadow: 5px 5px 0 var(--ink);
            display: inline-block;
        }

        .subtitle {
            font-style: italic;
            font-size: clamp(14px, 2vw, 17px);
            color: rgba(32, 26, 23, 0.55);
            margin-top: 12px;
        }

        /* ---- the scoreboard ---- */

        .stats-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(0.6deg);
            background: var(--cream);
            border: 3px solid var(--ink);
            border-radius: 18px;
            box-shadow: 8px 8px 0 var(--ink);
            padding: 22px 30px;
            width: min(92vw, 360px);
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }

        .big-meters {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(34px, 7vw, 52px);
            font-variant-numeric: tabular-nums;
            line-height: 1.1;
        }

        .big-meters small {
            font-size: 0.45em;
            color: rgba(32, 26, 23, 0.55);
        }

        .career-note {
            font-style: italic;
            font-size: 12px;
            color: rgba(32, 26, 23, 0.5);
            margin-top: 2px;
        }

        .progress-wrap {
            margin-top: 16px;
            text-align: left;
        }

        .progress-label {
            font-style: italic;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .bar {
            height: 18px;
            border: 2px solid var(--ink);
            border-radius: 999px;
            background: var(--paper);
            box-shadow: 2px 2px 0 var(--ink);
            overflow: hidden;
        }

        .bar .fill {
            height: 100%;
            width: 0%;
            background: var(--gold);
            border-right: 2px solid var(--ink);
            transition: width 0.2s ease;
        }

        .speed {
            margin-top: 12px;
            font-size: 13px;
            font-style: italic;
            color: rgba(32, 26, 23, 0.55);
            font-variant-numeric: tabular-nums;
        }

        /* ---- medals ---- */

        #medals {
            position: fixed;
            top: 14px;
            left: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }

        .medal {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--gold);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 2px 2px 0 var(--ink);
            padding: 5px 12px 5px 6px;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transform: rotate(-2deg);
            animation: medalIn 0.5s cubic-bezier(0.22, 1.6, 0.36, 1);
        }

        @keyframes medalIn {
            from { transform: rotate(-2deg) scale(0); }
            to { transform: rotate(-2deg) scale(1); }
        }

        .medal .disc {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #ffe9a8, var(--gold) 60%);
            border: 2px solid var(--ink);
            flex: 0 0 20px;
        }

        /* mile markers along the track */
        .marker {
            position: absolute;
            left: 24px;
            transform: rotate(-2deg);
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 8px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 6px 14px;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: 14px;
            color: rgba(32, 26, 23, 0.75);
            font-variant-numeric: tabular-nums;
        }

        .marker:nth-child(even) {
            left: auto;
            right: 24px;
            transform: rotate(2deg);
        }

        #toast {
            position: fixed;
            top: 10vh;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg) scale(0);
            background: var(--gold);
            border: 3px solid var(--ink);
            border-radius: 14px;
            box-shadow: 5px 5px 0 var(--ink);
            padding: 14px 28px;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(15px, 3vw, 24px);
            text-transform: uppercase;
            z-index: 200;
            pointer-events: none;
        }

        #toast.show { animation: toastIn 2.8s cubic-bezier(0.22, 1.6, 0.36, 1) forwards; }

        @keyframes toastIn {
            0% { transform: translateX(-50%) rotate(-2deg) scale(0); }
            12% { transform: translateX(-50%) rotate(-2deg) scale(1.1); }
            18% { transform: translateX(-50%) rotate(-2deg) scale(1); }
            85% { transform: translateX(-50%) rotate(-2deg) scale(1); opacity: 1; }
            100% { transform: translateX(-50%) rotate(-2deg) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>
    <header>
        <h1>SCROLLYMPICS</h1>
        <div class="subtitle">every 10 pixels is a meter. your career total is permanent. we keep records.</div>
    </header>

    <div class="stats-panel">
        <div class="big-meters"><span id="meters">0</span> <small>m</small></div>
        <div class="career-note">career distance, all visits</div>
        <div class="progress-wrap">
            <div class="progress-label" id="nextLabel">warming up&hellip;</div>
            <div class="bar"><div class="fill" id="fill"></div></div>
        </div>
        <div class="speed" id="speed">0.0 m/s</div>
    </div>

    <div id="medals"></div>
    <div id="toast"></div>

    <script>
        const PX_PER_METER = 10;   // as advertised

        // sorted. actually sorted this time.
        const COMPARISONS = [
            [2.1, 'a door'],
            [5.5, 'a giraffe'],
            [8.8, 'a telephone pole'],
            [30, 'a blue whale'],
            [93, 'the Statue of Liberty'],
            [100, 'a football field'],
            [330, 'the Eiffel Tower'],
            [443, 'the Empire State Building'],
            [828, 'the Burj Khalifa'],
            [1000, 'one kilometer'],
            [3776, 'Mount Fuji'],
            [8849, 'Mount Everest'],
            [10935, 'the Mariana Trench'],
            [42195, 'a marathon'],
            [100000, 'the edge of space'],
            [408000, 'the ISS'],
            [1000000, 'a thousand kilometers'],
            [3944000, 'Route 66'],
            [12742000, 'the diameter of Earth'],
            [40075000, 'the circumference of Earth'],
            [384400000, 'the Moon'],
        ];

        const MEDALS = [
            [100, 'FIELD DAY', 'a full football field'],
            [1000, 'FIRST KLICK', 'one kilometer'],
            [8849, 'EVEREST', 'you scrolled a mountain'],
            [42195, 'MARATHON', '42.195 km of thumb'],
            [100000, 'ASTRONAUT', 'the Kármán line'],
            [384400000, 'THE MOON', 'seek help'],
        ];

        // ---- persistent career total ----

        let career = 0;
        let earned = [];
        try {
            career = parseFloat(localStorage.getItem('scrollympics-m')) || 0;
            earned = JSON.parse(localStorage.getItem('scrollympics-medals')) || [];
        } catch (e) {}

        function save() {
            try {
                localStorage.setItem('scrollympics-m', String(career));
                localStorage.setItem('scrollympics-medals', JSON.stringify(earned));
            } catch (e) {}
        }
        setInterval(save, 2000);
        window.addEventListener('beforeunload', save);

        // ---- medal shelf ----

        const medalsEl = document.getElementById('medals');

        function renderMedals() {
            medalsEl.textContent = '';
            for (const [dist, name] of MEDALS) {
                if (earned.includes(name)) {
                    const m = document.createElement('div');
                    m.className = 'medal';
                    m.innerHTML = `<span class="disc"></span>${name}`;
                    m.title = dist.toLocaleString() + ' m';
                    medalsEl.appendChild(m);
                }
            }
        }

        function checkMedals() {
            for (const [dist, name, note] of MEDALS) {
                if (career >= dist && !earned.includes(name)) {
                    earned.push(name);
                    save();
                    renderMedals();
                    const toast = document.getElementById('toast');
                    toast.textContent = `MEDAL: ${name} — ${note}`;
                    toast.classList.remove('show');
                    void toast.offsetWidth;
                    toast.classList.add('show');
                }
            }
        }

        // ---- scroll tracking (up counts too — it's all exercise) ----

        let lastY = window.scrollY;
        let recentMeters = 0;

        window.addEventListener('scroll', () => {
            const dy = Math.abs(window.scrollY - lastY);
            lastY = window.scrollY;
            const m = dy / PX_PER_METER;
            career += m;
            recentMeters += m;
            updatePanel();
            checkMedals();
            extendTrack();
        }, { passive: true });

        // speed readout decays
        setInterval(() => {
            document.getElementById('speed').textContent =
                `${(recentMeters * 4).toFixed(1)} m/s`;
            recentMeters = 0;
        }, 250);

        function fmt(m) {
            if (m >= 1000000) return (m / 1000).toLocaleString(undefined, { maximumFractionDigits: 0 }) + ' k';
            if (m >= 10000) return Math.round(m).toLocaleString();
            return m.toFixed(1);
        }

        function updatePanel() {
            document.getElementById('meters').textContent = fmt(career);
            const next = COMPARISONS.find(([d]) => career < d);
            if (next) {
                const pct = Math.min(100, (career / next[0]) * 100);
                document.getElementById('nextLabel').textContent =
                    `next up: ${next[1]} — ${pct.toFixed(1)}%`;
                document.getElementById('fill').style.width = pct + '%';
            } else {
                document.getElementById('nextLabel').textContent =
                    'you have scrolled off the chart.';
                document.getElementById('fill').style.width = '100%';
            }
        }

        // ---- the infinite track, with roadside markers ----

        let trackHeight = document.documentElement.scrollHeight;
        let markerAt = 1000;   // px

        function extendTrack() {
            const remaining = document.documentElement.scrollHeight - (window.innerHeight + window.scrollY);
            if (remaining < 2500) {
                trackHeight = document.documentElement.scrollHeight + 6000;
                document.body.style.minHeight = trackHeight + 'px';
            }
            while (markerAt < trackHeight - 500) {
                const marker = document.createElement('div');
                marker.className = 'marker';
                marker.style.top = markerAt + 'px';
                marker.textContent = (markerAt / PX_PER_METER).toLocaleString() + ' m';
                document.body.appendChild(marker);
                markerAt += 1000;
            }
        }

        renderMedals();
        updatePanel();
        extendTrack();
    </script>
</body>
</html>
