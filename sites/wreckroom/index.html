<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wreck Room</title>
    <meta name="description" content="Upload a picture of your problem and take a bat to it">
    <meta name="keywords" content="stress relief, game, interactive, bat, smash">
    <meta name="author" content="Random Sites On The Web">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #201a17;
            --paper: #f2ede2;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--paper);
            background-image: radial-gradient(rgba(32, 26, 23, 0.06) 2px, transparent 2.2px);
            background-size: 22px 22px;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        #room {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: none;
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 5;
        }

        input[type="file"] { display: none; }

        .pill {
            background: #fff8ef;
            color: var(--ink);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 10px 22px;
            font-family: Georgia, 'Times New Roman', serif;
            font-style: italic;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .pill:hover { transform: translate(-2px, -2px) rotate(-2deg); }
        .pill:active { transform: translate(2px, 2px); }

        #status {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%) rotate(-1.5deg);
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(16px, 2.6vw, 24px);
            color: #f0563e;
            -webkit-text-stroke: 1.2px var(--ink);
            paint-order: stroke fill;
            text-shadow: 3px 3px 0 var(--ink);
            pointer-events: none;
            z-index: 5;
            font-variant-numeric: tabular-nums;
        }

        #hint {
            position: fixed;
            bottom: 74px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: clamp(13px, 1.9vw, 16px);
            color: rgba(32, 26, 23, 0.5);
            pointer-events: none;
            transition: opacity 2s ease;
            z-index: 5;
        }

        #hint.hidden { opacity: 0; }

        @keyframes page-shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-7px, 4px); }
            50% { transform: translate(6px, -5px); }
            75% { transform: translate(-4px, -3px); }
        }

        body.shake { animation: page-shake 0.24s linear; }
    </style>
</head>
<body>
    <canvas id="room"></canvas>
    <div id="status"></div>
    <div id="hint">this is your problem. swing at it.</div>

    <div id="controls">
        <input type="file" id="imageInput" accept="image/*">
        <label for="imageInput" class="pill">upload your problem</label>
        <button class="pill" id="again">same problem again</button>
    </div>

    <script>
        const INK = '#201a17';
        const GOLD = '#f7c948';
        const COLORS = ['#f0563e', '#5aa0db', '#b7ce3c', '#a98fd0', '#f47b28', '#ff7fa5'];

        const canvas = document.getElementById('room');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const hint = document.getElementById('hint');

        let W, H;
        const jit = (n) => (Math.random() - 0.5) * n;

        // ---- the problem (a real image, sliced into real tiles) ----

        const TILE = 30;
        let source = null;          // offscreen canvas holding the scaled image
        let blocks = [];
        let totalBlocks = 0, destroyed = 0;
        let resolved = false;

        function defaultProblem() {
            // a placard, for people with nothing to upload yet
            const c = document.createElement('canvas');
            c.width = 660;
            c.height = 420;
            const g = c.getContext('2d');
            g.fillStyle = '#fff8ef';
            g.fillRect(0, 0, 660, 420);
            g.strokeStyle = INK;
            g.lineWidth = 10;
            g.strokeRect(14, 14, 632, 392);
            g.strokeStyle = '#f0563e';
            g.lineWidth = 4;
            g.strokeRect(30, 30, 600, 360);
            g.fillStyle = INK;
            g.textAlign = 'center';
            g.font = "900 84px 'Arial Black', 'Segoe UI', sans-serif";
            g.fillText('YOUR', 330, 170);
            g.fillText('PROBLEM', 330, 265);
            g.font = "italic 26px Georgia, serif";
            g.fillStyle = 'rgba(32, 26, 23, 0.55)';
            g.fillText('(upload a more specific one below)', 330, 340);
            return c;
        }

        function slice(imgSource) {
            source = imgSource;
            blocks = [];
            destroyed = 0;
            resolved = false;

            // fit the image into ~70% of the viewport
            const scale = Math.min((W * 0.72) / source.width, (H * 0.62) / source.height, 1.6);
            const dw = source.width * scale;
            const dh = source.height * scale;
            const ox = (W - dw) / 2;
            const oy = (H - dh) / 2 - H * 0.03;

            const cols = Math.ceil(dw / TILE);
            const rows = Math.ceil(dh / TILE);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    blocks.push({
                        x: ox + c * TILE + TILE / 2,
                        y: oy + r * TILE + TILE / 2,
                        // the tile carries its actual slice of the image
                        sx: (c * TILE) / scale,
                        sy: (r * TILE) / scale,
                        ss: TILE / scale,
                        vx: 0, vy: 0, rot: 0, vrot: 0,
                        hit: false, gone: false,
                    });
                }
            }
            totalBlocks = blocks.length;
            updateStatus();
        }

        function updateStatus() {
            const pct = totalBlocks ? Math.floor((destroyed / totalBlocks) * 100) : 0;
            statusEl.textContent = pct === 0 ? '' : `problem ${pct}% resolved`;
            if (pct >= 100 && !resolved) {
                resolved = true;
                statusEl.textContent = 'problem resolved.';
                celebrate();
            }
        }

        // ---- the bat ----

        const bat = { x: -100, y: -100, angle: -0.5, swing: 0, swinging: false };

        function drawBat() {
            ctx.save();
            ctx.translate(bat.x, bat.y);
            // swing arc: winds slightly back then whips forward
            const s = bat.swing;
            const swingAngle = s > 0 ? -0.9 + (1 - s) * 2.2 : 0;
            ctx.rotate(bat.angle + swingAngle);
            ctx.lineCap = 'round';
            // ink outline pass, then wood
            ctx.strokeStyle = INK;
            ctx.lineWidth = 17;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(86, -86); ctx.stroke();
            ctx.lineWidth = 24;
            ctx.beginPath(); ctx.moveTo(38, -38); ctx.lineTo(86, -86); ctx.stroke();
            ctx.strokeStyle = '#c98d4e';
            ctx.lineWidth = 11;
            ctx.beginPath(); ctx.moveTo(4, -4); ctx.lineTo(84, -84); ctx.stroke();
            ctx.lineWidth = 18;
            ctx.beginPath(); ctx.moveTo(40, -40); ctx.lineTo(84, -84); ctx.stroke();
            // grip wrap
            ctx.strokeStyle = INK;
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(10, -14); ctx.lineTo(16, -8); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(16, -20); ctx.lineTo(22, -14); ctx.stroke();
            ctx.restore();
        }

        // ---- particles ----

        const fx = [];

        function spawnFx(p) { fx.push(p); if (fx.length > 250) fx.shift(); }

        function celebrate() {
            for (let i = 0; i < 40; i++) {
                spawnFx({ kind: 'rect', x: W / 2, y: H * 0.3,
                          vx: jit(9), vy: -3 - Math.random() * 5, g: 0.15,
                          w: 6 + Math.random() * 5, h: 4 + Math.random() * 3,
                          rot: Math.random() * Math.PI, vrot: jit(0.3),
                          color: [GOLD, ...COLORS][(Math.random() * 7) | 0], life: 1, decay: 0.008 });
            }
        }

        // ---- swinging ----

        const SWING_RADIUS = 180;

        function swing() {
            if (bat.swinging) return;
            bat.swinging = true;
            bat.swing = 1;
            hint.classList.add('hidden');

            let hits = 0;
            for (const b of blocks) {
                if (b.hit) continue;
                const dx = b.x - bat.x;
                const dy = b.y - bat.y;
                const d = Math.hypot(dx, dy);
                if (d < SWING_RADIUS) {
                    b.hit = true;
                    hits++;
                    const force = 14 + Math.random() * 14 + (1 - d / SWING_RADIUS) * 18;
                    b.vx = (dx / (d || 1)) * force + jit(4);
                    b.vy = (dy / (d || 1)) * force - 6;
                    b.vrot = jit(0.5);
                    // chips of the image fly off
                    if (Math.random() < 0.5) {
                        spawnFx({ kind: 'dot', x: b.x, y: b.y, vx: jit(6), vy: -2 - Math.random() * 3,
                                  g: 0.3, r: 2 + Math.random() * 3,
                                  color: COLORS[(Math.random() * COLORS.length) | 0], life: 1, decay: 0.03 });
                    }
                }
            }

            if (hits > 0) {
                spawnFx({ kind: 'ring', x: bat.x, y: bat.y, r: 20, vr: 9, lw: 3.5,
                          color: '#f0563e', life: 0.8, decay: 0.06 });
                if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                    document.body.classList.remove('shake');
                    void document.body.offsetWidth;
                    document.body.classList.add('shake');
                }
            }
        }

        // ---- main loop ----

        function frame() {
            ctx.clearRect(0, 0, W, H);

            // blocks: intact tiles first, flying tiles on top
            for (const b of blocks) {
                if (b.gone || b.hit) continue;
                drawTile(b);
            }
            for (const b of blocks) {
                if (b.gone || !b.hit) continue;
                b.vy += 0.55;
                b.x += b.vx;
                b.y += b.vy;
                b.rot += b.vrot;
                if (b.y > H + 80 || b.x < -80 || b.x > W + 80) {
                    b.gone = true;
                    destroyed++;
                    updateStatus();
                    continue;
                }
                drawTile(b);
            }

            // fx
            for (let i = fx.length - 1; i >= 0; i--) {
                const p = fx[i];
                p.life -= p.decay;
                if (p.life <= 0) { fx.splice(i, 1); continue; }
                if (p.g) p.vy = (p.vy || 0) + p.g;
                p.x += p.vx || 0;
                p.y += p.vy || 0;
                if (p.vrot) p.rot += p.vrot;
                const a = Math.min(1, p.life);
                ctx.globalAlpha = a;
                if (p.kind === 'dot') {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    ctx.lineWidth = 1.3;
                    ctx.strokeStyle = INK;
                    ctx.stroke();
                } else if (p.kind === 'ring') {
                    p.r += p.vr;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.lineWidth = p.lw + 2.5;
                    ctx.strokeStyle = INK;
                    ctx.stroke();
                    ctx.lineWidth = p.lw;
                    ctx.strokeStyle = p.color;
                    ctx.stroke();
                } else if (p.kind === 'rect') {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.lineWidth = 1.4;
                    ctx.strokeStyle = INK;
                    ctx.strokeRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                }
            }
            ctx.globalAlpha = 1;

            // bat swing animation
            if (bat.swinging) {
                bat.swing -= 0.12;
                if (bat.swing <= 0) {
                    bat.swing = 0;
                    bat.swinging = false;
                }
            }
            drawBat();

            requestAnimationFrame(frame);
        }

        function drawTile(b) {
            ctx.save();
            ctx.translate(b.x, b.y);
            ctx.rotate(b.rot);
            ctx.drawImage(source, b.sx, b.sy, b.ss, b.ss, -TILE / 2, -TILE / 2, TILE, TILE);
            // faint mosaic seams; full ink outline once it's flying
            ctx.lineWidth = b.hit ? 2 : 1;
            ctx.strokeStyle = b.hit ? INK : 'rgba(32, 26, 23, 0.18)';
            ctx.strokeRect(-TILE / 2, -TILE / 2, TILE, TILE);
            ctx.restore();
        }

        // ---- input ----

        document.addEventListener('pointermove', (e) => {
            bat.x = e.clientX;
            bat.y = e.clientY;
        });

        document.addEventListener('pointerdown', (e) => {
            if (e.target.closest('#controls')) return;
            bat.x = e.clientX;
            bat.y = e.clientY;
            swing();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                swing();
            }
        });

        // ---- image loading ----

        document.getElementById('imageInput').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (event) {
                const img = new Image();
                img.onload = function () {
                    // draw to an offscreen canvas so tiles can slice it
                    const c = document.createElement('canvas');
                    const maxSide = 1400;
                    const s = Math.min(1, maxSide / Math.max(img.width, img.height));
                    c.width = img.width * s;
                    c.height = img.height * s;
                    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
                    slice(c);
                    hint.textContent = 'there it is. swing.';
                    hint.classList.remove('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('again').addEventListener('click', () => {
            if (source) slice(source);
        });

        // ---- setup ----

        function setup() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
        }

        let resizeTimer = null;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                setup();
                if (source && destroyed === 0) slice(source);
            }, 200);
        });

        setup();
        slice(defaultProblem());
        frame();
        setTimeout(() => hint.classList.add('hidden'), 10000);
    </script>
</body>
</html>
