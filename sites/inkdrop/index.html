<!DOCTYPE html>
<html lang="en">
<head>
  <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ink Drop</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f4f1ea;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #water {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center,
        transparent 60%,
        rgba(60, 50, 35, 0.08) 88%,
        rgba(60, 50, 35, 0.16) 100%);
    }

    #hint {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 7vh;
      text-align: center;
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-size: clamp(15px, 2.2vw, 19px);
      color: rgba(70, 60, 45, 0.55);
      letter-spacing: 0.04em;
      pointer-events: none;
      transition: opacity 2.5s ease;
    }

    #hint.hidden { opacity: 0; }
  </style>
</head>
<body>
  <canvas id="water"></canvas>
  <div id="vignette"></div>
  <div id="hint">click to drop ink &nbsp;&middot;&nbsp; drag to pour</div>

  <script>
    // ---- Stable-fluids simulation (Jos Stam style) with RGB pigment dye ----

    const display = document.getElementById('water');
    const dctx = display.getContext('2d');
    const hint = document.getElementById('hint');

    // Pigments: absorption per channel (subtractive mixing, like real ink)
    const PIGMENTS = [
      [0x26, 0x34, 0x6f], // indigo
      [0xa4, 0x1f, 0x34], // crimson
      [0x0f, 0x6b, 0x66], // teal
      [0xc7, 0x74, 0x14], // amber
      [0x5b, 0x2a, 0x86], // violet
      [0x1e, 0x5c, 0x33], // forest
      [0x2b, 0x26, 0x20], // sumi black
    ];
    const PAPER = [244, 241, 234];

    let W, H, size;
    let u, v, u0, v0, p, div, curl;
    let dyeR, dyeG, dyeB, tmpR, tmpG, tmpB;
    let simCanvas, sctx, img;

    function initSim() {
      const aspect = window.innerHeight / window.innerWidth;
      W = 150;
      H = Math.max(64, Math.min(190, Math.round(W * aspect)));
      if (aspect > 1.4) { W = Math.round(H / aspect); } // tall phones: shrink W instead
      size = W * H;

      u = new Float32Array(size);  v = new Float32Array(size);
      u0 = new Float32Array(size); v0 = new Float32Array(size);
      p = new Float32Array(size);  div = new Float32Array(size);
      curl = new Float32Array(size);
      dyeR = new Float32Array(size); dyeG = new Float32Array(size); dyeB = new Float32Array(size);
      tmpR = new Float32Array(size); tmpG = new Float32Array(size); tmpB = new Float32Array(size);

      simCanvas = document.createElement('canvas');
      simCanvas.width = W;
      simCanvas.height = H;
      sctx = simCanvas.getContext('2d');
      img = sctx.createImageData(W, H);

      resizeDisplay();
    }

    function resizeDisplay() {
      display.width = window.innerWidth;
      display.height = window.innerHeight;
      dctx.imageSmoothingEnabled = true;
      dctx.imageSmoothingQuality = 'high';
    }

    const IX = (x, y) => x + y * W;

    function sampleBilinear(field, x, y) {
      x = Math.max(0.5, Math.min(W - 1.5, x));
      y = Math.max(0.5, Math.min(H - 1.5, y));
      const x0 = x | 0, y0 = y | 0;
      const x1 = x0 + 1, y1 = y0 + 1;
      const sx = x - x0, sy = y - y0;
      return (field[IX(x0, y0)] * (1 - sx) + field[IX(x1, y0)] * sx) * (1 - sy)
           + (field[IX(x0, y1)] * (1 - sx) + field[IX(x1, y1)] * sx) * sy;
    }

    function advect(dst, src, uu, vv, dt, dissipation) {
      for (let y = 1; y < H - 1; y++) {
        for (let x = 1; x < W - 1; x++) {
          const i = IX(x, y);
          dst[i] = sampleBilinear(src, x - dt * uu[i], y - dt * vv[i]) * dissipation;
        }
      }
    }

    function project() {
      for (let y = 1; y < H - 1; y++) {
        for (let x = 1; x < W - 1; x++) {
          const i = IX(x, y);
          div[i] = -0.5 * (u[i + 1] - u[i - 1] + v[i + W] - v[i - W]);
          p[i] = 0;
        }
      }
      for (let k = 0; k < 22; k++) {
        for (let y = 1; y < H - 1; y++) {
          for (let x = 1; x < W - 1; x++) {
            const i = IX(x, y);
            p[i] = (div[i] + p[i - 1] + p[i + 1] + p[i - W] + p[i + W]) * 0.25;
          }
        }
      }
      for (let y = 1; y < H - 1; y++) {
        for (let x = 1; x < W - 1; x++) {
          const i = IX(x, y);
          u[i] -= 0.5 * (p[i + 1] - p[i - 1]);
          v[i] -= 0.5 * (p[i + W] - p[i - W]);
        }
      }
    }

    function vorticityConfinement(eps) {
      for (let y = 1; y < H - 1; y++) {
        for (let x = 1; x < W - 1; x++) {
          const i = IX(x, y);
          curl[i] = 0.5 * ((v[i + 1] - v[i - 1]) - (u[i + W] - u[i - W]));
        }
      }
      for (let y = 2; y < H - 2; y++) {
        for (let x = 2; x < W - 2; x++) {
          const i = IX(x, y);
          const nx = 0.5 * (Math.abs(curl[i + 1]) - Math.abs(curl[i - 1]));
          const ny = 0.5 * (Math.abs(curl[i + W]) - Math.abs(curl[i - W]));
          const len = Math.hypot(nx, ny) + 1e-5;
          u[i] += eps * (ny / len) * curl[i];
          v[i] += eps * (-nx / len) * curl[i];
        }
      }
    }

    function setWalls() {
      for (let x = 0; x < W; x++) {
        u[IX(x, 0)] = v[IX(x, 0)] = 0;
        u[IX(x, H - 1)] = v[IX(x, H - 1)] = 0;
      }
      for (let y = 0; y < H; y++) {
        u[IX(0, y)] = v[IX(0, y)] = 0;
        u[IX(W - 1, y)] = v[IX(W - 1, y)] = 0;
      }
    }

    // ---- Ink injection ----

    let lastPigment = -1;
    function pickPigment() {
      let i;
      do { i = (Math.random() * PIGMENTS.length) | 0; } while (i === lastPigment);
      lastPigment = i;
      return PIGMENTS[i];
    }

    function absorption(pigment) {
      // darker channels absorb more; scaled so a full drop reads richly saturated
      return [
        (1 - pigment[0] / 255) * 1.0 + 0.02,
        (1 - pigment[1] / 255) * 1.0 + 0.02,
        (1 - pigment[2] / 255) * 1.0 + 0.02,
      ];
    }

    function inject(cx, cy, radius, amount, pigment, splash) {
      const [aR, aG, aB] = absorption(pigment);
      const r2 = radius * radius;
      // asymmetric splash: 2-3 sine harmonics so tendrils never look identical
      const ph1 = Math.random() * Math.PI * 2;
      const ph2 = Math.random() * Math.PI * 2;
      const lobes = 2 + ((Math.random() * 3) | 0);

      const x0 = Math.max(1, Math.floor(cx - radius * 1.6));
      const x1 = Math.min(W - 2, Math.ceil(cx + radius * 1.6));
      const y0 = Math.max(1, Math.floor(cy - radius * 1.6));
      const y1 = Math.min(H - 2, Math.ceil(cy + radius * 1.6));

      for (let y = y0; y <= y1; y++) {
        for (let x = x0; x <= x1; x++) {
          const dx = x - cx, dy = y - cy;
          const d2 = dx * dx + dy * dy;
          const g = Math.exp(-d2 / (r2 * 0.7));
          if (g < 0.01) continue;
          const i = IX(x, y);
          dyeR[i] += aR * amount * g;
          dyeG[i] += aG * amount * g;
          dyeB[i] += aB * amount * g;

          if (splash > 0 && d2 > 0.01) {
            const d = Math.sqrt(d2);
            const ang = Math.atan2(dy, dx);
            const asym = 1 + 0.8 * Math.sin(lobes * ang + ph1) + 0.4 * Math.sin((lobes + 1) * ang + ph2);
            const push = splash * g * asym;
            u[i] += (dx / d) * push;
            v[i] += (dy / d) * push;
          }
        }
      }
    }

    function addVortex(cx, cy, radius, strength) {
      const r2 = radius * radius;
      const x0 = Math.max(1, Math.floor(cx - radius * 2));
      const x1 = Math.min(W - 2, Math.ceil(cx + radius * 2));
      const y0 = Math.max(1, Math.floor(cy - radius * 2));
      const y1 = Math.min(H - 2, Math.ceil(cy + radius * 2));
      for (let y = y0; y <= y1; y++) {
        for (let x = x0; x <= x1; x++) {
          const dx = x - cx, dy = y - cy;
          const g = Math.exp(-(dx * dx + dy * dy) / r2);
          const i = IX(x, y);
          u[i] += -dy * strength * g;
          v[i] += dx * strength * g;
        }
      }
    }

    function drop(px, py) {
      const cx = px / display.width * W;
      const cy = py / display.height * H;
      const pigment = pickPigment();
      const radius = 3.2 + Math.random() * 2.8;
      inject(cx, cy, radius, 1.5 + Math.random() * 0.8, pigment, 1.4 + Math.random() * 0.9);
      // a couple of off-center whorls make the bloom curl into tendrils
      const n = 2 + ((Math.random() * 2) | 0);
      for (let k = 0; k < n; k++) {
        const a = Math.random() * Math.PI * 2;
        const dist = radius * (0.6 + Math.random() * 0.9);
        addVortex(cx + Math.cos(a) * dist, cy + Math.sin(a) * dist,
                  radius * (0.7 + Math.random() * 0.6),
                  (Math.random() < 0.5 ? -1 : 1) * (0.5 + Math.random() * 0.7));
      }
      currentPigment = pigment;
    }

    let currentPigment = PIGMENTS[0];
    function pour(px, py, dx, dy) {
      const cx = px / display.width * W;
      const cy = py / display.height * H;
      inject(cx, cy, 2.0, 0.35, currentPigment, 0);
      const i = IX(Math.max(1, Math.min(W - 2, cx | 0)), Math.max(1, Math.min(H - 2, cy | 0)));
      u[i] += dx / display.width * W * 0.6;
      v[i] += dy / display.height * H * 0.6;
    }

    // ---- Render: transmittance through pigment onto paper ----

    function render() {
      const data = img.data;
      for (let i = 0; i < size; i++) {
        const idx = i * 4;
        data[idx]     = PAPER[0] * Math.exp(-dyeR[i]);
        data[idx + 1] = PAPER[1] * Math.exp(-dyeG[i]);
        data[idx + 2] = PAPER[2] * Math.exp(-dyeB[i]);
        data[idx + 3] = 255;
      }
      sctx.putImageData(img, 0, 0);
      dctx.drawImage(simCanvas, 0, 0, display.width, display.height);
    }

    // ---- Main loop ----

    function step() {
      const dt = 1.0;

      vorticityConfinement(0.18);

      u0.set(u); v0.set(v);
      advect(u, u0, u0, v0, dt, 0.999);
      advect(v, v0, u0, v0, dt, 0.999);
      setWalls();
      project();
      setWalls();

      advect(tmpR, dyeR, u, v, dt, 0.9994); [dyeR, tmpR] = [tmpR, dyeR];
      advect(tmpG, dyeG, u, v, dt, 0.9994); [dyeG, tmpG] = [tmpG, dyeG];
      advect(tmpB, dyeB, u, v, dt, 0.9994); [dyeB, tmpB] = [tmpB, dyeB];

      render();
      requestAnimationFrame(step);
    }

    // ---- Input ----

    let pointerDown = false;
    let lastX = 0, lastY = 0;
    let interacted = false;

    function firstTouch() {
      if (!interacted) {
        interacted = true;
        hint.classList.add('hidden');
      }
    }

    display.addEventListener('pointerdown', (e) => {
      pointerDown = true;
      lastX = e.clientX; lastY = e.clientY;
      drop(e.clientX, e.clientY);
      firstTouch();
    });

    display.addEventListener('pointermove', (e) => {
      if (!pointerDown) return;
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      if (dx * dx + dy * dy < 4) return;
      pour(e.clientX, e.clientY, dx, dy);
      lastX = e.clientX; lastY = e.clientY;
    });

    window.addEventListener('pointerup', () => { pointerDown = false; });
    window.addEventListener('pointercancel', () => { pointerDown = false; });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'c' || e.key === 'C') {
        dyeR.fill(0); dyeG.fill(0); dyeB.fill(0);
        u.fill(0); v.fill(0);
      }
    });

    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        // keep the ink; only the display canvas rescales
        resizeDisplay();
      }, 150);
    });

    initSim();
    requestAnimationFrame(step);
  </script>
</body>
</html>
