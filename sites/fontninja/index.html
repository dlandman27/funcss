<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Ninja</title>
    <meta name="description" content="Words fly across the screen. Slice only the ones in the target font.">
    <meta name="theme-color" content="#f2ede2">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --coral: #f0563e;
            --gold: #f7c948;
            --lime: #b7ce3c;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--paper);
            background-image: radial-gradient(rgba(32, 26, 23, 0.06) 2px, transparent 2.2px);
            background-size: 22px 22px;
            font-family: Georgia, 'Times New Roman', serif;
            color: var(--ink);
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
            cursor: crosshair;
        }

        /* ---- HUD ---- */

        #hud {
            position: fixed;
            top: 14px;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 50;
            pointer-events: none;
            flex-wrap: wrap;
            padding: 0 12px;
        }

        .sticker {
            background: var(--cream);
            border: 2.5px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 8px 18px;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(12px, 2vw, 16px);
            letter-spacing: 0.05em;
            transform: rotate(-1deg);
            font-variant-numeric: tabular-nums;
        }

        #target {
            background: var(--gold);
            transform: rotate(1deg);
            font-weight: normal;
            font-size: clamp(15px, 2.6vw, 22px);
        }

        #target .label {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: 0.65em;
            letter-spacing: 0.14em;
            margin-right: 8px;
        }

        #target.swap { animation: swap 0.4s cubic-bezier(0.22, 1.6, 0.36, 1); }

        @keyframes swap {
            0% { transform: rotate(1deg) scale(0.4); }
            60% { transform: rotate(1deg) scale(1.15); }
            100% { transform: rotate(1deg) scale(1); }
        }

        #lives { display: flex; gap: 6px; align-items: center; }

        .shuriken {
            width: 26px;
            height: 26px;
            background: var(--ink);
            clip-path: polygon(50% 0%, 63% 37%, 100% 50%, 63% 63%, 50% 100%, 37% 63%, 0% 50%, 37% 37%);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .shuriken.spent { opacity: 0.15; transform: scale(0.7) rotate(90deg); }

        /* ---- flying words ---- */

        .word {
            position: fixed;
            top: 0;
            left: 0;
            font-size: clamp(30px, 6vw, 54px);
            line-height: 1.1;
            color: var(--ink);
            white-space: nowrap;
            will-change: transform;
            pointer-events: none;
            z-index: 10;
        }

        .half { z-index: 11; }

        /* ---- blade ---- */

        #blade { position: fixed; inset: 0; pointer-events: none; z-index: 40; }

        /* ---- overlays ---- */

        .overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 100;
            background: rgba(242, 237, 226, 0.88);
            backdrop-filter: blur(3px);
            text-align: center;
            padding: 20px;
        }

        .overlay h1 {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(34px, 8vw, 72px);
            transform: rotate(-2deg);
            -webkit-text-stroke: 1.5px var(--ink);
            paint-order: stroke fill;
            color: var(--coral);
            text-shadow: 5px 5px 0 var(--ink);
        }

        .overlay .rules {
            font-style: italic;
            font-size: clamp(15px, 2.2vw, 19px);
            line-height: 1.7;
            max-width: 460px;
            color: rgba(32, 26, 23, 0.75);
        }

        .overlay .big-score {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(44px, 10vw, 90px);
            color: var(--gold);
            -webkit-text-stroke: 2px var(--ink);
            paint-order: stroke fill;
            text-shadow: 5px 5px 0 var(--ink);
        }

        .overlay .best {
            font-style: italic;
            color: rgba(32, 26, 23, 0.6);
        }

        .pill {
            background: var(--coral);
            color: var(--cream);
            border: 2.5px solid var(--ink);
            border-radius: 999px;
            box-shadow: 4px 4px 0 var(--ink);
            padding: 14px 36px;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(15px, 2.4vw, 20px);
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .pill:hover { transform: translate(-2px, -2px) rotate(-2deg); }
        .pill:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }

        #toast {
            position: fixed;
            top: 18vh;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg) scale(0);
            background: var(--cream);
            border: 2.5px solid var(--ink);
            border-radius: 12px;
            box-shadow: 4px 4px 0 var(--ink);
            padding: 10px 24px;
            font-style: italic;
            font-size: clamp(14px, 2.2vw, 18px);
            z-index: 90;
            pointer-events: none;
        }

        #toast.bad { background: #ffd9d4; }
        #toast.show { animation: toastIn 1.6s ease forwards; }

        @keyframes toastIn {
            0% { transform: translateX(-50%) rotate(-2deg) scale(0); }
            15% { transform: translateX(-50%) rotate(-2deg) scale(1.08); }
            22% { transform: translateX(-50%) rotate(-2deg) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes page-shake {
            0%, 100% { transform: translate(0, 0); }
            30% { transform: translate(-6px, 4px); }
            60% { transform: translate(5px, -4px); }
        }

        body.shake { animation: page-shake 0.22s linear; }
    </style>
</head>
<body>
    <div id="hud" style="display:none">
        <div class="sticker" id="score">0</div>
        <div class="sticker" id="target"><span class="label">SLICE:</span><span id="targetName"></span></div>
        <div id="lives"></div>
    </div>

    <canvas id="blade"></canvas>
    <div id="toast"></div>

    <div class="overlay" id="startOverlay">
        <h1>FONT NINJA</h1>
        <div class="rules">
            words fly across the screen in different typefaces.<br>
            <b>swipe through the ones in the target font.</b><br>
            slice the wrong font &mdash; lose a shuriken.<br>
            let a target escape &mdash; lose a shuriken.<br>
            three shurikens. no mercy.
        </div>
        <button class="pill" id="startBtn">BEGIN TRAINING</button>
    </div>

    <div class="overlay" id="overOverlay" style="display:none">
        <h1>DISHONOR</h1>
        <div class="big-score" id="finalScore">0</div>
        <div class="best" id="bestLine"></div>
        <button class="pill" id="againBtn">TRAIN AGAIN</button>
    </div>

    <script>
        const INK = '#201a17';
        const jit = (n) => (Math.random() - 0.5) * n;
        const pick = (arr) => arr[(Math.random() * arr.length) | 0];

        // ---- the dojo's font pool (only ones this device actually has) ----

        const CANDIDATES = [
            ['Comic Sans MS', "'Comic Sans MS', cursive"],
            ['Impact', 'Impact, fantasy'],
            ['Courier New', "'Courier New', monospace"],
            ['Georgia', 'Georgia, serif'],
            ['Times New Roman', "'Times New Roman', serif"],
            ['Arial', 'Arial, sans-serif'],
            ['Verdana', 'Verdana, sans-serif'],
            ['Trebuchet MS', "'Trebuchet MS', sans-serif"],
            ['Brush Script MT', "'Brush Script MT', cursive"],
            ['Arial Black', "'Arial Black', sans-serif"],
            ['Palatino', 'Palatino, serif'],
            ['Tahoma', 'Tahoma, sans-serif'],
        ];

        let POOL = CANDIDATES.filter(([name]) => {
            try { return document.fonts.check(`16px "${name}"`); } catch (e) { return true; }
        });
        if (POOL.length < 6) POOL = CANDIDATES;

        const WORDS = [
            'slice', 'dojo', 'swift', 'shadow', 'honor', 'blade', 'sensei', 'stealth',
            'whoosh', 'kerning', 'serif', 'glyph', 'ligature', 'italic', 'baseline',
            'ascender', 'x-height', 'swash', 'grotesque', 'oblique',
        ];

        // ---- state ----

        let playing = false;
        let score = 0;
        let combo = 0;
        let correctCount = 0;
        let lives = 3;
        let target = null;
        let spawnTimer = null;
        let spawnEvery = 1700;
        const words = [];

        let best = 0;
        try { best = parseInt(localStorage.getItem('fontninja-best'), 10) || 0; } catch (e) {}

        // ---- HUD ----

        function renderLives() {
            const el = document.getElementById('lives');
            el.textContent = '';
            for (let i = 0; i < 3; i++) {
                const s = document.createElement('div');
                s.className = 'shuriken' + (i >= lives ? ' spent' : '');
                el.appendChild(s);
            }
        }

        function setTarget() {
            const others = POOL.filter(f => f !== target);
            target = pick(others);
            const t = document.getElementById('target');
            const nameEl = document.getElementById('targetName');
            nameEl.textContent = target[0];
            nameEl.style.fontFamily = target[1];
            t.classList.remove('swap');
            void t.offsetWidth;
            t.classList.add('swap');
        }

        function updateScore() {
            document.getElementById('score').textContent =
                combo > 1 ? `${score} · x${combo}` : String(score);
        }

        function toast(msg, bad) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = bad ? 'bad' : '';
            t.id = 'toast';
            t.classList.remove('show');
            void t.offsetWidth;
            t.classList.add('show');
        }

        // ---- flying words ----

        function spawnWord() {
            if (!playing) return;
            // 40% chance it's the target font
            const font = Math.random() < 0.4 ? target : pick(POOL.filter(f => f !== target));
            const el = document.createElement('div');
            el.className = 'word';
            el.textContent = pick(WORDS);
            el.style.fontFamily = font[1];
            document.body.appendChild(el);

            const W = window.innerWidth, H = window.innerHeight;
            const fromX = W * (0.15 + Math.random() * 0.7);
            const w = {
                el, font,
                x: fromX,
                y: H + 40,
                vx: (W / 2 - fromX) * 0.0025 + jit(1.2),
                vy: -(H * 0.0122 + Math.random() * H * 0.0025),
                g: H * 0.0000875,
                rot: jit(14),
                vrot: jit(0.7),
                sliced: false,
            };
            words.push(w);
        }

        function stepWords() {
            for (let i = words.length - 1; i >= 0; i--) {
                const w = words[i];
                w.vy += w.g;
                w.x += w.vx;
                w.y += w.vy;
                w.rot += w.vrot;
                w.el.style.transform = `translate(${w.x}px, ${w.y}px) translate(-50%, -50%) rotate(${w.rot}deg)`;
                if (w.y > window.innerHeight + 80 && w.vy > 0) {
                    // letting a target escape costs a shuriken too
                    if (!w.sliced && w.font === target && playing) {
                        lives--;
                        combo = 0;
                        renderLives();
                        updateScore();
                        toast(`a ${w.font[0]} got away.`, true);
                        if (lives <= 0) gameOver();
                    }
                    w.el.remove();
                    words.splice(i, 1);
                }
            }
        }

        // ---- slicing ----

        function slice(w, angleDeg) {
            w.sliced = true;
            const rect = w.el.getBoundingClientRect();
            const correct = w.font === target;

            // the word splits into two halves that tumble apart
            for (const half of ['top', 'bottom']) {
                const h = w.el.cloneNode(true);
                h.classList.add('half');
                h.style.clipPath = half === 'top' ? 'inset(0 0 48% 0)' : 'inset(48% 0 0 0)';
                if (!correct) h.style.color = '#c0392b';
                document.body.appendChild(h);
                const dir = half === 'top' ? -1 : 1;
                const hw = {
                    el: h, font: w.font,
                    x: w.x, y: w.y,
                    vx: w.vx + jit(3) + dir * 1.5,
                    vy: w.vy * 0.3 + dir * -2 + (half === 'bottom' ? 3 : -1),
                    g: 0.5,
                    rot: w.rot, vrot: dir * (2 + Math.random() * 3),
                    sliced: true,
                };
                words.push(hw);
            }
            w.el.remove();
            words.splice(words.indexOf(w), 1);

            // slash flash
            flashSlash(rect.left + rect.width / 2, rect.top + rect.height / 2, angleDeg);

            if (correct) {
                combo++;
                correctCount++;
                score += 10 * combo;
                updateScore();
                if (correctCount % 5 === 0) {
                    setTarget();
                    toast('new target. focus.');
                }
            } else {
                lives--;
                combo = 0;
                renderLives();
                updateScore();
                toast(`that was ${w.font[0]}.`, true);
                document.body.classList.remove('shake');
                void document.body.offsetWidth;
                document.body.classList.add('shake');
                if (lives <= 0) gameOver();
            }
        }

        // ---- the blade ----

        const blade = document.getElementById('blade');
        const bctx = blade.getContext('2d');
        const trail = [];
        const slashes = [];
        let pointerDown = false;

        function sizeBlade() {
            blade.width = window.innerWidth;
            blade.height = window.innerHeight;
        }

        function flashSlash(x, y, angleDeg) {
            const a = (angleDeg * Math.PI) / 180;
            slashes.push({
                x1: x - Math.cos(a) * 70, y1: y - Math.sin(a) * 70,
                x2: x + Math.cos(a) * 70, y2: y + Math.sin(a) * 70,
                life: 1,
            });
        }

        function drawBlade() {
            bctx.clearRect(0, 0, blade.width, blade.height);
            const now = performance.now();

            // trail
            const pts = trail.filter(p => now - p.t < 140);
            trail.length = 0;
            trail.push(...pts);
            if (pts.length > 1) {
                for (const [width, color] of [[7, INK], [2.5, '#fff8ef']]) {
                    bctx.lineWidth = width;
                    bctx.strokeStyle = color;
                    bctx.lineCap = 'round';
                    bctx.lineJoin = 'round';
                    bctx.beginPath();
                    pts.forEach((p, i) => i === 0 ? bctx.moveTo(p.x, p.y) : bctx.lineTo(p.x, p.y));
                    bctx.stroke();
                }
            }

            // slash flashes
            for (let i = slashes.length - 1; i >= 0; i--) {
                const s = slashes[i];
                s.life -= 0.08;
                if (s.life <= 0) { slashes.splice(i, 1); continue; }
                bctx.globalAlpha = s.life;
                bctx.lineCap = 'round';
                bctx.lineWidth = 8 * s.life;
                bctx.strokeStyle = INK;
                bctx.beginPath();
                bctx.moveTo(s.x1, s.y1);
                bctx.lineTo(s.x2, s.y2);
                bctx.stroke();
                bctx.lineWidth = 3 * s.life;
                bctx.strokeStyle = '#fff8ef';
                bctx.stroke();
                bctx.globalAlpha = 1;
            }
        }

        function checkSlice(x1, y1, x2, y2) {
            if (!playing) return;
            const speed = Math.hypot(x2 - x1, y2 - y1);
            if (speed < 14) return;   // a swipe, not a hover
            const angle = (Math.atan2(y2 - y1, x2 - x1) * 180) / Math.PI;
            const steps = Math.ceil(speed / 8);
            for (const w of [...words]) {
                if (w.sliced) continue;
                const rect = w.el.getBoundingClientRect();
                for (let s = 0; s <= steps; s++) {
                    const px = x1 + ((x2 - x1) * s) / steps;
                    const py = y1 + ((y2 - y1) * s) / steps;
                    if (px >= rect.left && px <= rect.right && py >= rect.top && py <= rect.bottom) {
                        slice(w, angle);
                        break;
                    }
                }
            }
        }

        let lastPX = 0, lastPY = 0;

        document.addEventListener('pointerdown', (e) => {
            pointerDown = true;
            lastPX = e.clientX;
            lastPY = e.clientY;
        });

        document.addEventListener('pointermove', (e) => {
            if (!pointerDown) return;
            trail.push({ x: e.clientX, y: e.clientY, t: performance.now() });
            checkSlice(lastPX, lastPY, e.clientX, e.clientY);
            lastPX = e.clientX;
            lastPY = e.clientY;
        });

        document.addEventListener('pointerup', () => { pointerDown = false; });
        document.addEventListener('pointercancel', () => { pointerDown = false; });

        // ---- game flow ----

        function start() {
            playing = true;
            score = 0;
            combo = 0;
            correctCount = 0;
            lives = 3;
            spawnEvery = 1700;
            for (const w of words) w.el.remove();
            words.length = 0;
            document.getElementById('startOverlay').style.display = 'none';
            document.getElementById('overOverlay').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            renderLives();
            setTarget();
            updateScore();
            scheduleSpawn();
        }

        function scheduleSpawn() {
            clearTimeout(spawnTimer);
            if (!playing) return;
            spawnWord();
            if (Math.random() < 0.3) setTimeout(spawnWord, 300);
            spawnEvery = Math.max(900, spawnEvery - 9);   // it gets worse, gently
            spawnTimer = setTimeout(scheduleSpawn, spawnEvery);
        }

        function gameOver() {
            playing = false;
            clearTimeout(spawnTimer);
            if (score > best) {
                best = score;
                try { localStorage.setItem('fontninja-best', String(best)); } catch (e) {}
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestLine').textContent =
                score >= best && score > 0 ? 'a new personal best. the dojo is proud.' : `personal best: ${best}`;
            setTimeout(() => {
                document.getElementById('overOverlay').style.display = 'flex';
            }, 700);
        }

        document.getElementById('startBtn').addEventListener('click', start);
        document.getElementById('againBtn').addEventListener('click', start);

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && playing) clearTimeout(spawnTimer);
            else if (playing) scheduleSpawn();
        });

        // ---- loop ----

        function frame() {
            stepWords();
            drawBlade();
            requestAnimationFrame(frame);
        }

        window.addEventListener('resize', sizeBlade);
        sizeBlade();
        frame();
    </script>
</body>
</html>
