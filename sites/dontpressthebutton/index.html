<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don't Press The Button</title>
    <meta name="description" content="A button that should not be pressed under any circumstances. There is a form on file about it.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'><circle cx='25' cy='25' r='17' fill='%23f0563e' stroke='%23201a17' stroke-width='3'/></svg>">
    <style>
        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --coral: #f0563e;
            --sky: #5aa0db;
            --gold: #f7c948;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            height: 100vh;
            height: 100dvh;
            min-height: 520px;
            background: var(--paper);
            color: var(--ink);
            font-family: Georgia, 'Times New Roman', serif;
            display: grid;
            grid-template-rows: auto 1fr auto;
            justify-items: center;
            align-items: center;
            padding: 22px 16px 26px;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 12px;
            box-shadow: 4px 4px 0 var(--ink);
        }

        .sign {
            padding: 16px 26px;
            text-align: center;
            transform: rotate(-1.2deg);
            max-width: 92vw;
            position: relative;
            z-index: 3;
        }
        .sign .head {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(20px, 5vw, 28px);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .sign .sub {
            font-style: italic;
            font-size: 14px;
            color: rgba(32, 26, 23, 0.65);
            margin-top: 5px;
            min-height: 1.2em;
        }

        .mount {
            position: relative;
            z-index: 2;
            width: min(340px, 88vw);
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--coral);
            border: 3px solid var(--ink);
            box-shadow: 6px 6px 0 var(--ink);
            cursor: pointer;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 17px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--ink);
            transition: transform 0.25s cubic-bezier(0.2, 1.4, 0.4, 1), box-shadow 0.15s ease,
                        width 0.3s ease, height 0.3s ease, filter 0.3s ease;
            position: relative;
        }
        #btn:active { box-shadow: 1px 1px 0 var(--ink); }
        #btn.disabled { filter: grayscale(0.9) brightness(1.1); cursor: not-allowed; }

        #decoy {
            position: absolute;
            right: -10px;
            bottom: -6px;
            width: 92px;
            height: 92px;
            border-radius: 50%;
            background: var(--sky);
            border: 3px solid var(--ink);
            box-shadow: 4px 4px 0 var(--ink);
            cursor: pointer;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--ink);
            transform: rotate(8deg) scale(0);
            transition: transform 0.3s cubic-bezier(0.2, 1.6, 0.4, 1);
        }
        #decoy.show { transform: rotate(8deg) scale(1); }

        .siren {
            position: fixed;
            top: 14px;
            width: 46px;
            height: 30px;
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 23px 23px 6px 6px;
            box-shadow: 3px 3px 0 var(--ink);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 5;
        }
        .siren.l { left: 14px; transform: rotate(-6deg); }
        .siren.r { right: 14px; transform: rotate(6deg); }
        body.alarm .siren { opacity: 1; animation: sirenFlash 0.4s steps(1) infinite; }
        @keyframes sirenFlash {
            0% { background: var(--coral); }
            50% { background: var(--gold); }
        }

        .report {
            width: min(440px, 92vw);
            padding: 14px 20px 16px;
            transform: rotate(0.7deg);
            position: relative;
            z-index: 2;
            max-height: 28vh;
            overflow-y: auto;
        }
        .report h2 {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            border-bottom: 2px solid var(--ink);
            padding-bottom: 6px;
            margin-bottom: 8px;
        }
        .report .line {
            font-style: italic;
            font-size: 14px;
            padding: 3px 0;
            border-bottom: 1px dotted rgba(32, 26, 23, 0.25);
            opacity: 0;
            transform: translateY(4px);
            animation: lineIn 0.25s ease-out forwards;
        }
        .report .line b { font-style: normal; font-family: 'Arial Black', Arial, sans-serif; font-size: 11px; margin-right: 8px; }
        @keyframes lineIn { to { opacity: 1; transform: translateY(0); } }
        .report .empty { font-style: italic; font-size: 14px; color: rgba(32, 26, 23, 0.45); }

        .stamp {
            position: fixed;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 12px;
            border: 3px solid;
            border-radius: 8px;
            background: rgba(255, 248, 239, 0.7);
            pointer-events: none;
            z-index: 4;
            transform: scale(0);
            animation: stampIn 0.3s cubic-bezier(0.2, 1.6, 0.4, 1) forwards;
            transition: opacity 1.5s ease;
        }
        @keyframes stampIn {
            0% { transform: rotate(3deg) scale(2); opacity: 0; }
            70% { transform: rotate(var(--r)) scale(0.94); opacity: 1; }
            100% { transform: rotate(var(--r)) scale(1); opacity: 1; }
        }

        #dim {
            position: fixed;
            inset: 0;
            background: rgba(32, 26, 23, 0.55);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 6;
        }
        #dim.on { opacity: 1; }

        @keyframes thunk {
            0% { transform: translate(0, 0); }
            25% { transform: translate(3px, 4px); }
            50% { transform: translate(-4px, 2px); }
            75% { transform: translate(2px, -3px); }
            100% { transform: translate(0, 0); }
        }
        body.thunk { animation: thunk 0.25s linear; }

        @media (prefers-reduced-motion: reduce) {
            body.thunk { animation: none; }
            body.alarm .siren { animation: none; background: var(--coral); }
            .stamp { animation: none; transform: rotate(var(--r)) scale(1); opacity: 1; }
            #btn { transition: none; }
        }
    </style>
</head>
<body>
    <div class="siren l"></div>
    <div class="siren r"></div>

    <div class="card sign">
        <div class="head">Do Not Press</div>
        <div class="sub" id="signSub">the button. form 11-C is on file.</div>
    </div>

    <div class="mount">
        <button id="btn" aria-label="The button. Do not press it.">Do Not<br>Press</button>
        <button id="decoy">press this<br>one instead</button>
    </div>

    <div class="card report">
        <h2>Incident Report</h2>
        <div id="lines"><div class="empty">no incidents. keep it that way.</div></div>
    </div>

    <div id="dim"></div>

    <script>
    (() => {
        const btn = document.getElementById('btn');
        const decoy = document.getElementById('decoy');
        const signSub = document.getElementById('signSub');
        const signHead = document.querySelector('.sign .head');
        const linesEl = document.getElementById('lines');
        const dim = document.getElementById('dim');
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
        const canHover = window.matchMedia('(hover: hover)').matches;

        function loadNum(k) { try { return parseInt(localStorage.getItem(k), 10) || 0; } catch (e) { return 0; } }
        function saveNum(k, v) { try { localStorage.setItem(k, String(v)); } catch (e) {} }

        let total = loadNum('dptb-presses');
        let n = 0;              // presses this visit
        let entry = 0;          // report entry counter
        let fleeing = false;
        let dodgesLeft = 0;

        if (total > 0) {
            signSub.textContent = 'back again. presses on file: ' + total + '.';
        }

        // ---- effects ----
        function shake() {
            if (reducedMotion.matches) return;
            document.body.classList.remove('thunk');
            void document.body.offsetWidth;
            document.body.classList.add('thunk');
        }

        const stamps = [];
        function stamp(text, color) {
            const el = document.createElement('div');
            el.className = 'stamp';
            el.textContent = text;
            el.style.color = color;
            el.style.borderColor = color;
            el.style.setProperty('--r', ((Math.random() * 24) - 12).toFixed(1) + 'deg');
            el.style.left = (8 + Math.random() * 70) + 'vw';
            el.style.top = (8 + Math.random() * 74) + 'vh';
            document.body.appendChild(el);
            stamps.push(el);
            if (stamps.length > 12) {
                const old = stamps.shift();
                old.style.opacity = '0';
                setTimeout(() => old.remove(), 1600);
            }
        }

        function report(text) {
            entry++;
            const empty = linesEl.querySelector('.empty');
            if (empty) empty.remove();
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = '<b>ENTRY ' + String(entry).padStart(3, '0') + '</b>';
            line.appendChild(document.createTextNode(text));
            linesEl.prepend(line);
            while (linesEl.children.length > 6) linesEl.lastChild.remove();
        }

        let alarmTimer = 0;
        function alarm(ms) {
            document.body.classList.add('alarm');
            clearTimeout(alarmTimer);
            alarmTimer = setTimeout(() => document.body.classList.remove('alarm'), ms);
        }

        function setBtn(label, scale, tilt) {
            if (label !== null) btn.innerHTML = label;
            btn.style.transform = 'scale(' + (scale || 1) + ') rotate(' + (tilt || 0) + 'deg)';
        }

        function flee(dodges) {
            if (!canHover || reducedMotion.matches) return;
            fleeing = true;
            dodgesLeft = dodges;
        }
        btn.addEventListener('pointerenter', () => {
            if (!fleeing || dodgesLeft <= 0) return;
            dodgesLeft--;
            const dx = (Math.random() < 0.5 ? -1 : 1) * (60 + Math.random() * 60);
            const dy = (Math.random() < 0.5 ? -1 : 1) * (20 + Math.random() * 40);
            btn.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
            if (dodgesLeft === 0) {
                fleeing = false;
                setTimeout(() => { btn.style.transform = ''; report('the button tired of running.'); }, 600);
            }
        });

        function dimFlash() {
            dim.classList.add('on');
            setTimeout(() => dim.classList.remove('on'), 900);
        }

        // ---- the escalation ----
        const BEATS = [
            () => { report('subject pressed the button.'); stamp('PRESSED', '#f0563e'); signSub.textContent = 'that was the one thing.'; },
            () => { report('subject pressed it again, while reading this.'); signSub.textContent = 'one warning remains.'; },
            () => { report('second warning issued.'); stamp('SECOND WARNING', '#f0563e'); shake(); },
            () => { report('the button has been made smaller. for safety.'); setBtn(null, 0.82); },
            () => { report('the button is avoiding you.'); flee(4); },
            () => { report('signage reinforced.'); stamp('DO NOT', '#f0563e'); stamp('DO NOT', '#f0563e'); shake(); },
            () => { report('the button says it is fine.'); setBtn('Fine.', 0.82); },
            () => { report('alarm activated. it is decorative. so far.'); alarm(2600); },
            () => { report('button disabled remotely.'); btn.classList.add('disabled'); setBtn('Disabled', 0.82); },
            () => { report('the disabling did not take.'); btn.classList.remove('disabled'); setBtn('Do Not<br>Press', 1); shake(); },
            () => { report('an approved button has been provided.'); decoy.classList.add('show'); },
            () => { report('structural fatigue detected.'); setBtn(null, 1, -8); },
            () => { report('form 11-C has been revoked.'); stamp('FORM 11-C REVOKED', '#201a17'); },
            () => { report('the wall is running out of room.'); shake(); stamp('STOP', '#f0563e'); },
            () => { report('the button appears to feed on presses.'); setBtn(null, 1.5); },
            () => { report('power draw exceeded allotment.'); dimFlash(); },
            () => { report('the button has unionized.'); setBtn('No.', 1.5); },
            () => { report('alarm again. still decorative. probably.'); alarm(4000); shake(); },
            () => { report('management has been notified.'); stamp('MANAGEMENT NOTIFIED', '#201a17'); },
            () => { report('management pressed it too.'); },
            () => { report('the button is hiding.'); setBtn(null, 0.5); },
            () => { report('it would prefer not to.'); flee(3); },
            () => { report('subject reclassified as a tester.'); stamp('EMPLOYEE OF THE MONTH', '#c99a12'); },
            () => { report('testing quota assigned: unlimited.'); signHead.textContent = 'Press The Button'; signSub.textContent = 'the department has adjusted its position.'; },
            () => { report('the button accepts its role.'); setBtn('OK.<br>Press', 1); },
            () => { report('quota met. quota raised.'); stamp('QUOTA MET', '#c99a12'); },
            () => { report('the button has filed a complaint about you.'); },
            () => { report('incident closed. reopened. closed again.'); shake(); signHead.textContent = 'Do Not Press'; signSub.textContent = 'we are back where we started. do not press the button.'; setBtn('Do Not<br>Press', 1); }
        ];

        const LATER = [
            'the button no longer keeps count. we do.',
            'nothing happened. officially.',
            'this line item was pre-written.',
            'the department is aware.',
            'that press has been attributed to the wind.',
            'a beep was heard three rooms away.',
            'the button remains structurally smug.',
            'entry intentionally left vague.',
            'someone, somewhere, sighed.',
            'the paperwork has paperwork now.',
            'your persistence has been noted in the margins.',
            'the button and the department have stopped speaking.'
        ];

        btn.addEventListener('click', () => {
            n++;
            total++;
            saveNum('dptb-presses', total);

            if (Math.random() < 0.03) {
                stamp('THE BUTTON LIKED THAT', '#c99a12');
                report('the button liked that. this is worse.');
                return;
            }

            if (n <= BEATS.length) {
                BEATS[n - 1]();
            } else {
                report(LATER[Math.floor(Math.random() * LATER.length)]);
                const r = Math.random();
                if (r < 0.2) shake();
                else if (r < 0.32) stamp('STILL PRESSING', '#f0563e');
                else if (r < 0.36) alarm(1800);
                else if (r < 0.4) flee(2);
            }
        });

        decoy.addEventListener('click', () => {
            report('subject pressed the approved button. unsettling.');
            decoy.classList.remove('show');
        });
    })();
    </script>
</body>
</html>
