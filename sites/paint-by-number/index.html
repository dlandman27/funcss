<!DOCTYPE html>
<html lang="en">
<head>
  <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paint by Number</title>
  <meta name="description" content="Upload a photo, get a numbered kit, and paint it back together.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'><rect x='6' y='6' width='38' height='38' rx='6' fill='%23fff8ef' stroke='%23201a17' stroke-width='3'/><path d='M6 32l12-10 9 8 8-6 9 8v8a6 6 0 01-6 6H12a6 6 0 01-6-6z' fill='%235aa0db' stroke='%23201a17' stroke-width='3'/><circle cx='34' cy='16' r='5' fill='%23f7c948' stroke='%23201a17' stroke-width='3'/></svg>">
  <style>
    :root {
      --ink: #201a17;
      --paper: #f2ede2;
      --cream: #fff8ef;
      --coral: #f0563e;
      --sky: #5aa0db;
      --gold: #f7c948;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 22px 14px 40px;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    header { text-align: center; margin-bottom: 20px; }
    h1 {
      font-family: 'Arial Black', Arial, sans-serif;
      font-weight: 900;
      font-size: clamp(24px, 6vw, 34px);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: inline-block;
      transform: rotate(-1.5deg);
    }
    header p { font-style: italic; font-size: 15px; color: rgba(32,26,23,0.6); margin-top: 4px; }

    .card {
      background: var(--cream);
      border: 2px solid var(--ink);
      border-radius: 12px;
      box-shadow: 4px 4px 0 var(--ink);
    }

    /* ── buttons ── */
    .pill {
      font-family: 'Arial Black', Arial, sans-serif;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink);
      border: 2px solid var(--ink);
      border-radius: 999px;
      box-shadow: 3px 3px 0 var(--ink);
      padding: 11px 20px;
      cursor: pointer;
      background: var(--cream);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      user-select: none;
    }
    .pill:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--ink); }
    .pill:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
    .pill.coral { background: var(--coral); }
    .pill.gold { background: var(--gold); }
    .pill.sky { background: var(--sky); }

    /* ── setup screen ── */
    #setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: min(520px, 94vw);
    }
    .drop {
      width: 100%;
      padding: 38px 20px;
      text-align: center;
      cursor: pointer;
      border-style: dashed;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .drop:hover, .drop.drag { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
    .drop svg { display: block; margin: 0 auto 12px; }
    .drop .big { font-family: 'Arial Black', Arial, sans-serif; font-weight: 900; font-size: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
    .drop .small { font-style: italic; font-size: 14px; color: rgba(32,26,23,0.6); margin-top: 6px; }
    #fileInput { display: none; }

    .controls {
      width: 100%;
      padding: 16px 20px;
      display: flex;
      gap: 24px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      transform: rotate(0.6deg);
    }
    .ctrl { display: flex; flex-direction: column; gap: 6px; align-items: center; }
    .ctrl .lab { font-family: 'Arial Black', Arial, sans-serif; font-weight: 900; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
    .ctrl .row { display: flex; align-items: center; gap: 10px; }
    input[type=range] { width: 130px; accent-color: var(--coral); cursor: pointer; }
    #paintsVal { font-style: italic; min-width: 20px; text-align: center; }
    select {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 14px;
      background: var(--cream);
      color: var(--ink);
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
    }

    .setup-btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    #makeBtn { display: none; transform: rotate(-1.5deg); }

    /* ── studio ── */
    #studio { display: none; flex-direction: column; align-items: center; gap: 16px; width: 100%; max-width: 1000px; }
    #studio.on { display: flex; }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 16px;
      transform: rotate(-0.5deg);
    }
    .toolbar .pill { font-size: 12px; padding: 9px 16px; }
    #progress { font-style: italic; font-size: 15px; }

    .workbench {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      flex-wrap: wrap;
    }
    .easel {
      position: relative;
      padding: 10px;
      line-height: 0;
    }
    #board { display: block; cursor: crosshair; touch-action: none; user-select: none; }

    .masterpiece {
      position: absolute;
      top: -18px;
      right: -14px;
      background: var(--gold);
      border: 2px solid var(--ink);
      border-radius: 999px;
      box-shadow: 3px 3px 0 var(--ink);
      padding: 10px 18px;
      font-family: 'Arial Black', Arial, sans-serif;
      font-weight: 900;
      font-size: 14px;
      text-transform: uppercase;
      transform: rotate(7deg) scale(0);
      text-align: center;
      pointer-events: none;
      line-height: 1.2;
    }
    .masterpiece em { display: block; font-family: Georgia, serif; font-weight: normal; font-size: 11px; text-transform: none; }
    .masterpiece.show { animation: popIn 0.4s cubic-bezier(0.2, 1.6, 0.4, 1) forwards; }
    @keyframes popIn {
      0% { transform: rotate(15deg) scale(0.2); }
      70% { transform: rotate(6deg) scale(1.15); }
      100% { transform: rotate(7deg) scale(1); }
    }

    .paints {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 70vh;
      overflow-y: auto;
      transform: rotate(0.8deg);
    }
    .paints h3 {
      font-family: 'Arial Black', Arial, sans-serif;
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 2px;
      text-align: center;
    }
    .dab {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 8px;
      border: 2px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      user-select: none;
    }
    .dab:hover { background: rgba(32,26,23,0.06); }
    .dab.active { border-color: var(--ink); background: rgba(32,26,23,0.06); box-shadow: 2px 2px 0 var(--ink); }
    .dab-swatch {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      flex-shrink: 0;
      position: relative;
    }
    .dab-num { font-family: 'Arial Black', Arial, sans-serif; font-weight: 900; font-size: 14px; min-width: 22px; }
    .dab-left { font-style: italic; font-size: 12px; color: rgba(32,26,23,0.55); margin-left: auto; }
    .dab.done { opacity: 0.4; }
    .dab.done .dab-left::after { content: ' ✓'; }
    .dab.eraser .dab-swatch {
      background: var(--cream);
      background-image: linear-gradient(45deg, transparent 44%, var(--ink) 44%, var(--ink) 56%, transparent 56%);
    }

    @media (max-width: 720px) {
      .workbench { flex-direction: column; align-items: center; }
      .paints {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        max-height: none;
        max-width: 94vw;
      }
      .paints h3 { width: 100%; }
      .dab-left { display: none; }
    }

    .hint {
      font-style: italic;
      font-size: 15px;
      color: rgba(32,26,23,0.55);
      transition: opacity 1.2s ease;
      min-height: 1.2em;
      text-align: center;
    }
    .hint.gone { opacity: 0; }

    /* ── loading ── */
    #loading {
      display: none;
      position: fixed; inset: 0;
      background: rgba(242, 237, 226, 0.88);
      z-index: 50;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #loading.show { display: flex; }
    .blob-spin {
      width: 44px; height: 44px;
      background: var(--coral);
      border: 2px solid var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      border-radius: 46% 54% 60% 40% / 50% 44% 56% 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingMsg { font-style: italic; font-size: 16px; }

    @keyframes thunk {
      0% { transform: translate(0, 0); }
      25% { transform: translate(2px, 3px); }
      50% { transform: translate(-3px, 1px); }
      75% { transform: translate(1px, -2px); }
      100% { transform: translate(0, 0); }
    }
    body.thunk { animation: thunk 0.22s linear; }

    @media (prefers-reduced-motion: reduce) {
      body.thunk { animation: none; }
      .masterpiece.show { animation: none; transform: rotate(7deg) scale(1); }
      .blob-spin { animation-duration: 3s; }
      .pill, .drop, .hint { transition: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>Paint by Number</h1>
  <p>upload a photo. we number it. you do the rest.</p>
</header>

<!-- setup -->
<div id="setup">
  <div class="card drop" id="drop">
    <svg width="52" height="52" viewBox="0 0 50 50" aria-hidden="true">
      <rect x="6" y="6" width="38" height="38" rx="6" fill="#fff8ef" stroke="#201a17" stroke-width="3"/>
      <path d="M6 32l12-10 9 8 8-6 9 8v8a6 6 0 01-6 6H12a6 6 0 01-6-6z" fill="#5aa0db" stroke="#201a17" stroke-width="3"/>
      <circle cx="34" cy="16" r="5" fill="#f7c948" stroke="#201a17" stroke-width="3"/>
    </svg>
    <div class="big">Drop a photo here</div>
    <div class="small">or click — jpg, png, the usual</div>
  </div>
  <input type="file" id="fileInput" accept="image/*">

  <div class="card controls">
    <div class="ctrl">
      <div class="lab">Paints</div>
      <div class="row">
        <input type="range" id="paints" min="4" max="16" value="10" step="1">
        <span id="paintsVal">10</span>
      </div>
    </div>
    <div class="ctrl">
      <div class="lab">Detail</div>
      <select id="detail">
        <option value="260">chunky</option>
        <option value="380" selected>classic</option>
        <option value="560">fussy</option>
      </select>
    </div>
  </div>

  <div class="setup-btns">
    <button class="pill coral" id="makeBtn">Make My Kit</button>
    <button class="pill" id="sampleBtn" style="transform: rotate(1.2deg)">No photo? Paint the sample</button>
  </div>
</div>

<!-- studio -->
<div id="studio">
  <div class="card toolbar">
    <button class="pill" id="newBtn">New Canvas</button>
    <button class="pill sky" id="peekBtn">Hold to Peek</button>
    <button class="pill gold" id="frameBtn">Frame It</button>
    <span id="progress"></span>
  </div>

  <div class="workbench">
    <div class="card easel">
      <canvas id="board"></canvas>
      <div class="masterpiece" id="masterpiece">A Masterpiece<em>signed, presumably</em></div>
    </div>
    <div class="card paints" id="paints-panel">
      <h3>The Kit</h3>
    </div>
  </div>

  <div class="hint" id="hint">drag to paint — the right color makes the number disappear</div>
</div>

<!-- loading -->
<div id="loading">
  <div class="blob-spin"></div>
  <div id="loadingMsg">mixing paints…</div>
</div>

<script>
(() => {
  const INK = '#201a17';
  const CREAM = '#fff8ef';

  // ── state ──
  let srcImg = null;         // Image or canvas used as source
  let imgW = 0, imgH = 0;
  let palette = [];          // [{r,g,b,hex}]
  let qData = null;          // Uint8Array color index per pixel
  let regionMap = null;      // Int32Array region id per pixel
  let regions = [];          // [{id,color,area,nx,ny,pixels,filledWith}]
  let colorTotals = [];      // regions per color
  let selected = 0;          // palette index, -1 = eraser
  let fillCanvas, fillCtx, fillData;
  let borderCanvas;
  let peeking = false;
  let celebrated = false;

  const setup = document.getElementById('setup');
  const studio = document.getElementById('studio');
  const drop = document.getElementById('drop');
  const fileInput = document.getElementById('fileInput');
  const makeBtn = document.getElementById('makeBtn');
  const sampleBtn = document.getElementById('sampleBtn');
  const paintsEl = document.getElementById('paints');
  const paintsVal = document.getElementById('paintsVal');
  const detailEl = document.getElementById('detail');
  const board = document.getElementById('board');
  const bctx = board.getContext('2d');
  const panel = document.getElementById('paints-panel');
  const progressEl = document.getElementById('progress');
  const loading = document.getElementById('loading');
  const loadingMsg = document.getElementById('loadingMsg');
  const hintEl = document.getElementById('hint');
  const masterpieceEl = document.getElementById('masterpiece');
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

  paintsEl.addEventListener('input', () => paintsVal.textContent = paintsEl.value);

  // ── setup: upload / drag / sample ──
  drop.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => e.target.files[0] && loadFile(e.target.files[0]));
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
  drop.addEventListener('drop', e => {
    e.preventDefault();
    drop.classList.remove('drag');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });

  function loadFile(file) {
    const img = new Image();
    img.onload = () => {
      srcImg = img;
      makeBtn.style.display = 'inline-block';
      drop.querySelector('.big').textContent = file.name.length > 28 ? file.name.slice(0, 25) + '…' : file.name;
      drop.querySelector('.small').textContent = 'got it. make your kit below.';
    };
    img.src = URL.createObjectURL(file);
  }

  sampleBtn.addEventListener('click', () => {
    srcImg = drawSample();
    startProcessing();
  });
  makeBtn.addEventListener('click', () => { if (srcImg) startProcessing(); });

  // A flat little landscape — quantizes into a clean, satisfying kit.
  function drawSample() {
    const c = document.createElement('canvas');
    c.width = 480; c.height = 360;
    const x = c.getContext('2d');
    x.fillStyle = '#8fc1e8'; x.fillRect(0, 0, 480, 200);
    x.fillStyle = '#5aa0db'; x.fillRect(0, 0, 480, 90);
    x.fillStyle = '#f7c948';
    x.beginPath(); x.arc(390, 70, 42, 0, Math.PI * 2); x.fill();
    x.fillStyle = '#fff8ef';
    x.beginPath(); x.ellipse(120, 60, 55, 22, 0, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.ellipse(200, 90, 40, 16, 0, 0, Math.PI * 2); x.fill();
    x.fillStyle = '#a98fd0';
    x.beginPath(); x.moveTo(0, 200); x.lineTo(120, 80); x.lineTo(260, 200); x.closePath(); x.fill();
    x.fillStyle = '#8f74b8';
    x.beginPath(); x.moveTo(140, 200); x.lineTo(300, 100); x.lineTo(480, 200); x.closePath(); x.fill();
    x.fillStyle = '#b7ce3c'; x.fillRect(0, 200, 480, 160);
    x.fillStyle = '#f2ede2';
    x.beginPath();
    x.moveTo(210, 360); x.quadraticCurveTo(250, 280, 230, 200);
    x.lineTo(260, 200); x.quadraticCurveTo(300, 280, 290, 360);
    x.closePath(); x.fill();
    x.fillStyle = '#f0563e'; x.fillRect(60, 240, 90, 70);
    x.fillStyle = '#201a17';
    x.beginPath(); x.moveTo(45, 240); x.lineTo(105, 195); x.lineTo(165, 240); x.closePath(); x.fill();
    x.fillStyle = '#f7c948'; x.fillRect(90, 270, 28, 40);
    x.fillStyle = '#8a5a2b'; x.fillRect(370, 235, 18, 75);
    x.fillStyle = '#2fb0a3';
    x.beginPath(); x.arc(379, 210, 45, 0, Math.PI * 2); x.fill();
    return c;
  }

  // ── processing pipeline ──
  function startProcessing() {
    showLoading('mixing paints…');
    setTimeout(process, 60);
  }

  function process() {
    const maxDim = parseInt(detailEl.value, 10);
    const k = parseInt(paintsEl.value, 10);

    const sw = srcImg.width, sh = srcImg.height;
    const scale = Math.min(1, maxDim / Math.max(sw, sh));
    imgW = Math.max(2, Math.round(sw * scale));
    imgH = Math.max(2, Math.round(sh * scale));

    const src = document.createElement('canvas');
    src.width = imgW; src.height = imgH;
    const sctx = src.getContext('2d');
    sctx.drawImage(srcImg, 0, 0, imgW, imgH);
    const pixels = sctx.getImageData(0, 0, imgW, imgH).data;
    boxBlur(pixels, imgW, imgH);

    loadingMsg.textContent = 'sorting by number…';
    setTimeout(() => {
      palette = kMeans(pixels, imgW * imgH, k);
      qData = assignColors(pixels, imgW * imgH, palette);

      loadingMsg.textContent = 'drawing the lines…';
      setTimeout(() => {
        cleanRegions();
        buildLayers();
        buildPanel();
        setup.style.display = 'none';
        studio.classList.add('on');
        sizeBoard();
        render();
        updateProgress();
        hideLoading();
      }, 20);
    }, 20);
  }

  // 3x3 box blur to calm speckle before quantizing
  function boxBlur(d, w, h) {
    const out = new Uint8ClampedArray(d.length);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        let r = 0, g = 0, b = 0, n = 0;
        for (let dy = -1; dy <= 1; dy++) {
          const yy = y + dy;
          if (yy < 0 || yy >= h) continue;
          for (let dx = -1; dx <= 1; dx++) {
            const xx = x + dx;
            if (xx < 0 || xx >= w) continue;
            const p = (yy * w + xx) * 4;
            r += d[p]; g += d[p + 1]; b += d[p + 2]; n++;
          }
        }
        const q = (y * w + x) * 4;
        out[q] = r / n; out[q + 1] = g / n; out[q + 2] = b / n; out[q + 3] = 255;
      }
    }
    d.set(out);
  }

  function kMeans(pixels, n, k) {
    const step = Math.max(1, Math.floor(n / 2500));
    const samples = [];
    for (let i = 0; i < n; i += step) {
      const p = i * 4;
      samples.push([pixels[p], pixels[p + 1], pixels[p + 2]]);
    }
    const dist2 = (a, b) => (a[0] - b[0]) ** 2 + (a[1] - b[1]) ** 2 + (a[2] - b[2]) ** 2;

    const cents = [samples[Math.floor(Math.random() * samples.length)]];
    while (cents.length < k) {
      let sum = 0;
      const ds = samples.map(s => {
        let m = Infinity;
        for (const c of cents) { const d = dist2(s, c); if (d < m) m = d; }
        sum += m;
        return m;
      });
      let r = Math.random() * sum, acc = 0, pick = 0;
      for (let i = 0; i < samples.length; i++) { acc += ds[i]; if (acc >= r) { pick = i; break; } }
      cents.push(samples[pick]);
    }

    for (let iter = 0; iter < 12; iter++) {
      const sums = cents.map(() => [0, 0, 0, 0]);
      for (const s of samples) {
        let best = 0, bd = Infinity;
        for (let ci = 0; ci < cents.length; ci++) {
          const d = dist2(s, cents[ci]);
          if (d < bd) { bd = d; best = ci; }
        }
        const t = sums[best];
        t[0] += s[0]; t[1] += s[1]; t[2] += s[2]; t[3]++;
      }
      for (let ci = 0; ci < cents.length; ci++) {
        if (sums[ci][3] > 0) {
          cents[ci] = [sums[ci][0] / sums[ci][3], sums[ci][1] / sums[ci][3], sums[ci][2] / sums[ci][3]];
        }
      }
    }

    // lightest paint is No. 1, like a real kit
    cents.sort((a, b) => (b[0] + b[1] + b[2]) - (a[0] + a[1] + a[2]));
    return cents.map(c => {
      const r = Math.round(c[0]), g = Math.round(c[1]), b = Math.round(c[2]);
      return { r, g, b, hex: '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('') };
    });
  }

  function assignColors(pixels, n, pal) {
    const out = new Uint8Array(n);
    for (let i = 0; i < n; i++) {
      const p = i * 4;
      const r = pixels[p], g = pixels[p + 1], b = pixels[p + 2];
      let best = 0, bd = Infinity;
      for (let ci = 0; ci < pal.length; ci++) {
        const c = pal[ci];
        const d = (r - c.r) ** 2 + (g - c.g) ** 2 + (b - c.b) ** 2;
        if (d < bd) { bd = d; best = ci; }
      }
      out[i] = best;
    }
    return out;
  }

  function label() {
    const n = imgW * imgH, w = imgW, h = imgH;
    regionMap = new Int32Array(n).fill(-1);
    regions = [];
    const queue = new Int32Array(n);
    for (let start = 0; start < n; start++) {
      if (regionMap[start] !== -1) continue;
      const id = regions.length;
      const color = qData[start];
      const pixels = [];
      let head = 0, tail = 0;
      queue[tail++] = start;
      regionMap[start] = id;
      while (head < tail) {
        const cur = queue[head++];
        pixels.push(cur);
        const x = cur % w, y = (cur - x) / w;
        if (x > 0 && regionMap[cur - 1] === -1 && qData[cur - 1] === color) { regionMap[cur - 1] = id; queue[tail++] = cur - 1; }
        if (x < w - 1 && regionMap[cur + 1] === -1 && qData[cur + 1] === color) { regionMap[cur + 1] = id; queue[tail++] = cur + 1; }
        if (y > 0 && regionMap[cur - w] === -1 && qData[cur - w] === color) { regionMap[cur - w] = id; queue[tail++] = cur - w; }
        if (y < h - 1 && regionMap[cur + w] === -1 && qData[cur + w] === color) { regionMap[cur + w] = id; queue[tail++] = cur + w; }
      }
      regions.push({ id, color, area: pixels.length, pixels, filledWith: null, nx: 0, ny: 0 });
    }
  }

  // Absorb tiny regions into the neighboring color they touch most,
  // then relabel — repeat until every region is paintable.
  function cleanRegions() {
    const n = imgW * imgH, w = imgW;
    const MIN_AREA = Math.max(24, Math.round(n / 2200));

    for (let pass = 0; pass < 4; pass++) {
      label();
      const smalls = regions.filter(r => r.area < MIN_AREA).sort((a, b) => a.area - b.area);
      if (smalls.length === 0) break;
      for (const small of smalls) {
        const tally = {};
        for (const pi of small.pixels) {
          const x = pi % w;
          const nbs = [];
          if (x > 0) nbs.push(pi - 1);
          if (x < w - 1) nbs.push(pi + 1);
          if (pi >= w) nbs.push(pi - w);
          if (pi < n - w) nbs.push(pi + w);
          for (const nb of nbs) {
            if (regionMap[nb] !== small.id) {
              const c = qData[nb];
              tally[c] = (tally[c] || 0) + 1;
            }
          }
        }
        let bestColor = -1, bestCount = -1;
        for (const c in tally) {
          if (tally[c] > bestCount) { bestCount = tally[c]; bestColor = parseInt(c, 10); }
        }
        if (bestColor !== -1) {
          for (const pi of small.pixels) qData[pi] = bestColor;
        }
      }
    }
    label();

    // number anchor: region pixel nearest its centroid (stays inside concave shapes)
    for (const r of regions) {
      let sx = 0, sy = 0;
      for (const pi of r.pixels) { sx += pi % w; sy += (pi - pi % w) / w; }
      const cx = sx / r.area, cy = sy / r.area;
      let best = Infinity;
      for (const pi of r.pixels) {
        const x = pi % w, y = (pi - x) / w;
        const d = (x - cx) ** 2 + (y - cy) ** 2;
        if (d < best) { best = d; r.nx = x; r.ny = y; }
      }
    }

    colorTotals = new Array(palette.length).fill(0);
    for (const r of regions) colorTotals[r.color]++;
  }

  // ── layers ──
  function buildLayers() {
    fillCanvas = document.createElement('canvas');
    fillCanvas.width = imgW; fillCanvas.height = imgH;
    fillCtx = fillCanvas.getContext('2d');
    fillData = fillCtx.createImageData(imgW, imgH);

    // transparent overlay with ink borders where regions meet
    borderCanvas = document.createElement('canvas');
    borderCanvas.width = imgW; borderCanvas.height = imgH;
    const bc = borderCanvas.getContext('2d');
    const bImg = bc.createImageData(imgW, imgH);
    const bd = bImg.data;
    for (let y = 0; y < imgH; y++) {
      for (let x = 0; x < imgW; x++) {
        const i = y * imgW + x;
        const rid = regionMap[i];
        if ((x < imgW - 1 && regionMap[i + 1] !== rid) || (y < imgH - 1 && regionMap[i + imgW] !== rid)) {
          const p = i * 4;
          bd[p] = 32; bd[p + 1] = 26; bd[p + 2] = 23; bd[p + 3] = 255;
        }
      }
    }
    bc.putImageData(bImg, 0, 0);
  }

  // ── display (aspect ratio always preserved) ──
  function sizeBoard() {
    const pad = 24;
    const maxW = Math.min(document.body.clientWidth - pad * 2, 760);
    const maxH = window.innerHeight * 0.66;
    const cssScale = Math.min(maxW / imgW, maxH / imgH);
    const cssW = Math.round(imgW * cssScale);
    const cssH = Math.round(imgH * cssScale);
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    board.width = Math.round(cssW * dpr);
    board.height = Math.round(cssH * dpr);
    board.style.width = cssW + 'px';
    board.style.height = cssH + 'px';
  }

  function render() {
    const W = board.width, H = board.height;
    bctx.clearRect(0, 0, W, H);

    if (peeking && srcImg) {
      bctx.imageSmoothingEnabled = true;
      bctx.drawImage(srcImg, 0, 0, W, H);
      return;
    }

    bctx.fillStyle = CREAM;
    bctx.fillRect(0, 0, W, H);
    bctx.imageSmoothingEnabled = false;
    bctx.drawImage(fillCanvas, 0, 0, W, H);
    bctx.drawImage(borderCanvas, 0, 0, W, H);

    // numbers: crisp vector text, gone once the region is correct
    const s = W / imgW;
    bctx.textAlign = 'center';
    bctx.textBaseline = 'middle';
    for (const r of regions) {
      if (r.filledWith === r.color) continue;
      const size = Math.min(14, Math.max(5, Math.sqrt(r.area) * 0.38)) * s;
      if (size < 7) continue;
      const x = (r.nx + 0.5) * s, y = (r.ny + 0.5) * s;
      bctx.font = '700 ' + size + 'px Arial, sans-serif';
      bctx.lineWidth = Math.max(2, size * 0.22);
      bctx.strokeStyle = CREAM;
      bctx.strokeText(r.color + 1, x, y);
      bctx.fillStyle = (r.color === selected) ? '#f0563e' : 'rgba(32, 26, 23, 0.75)';
      bctx.fillText(r.color + 1, x, y);
    }
  }

  // ── painting (drag to paint) ──
  let painting = false;

  function regionAt(e) {
    const rect = board.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) / rect.width * imgW);
    const y = Math.floor((e.clientY - rect.top) / rect.height * imgH);
    if (x < 0 || y < 0 || x >= imgW || y >= imgH) return null;
    return regions[regionMap[y * imgW + x]] || null;
  }

  function paintAt(e) {
    const r = regionAt(e);
    if (!r) return;
    const d = fillData.data;
    if (selected === -1) {
      if (r.filledWith === null) return;
      for (const pi of r.pixels) d[pi * 4 + 3] = 0;
      r.filledWith = null;
    } else {
      if (r.filledWith === selected) return;
      const c = palette[selected];
      for (const pi of r.pixels) {
        const p = pi * 4;
        d[p] = c.r; d[p + 1] = c.g; d[p + 2] = c.b; d[p + 3] = 255;
      }
      r.filledWith = selected;
    }
    fillCtx.putImageData(fillData, 0, 0);
    render();
    updateProgress();
  }

  board.addEventListener('pointerdown', e => {
    painting = true;
    board.setPointerCapture(e.pointerId);
    hintEl.classList.add('gone');
    paintAt(e);
  });
  board.addEventListener('pointermove', e => { if (painting) paintAt(e); });
  board.addEventListener('pointerup', () => painting = false);
  board.addEventListener('pointercancel', () => painting = false);

  // ── the kit panel ──
  function buildPanel() {
    panel.innerHTML = '<h3>The Kit</h3>';
    palette.forEach((c, i) => {
      const dab = document.createElement('div');
      dab.className = 'dab' + (i === selected ? ' active' : '');
      dab.dataset.idx = i;
      dab.innerHTML =
        '<div class="dab-swatch" style="background:' + c.hex + '"></div>' +
        '<span class="dab-num">' + (i + 1) + '</span>' +
        '<span class="dab-left"></span>';
      dab.addEventListener('click', () => selectPaint(i));
      panel.appendChild(dab);
    });
    const eraser = document.createElement('div');
    eraser.className = 'dab eraser';
    eraser.dataset.idx = -1;
    eraser.innerHTML = '<div class="dab-swatch"></div><span class="dab-num" style="font-size:11px">UNDO</span><span class="dab-left"></span>';
    eraser.addEventListener('click', () => selectPaint(-1));
    panel.appendChild(eraser);
    selectPaint(0);
  }

  function selectPaint(i) {
    selected = i;
    panel.querySelectorAll('.dab').forEach(d => {
      d.classList.toggle('active', parseInt(d.dataset.idx, 10) === i);
    });
    render();
  }

  function updateProgress() {
    const done = new Array(palette.length).fill(0);
    let correct = 0;
    for (const r of regions) {
      if (r.filledWith === r.color) { correct++; done[r.color]++; }
    }
    const pct = regions.length ? Math.floor(correct / regions.length * 100) : 0;
    progressEl.textContent = 'true to the original: ' + pct + '% · ' + correct + '/' + regions.length + ' regions';

    panel.querySelectorAll('.dab').forEach(dab => {
      const i = parseInt(dab.dataset.idx, 10);
      if (i < 0) return;
      const left = colorTotals[i] - done[i];
      dab.querySelector('.dab-left').textContent = left === 0 ? 'done' : left + ' left';
      dab.classList.toggle('done', left === 0);
    });

    if (pct === 100 && !celebrated) {
      celebrated = true;
      masterpieceEl.classList.add('show');
      if (!reducedMotion.matches) {
        document.body.classList.add('thunk');
        setTimeout(() => document.body.classList.remove('thunk'), 250);
      }
    }
  }

  // ── toolbar ──
  document.getElementById('newBtn').addEventListener('click', () => {
    studio.classList.remove('on');
    setup.style.display = 'flex';
    drop.querySelector('.big').textContent = 'Drop a photo here';
    drop.querySelector('.small').textContent = 'or click — jpg, png, the usual';
    makeBtn.style.display = 'none';
    fileInput.value = '';
    srcImg = null; qData = null; regionMap = null; regions = [];
    celebrated = false;
    masterpieceEl.classList.remove('show');
    hintEl.classList.remove('gone');
  });

  const peekBtn = document.getElementById('peekBtn');
  function peek(on) {
    if (peeking === on) return;
    peeking = on;
    render();
  }
  peekBtn.addEventListener('pointerdown', e => { e.preventDefault(); peek(true); });
  ['pointerup', 'pointerleave', 'pointercancel'].forEach(ev => peekBtn.addEventListener(ev, () => peek(false)));

  document.getElementById('frameBtn').addEventListener('click', () => {
    if (!regions.length) return;
    const S = 2;
    const out = document.createElement('canvas');
    out.width = imgW * S; out.height = imgH * S;
    const c = out.getContext('2d');
    c.fillStyle = CREAM;
    c.fillRect(0, 0, out.width, out.height);
    c.imageSmoothingEnabled = false;
    c.drawImage(fillCanvas, 0, 0, out.width, out.height);
    c.drawImage(borderCanvas, 0, 0, out.width, out.height);
    c.textAlign = 'center'; c.textBaseline = 'middle';
    for (const r of regions) {
      if (r.filledWith === r.color) continue;
      const size = Math.min(14, Math.max(5, Math.sqrt(r.area) * 0.38)) * S;
      c.font = '700 ' + size + 'px Arial, sans-serif';
      c.lineWidth = Math.max(2, size * 0.22);
      c.strokeStyle = CREAM;
      c.strokeText(r.color + 1, (r.nx + 0.5) * S, (r.ny + 0.5) * S);
      c.fillStyle = 'rgba(32, 26, 23, 0.75)';
      c.fillText(r.color + 1, (r.nx + 0.5) * S, (r.ny + 0.5) * S);
    }
    const link = document.createElement('a');
    link.download = celebrated ? 'a-masterpiece.png' : 'work-in-progress.png';
    link.href = out.toDataURL('image/png');
    link.click();
  });

  // ── loading ──
  function showLoading(msg) { loadingMsg.textContent = msg; loading.classList.add('show'); }
  function hideLoading() { loading.classList.remove('show'); }

  let resizeTimer = 0;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (studio.classList.contains('on') && regions.length) { sizeBoard(); render(); }
    }, 150);
  });
})();
</script>
</body>
</html>
