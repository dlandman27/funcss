<!DOCTYPE html>
<html lang="en">
<head>
  <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Quietest Site on the Web</title>
  <meta name="description" content="0.000 dB and holding. Please do not adjust your volume.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'><path d='M25 4a21 21 0 100 42 21 21 0 000-42z' fill='%230b0c0e' stroke='%23c9b98a' stroke-width='3'/><path d='M25 25L12 18' stroke='%23c9b98a' stroke-width='3' stroke-linecap='round'/></svg>">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #0b0c0e;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      font-family: Georgia, 'Times New Roman', serif;
      color: #b8b4aa;
      text-align: center;
      padding: 24px;
    }

    header .label {
      font-size: clamp(11px, 1.4vw, 13px);
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #6b675e;
    }

    header h1 {
      font-weight: normal;
      font-style: italic;
      font-size: clamp(20px, 3.4vw, 32px);
      color: #d5d0c3;
      margin-top: 10px;
    }

    #meter { width: min(78vw, 380px); }

    #db {
      font-size: clamp(34px, 6vw, 54px);
      font-variant-numeric: tabular-nums;
      color: #e8e2d2;
      letter-spacing: 0.04em;
      transition: color 0.6s ease;
    }

    #db span {
      font-size: 0.45em;
      color: #7a756a;
    }

    #db.disturbed { color: #c98a8a; transition: none; }

    .stats {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: clamp(13px, 1.8vw, 16px);
      color: #8d887c;
      font-variant-numeric: tabular-nums;
    }

    .stats b {
      color: #cfc9ba;
      font-weight: normal;
    }

    #soundBtn {
      appearance: none;
      background: transparent;
      border: 1px solid rgba(200, 190, 170, 0.28);
      color: #b8b4aa;
      font-family: inherit;
      font-style: italic;
      font-size: clamp(13px, 1.8vw, 16px);
      padding: 10px 26px;
      border-radius: 999px;
      cursor: pointer;
      transition: border-color 0.3s ease, color 0.3s ease;
      margin-top: 4px;
    }

    #soundBtn:hover {
      border-color: rgba(220, 210, 185, 0.55);
      color: #e0dac9;
    }

    #soundBtn:active { transform: translateY(1px); }

    #response {
      min-height: 1.4em;
      font-style: italic;
      font-size: clamp(12px, 1.7vw, 15px);
      color: #7a756a;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #response.show { opacity: 1; }

    #ledger {
      width: min(84vw, 440px);
      min-height: 4.6em;
      font-size: clamp(11px, 1.5vw, 13px);
      font-style: italic;
      color: #5d594f;
      font-variant-numeric: tabular-nums;
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
    }
    #ledger .row { animation: rowIn 0.6s ease; }
    #ledger .row:nth-child(2) { opacity: 0.7; }
    #ledger .row:nth-child(3) { opacity: 0.45; }
    #ledger .row:nth-child(4) { opacity: 0.25; }
    @keyframes rowIn { from { opacity: 0; transform: translateY(-3px); } }

    #ledger .head {
      letter-spacing: 0.24em;
      text-transform: uppercase;
      font-style: normal;
      font-size: 10px;
      color: #45423b;
      margin-bottom: 2px;
    }

    footer {
      position: fixed;
      bottom: 3vh;
      left: 0;
      right: 0;
      font-size: clamp(10px, 1.3vw, 12px);
      font-style: italic;
      color: #52504a;
      letter-spacing: 0.06em;
    }

    @media (prefers-reduced-motion: reduce) {
      #ledger .row { animation: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="label">Now Broadcasting</div>
    <h1>The Quietest Site on the Web</h1>
  </header>

  <svg id="meter" viewBox="0 0 300 170" aria-hidden="true">
    <!-- dial face -->
    <path d="M 30 150 A 120 120 0 0 1 270 150" fill="none" stroke="#2a2c30" stroke-width="2"/>
    <g id="ticks"></g>
    <text x="34" y="168" fill="#6b675e" font-size="11" font-family="Georgia" text-anchor="middle">0</text>
    <text x="266" y="168" fill="#453f38" font-size="11" font-family="Georgia" text-anchor="middle">120</text>
    <text x="150" y="60" fill="#453f38" font-size="10" font-family="Georgia" text-anchor="middle" font-style="italic" letter-spacing="2">decibels</text>
    <!-- needle, pinned at silence -->
    <g id="needle">
      <line x1="150" y1="150" x2="42" y2="98" stroke="#c9b98a" stroke-width="2" stroke-linecap="round"/>
    </g>
    <circle cx="150" cy="150" r="6" fill="#1d1f22" stroke="#4a463e" stroke-width="1.5"/>
  </svg>

  <div id="db">0.000 <span>dB</span></div>

  <div class="stats">
    <div>consecutive silent days: <b id="days">0</b></div>
    <div>today's silence: <b id="clock">00:00:00</b></div>
    <div>sounds produced to date: <b>0</b></div>
    <div>noise incidents on record: <b id="incidentCount">0</b></div>
  </div>

  <button id="soundBtn">make a sound</button>
  <div id="response"></div>

  <div id="ledger">
    <div class="head">incident ledger</div>
  </div>

  <footer>please do not adjust your volume. there is nothing to adjust.</footer>

  <script>
    // silence began the day this page went live
    const EPOCH = new Date(2026, 6, 17); // July 17, 2026, local midnight

    const daysEl = document.getElementById('days');
    const clockEl = document.getElementById('clock');
    const response = document.getElementById('response');
    const needle = document.getElementById('needle');
    const dbEl = document.getElementById('db');
    const ledger = document.getElementById('ledger');
    const incidentCountEl = document.getElementById('incidentCount');
    const soundBtn = document.getElementById('soundBtn');
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

    // dial ticks
    const ticks = document.getElementById('ticks');
    for (let i = 0; i <= 12; i++) {
      const a = Math.PI - (Math.PI * i) / 12;
      const x1 = 150 + Math.cos(a) * 112;
      const y1 = 150 - Math.sin(a) * 112;
      const x2 = 150 + Math.cos(a) * (i % 3 === 0 ? 102 : 107);
      const y2 = 150 - Math.sin(a) * (i % 3 === 0 ? 102 : 107);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('stroke', i === 0 ? '#8d887c' : '#33353a');
      line.setAttribute('stroke-width', i % 3 === 0 ? 2 : 1);
      ticks.appendChild(line);
    }

    const pad = (n) => String(n).padStart(2, '0');

    function tick() {
      const now = new Date();
      const days = Math.max(0, Math.floor((now - EPOCH) / 86400000));
      daysEl.textContent = days.toLocaleString();

      const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const secs = Math.floor((now - midnight) / 1000);
      clockEl.textContent = `${pad(Math.floor(secs / 3600))}:${pad(Math.floor((secs % 3600) / 60))}:${pad(secs % 60)}`;
    }

    // ---- needle: rAF runs only while it has somewhere to settle from ----
    let quiver = 0;
    let rafId = 0;
    function needleFrame() {
      quiver *= 0.9;
      if (Math.abs(quiver) < 0.005) {
        quiver = 0;
        needle.setAttribute('transform', 'rotate(0 150 150)');
        rafId = 0;
        return;
      }
      needle.setAttribute('transform', `rotate(${quiver.toFixed(3)} 150 150)`);
      rafId = requestAnimationFrame(needleFrame);
    }
    function impulse(deg) {
      if (reducedMotion.matches) return;
      quiver = Math.max(quiver, deg);
      if (!rafId) rafId = requestAnimationFrame(needleFrame);
    }

    // idle dreams: a barely-visible twitch now and then, no ledger entry
    setInterval(() => { if (Math.random() < 0.12) impulse(0.5); }, 4000);

    // ---- incidents: the visitor is the only noise source here ----
    function loadNum(k) { try { return parseInt(localStorage.getItem(k), 10) || 0; } catch (e) { return 0; } }
    function saveNum(k, v) { try { localStorage.setItem(k, String(v)); } catch (e) {} }
    let incidents = loadNum('quietest-incidents');
    incidentCountEl.textContent = incidents.toLocaleString();

    let dbTimer = 0;
    function showDb(v) {
      dbEl.classList.add('disturbed');
      dbEl.firstChild.textContent = v.toFixed(3) + ' ';
      clearTimeout(dbTimer);
      dbTimer = setTimeout(() => {
        dbEl.classList.remove('disturbed');
        dbEl.firstChild.textContent = '0.000 ';
      }, 1400);
    }

    function logIncident(cause, db) {
      incidents++;
      saveNum('quietest-incidents', incidents);
      incidentCountEl.textContent = incidents.toLocaleString();

      const now = new Date();
      const row = document.createElement('div');
      row.className = 'row';
      row.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())} — ${cause} ${db.toFixed(3)} dB. recovering.`;
      const head = ledger.querySelector('.head');
      head.after(row);
      while (ledger.children.length > 5) ledger.removeChild(ledger.lastChild);

      showDb(db);
      impulse(db * 700);
    }

    // rate-limited listeners — the site notices, but it isn't hysterical
    let lastIncident = 0;
    function maybeIncident(cause, db, minGap) {
      const now = performance.now();
      if (now - lastIncident < minGap) return;
      lastIncident = now;
      logIncident(cause, db);
    }

    window.addEventListener('pointerdown', (e) => {
      if (e.target === soundBtn) return;
      maybeIncident('someone touched something.', 0.002 + Math.random() * 0.002, 4000);
    });
    window.addEventListener('keydown', () => {
      maybeIncident('a key was pressed. we know.', 0.003 + Math.random() * 0.002, 5000);
    });

    let lastMove = null;
    window.addEventListener('pointermove', (e) => {
      if (lastMove) {
        const dx = e.clientX - lastMove.x, dy = e.clientY - lastMove.y;
        if (dx * dx + dy * dy > 3600) {
          maybeIncident('air displacement.', 0.001 + Math.random() * 0.001, 9000);
        }
      }
      lastMove = { x: e.clientX, y: e.clientY };
    }, { passive: true });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        maybeIncident('the door opened.', 0.004, 30000);
      }
    });

    // once in a while, something neither of us can explain. once per visit at most.
    if (Math.random() < 0.04) {
      setTimeout(() => {
        logIncident('[unexplained]. do not worry about it.', 0.041);
      }, 15000 + Math.random() * 30000);
    }

    // the button
    const RESPONSES = [
      'nothing happened.',
      'the silence holds.',
      'thank you for your restraint.',
      '0.000 dB. as always.',
      'we were worried for a moment.',
      'shhh.',
      'your sound could not be produced at this time.',
      'the committee has reviewed your request and declined.',
      'even that click was silent. impressive.',
      'please try never again.',
    ];
    let clicks = 0;
    let responseTimer = null;

    soundBtn.addEventListener('click', () => {
      response.textContent = RESPONSES[clicks % RESPONSES.length];
      response.classList.add('show');
      clicks++;
      clearTimeout(responseTimer);
      responseTimer = setTimeout(() => response.classList.remove('show'), 4000);
    });

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
