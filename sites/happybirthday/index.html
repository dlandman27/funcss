<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <title>Happy Birthday!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Make a birthday page for someone and send them the link">
    <meta name="author" content="randomsitesontheweb">
    <meta name="theme-color" content="#f2ede2">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --coral: #f0563e;
            --sky: #5aa0db;
            --lime: #b7ce3c;
            --purple: #a98fd0;
            --orange: #f47b28;
            --pink: #ff7fa5;
            --gold: #f7c948;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Georgia, 'Times New Roman', serif;
            color: var(--ink);
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--paper);
        }

        /* slow sunburst, palette flavored */
        #sunburst {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 240vmax;
            height: 240vmax;
            background: repeating-conic-gradient(from 0deg,
                rgba(247, 201, 72, 0.18) 0deg 12deg,
                transparent 12deg 24deg);
            animation: spin 90s linear infinite;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        #fx {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
        }

        /* ---- the message ---- */

        .birthday-message {
            text-align: center;
            z-index: 2;
            padding: 20px;
        }

        .row { margin-bottom: clamp(8px, 2vh, 20px); }

        .letter {
            display: inline-block;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(26px, 7vw, 64px);
            line-height: 1;
            padding: clamp(6px, 1.4vw, 14px) clamp(8px, 1.8vw, 18px);
            margin: 3px;
            background: #fff8ef;
            border: 3px solid var(--ink);
            border-radius: 12px;
            box-shadow: 4px 4px 0 var(--ink);
            transform: rotate(var(--tilt)) scale(0);
            animation: letterIn 0.5s cubic-bezier(0.22, 1.6, 0.36, 1) forwards,
                       floatLetter 2.6s ease-in-out var(--float-delay) infinite;
        }

        @keyframes letterIn {
            to { transform: rotate(var(--tilt)) scale(1); }
        }

        @keyframes floatLetter {
            0%, 100% { translate: 0 0; }
            50% { translate: 0 -12px; }
        }

        /* ---- balloons ---- */

        .balloon {
            position: fixed;
            bottom: -140px;
            width: 54px;
            height: 66px;
            border-radius: 50% 50% 48% 52% / 44% 44% 56% 56%;
            border: 3px solid var(--ink);
            box-shadow: inset -6px -8px 0 rgba(32, 26, 23, 0.14);
            cursor: pointer;
            animation: rise var(--dur) linear forwards;
            z-index: 3;
        }

        .balloon::before {
            /* highlight */
            content: '';
            position: absolute;
            top: 9px;
            left: 10px;
            width: 13px;
            height: 17px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.55);
            transform: rotate(-20deg);
        }

        .balloon::after {
            /* string */
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            width: 2px;
            height: 46px;
            background: var(--ink);
            transform: translateX(-50%);
        }

        @keyframes rise {
            0% { transform: translateY(0) rotate(-3deg); }
            25% { transform: translateY(-28vh) rotate(4deg); }
            50% { transform: translateY(-56vh) rotate(-4deg); }
            75% { transform: translateY(-84vh) rotate(3deg); }
            100% { transform: translateY(-130vh) rotate(-2deg); }
        }

        /* ---- the prompt card ---- */

        .prompt-container {
            background: #fff8ef;
            border: 3px solid var(--ink);
            border-radius: 18px;
            box-shadow: 8px 8px 0 var(--ink);
            padding: clamp(24px, 5vw, 44px);
            text-align: center;
            max-width: min(92vw, 480px);
            z-index: 2;
            transform: rotate(-1deg);
        }

        .prompt-container h2 {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(22px, 4.6vw, 34px);
            -webkit-text-stroke: 1px var(--ink);
            paint-order: stroke fill;
            color: var(--coral);
            text-shadow: 3px 3px 0 var(--ink);
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 12px 18px;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 17px;
            border: 2px solid var(--ink);
            border-radius: 999px;
            background: var(--paper);
            outline: none;
            text-align: center;
            margin-bottom: 16px;
            -webkit-user-select: text;
            user-select: text;
        }

        .btn {
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 15px;
            padding: 11px 22px;
            margin: 4px;
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            cursor: pointer;
            transition: transform 0.15s ease;
            background: var(--gold);
            color: var(--ink);
        }

        .btn.alt { background: var(--sky); }
        .btn:hover { transform: translate(-2px, -2px) rotate(-1.5deg); }
        .btn:active { transform: translate(2px, 2px); }

        /* ---- floating toolbar on the celebration screen ---- */

        #partyBar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 60;
        }

        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg);
            background: var(--pink);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 10px 24px;
            font-style: italic;
            font-size: 15px;
            z-index: 100;
            animation: toastIn 2.2s ease forwards;
        }

        @keyframes toastIn {
            0% { transform: translateX(-50%) rotate(-2deg) scale(0.3); opacity: 0; }
            12% { transform: translateX(-50%) rotate(-2deg) scale(1.08); opacity: 1; }
            18% { transform: translateX(-50%) rotate(-2deg) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="sunburst"></div>
    <canvas id="fx"></canvas>
    <div id="content"></div>
    <div id="partyBar"></div>

    <script>
        const INK = '#201a17';
        const COLORS = ['#f0563e', '#5aa0db', '#b7ce3c', '#a98fd0', '#f47b28', '#ff7fa5', '#f7c948'];
        const jit = (n) => (Math.random() - 0.5) * n;
        const pick = (arr) => arr[(Math.random() * arr.length) | 0];

        // ---- confetti engine (no CDN required at a birthday party) ----

        const fxCanvas = document.getElementById('fx');
        const fxCtx = fxCanvas.getContext('2d');
        let FW, FH;
        const bits = [];
        let fxRaf = null;

        function sizeFx() {
            FW = fxCanvas.width = window.innerWidth;
            FH = fxCanvas.height = window.innerHeight;
        }

        function burst(x, y, n, spread) {
            for (let i = 0; i < n; i++) {
                const a = Math.random() * Math.PI * 2;
                const v = 2 + Math.random() * (spread || 6);
                bits.push({
                    x, y,
                    vx: Math.cos(a) * v,
                    vy: Math.sin(a) * v - 3,
                    g: 0.14,
                    w: 5 + Math.random() * 5,
                    h: 3 + Math.random() * 4,
                    rot: Math.random() * Math.PI,
                    vrot: jit(0.35),
                    color: pick(COLORS),
                    life: 1,
                    decay: 0.008 + Math.random() * 0.008,
                });
            }
            if (bits.length > 600) bits.splice(0, bits.length - 600);
            if (!fxRaf) fxRaf = requestAnimationFrame(fxLoop);
        }

        function drizzle() {
            burst(Math.random() * FW, -20, 6, 3);
        }

        function fxLoop() {
            fxRaf = null;
            fxCtx.clearRect(0, 0, FW, FH);
            for (let i = bits.length - 1; i >= 0; i--) {
                const p = bits[i];
                p.life -= p.decay;
                if (p.life <= 0 || p.y > FH + 30) { bits.splice(i, 1); continue; }
                p.vy += p.g;
                p.x += p.vx;
                p.y += p.vy;
                p.rot += p.vrot;
                fxCtx.save();
                fxCtx.translate(p.x, p.y);
                fxCtx.rotate(p.rot);
                fxCtx.globalAlpha = Math.min(1, p.life * 1.6);
                fxCtx.fillStyle = p.color;
                fxCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                fxCtx.lineWidth = 1.3;
                fxCtx.strokeStyle = INK;
                fxCtx.strokeRect(-p.w / 2, -p.h / 2, p.w, p.h);
                fxCtx.restore();
            }
            fxCtx.globalAlpha = 1;
            if (bits.length) fxRaf = requestAnimationFrame(fxLoop);
        }

        // ---- balloons you can pop ----

        function launchBalloon() {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = 4 + Math.random() * 90 + 'vw';
            b.style.background = pick(COLORS);
            b.style.setProperty('--dur', 9 + Math.random() * 8 + 's');
            b.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                const r = b.getBoundingClientRect();
                burst(r.left + r.width / 2, r.top + r.height / 2, 24, 5);
                b.remove();
            });
            b.addEventListener('animationend', () => b.remove());
            document.body.appendChild(b);
        }

        // ---- the song (one AudioContext, actually wired up) ----

        const SONG = [
            ['C4', 0.25], ['C4', 0.25], ['D4', 0.5], ['C4', 0.5], ['F4', 0.5], ['E4', 1],
            ['C4', 0.25], ['C4', 0.25], ['D4', 0.5], ['C4', 0.5], ['G4', 0.5], ['F4', 1],
            ['C4', 0.25], ['C4', 0.25], ['C5', 0.5], ['A4', 0.5], ['F4', 0.5], ['E4', 0.5], ['D4', 1],
            ['Bb4', 0.25], ['Bb4', 0.25], ['A4', 0.5], ['F4', 0.5], ['G4', 0.5], ['F4', 1],
        ];
        const FREQ = { C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23, G4: 392, A4: 440, Bb4: 466.16, B4: 493.88, C5: 523.25 };

        let audio = null;
        let songTimer = null;
        let singing = false;

        function playSong() {
            if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)();
            let t = audio.currentTime + 0.08;
            const tempo = 0.62;
            for (const [note, beats] of SONG) {
                const dur = beats * tempo * 2;
                const osc = audio.createOscillator();
                const gain = audio.createGain();
                osc.connect(gain);
                gain.connect(audio.destination);
                osc.type = 'triangle';
                osc.frequency.value = FREQ[note];
                gain.gain.setValueAtTime(0.0001, t);
                gain.gain.exponentialRampToValueAtTime(0.25, t + 0.03);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.92);
                osc.start(t);
                osc.stop(t + dur);
                t += dur;
            }
            return (t - audio.currentTime) * 1000;
        }

        function toggleSong(btn) {
            if (singing) {
                clearTimeout(songTimer);
                singing = false;
                if (audio) { audio.close(); audio = null; }
                btn.textContent = 'play the song';
                return;
            }
            singing = true;
            btn.textContent = 'okay stop';
            const loop = () => {
                const ms = playSong();
                songTimer = setTimeout(loop, ms + 600);
            };
            loop();
        }

        // ---- screens ----

        function getUrlParam(param) {
            return new URLSearchParams(window.location.search).get(param);
        }

        function letterRow(word) {
            return word.split('').map(l => {
                const tilt = jit(8).toFixed(1);
                const delay = (Math.random() * 1.2).toFixed(2);
                const color = pick(COLORS);
                const ch = l === ' ' ? '&nbsp;' : l;
                return `<span class="letter" style="--tilt:${tilt}deg; --float-delay:${delay}s; color:${color}">${ch}</span>`;
            }).join('');
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function showBirthdayMessage(name) {
            const safe = escapeHtml(name.toUpperCase().slice(0, 24));
            document.getElementById('content').innerHTML = `
                <div class="birthday-message">
                    <div class="row">${letterRow('HAPPY')}</div>
                    <div class="row">${letterRow('BIRTHDAY')}</div>
                    <div class="row">${letterRow(safe + '!')}</div>
                </div>
            `;
            document.getElementById('partyBar').innerHTML = `
                <button class="btn" id="songBtn">play the song</button>
                <button class="btn alt" id="moreBtn">more confetti</button>
            `;
            document.getElementById('songBtn').addEventListener('click', function () { toggleSong(this); });
            document.getElementById('moreBtn').addEventListener('click', () => {
                burst(FW * 0.5, FH * 0.55, 120, 9);
            });

            // opening salvo
            setTimeout(() => burst(FW * 0.3, FH * 0.6, 70, 8), 300);
            setTimeout(() => burst(FW * 0.7, FH * 0.6, 70, 8), 550);

            // the party never quite stops
            setInterval(drizzle, 900);
            setInterval(launchBalloon, 1700);
            for (let i = 0; i < 5; i++) setTimeout(launchBalloon, i * 350);

            // click anywhere = confetti
            document.addEventListener('pointerdown', (e) => {
                if (e.target.closest('.btn') || e.target.closest('.balloon')) return;
                burst(e.clientX, e.clientY, 36, 6);
            });
        }

        function showNamePrompt() {
            document.getElementById('content').innerHTML = `
                <div class="prompt-container">
                    <h2>WHOSE BIRTHDAY IS IT?</h2>
                    <input type="text" id="nameInput" maxlength="24" placeholder="their name goes here&hellip;">
                    <div>
                        <button class="btn" id="goBtn">celebrate</button>
                        <button class="btn alt" id="shareBtn">copy the link instead</button>
                    </div>
                </div>
            `;
            const input = document.getElementById('nameInput');
            const go = () => {
                if (input.value.trim()) {
                    window.location.href = `?name=${encodeURIComponent(input.value.trim())}`;
                }
            };
            document.getElementById('goBtn').addEventListener('click', go);
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });
            document.getElementById('shareBtn').addEventListener('click', () => {
                if (!input.value.trim()) {
                    toast('a name first, please');
                    return;
                }
                const url = `${window.location.origin}${window.location.pathname}?name=${encodeURIComponent(input.value.trim())}`;
                navigator.clipboard.writeText(url)
                    .then(() => {
                        toast('copied. go make their day.');
                        burst(FW / 2, FH * 0.35, 50, 7);
                    })
                    .catch(() => toast('could not copy — the url bar works too'));
            });
            // a few idle balloons so the prompt isn't lonely
            setInterval(launchBalloon, 4000);
            launchBalloon();
        }

        function toast(msg) {
            const old = document.querySelector('.toast');
            if (old) old.remove();
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2300);
        }

        // ---- go ----

        window.addEventListener('resize', sizeFx);
        sizeFx();

        const name = getUrlParam('name');
        if (name && name.trim()) {
            showBirthdayMessage(name.trim());
        } else {
            showNamePrompt();
        }
    </script>
</body>
</html>
