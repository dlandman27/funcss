<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorle</title>
    <meta name="description" content="One color a day. Six tries to mix it. The department rounds generously.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'><rect x='5' y='5' width='40' height='40' rx='8' fill='%23a98fd0' stroke='%23201a17' stroke-width='3'/><rect x='13' y='13' width='24' height='24' rx='4' fill='%23f0563e' stroke='%23201a17' stroke-width='3'/></svg>">
    <style>
        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --coral: #f0563e;
            --gold: #f7c948;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: var(--paper);
            color: var(--ink);
            font-family: Georgia, 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 26px 14px 50px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        header { text-align: center; }
        h1 {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(26px, 7vw, 36px);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: inline-block;
            transform: rotate(-1.5deg);
        }
        header .sub { font-style: italic; font-size: 15px; color: rgba(32,26,23,0.6); margin-top: 4px; }

        .card {
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 12px;
            box-shadow: 4px 4px 0 var(--ink);
        }

        /* target */
        .target-card {
            position: relative;
            padding: 14px 16px 12px;
            text-align: center;
            transform: rotate(-1deg);
            width: min(340px, 92vw);
        }
        #targetSwatch {
            height: 120px;
            border: 2px solid var(--ink);
            border-radius: 8px;
        }
        .target-card .lab {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        #answer { font-style: italic; font-size: 14px; margin-top: 8px; color: rgba(32,26,23,0.65); min-height: 1.2em; }

        .stamp {
            position: absolute;
            left: 50%;
            top: 58px;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 26px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            white-space: nowrap;
            padding: 4px 14px;
            border: 3px solid;
            border-radius: 8px;
            background: rgba(255, 248, 239, 0.75);
            transform: translateX(-50%) rotate(-9deg) scale(0);
            pointer-events: none;
            z-index: 3;
        }
        .stamp.win { color: #c99a12; border-color: #c99a12; box-shadow: inset 0 0 0 2px var(--cream), inset 0 0 0 4px #c99a12; }
        .stamp.lose { color: var(--coral); border-color: var(--coral); box-shadow: inset 0 0 0 2px var(--cream), inset 0 0 0 4px var(--coral); }
        .stamp.show { animation: stampIn 0.35s cubic-bezier(0.2, 1.6, 0.4, 1) forwards; }
        @keyframes stampIn {
            0% { transform: translateX(-50%) rotate(3deg) scale(2.1); opacity: 0; }
            65% { transform: translateX(-50%) rotate(-10deg) scale(0.94); opacity: 1; }
            100% { transform: translateX(-50%) rotate(-9deg) scale(1); opacity: 1; }
        }

        /* mixer */
        .mixer {
            width: min(340px, 92vw);
            padding: 16px 18px 18px;
            transform: rotate(0.7deg);
        }
        .mix-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        #mixSwatch {
            width: 44px;
            height: 44px;
            border: 2px solid var(--ink);
            border-radius: 8px;
            flex-shrink: 0;
        }
        #hexInput {
            flex: 1;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 16px;
            padding: 8px 10px;
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 8px;
            color: var(--ink);
            width: 100%;
            min-width: 0;
        }
        #hexInput:focus { outline: none; box-shadow: 2px 2px 0 var(--ink); }

        .sliders { display: flex; flex-direction: column; gap: 12px; }
        .srow { display: flex; align-items: center; gap: 10px; }
        .srow .ch {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 13px;
            width: 16px;
        }
        .srow .num {
            font-style: italic;
            font-size: 14px;
            width: 34px;
            text-align: right;
        }
        input[type=range] {
            flex: 1;
            appearance: none;
            -webkit-appearance: none;
            height: 14px;
            border: 2px solid var(--ink);
            border-radius: 99px;
            background: #888;
            cursor: pointer;
            min-width: 0;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--cream);
            border: 2px solid var(--ink);
            box-shadow: 2px 2px 0 var(--ink);
            cursor: grab;
        }
        input[type=range]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--cream);
            border: 2px solid var(--ink);
            box-shadow: 2px 2px 0 var(--ink);
            cursor: grab;
        }

        .guess-btn-row { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; gap: 10px; }
        button.pill {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--ink);
            background: var(--coral);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            transform: rotate(-1.2deg);
            padding: 11px 24px;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        button.pill.gold { background: var(--gold); transform: rotate(1.2deg); }
        button.pill:hover { transform: translate(-2px, -2px) rotate(-1.2deg); box-shadow: 5px 5px 0 var(--ink); }
        button.pill.gold:hover { transform: translate(-2px, -2px) rotate(1.2deg); }
        button.pill:active { transform: translate(2px, 2px) rotate(-1.2deg); box-shadow: 1px 1px 0 var(--ink); }
        button.pill:disabled { opacity: 0.4; cursor: default; }
        #left { font-style: italic; font-size: 14px; color: rgba(32,26,23,0.6); }

        /* guesses */
        #rows { display: flex; flex-direction: column; gap: 10px; width: min(340px, 92vw); }
        .grow {
            padding: 8px 12px 9px;
            display: grid;
            grid-template-columns: 44px 1fr 1fr 1fr;
            gap: 8px;
            align-items: center;
            opacity: 0;
            transform: translateY(6px) scale(0.97);
        }
        .grow.in { animation: rowIn 0.28s cubic-bezier(0.2, 1.4, 0.4, 1) forwards; }
        @keyframes rowIn { to { opacity: 1; transform: none; } }
        .grow .sw {
            width: 40px;
            height: 40px;
            border: 2px solid var(--ink);
            border-radius: 8px;
        }
        .cell { display: flex; align-items: center; gap: 5px; justify-content: center; }
        .cell .v { font-style: italic; font-size: 14px; }
        .cell svg { display: block; }
        .grow .remark {
            grid-column: 1 / -1;
            font-style: italic;
            font-size: 13px;
            color: rgba(32,26,23,0.6);
            text-align: center;
        }

        .stats { font-style: italic; font-size: 14px; color: rgba(32,26,23,0.6); text-align: center; }
        #countdown { font-style: italic; font-size: 13px; color: rgba(32,26,23,0.5); }
        #shareBtn { display: none; }
        #shareBtn.show { display: inline-block; }

        @keyframes thunk {
            0% { transform: translate(0, 0); }
            25% { transform: translate(2px, 3px); }
            50% { transform: translate(-3px, 1px); }
            75% { transform: translate(1px, -2px); }
            100% { transform: translate(0, 0); }
        }
        body.thunk { animation: thunk 0.22s linear; }

        @media (prefers-reduced-motion: reduce) {
            .stamp.show { animation: none; transform: translateX(-50%) rotate(-9deg) scale(1); opacity: 1; }
            .grow.in { animation: none; opacity: 1; transform: none; }
            body.thunk { animation: none; }
            button.pill { transition: none; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Colorle</h1>
        <div class="sub">one color a day. six tries to mix it.</div>
    </header>

    <div class="card target-card">
        <div class="lab">Today's Color</div>
        <div id="targetSwatch"></div>
        <div id="answer"></div>
        <div class="stamp" id="stamp"></div>
    </div>

    <div class="card mixer">
        <div class="mix-row">
            <div id="mixSwatch"></div>
            <input type="text" id="hexInput" maxlength="7" autocomplete="off" spellcheck="false" aria-label="Hex color guess">
        </div>
        <div class="sliders">
            <div class="srow"><span class="ch">R</span><input type="range" id="sr" min="0" max="255" value="128" aria-label="Red"><span class="num" id="nr">128</span></div>
            <div class="srow"><span class="ch">G</span><input type="range" id="sg" min="0" max="255" value="128" aria-label="Green"><span class="num" id="ng">128</span></div>
            <div class="srow"><span class="ch">B</span><input type="range" id="sb" min="0" max="255" value="128" aria-label="Blue"><span class="num" id="nb">128</span></div>
        </div>
        <div class="guess-btn-row">
            <button class="pill" id="guessBtn">Guess</button>
            <span id="left"></span>
            <button class="pill gold" id="shareBtn">Brag</button>
        </div>
    </div>

    <div id="rows"></div>
    <div class="stats" id="stats"></div>
    <div id="countdown"></div>

    <script>
    (() => {
        const INK = '#201a17';
        const MAX_GUESSES = 6;
        const WIN_TOL = 5;   // per-channel; the department rounds generously
        const CLOSE_TOL = 12;

        // ---- deterministic daily color ----
        function hashStr(s) {
            let h = 1779033703 ^ s.length;
            for (let i = 0; i < s.length; i++) {
                h = Math.imul(h ^ s.charCodeAt(i), 3432918353);
                h = (h << 13) | (h >>> 19);
            }
            return h >>> 0;
        }
        function mulberry32(a) {
            return function () {
                a |= 0; a = (a + 0x6D2B79F5) | 0;
                let t = Math.imul(a ^ (a >>> 15), 1 | a);
                t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }
        const now = new Date();
        const dayKey = now.getFullYear() + '-' +
            String(now.getMonth() + 1).padStart(2, '0') + '-' +
            String(now.getDate()).padStart(2, '0');
        const rand = mulberry32(hashStr('colorle-' + dayKey));
        const target = [Math.floor(rand() * 256), Math.floor(rand() * 256), Math.floor(rand() * 256)];

        const toHex = c => '#' + c.map(v => v.toString(16).padStart(2, '0')).join('');
        const rgb = c => 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')';

        // ---- storage ----
        function load(key, fallback) {
            try {
                const v = localStorage.getItem(key);
                return v === null ? fallback : JSON.parse(v);
            } catch (e) { return fallback; }
        }
        function save(key, v) {
            try { localStorage.setItem(key, JSON.stringify(v)); } catch (e) {}
        }
        let state = load('colorle-state', null);
        if (!state || state.date !== dayKey) state = { date: dayKey, guesses: [], done: false, won: false };
        let stats = load('colorle-stats', { played: 0, wins: 0, streak: 0, lastDate: null });

        // ---- elements ----
        const targetSwatch = document.getElementById('targetSwatch');
        const mixSwatch = document.getElementById('mixSwatch');
        const hexInput = document.getElementById('hexInput');
        const rowsEl = document.getElementById('rows');
        const leftEl = document.getElementById('left');
        const statsEl = document.getElementById('stats');
        const stampEl = document.getElementById('stamp');
        const answerEl = document.getElementById('answer');
        const guessBtn = document.getElementById('guessBtn');
        const shareBtn = document.getElementById('shareBtn');
        const countdownEl = document.getElementById('countdown');
        const sliders = ['sr', 'sg', 'sb'].map(id => document.getElementById(id));
        const nums = ['nr', 'ng', 'nb'].map(id => document.getElementById(id));
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

        targetSwatch.style.background = rgb(target);

        // ---- mixer ----
        function currentMix() { return sliders.map(s => parseInt(s.value, 10)); }
        function syncMix(fromHex) {
            const c = currentMix();
            mixSwatch.style.background = rgb(c);
            nums.forEach((n, i) => n.textContent = c[i]);
            if (!fromHex) hexInput.value = toHex(c);
            sliders.forEach((s, i) => {
                const lo = c.slice(); lo[i] = 0;
                const hi = c.slice(); hi[i] = 255;
                s.style.background = 'linear-gradient(to right, ' + rgb(lo) + ', ' + rgb(hi) + ')';
            });
        }
        sliders.forEach(s => s.addEventListener('input', () => syncMix(false)));
        hexInput.addEventListener('input', () => {
            const m = hexInput.value.trim().match(/^#?([0-9a-fA-F]{6})$/);
            if (!m) return;
            const v = parseInt(m[1], 16);
            sliders[0].value = (v >> 16) & 255;
            sliders[1].value = (v >> 8) & 255;
            sliders[2].value = v & 255;
            syncMix(true);
        });

        // ---- feedback icons (drawn in ink) ----
        function icon(kind) {
            const s = 'width="14" height="14" viewBox="0 0 14 14"';
            if (kind === 'up') return '<svg ' + s + '><path d="M7 2L13 11H1z" fill="' + INK + '"/></svg>';
            if (kind === 'down') return '<svg ' + s + '><path d="M7 12L1 3h12z" fill="' + INK + '"/></svg>';
            if (kind === 'close') return '<svg ' + s + '><circle cx="7" cy="7" r="4.5" fill="none" stroke="' + INK + '" stroke-width="2.5"/></svg>';
            return '<svg ' + s + '><path d="M2 7.5L5.5 11 12 3" fill="none" stroke="' + INK + '" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        }
        function channelKind(guess, tgt) {
            const d = tgt - guess;
            if (d === 0) return 'check';
            if (Math.abs(d) <= CLOSE_TOL) return 'close';
            return d > 0 ? 'up' : 'down';
        }
        function remark(c) {
            const dist = Math.abs(c[0] - target[0]) + Math.abs(c[1] - target[1]) + Math.abs(c[2] - target[2]);
            if (dist === 0) return 'that is the color. exactly.';
            if (dist <= WIN_TOL * 3) return 'close enough. the department rounds.';
            if (dist <= 40) return 'uncomfortably close.';
            if (dist <= 100) return 'warm.';
            if (dist <= 200) return 'warm-ish. not close.';
            if (dist <= 380) return 'a different neighborhood.';
            return 'a different color entirely.';
        }

        function renderRow(c, animate) {
            const row = document.createElement('div');
            row.className = 'card grow';
            const labels = ['R', 'G', 'B'];
            row.innerHTML =
                '<div class="sw" style="background:' + rgb(c) + '"></div>' +
                c.map((v, i) =>
                    '<div class="cell">' + icon(channelKind(v, target[i])) + '<span class="v">' + v + '</span></div>'
                ).join('') +
                '<div class="remark">' + remark(c) + '</div>';
            rowsEl.prepend(row);
            if (animate) row.classList.add('in');
            else { row.classList.add('in'); row.style.animation = 'none'; row.style.opacity = 1; row.style.transform = 'none'; }
        }

        // ---- game flow ----
        function isWin(c) { return c.every((v, i) => Math.abs(v - target[i]) <= WIN_TOL); }

        function updateChrome() {
            leftEl.textContent = state.done ? '' : (MAX_GUESSES - state.guesses.length) + ' left';
            statsEl.textContent = stats.played > 0
                ? 'streak ' + stats.streak + ' · played ' + stats.played + ' · matched ' + stats.wins
                : '';
            guessBtn.disabled = state.done;
            if (state.done) shareBtn.classList.add('show');
        }

        function thunk() {
            if (reducedMotion.matches) return;
            document.body.classList.add('thunk');
            setTimeout(() => document.body.classList.remove('thunk'), 250);
        }

        function endGame(won, animate) {
            stampEl.textContent = won ? 'Matched' : 'Close Enough? No.';
            stampEl.className = 'stamp ' + (won ? 'win' : 'lose');
            void stampEl.offsetWidth;
            stampEl.classList.add('show');
            answerEl.textContent = 'it was ' + toHex(target) + '.';
            if (animate) thunk();
        }

        guessBtn.addEventListener('click', () => {
            if (state.done || state.guesses.length >= MAX_GUESSES) return;
            const c = currentMix();
            state.guesses.push(c);
            renderRow(c, true);
            const won = isWin(c);
            if (won || state.guesses.length >= MAX_GUESSES) {
                state.done = true;
                state.won = won;
                stats.played++;
                if (won) {
                    stats.wins++;
                    stats.streak = (stats.lastDate && daysBetween(stats.lastDate, dayKey) === 1) ? stats.streak + 1 : 1;
                } else {
                    stats.streak = 0;
                }
                stats.lastDate = dayKey;
                save('colorle-stats', stats);
                endGame(won, true);
            }
            save('colorle-state', state);
            updateChrome();
        });

        function daysBetween(a, b) {
            return Math.round((new Date(b) - new Date(a)) / 86400000);
        }

        // ---- share ----
        function shareText() {
            const lines = state.guesses.map(c =>
                c.map((v, i) => {
                    const k = channelKind(v, target[i]);
                    return k === 'check' ? '✓' : k === 'close' ? '○' : k === 'up' ? '↑' : '↓';
                }).join(' ')
            );
            const score = state.won ? state.guesses.length + '/' + MAX_GUESSES : 'X/' + MAX_GUESSES;
            return 'Colorle ' + dayKey + ' — ' + score + '\n' + lines.join('\n') + '\nrandomsitesontheweb.com/sites/colorle';
        }
        shareBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(shareText());
                shareBtn.textContent = 'Copied';
            } catch (e) {
                shareBtn.textContent = 'No.';
            }
            setTimeout(() => { shareBtn.textContent = 'Brag'; }, 1500);
        });

        // ---- countdown ----
        function tickCountdown() {
            const mid = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            const ms = mid - new Date();
            if (ms <= 0) { countdownEl.textContent = 'a new color exists. refresh.'; return; }
            const h = Math.floor(ms / 3600000), m = Math.floor(ms % 3600000 / 60000);
            countdownEl.textContent = 'next color in ' + h + 'h ' + m + 'm';
        }
        tickCountdown();
        setInterval(tickCountdown, 30000);

        // ---- restore ----
        state.guesses.forEach(c => renderRow(c, false));
        if (state.done) endGame(state.won, false);
        syncMix(false);
        updateChrome();
    })();
    </script>
</body>
</html>
