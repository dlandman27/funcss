<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">

    <title>Comic Moves</title>

    <meta name="description" content="Create epic comic book style effects with every click">
    <meta name="keywords" content="comic effects, interactive animation, comic book style">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'><path d='M25 2C12.3 2 2 12.3 2 25s10.3 23 23 23 23-10.3 23-23S37.7 2 25 2zm0 4c10.5 0 19 8.5 19 19s-8.5 19-19 19S6 35.5 6 25 14.5 6 25 6z' fill='%23ff4400'/></svg>">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://randomsitesontheweb.com/sites/comicmoves/">
    <meta property="og:title" content="Comic Moves - Interactive Comic Effects">
    <meta property="og:description" content="Create epic comic book style effects with every click">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://randomsitesontheweb.com/sites/comicmoves/">
    <meta property="twitter:title" content="Comic Moves - Interactive Comic Effects">
    <meta property="twitter:description" content="Create epic comic book style effects with every click">
    <meta property="twitter:image" content="https://randomsitesontheweb.com/og-image.jpg">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            /* comic halftone backdrop */
            background-color: #ff4400;
            background-image:
                radial-gradient(circle at center,
                    rgba(255, 100, 0, 0.8) 0%,
                    rgba(200, 0, 0, 0.9) 100%),
                repeating-radial-gradient(circle at center,
                    rgba(0, 0, 0, 0.2) 0,
                    rgba(0, 0, 0, 0.2) 3px,
                    transparent 3px,
                    transparent 6px);
            background-size: 100% 100%, 20px 20px;
            background-position: center;
        }

        #fx {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
        }

        #clickMe {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-3deg);
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(26px, 5.5vw, 46px);
            letter-spacing: 0.04em;
            color: #fff3d6;
            -webkit-text-stroke: 2px #201a17;
            paint-order: stroke fill;
            text-shadow: 4px 4px 0 #201a17;
            pointer-events: none;
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) rotate(-3deg) scale(1); }
            50% { transform: translate(-50%, -50%) rotate(-3deg) scale(1.08); }
        }

        #combo {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg);
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(18px, 3vw, 26px);
            color: #f7c948;
            -webkit-text-stroke: 1.5px #201a17;
            paint-order: stroke fill;
            text-shadow: 3px 3px 0 #201a17;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.12s ease;
        }

        #combo.show { opacity: 1; }
        #combo.bump { transform: translateX(-50%) rotate(2deg) scale(1.25); }

        @keyframes page-shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-6px, 4px); }
            50% { transform: translate(5px, -4px); }
            75% { transform: translate(-3px, -3px); }
        }

        body.shake { animation: page-shake 0.24s linear; }
    </style>
</head>
<body>
    <canvas id="fx"></canvas>
    <div id="clickMe">CLICK THE SCREEN!</div>
    <div id="combo"></div>

    <script>
        const INK = '#201a17';
        const PAPER = '#fff3d6';
        const GOLD = '#f7c948';
        const COLORS = ['#f7c948', '#5aa0db', '#b7ce3c', '#f0563e', '#a98fd0', '#ff7fa5', '#2fb0a3', '#ff9800'];

        const MOVES = [
            'POW!', 'BAM!', 'WHAM!', 'KAPOW!', 'BOOM!', 'ZAP!', 'BIFF!', 'CRASH!',
            'WALLOP!', 'THWACK!', 'SOCK!', 'SLAM!', 'SMASH!', 'CRUNCH!', 'WHACK!', 'BONK!',
            'BANG!', 'CLANG!', 'ZOWIE!', 'BOING!', 'SPLAT!', 'WHAMMO!', 'ZONK!', 'THUMP!',
            'CRACK!', 'SWOOSH!', 'BLAM!', 'ZING!', 'WHUMP!', 'SNAP!', 'POP!', 'OOOF!',
            'OW!', 'SMACK!', 'SQUISH!', 'THUD!', 'WHOMP!', 'YOW!', 'ZOOM!', 'RIP!',
        ];
        const MEGA_MOVES = ['KA-BOOM!', 'KA-BLAM!', 'KABLOOIE!', 'KRAKOOM!', 'MEGATON!', 'KAPOWIE!'];

        const canvas = document.getElementById('fx');
        const ctx = canvas.getContext('2d');
        let W, H, dpr;

        const jit = (n) => (Math.random() - 0.5) * n;
        const pick = (arr) => arr[(Math.random() * arr.length) | 0];

        // ---- the fist ----

        function fistPath(g) {
            g.beginPath();
            g.moveTo(6, 17);
            g.quadraticCurveTo(6, 10, 10, 10);      // up to the first knuckle
            g.quadraticCurveTo(12, 7.5, 14, 10);    // knuckle bumps
            g.quadraticCurveTo(16, 7.5, 18, 10);
            g.quadraticCurveTo(20, 7.5, 22, 10);
            g.quadraticCurveTo(26, 10, 26, 15);
            g.lineTo(27, 22);
            g.quadraticCurveTo(27, 26, 22, 26);
            g.lineTo(11, 26);
            g.quadraticCurveTo(6, 26, 6, 20);
            g.closePath();
        }

        function drawFist(g, fill) {
            // hard ink shadow, then fill, then outline — the sticker treatment
            g.save();
            g.translate(1.5, 1.5);
            fistPath(g);
            g.fillStyle = INK;
            g.fill();
            g.restore();
            fistPath(g);
            g.fillStyle = fill;
            g.fill();
            g.lineWidth = 1.75;
            g.lineJoin = 'round';
            g.strokeStyle = INK;
            g.stroke();
            // finger separations
            g.lineWidth = 1.3;
            g.lineCap = 'round';
            g.beginPath();
            g.moveTo(12, 10.5); g.lineTo(12, 15);
            g.moveTo(16, 10.5); g.lineTo(16, 15);
            g.moveTo(20, 10.5); g.lineTo(20, 15);
            g.stroke();
            // thumb curl
            g.beginPath();
            g.moveTo(8, 20);
            g.quadraticCurveTo(12, 24, 16, 22.5);
            g.stroke();
        }

        // cursor: the fist itself
        function fistCursor(size) {
            const c = document.createElement('canvas');
            c.width = size;
            c.height = size;
            const g = c.getContext('2d');
            g.scale(size / 32, size / 32);
            drawFist(g, '#f0563e');
            return c.toDataURL('image/png');
        }

        const style = document.createElement('style');
        style.textContent = `* { cursor: url("${fistCursor(32)}") 14 10, auto !important; }`;
        document.head.appendChild(style);

        // ---- particle engine ----

        const particles = [];
        let raf = null;

        function push(p) {
            particles.push(p);
            if (particles.length > 300) particles.splice(0, particles.length - 300);
            if (!raf) raf = requestAnimationFrame(loop);
        }

        function loop() {
            raf = null;
            ctx.clearRect(0, 0, W, H);

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (p.delay > 0) { p.delay--; continue; }
                p.t = (p.t || 0) + 1;
                p.life -= p.decay;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                if (p.g) p.vy = (p.vy || 0) + p.g;
                p.x += p.vx || 0;
                p.y += p.vy || 0;
                if (p.vrot) p.rot += p.vrot;
                const a = Math.min(1, p.life);

                switch (p.kind) {
                    case 'burst': {
                        // pop in with overshoot, hold, deflate
                        let s;
                        if (p.t < 7) s = 0.2 + (p.t / 7) * 1.0;
                        else if (p.t < 11) s = 1.2 - ((p.t - 7) / 4) * 0.2;
                        else s = 1;
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.ang);
                        ctx.scale(s, s);
                        ctx.globalAlpha = a;

                        // starburst: ink shadow pass, color fill, ink outline
                        const drawStar = (scale) => {
                            ctx.beginPath();
                            for (let k = 0; k < p.spikes.length; k++) {
                                const [ang2, r2] = p.spikes[k];
                                const px = Math.cos(ang2) * r2 * scale;
                                const py = Math.sin(ang2) * r2 * scale * 0.72; // squashed, comic style
                                k === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                            }
                            ctx.closePath();
                        };
                        ctx.save();
                        ctx.translate(6, 7);
                        drawStar(1);
                        ctx.fillStyle = INK;
                        ctx.fill();
                        ctx.restore();
                        drawStar(1);
                        ctx.fillStyle = p.color;
                        ctx.fill();
                        ctx.lineWidth = 4;
                        ctx.lineJoin = 'round';
                        ctx.strokeStyle = INK;
                        ctx.stroke();
                        drawStar(0.78);
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
                        ctx.fill();

                        // the word — drawn with the star, so it can never be clipped
                        ctx.font = `900 ${p.fontSize}px 'Arial Black', 'Segoe UI', sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.lineWidth = p.fontSize * 0.22;
                        ctx.lineJoin = 'round';
                        ctx.strokeStyle = INK;
                        ctx.strokeText(p.txt, 0, 2);
                        ctx.fillStyle = PAPER;
                        ctx.fillText(p.txt, 0, 2);
                        ctx.restore();
                        break;
                    }
                    case 'fist': {
                        // jab in from the lower right, recoil, fade
                        const f = Math.min(1, p.t / 5);
                        const ease = 1 - Math.pow(1 - f, 3);
                        const back = p.t > 10 ? (p.t - 10) * 3 : 0;
                        const ox = (1 - ease) * 70 + back;
                        const oy = (1 - ease) * 70 + back;
                        ctx.save();
                        ctx.translate(p.x + ox, p.y + oy);
                        ctx.rotate(-0.5);
                        ctx.scale(2.6, 2.6);
                        ctx.globalAlpha = a;
                        ctx.translate(-16, -18);
                        drawFist(ctx, '#f0563e');
                        ctx.restore();
                        break;
                    }
                    case 'line':
                        ctx.globalAlpha = a;
                        ctx.lineCap = 'round';
                        ctx.strokeStyle = INK;
                        ctx.lineWidth = p.lw;
                        ctx.beginPath();
                        ctx.moveTo(p.x + Math.cos(p.ang) * p.r0, p.y + Math.sin(p.ang) * p.r0);
                        ctx.lineTo(p.x + Math.cos(p.ang) * (p.r0 + p.len * (0.4 + a * 0.6)),
                                   p.y + Math.sin(p.ang) * (p.r0 + p.len * (0.4 + a * 0.6)));
                        ctx.stroke();
                        break;
                    case 'ring':
                        ctx.globalAlpha = a;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r += p.vr, 0, Math.PI * 2);
                        ctx.lineWidth = p.lw + 2.5;
                        ctx.strokeStyle = INK;
                        ctx.stroke();
                        ctx.lineWidth = p.lw;
                        ctx.strokeStyle = p.color;
                        ctx.stroke();
                        break;
                    case 'dot':
                        ctx.globalAlpha = a;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.fill();
                        if (p.r > 1.8) {
                            ctx.lineWidth = 1.4;
                            ctx.strokeStyle = INK;
                            ctx.stroke();
                        }
                        break;
                    case 'star': {
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rot);
                        ctx.globalAlpha = a;
                        ctx.beginPath();
                        for (let k = 0; k < 10; k++) {
                            const rr = k % 2 === 0 ? p.r : p.r * 0.45;
                            const ang2 = -Math.PI / 2 + (Math.PI * k) / 5;
                            k === 0 ? ctx.moveTo(Math.cos(ang2) * rr, Math.sin(ang2) * rr)
                                    : ctx.lineTo(Math.cos(ang2) * rr, Math.sin(ang2) * rr);
                        }
                        ctx.closePath();
                        ctx.fillStyle = p.color;
                        ctx.fill();
                        ctx.lineWidth = Math.max(1.2, p.r * 0.2);
                        ctx.lineJoin = 'round';
                        ctx.strokeStyle = INK;
                        ctx.stroke();
                        ctx.restore();
                        break;
                    }
                }
            }
            ctx.globalAlpha = 1;
            if (particles.length) raf = requestAnimationFrame(loop);
        }

        // ---- the punch ----

        function spikesFor(radius) {
            const spikes = [];
            const n = 14;
            for (let k = 0; k < n * 2; k++) {
                const ang = (Math.PI * k) / n;
                const base = k % 2 === 0 ? radius : radius * 0.62;
                spikes.push([ang, base * (0.85 + Math.random() * 0.3)]);
            }
            return spikes;
        }

        function shake() {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
            document.body.classList.remove('shake');
            void document.body.offsetWidth;
            document.body.classList.add('shake');
        }

        // combo tracking
        let combo = 0;
        let lastHit = 0;
        const comboEl = document.getElementById('combo');
        let comboFade = null;

        function punch(x, y) {
            const now = performance.now();
            combo = now - lastHit < 1400 ? combo + 1 : 1;
            lastHit = now;

            const mega = combo > 0 && combo % 10 === 0 || Math.random() < 0.08;
            const word = mega ? pick(MEGA_MOVES) : pick(MOVES);
            const color = pick(COLORS);

            // size the star to actually fit the word
            const fontSize = mega ? 56 : 44;
            ctx.font = `900 ${fontSize}px 'Arial Black', 'Segoe UI', sans-serif`;
            const radius = ctx.measureText(word).width / 2 + (mega ? 46 : 36);

            push({ kind: 'fist', x, y, life: 1, decay: 0.055 });
            push({ kind: 'burst', x, y, txt: word, color, fontSize,
                   ang: jit(0.24), spikes: spikesFor(radius),
                   life: 1, decay: mega ? 0.012 : 0.016, delay: 3 });
            push({ kind: 'ring', x, y, r: 10, vr: mega ? 5 : 3.5, lw: 3, color, life: 0.8, decay: 0.05, delay: 3 });

            // speed lines radiating from the hit
            const lines = mega ? 10 : 7;
            for (let i = 0; i < lines; i++) {
                const ang = Math.random() * Math.PI * 2;
                push({ kind: 'line', x, y, ang, r0: radius * 0.9, len: 26 + Math.random() * 34,
                       lw: 2 + Math.random() * 2, life: 0.9, decay: 0.06, delay: 4 + ((Math.random() * 4) | 0) });
            }
            // debris
            for (let i = 0; i < (mega ? 12 : 7); i++) {
                const ang = Math.random() * Math.PI * 2;
                const v = 2 + Math.random() * 3.5;
                push({ kind: 'dot', x, y, vx: Math.cos(ang) * v, vy: Math.sin(ang) * v - 1.5, g: 0.14,
                       r: 2 + Math.random() * 2.5, color: pick(COLORS), life: 1, decay: 0.03, delay: 3 });
            }
            if (mega) {
                for (let i = 0; i < 6; i++) {
                    const ang = Math.random() * Math.PI * 2;
                    const v = 1.5 + Math.random() * 2.5;
                    push({ kind: 'star', x, y, vx: Math.cos(ang) * v, vy: Math.sin(ang) * v - 1, g: 0.06,
                           r: 5 + Math.random() * 5, rot: Math.random() * Math.PI, vrot: jit(0.3),
                           color: GOLD, life: 1, decay: 0.02, delay: 3 });
                }
            }

            shake();

            // combo chip
            if (combo >= 3) {
                comboEl.textContent = `COMBO ×${combo}`;
                comboEl.classList.add('show', 'bump');
                setTimeout(() => comboEl.classList.remove('bump'), 130);
                clearTimeout(comboFade);
                comboFade = setTimeout(() => comboEl.classList.remove('show'), 1600);
            }
        }

        document.addEventListener('pointerdown', (e) => {
            const clickMe = document.getElementById('clickMe');
            if (clickMe) clickMe.remove();
            punch(e.clientX, e.clientY);
        });

        // ---- setup ----

        function setup() {
            dpr = Math.min(2, window.devicePixelRatio || 1);
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        let resizeTimer = null;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(setup, 150);
        });

        setup();
    </script>
</body>
</html>
