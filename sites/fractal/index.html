<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal</title>
    <meta name="description" content="Click to split the screen in half, forever. Then shatter it all at once.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'><path d='M25 5v20h20v20H25V25H5V5h20z' fill='%233498db'><animate attributeName='fill' values='%233498db;%239b59b6;%23e74c3c;%233498db' dur='4s' repeatCount='indefinite'/></path></svg>">

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --ink: #201a17;
            --cream: #fff8ef;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Georgia, 'Times New Roman', serif;
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            transition: background-color 0.3s ease;
        }

        .split {
            float: left;
            position: relative;
            transition: background-color 0.5s ease-in-out;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .split:hover {
            cursor: pointer;
            z-index: 100;
            box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.25);
        }

        /* ---- sticker control panel ---- */

        .controls {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--cream);
            border: 2.5px solid var(--ink);
            border-radius: 14px;
            box-shadow: 5px 5px 0 var(--ink);
            padding: 14px;
            z-index: 1000;
            width: 190px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transform: rotate(0.8deg);
        }

        .controls .title {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: 15px;
            letter-spacing: 0.08em;
            color: var(--ink);
        }

        select {
            width: 100%;
            padding: 8px 12px;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 14px;
            border: 2px solid var(--ink);
            border-radius: 999px;
            background: #f2ede2;
            color: var(--ink);
            cursor: pointer;
            outline: none;
        }

        .controls button {
            width: 100%;
            padding: 8px 12px;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 14px;
            border: 2px solid var(--ink);
            border-radius: 999px;
            background: var(--cream);
            color: var(--ink);
            box-shadow: 2px 2px 0 var(--ink);
            cursor: pointer;
            transition: transform 0.12s ease;
        }

        .controls button:hover { transform: translate(-1px, -1px) rotate(-1deg); }
        .controls button:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }

        #shatterBtn { background: #f0563e; color: var(--cream); }
        #invertBtn { background: #a98fd0; }
        #resetBtn { background: #f2ede2; }

        .click-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(20px, 4vw, 34px);
            letter-spacing: 0.04em;
            color: var(--cream);
            -webkit-text-stroke: 1px var(--ink);
            paint-order: stroke fill;
            text-shadow: 4px 4px 0 var(--ink);
            pointer-events: none;
            transition: opacity 0.3s ease;
            text-align: center;
            z-index: 500;
        }
    </style>
</head>
<body>
    <div class="controls">
        <div class="title">FRACTAL</div>
        <select id="colorScheme">
            <option value="slate">slate</option>
            <option value="gray">gray</option>
            <option value="zinc">zinc</option>
            <option value="neutral">neutral</option>
            <option value="stone">stone</option>
            <option value="red">red</option>
            <option value="orange">orange</option>
            <option value="amber">amber</option>
            <option value="yellow">yellow</option>
            <option value="lime">lime</option>
            <option value="green">green</option>
            <option value="emerald">emerald</option>
            <option value="teal">teal</option>
            <option value="cyan">cyan</option>
            <option value="sky">sky</option>
            <option value="blue">blue</option>
            <option value="indigo">indigo</option>
            <option value="violet">violet</option>
            <option value="purple">purple</option>
            <option value="fuchsia">fuchsia</option>
            <option value="pink">pink</option>
            <option value="rose">rose</option>
        </select>
        <button id="shatterBtn">shatter everything</button>
        <button id="invertBtn">invert</button>
        <button id="resetBtn">start over</button>
    </div>
    <div id="clickOverlay" class="click-overlay">CLICK ANYWHERE TO SPLIT</div>
    <div class="container split" id="root"></div>

    <script>
        const colorSchemes = {
            slate: ['#f8fafc', '#f1f5f9', '#e2e8f0', '#cbd5e1', '#94a3b8', '#64748b', '#475569', '#334155', '#1e293b', '#0f172a', '#020617'],
            gray: ['#f9fafb', '#f3f4f6', '#e5e7eb', '#d1d5db', '#9ca3af', '#6b7280', '#4b5563', '#374151', '#1f2937', '#111827', '#030712'],
            zinc: ['#fafafa', '#f4f4f5', '#e4e4e7', '#d4d4d8', '#a1a1aa', '#71717a', '#52525b', '#3f3f46', '#27272a', '#18181b', '#09090b'],
            neutral: ['#fafafa', '#f5f5f5', '#e5e5e5', '#d4d4d4', '#a3a3a3', '#737373', '#525252', '#404040', '#262626', '#171717', '#0a0a0a'],
            stone: ['#fafaf9', '#f5f5f4', '#e7e5e4', '#d6d3d1', '#a8a29e', '#78716c', '#57534e', '#44403c', '#292524', '#1c1917', '#0c0a09'],
            red: ['#fef2f2', '#fee2e2', '#fecaca', '#fca5a5', '#f87171', '#ef4444', '#dc2626', '#b91c1c', '#991b1b', '#7f1d1d', '#450a0a'],
            orange: ['#fff7ed', '#ffedd5', '#fed7aa', '#fdba74', '#fb923c', '#f97316', '#ea580c', '#c2410c', '#9a3412', '#7c2d12', '#431407'],
            amber: ['#fffbeb', '#fef3c7', '#fde68a', '#fcd34d', '#fbbf24', '#f59e0b', '#d97706', '#b45309', '#92400e', '#78350f', '#451a03'],
            yellow: ['#fefce8', '#fef9c3', '#fef08a', '#fde047', '#facc15', '#eab308', '#ca8a04', '#a16207', '#854d0e', '#713f12', '#422006'],
            lime: ['#f7fee7', '#ecfccb', '#d9f99d', '#bef264', '#a3e635', '#84cc16', '#65a30d', '#4d7c0f', '#3f6212', '#365314', '#1a2e05'],
            green: ['#f0fdf4', '#dcfce7', '#bbf7d0', '#86efac', '#4ade80', '#22c55e', '#16a34a', '#15803d', '#166534', '#14532d', '#052e16'],
            emerald: ['#ecfdf5', '#d1fae5', '#a7f3d0', '#6ee7b7', '#34d399', '#10b981', '#059669', '#047857', '#065f46', '#064e3b', '#022c22'],
            teal: ['#f0fdfa', '#ccfbf1', '#99f6e4', '#5eead4', '#2dd4bf', '#14b8a6', '#0d9488', '#0f766e', '#115e59', '#134e4a', '#042f2e'],
            cyan: ['#ecfeff', '#cffafe', '#a5f3fc', '#67e8f9', '#22d3ee', '#06b6d4', '#0891b2', '#0e7490', '#155e75', '#164e63', '#083344'],
            sky: ['#f0f9ff', '#e0f2fe', '#bae6fd', '#7dd3fc', '#38bdf8', '#0ea5e9', '#0284c7', '#0369a1', '#075985', '#0c4a6e', '#082f49'],
            blue: ['#eff6ff', '#dbeafe', '#bfdbfe', '#93c5fd', '#60a5fa', '#3b82f6', '#2563eb', '#1d4ed8', '#1e40af', '#1e3a8a', '#172554'],
            indigo: ['#eef2ff', '#e0e7ff', '#c7d2fe', '#a5b4fc', '#818cf8', '#6366f1', '#4f46e5', '#4338ca', '#3730a3', '#312e81', '#1e1b4b'],
            violet: ['#f5f3ff', '#ede9fe', '#ddd6fe', '#c4b5fd', '#a78bfa', '#8b5cf6', '#7c3aed', '#6d28d9', '#5b21b6', '#4c1d95', '#2e1065'],
            purple: ['#faf5ff', '#f3e8ff', '#e9d5ff', '#d8b4fe', '#c084fc', '#a855f7', '#9333ea', '#7e22ce', '#6b21a8', '#581c87', '#3b0764'],
            fuchsia: ['#fdf4ff', '#fae8ff', '#f5d0fe', '#f0abfc', '#e879f9', '#d946ef', '#c026d3', '#a21caf', '#86198f', '#701a75', '#4a044e'],
            pink: ['#fdf2f8', '#fce7f3', '#fbcfe8', '#f9a8d4', '#f472b6', '#ec4899', '#db2777', '#be185d', '#9d174d', '#831843', '#500724'],
            rose: ['#fff1f2', '#ffe4e6', '#fecdd3', '#fda4af', '#fb7185', '#f43f5e', '#e11d48', '#be123c', '#9f1239', '#881337', '#4c0519'],
        };

        const MAX_DEPTH = 10;
        let currentScheme = 'slate';
        let isReversed = false;

        function getColor(depth) {
            const colors = colorSchemes[currentScheme];
            const index = isReversed
                ? (colors.length - 1) - Math.min(depth, colors.length - 1)
                : Math.min(depth, colors.length - 1);
            return colors[index];
        }

        function split(element) {
            const currentDepth = parseInt(element.dataset.depth) || 0;
            if (currentDepth >= MAX_DEPTH) return;

            element.removeEventListener('click', handleClick);

            const vertical = currentDepth % 2 === 0;
            const div1 = document.createElement('div');
            const div2 = document.createElement('div');
            div1.className = div2.className = 'split';
            div1.dataset.depth = div2.dataset.depth = currentDepth + 1;
            div1.style.backgroundColor = div2.style.backgroundColor = 'transparent';

            if (vertical) {
                div1.style.width = div2.style.width = '50%';
                div1.style.height = div2.style.height = '100%';
            } else {
                div1.style.width = div2.style.width = '100%';
                div1.style.height = div2.style.height = '50%';
            }

            element.innerHTML = '';
            element.appendChild(div1);
            element.appendChild(div2);

            setTimeout(() => {
                const nextColor = getColor(currentDepth + 1);
                div1.style.backgroundColor = nextColor;
                div2.style.backgroundColor = nextColor;
            }, 50);

            div1.addEventListener('click', handleClick);
            div2.addEventListener('click', handleClick);
        }

        function handleClick(e) {
            e.stopPropagation();
            dismissOverlay();
            split(this);
        }

        function dismissOverlay() {
            const overlay = document.getElementById('clickOverlay');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 300);
            }
        }

        function leaves() {
            return [...document.querySelectorAll('.split')]
                .filter(el => !el.querySelector('.split') && (parseInt(el.dataset.depth) || 0) < MAX_DEPTH);
        }

        // split every visible pane at once, with a little stagger wave
        function shatter() {
            dismissOverlay();
            const panes = leaves();
            panes.forEach((el, i) => {
                setTimeout(() => split(el), i * 18);
            });
        }

        function reset() {
            const root = document.getElementById('root');
            root.innerHTML = '';
            root.dataset.depth = '0';
            root.style.backgroundColor = getColor(0);
            root.addEventListener('click', handleClick);
        }

        document.getElementById('colorScheme').addEventListener('change', (e) => {
            currentScheme = e.target.value;
            // recolor in place — don't destroy the pattern you built
            document.querySelectorAll('.split').forEach(el => {
                el.style.backgroundColor = getColor(parseInt(el.dataset.depth) || 0);
            });
        });

        document.getElementById('invertBtn').addEventListener('click', () => {
            isReversed = !isReversed;
            document.querySelectorAll('.split').forEach(el => {
                el.style.backgroundColor = getColor(parseInt(el.dataset.depth) || 0);
            });
        });

        document.getElementById('shatterBtn').addEventListener('click', shatter);
        document.getElementById('resetBtn').addEventListener('click', reset);

        reset();
    </script>
</body>
</html>
