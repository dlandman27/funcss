<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Sudoku</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --coral: #f0563e;
            --sky: #5aa0db;
            --lime: #b7ce3c;
            --gold: #f7c948;
            --teal: #2fb0a3;
            --muted: #8a7f74;
        }

        html, body {
            height: 100%;
            background: var(--paper);
            color: var(--ink);
            font-family: Georgia, 'Times New Roman', serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── TOP BAR ── */
        #topbar {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 0;
            flex-shrink: 0;
        }

        #brand {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(17px, 4vw, 24px);
            text-transform: uppercase;
            color: var(--coral);
            -webkit-text-stroke: 5px var(--ink);
            paint-order: stroke fill;
            transform: rotate(-2deg);
        }

        #puzzle-num {
            font-style: italic;
            font-size: 13px;
            color: var(--muted);
        }

        #timer {
            font-family: 'Courier New', monospace;
            font-weight: 700;
            font-size: 18px;
            background: var(--cream);
            border: 2px solid var(--ink);
            box-shadow: 3px 3px 0 var(--ink);
            border-radius: 999px;
            padding: 5px 14px;
            min-width: 92px;
            text-align: center;
            transform: rotate(1deg);
        }

        /* ── MAIN ── */
        #main {
            flex: 1;
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 20px 32px;
            gap: 24px;
        }

        /* ── DIFFICULTY TABS ── */
        #tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab {
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--ink);
            background: var(--cream);
            border: 2px solid var(--ink);
            box-shadow: 3px 3px 0 var(--ink);
            border-radius: 999px;
            padding: 8px 14px 6px;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
            text-align: center;
        }
        .tab:nth-child(odd) { rotate: -1.5deg; }
        .tab:nth-child(even) { rotate: 1.5deg; }
        .tab:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--ink); }
        .tab:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
        .tab.active { background: var(--coral); }
        .skulls {
            display: block;
            height: 13px;
            margin-top: 2px;
            line-height: 0;
        }
        .skulls svg { width: 12px; height: 12px; margin: 0 1px; }

        /* ── GRID ── */
        #board-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            min-height: 270px;
            justify-content: center;
        }

        #grid {
            display: grid;
            gap: 12px;
            background: var(--cream);
            border: 3px solid var(--ink);
            box-shadow: 6px 6px 0 var(--ink);
            padding: 14px;
            border-radius: 16px;
            transform: rotate(-0.6deg);
        }

        .cell {
            width: 96px;
            height: 96px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 42px;
            font-weight: 900;
            background: var(--paper);
            border: 3px solid var(--ink);
            box-shadow: 4px 4px 0 var(--ink);
            border-radius: 12px;
            cursor: pointer;
            color: var(--ink);
            transform: rotate(var(--rot, 0deg));
            transition: background 0.12s, transform 0.12s, box-shadow 0.12s;
        }
        .cell.given {
            color: var(--muted);
            cursor: default;
            background: var(--cream);
            box-shadow: 2px 2px 0 var(--ink);
        }
        .cell.selected {
            background: #dcebf9;
            transform: rotate(var(--rot, 0deg)) translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--ink);
        }
        .cell.correct-flash { animation: pop 0.3s ease; background: #e9f0c9; }
        .cell.wrong { animation: cellshake 0.35s ease; background: #fddbd4; color: var(--coral); }

        @keyframes pop {
            0% { transform: rotate(var(--rot, 0deg)) scale(1); }
            50% { transform: rotate(var(--rot, 0deg)) scale(1.14); }
            100% { transform: rotate(var(--rot, 0deg)) scale(1); }
        }
        @keyframes cellshake {
            0%, 100% { transform: rotate(var(--rot, 0deg)) translateX(0); }
            25% { transform: rotate(var(--rot, 0deg)) translateX(-7px); }
            75% { transform: rotate(var(--rot, 0deg)) translateX(7px); }
        }
        @media (prefers-reduced-motion: reduce) {
            .cell.wrong { animation: none; }
        }

        #hint {
            font-style: italic;
            font-size: 14px;
            color: var(--ink);
            opacity: 0.75;
            text-align: center;
            min-height: 20px;
            transition: color 0.2s;
            max-width: 340px;
        }
        #hint.error { color: var(--coral); opacity: 1; }

        /* ── NUMBER PAD ── */
        #pad {
            display: flex;
            gap: 16px;
        }

        .pad-btn {
            width: 88px;
            height: 64px;
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--ink);
            background: var(--gold);
            border: 3px solid var(--ink);
            box-shadow: 4px 4px 0 var(--ink);
            border-radius: 999px;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s;
        }
        .pad-btn:first-child { rotate: -2deg; background: var(--sky); }
        .pad-btn:last-child { rotate: 2deg; }
        .pad-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
        .pad-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }

        .pad-note {
            width: 100%;
            text-align: center;
            font-style: italic;
            font-size: 12px;
            color: var(--muted);
            margin-top: -14px;
        }

        /* ── STATS ROW ── */
        #stats {
            display: flex;
            gap: 14px;
        }
        #stats > div {
            text-align: center;
            font-style: italic;
            font-size: 12px;
            color: var(--ink);
            background: var(--cream);
            border: 2px solid var(--ink);
            box-shadow: 3px 3px 0 var(--ink);
            border-radius: 10px;
            padding: 8px 14px;
        }
        #stats > div:nth-child(1) { rotate: -1deg; }
        #stats > div:nth-child(3) { rotate: 1deg; }
        #stats b {
            display: block;
            font-family: 'Arial Black', Arial, sans-serif;
            font-style: normal;
            font-size: 17px;
        }

        /* ── FOOTER ── */
        #footer {
            font-style: italic;
            font-size: 13px;
            color: var(--muted);
            padding: 0 20px 22px;
            text-align: center;
        }

        /* ── VICTORY OVERLAY ── */
        #victory {
            position: fixed;
            inset: 0;
            background: rgba(32, 26, 23, 0.55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #victory.show { display: flex; }

        #victory-card {
            background: var(--cream);
            border: 3px solid var(--ink);
            box-shadow: 8px 8px 0 var(--ink);
            border-radius: 18px;
            padding: 38px 34px;
            max-width: 400px;
            width: calc(100% - 40px);
            text-align: center;
            transform: rotate(-1deg);
            animation: cardIn 0.45s cubic-bezier(0.2, 1.5, 0.4, 1);
        }
        @keyframes cardIn {
            from { transform: rotate(-1deg) scale(0.6) translateY(30px); opacity: 0; }
            to { transform: rotate(-1deg) scale(1) translateY(0); opacity: 1; }
        }

        #victory-title {
            display: inline-block;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 40px;
            text-transform: uppercase;
            color: var(--coral);
            -webkit-text-stroke: 7px var(--ink);
            paint-order: stroke fill;
            transform: rotate(-3deg);
        }

        #victory-sub {
            font-style: italic;
            font-size: 14px;
            margin-top: 12px;
            line-height: 1.5;
        }

        #victory-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 24px 0;
        }
        .vstat {
            background: var(--paper);
            border: 2px solid var(--ink);
            box-shadow: 3px 3px 0 var(--ink);
            border-radius: 12px;
            padding: 12px 8px;
        }
        .vstat:nth-child(odd) { rotate: -1deg; }
        .vstat:nth-child(even) { rotate: 1deg; }
        .vstat b {
            display: block;
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 20px;
        }
        .vstat span {
            font-style: italic;
            font-size: 11px;
            color: var(--muted);
        }
        .vstat.gold { background: var(--gold); }

        #next-btn {
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 15px;
            text-transform: uppercase;
            color: var(--ink);
            background: var(--lime);
            border: 3px solid var(--ink);
            box-shadow: 4px 4px 0 var(--ink);
            border-radius: 999px;
            padding: 13px 30px;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s;
        }
        #next-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
        #next-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }

        /* ── CONFETTI ── */
        .bit {
            position: fixed;
            top: -40px;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            -webkit-text-stroke: 3px var(--ink);
            paint-order: stroke fill;
            pointer-events: none;
            z-index: 90;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
        }

        /* ── MOBILE ── */
        @media (max-width: 480px) {
            .cell { width: 76px; height: 76px; font-size: 34px; }
            .tab { padding: 7px 10px 5px; font-size: 11px; }
            #puzzle-num { display: none; }
            #pad .pad-btn { width: 76px; height: 58px; }
        }
    </style>
</head>
<body>
    <div id="topbar">
        <div id="brand">Binary Sudoku</div>
        <div id="puzzle-num"></div>
        <div id="timer">0.00</div>
    </div>

    <div id="main">
        <div id="tabs">
            <button class="tab active" data-diff="easy">Easy<span class="skulls" data-skulls="1"></span></button>
            <button class="tab" data-diff="medium">Medium<span class="skulls" data-skulls="2"></span></button>
            <button class="tab" data-diff="hard">Hard<span class="skulls" data-skulls="3"></span></button>
        </div>

        <div id="board-wrap">
            <div id="grid"></div>
            <div id="hint"></div>
        </div>

        <div id="pad">
            <button class="pad-btn" data-val="0">0</button>
            <button class="pad-btn" data-val="1">1</button>
        </div>
        <div class="pad-note">every digit known to binary sudoku</div>

        <div id="stats">
            <div><b id="stat-streak">0</b>win streak</div>
            <div><b id="stat-best">—</b>best time</div>
            <div><b id="stat-solved">0</b>puzzles solved</div>
        </div>
    </div>

    <div id="footer">Sudoku, but with half the digits and none of the difficulty.</div>

    <div id="victory">
        <div id="victory-card">
            <div id="victory-title">Solved!</div>
            <div id="victory-sub"></div>
            <div id="victory-stats">
                <div class="vstat"><b id="v-time">0.00s</b><span>time</span></div>
                <div class="vstat gold"><b id="v-rank">#1</b><span>global rank</span></div>
                <div class="vstat"><b id="v-iq">210</b><span>estimated IQ</span></div>
                <div class="vstat"><b id="v-pct">99.9%</b><span>percentile</span></div>
            </div>
            <button id="next-btn">Next Puzzle</button>
        </div>
    </div>

    <script>
        'use strict';

        // hand-drawn skull, sticker style — emoji are banned in this house
        const SKULL = '<svg viewBox="0 0 24 24"><path d="M12 2c-5 0-9 3.6-9 8.2 0 2.8 1.5 5.2 3.8 6.7l.4 3.1c.1.8.7 1.4 1.5 1.4h6.6c.8 0 1.4-.6 1.5-1.4l.4-3.1C19.5 15.4 21 13 21 10.2 21 5.6 17 2 12 2z" fill="#fff8ef" stroke="#201a17" stroke-width="2"/><circle cx="8.5" cy="10.5" r="1.9" fill="#201a17"/><circle cx="15.5" cy="10.5" r="1.9" fill="#201a17"/><path d="M10.3 16h3.4" stroke="#201a17" stroke-width="1.6" stroke-linecap="round"/></svg>';
        document.querySelectorAll('.skulls[data-skulls]').forEach(el => {
            el.innerHTML = SKULL.repeat(Number(el.dataset.skulls));
        });

        const DIFFS = {
            easy:   { clues: 3, label: 'Easy' },
            medium: { clues: 1, label: 'Medium' },
            hard:   { clues: 0, label: 'Hard' },
        };

        const HINTS = {
            easy:   'Each row and column needs a 0 and a 1. One cell remains.',
            medium: 'One clue. Three empty cells. Steel yourself.',
            hard:   'Zero clues. You are completely on your own out there.',
        };

        const WINS = {
            easy: [
                'Three of the four answers were given to you. Still — well played.',
                'The final bit never stood a chance.',
                'One cell. One legend.',
            ],
            medium: [
                'You deduced three entire bits from a single clue. Detective-grade work.',
                'Deduction worthy of a true detective.',
                'The 2×2 grid has met its match.',
            ],
            hard: [
                'FOUR cells, no clues, solved by hand. Please rest now.',
                'Only 100% of players ever finish this mode. Welcome to the club.',
                'The hardest puzzle binary sudoku has to offer. Demolished.',
            ],
        };

        const FAILS = [
            'Incorrect. It was one of two options.',
            'Somehow... no.',
            'Statistically, that was impressive.',
            'The other one. It was the other one.',
        ];

        // 2×2 binary latin squares (row-major)
        const SQUARES = [[0,1,1,0], [1,0,0,1]];

        const $ = id => document.getElementById(id);
        const gridEl = $('grid'), hintEl = $('hint'), timerEl = $('timer');

        let diff = 'easy';
        let size = 1, solution = [], given = [], entries = [];
        let selected = -1;
        let startTime = 0, timerInterval = null, solvedState = false;

        // ── persistent stats ──
        const store = {
            get(k, d) { try { const v = localStorage.getItem('binary-sudoku-' + k); return v === null ? d : JSON.parse(v); } catch { return d; } },
            set(k, v) { try { localStorage.setItem('binary-sudoku-' + k, JSON.stringify(v)); } catch {} },
        };
        let streak = store.get('streak', 0);
        let solvedCount = store.get('solved', 0);

        function fmtTime(ms) { return (ms / 1000).toFixed(2); }

        function renderStats() {
            $('stat-streak').textContent = streak;
            $('stat-solved').textContent = solvedCount;
            const best = store.get('best-' + diff, null);
            $('stat-best').textContent = best === null ? '—' : fmtTime(best) + 's';
        }

        function newPuzzle() {
            const cfg = DIFFS[diff];
            size = 2;
            solvedState = false;
            selected = -1;

            solution = SQUARES[Math.floor(Math.random() * 2)].slice();

            const n = size * size;
            given = new Array(n).fill(false);
            entries = new Array(n).fill(null);

            // reveal clues
            const idxs = [...Array(n).keys()];
            for (let i = idxs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
            }
            for (let i = 0; i < cfg.clues; i++) {
                given[idxs[i]] = true;
                entries[idxs[i]] = solution[idxs[i]];
            }

            // puzzle number: a proud binary serial
            $('puzzle-num').textContent = 'puzzle №' + (Math.floor(Math.random() * 63) + 1).toString(2);

            hintEl.textContent = HINTS[diff];
            hintEl.classList.remove('error');

            gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            gridEl.innerHTML = '';
            for (let i = 0; i < n; i++) {
                const c = document.createElement('div');
                c.className = 'cell' + (given[i] ? ' given' : '');
                c.dataset.idx = i;
                c.style.setProperty('--rot', (Math.random() * 3 - 1.5).toFixed(2) + 'deg');
                c.textContent = entries[i] === null ? '' : entries[i];
                if (!given[i]) c.addEventListener('click', () => selectCell(i));
                gridEl.appendChild(c);
            }

            // auto-select first empty cell
            const firstEmpty = entries.indexOf(null);
            if (firstEmpty !== -1) selectCell(firstEmpty);

            startTimer();
            renderStats();
        }

        function selectCell(i) {
            if (solvedState || given[i]) return;
            selected = i;
            [...gridEl.children].forEach((c, idx) => c.classList.toggle('selected', idx === i));
        }

        function enterValue(val) {
            if (solvedState || selected === -1 || given[selected]) return;
            const cell = gridEl.children[selected];

            // With zero clues, both latin squares are valid — the first bit placed
            // decides which one the player is solving.
            if (entries.every(e => e === null) && val !== solution[selected]) {
                solution = SQUARES.find(sq => sq[selected] === val).slice();
            }

            if (val !== solution[selected]) {
                streak = 0;
                store.set('streak', streak);
                renderStats();
                cell.textContent = val;
                cell.classList.remove('wrong');
                void cell.offsetWidth;
                cell.classList.add('wrong');
                hintEl.textContent = FAILS[Math.floor(Math.random() * FAILS.length)];
                hintEl.classList.add('error');
                setTimeout(() => {
                    cell.classList.remove('wrong');
                    if (entries[selected] === null) cell.textContent = '';
                }, 700);
                return;
            }

            entries[selected] = val;
            cell.textContent = val;
            cell.classList.remove('wrong');
            cell.classList.add('correct-flash');
            hintEl.classList.remove('error');
            setTimeout(() => cell.classList.remove('correct-flash'), 350);

            const next = entries.indexOf(null);
            if (next === -1) {
                win();
            } else {
                selectCell(next);
            }
        }

        // ── timer ──
        function startTimer() {
            clearInterval(timerInterval);
            startTime = performance.now();
            timerEl.textContent = '0.00';
            timerInterval = setInterval(() => {
                timerEl.textContent = fmtTime(performance.now() - startTime);
            }, 47);
        }

        // ── victory ──
        function win() {
            if (solvedState) return;
            solvedState = true;
            clearInterval(timerInterval);
            const ms = performance.now() - startTime;
            timerEl.textContent = fmtTime(ms);

            selected = -1;
            [...gridEl.children].forEach(c => c.classList.remove('selected'));

            streak++;
            solvedCount++;
            store.set('streak', streak);
            store.set('solved', solvedCount);
            const bestKey = 'best-' + diff;
            const prev = store.get(bestKey, null);
            const isRecord = prev === null || ms < prev;
            if (isRecord) store.set(bestKey, ms);
            renderStats();

            const msgs = WINS[diff];
            $('victory-sub').textContent = msgs[Math.floor(Math.random() * msgs.length)];
            $('v-time').textContent = fmtTime(ms) + 's' + (isRecord ? ' ★' : '');
            $('v-rank').textContent = '#1';
            $('v-iq').textContent = 180 + Math.floor(Math.random() * 60);
            $('v-pct').textContent = (99 + Math.random()).toFixed(1) + '%';
            $('victory').classList.add('show');

            confetti();
        }

        function confetti() {
            const colors = ['#f0563e', '#5aa0db', '#b7ce3c', '#a98fd0', '#f7c948', '#2fb0a3', '#ff7fa5'];
            for (let i = 0; i < 70; i++) {
                const b = document.createElement('div');
                b.className = 'bit';
                b.textContent = Math.random() < 0.5 ? '0' : '1';
                b.style.left = Math.random() * 100 + 'vw';
                b.style.fontSize = 14 + Math.random() * 22 + 'px';
                b.style.color = colors[Math.floor(Math.random() * colors.length)];
                b.style.animationDuration = 2.2 + Math.random() * 2.5 + 's';
                b.style.animationDelay = Math.random() * 0.9 + 's';
                document.body.appendChild(b);
                setTimeout(() => b.remove(), 6000);
            }
        }

        // ── events ──
        document.querySelectorAll('.tab').forEach(t => {
            t.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                diff = t.dataset.diff;
                $('victory').classList.remove('show');
                newPuzzle();
            });
        });

        document.querySelectorAll('.pad-btn').forEach(b => {
            b.addEventListener('click', () => enterValue(Number(b.dataset.val)));
        });

        $('next-btn').addEventListener('click', () => {
            $('victory').classList.remove('show');
            newPuzzle();
        });

        document.addEventListener('keydown', e => {
            if (e.key === '0' || e.key === '1') enterValue(Number(e.key));
            if (e.key === 'Enter' && solvedState) {
                $('victory').classList.remove('show');
                newPuzzle();
            }
            if (size === 2 && !solvedState) {
                const moves = { ArrowLeft: -1, ArrowRight: 1, ArrowUp: -2, ArrowDown: 2 };
                if (e.key in moves && selected !== -1) {
                    let i = selected + moves[e.key];
                    if (i >= 0 && i < 4 && !given[i]) selectCell(i);
                }
            }
        });

        newPuzzle();
    </script>
</body>
</html>
