<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Sudoku</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f13;
            --surface: #17171d;
            --surface2: #1d1d25;
            --border: #26262f;
            --text: #e8e8f0;
            --muted: #5a5a6e;
            --accent: #3ddc84;
            --wrong: #ff4d6a;
            --given: #8b8ba3;
            --gold: #f5c518;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            user-select: none;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── TOP BAR ── */
        #topbar {
            width: 100%;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        #brand {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
        }
        #brand b { color: var(--text); }

        #puzzle-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.08em;
        }

        #timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            min-width: 90px;
            text-align: right;
        }

        /* ── MAIN ── */
        #main {
            flex: 1;
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 20px 40px;
            gap: 26px;
        }

        /* ── DIFFICULTY TABS ── */
        #tabs {
            display: flex;
            gap: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 5px;
        }

        .tab {
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            background: none;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            background: var(--surface2);
            color: var(--text);
            font-weight: 700;
        }
        .tab .skulls { font-size: 10px; display: block; letter-spacing: 1px; margin-top: 1px; opacity: 0.8; }

        /* ── GRID ── */
        #board-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            min-height: 260px;
            justify-content: center;
        }

        #grid {
            display: grid;
            gap: 8px;
            border: 2px solid var(--border);
            background: var(--surface);
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .cell {
            width: 96px;
            height: 96px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 44px;
            font-weight: 700;
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.12s, background 0.12s, transform 0.12s;
            color: var(--text);
        }
        .cell.given {
            color: var(--given);
            cursor: default;
            background: var(--surface);
        }
        .cell.selected {
            border-color: var(--accent);
            background: rgba(61,220,132,0.08);
        }
        .cell.correct-flash { animation: pop 0.3s ease; }
        .cell.wrong { animation: shake 0.35s ease; border-color: var(--wrong); color: var(--wrong); }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-7px); }
            75% { transform: translateX(7px); }
        }

        #hint {
            font-size: 13px;
            color: var(--muted);
            text-align: center;
            min-height: 18px;
            transition: color 0.2s;
        }
        #hint.error { color: var(--wrong); }

        /* ── NUMBER PAD ── */
        #pad {
            display: flex;
            gap: 14px;
        }

        .pad-btn {
            width: 84px;
            height: 64px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 30px;
            font-weight: 700;
            color: var(--text);
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.12s;
        }
        .pad-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
        .pad-btn:active { transform: translateY(0) scale(0.96); }
        .pad-note {
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            margin-top: -16px;
            letter-spacing: 0.05em;
        }

        /* ── STATS ROW ── */
        #stats {
            display: flex;
            gap: 28px;
            font-size: 12px;
            color: var(--muted);
        }
        #stats b {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            color: var(--text);
            text-align: center;
        }
        #stats > div { text-align: center; }

        /* ── FOOTER ── */
        #footer {
            font-size: 12px;
            color: var(--muted);
            padding: 0 20px 24px;
            text-align: center;
            font-style: italic;
        }

        /* ── VICTORY OVERLAY ── */
        #victory {
            position: fixed;
            inset: 0;
            background: rgba(15,15,19,0.88);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #victory.show { display: flex; }

        #victory-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 36px;
            max-width: 400px;
            width: calc(100% - 40px);
            text-align: center;
            animation: cardIn 0.45s cubic-bezier(0.2, 1.4, 0.4, 1);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }
        @keyframes cardIn {
            from { transform: scale(0.7) translateY(30px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        #victory-title {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 0.04em;
            background: linear-gradient(90deg, var(--accent), #5b9cf6, var(--accent));
            background-size: 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 2.5s linear infinite;
        }
        @keyframes shimmer {
            to { background-position: 200%; }
        }

        #victory-sub {
            font-size: 14px;
            color: var(--muted);
            margin-top: 10px;
            line-height: 1.5;
        }

        #victory-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 26px 0;
        }
        .vstat {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 8px;
        }
        .vstat b {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            color: var(--text);
        }
        .vstat span { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
        .vstat.gold b { color: var(--gold); }

        #next-btn {
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            color: #0f0f13;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s;
        }
        #next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(61,220,132,0.35); }

        /* ── CONFETTI ── */
        .bit {
            position: fixed;
            top: -40px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            pointer-events: none;
            z-index: 90;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
        }

        /* ── MOBILE ── */
        @media (max-width: 480px) {
            .cell { width: 78px; height: 78px; font-size: 36px; }
            .tab { padding: 7px 10px; font-size: 12px; }
            #puzzle-num { display: none; }
            #stats { gap: 20px; }
        }
    </style>
</head>
<body>
    <div id="topbar">
        <div id="brand"><b>BINARY</b> SUDOKU</div>
        <div id="puzzle-num"></div>
        <div id="timer">0.00</div>
    </div>

    <div id="main">
        <div id="tabs">
            <button class="tab active" data-diff="easy">Easy<span class="skulls">&nbsp;</span></button>
            <button class="tab" data-diff="medium">Medium<span class="skulls">💀</span></button>
            <button class="tab" data-diff="hard">Hard<span class="skulls">💀💀</span></button>
            <button class="tab" data-diff="extreme">Extreme<span class="skulls">💀💀💀</span></button>
        </div>

        <div id="board-wrap">
            <div id="grid"></div>
            <div id="hint"></div>
        </div>

        <div id="pad">
            <button class="pad-btn" data-val="0">0</button>
            <button class="pad-btn" data-val="1">1</button>
        </div>
        <div class="pad-note">every digit known to binary sudoku</div>

        <div id="stats">
            <div><b id="stat-streak">0</b>win streak</div>
            <div><b id="stat-best">—</b>best time</div>
            <div><b id="stat-solved">0</b>puzzles solved</div>
        </div>
    </div>

    <div id="footer">Sudoku, but with half the digits and none of the difficulty.</div>

    <div id="victory">
        <div id="victory-card">
            <div id="victory-title">SOLVED!</div>
            <div id="victory-sub"></div>
            <div id="victory-stats">
                <div class="vstat"><b id="v-time">0.00s</b><span>time</span></div>
                <div class="vstat gold"><b id="v-rank">#1</b><span>global rank</span></div>
                <div class="vstat"><b id="v-iq">210</b><span>estimated IQ</span></div>
                <div class="vstat"><b id="v-pct">99.9%</b><span>percentile</span></div>
            </div>
            <button id="next-btn">Next Puzzle</button>
        </div>
    </div>

    <script>
        'use strict';

        const DIFFS = {
            easy:    { clues: 4, label: 'Easy' },
            medium:  { clues: 3, label: 'Medium' },
            hard:    { clues: 1, label: 'Hard' },
            extreme: { clues: 0, label: 'Extreme' },
        };

        const HINTS = {
            easy:    'This puzzle is already solved. Take a moment.',
            medium:  'Each row and column needs a 0 and a 1. One cell remains.',
            hard:    'One clue. Three empty cells. Steel yourself.',
            extreme: 'Zero clues. You are completely on your own out there.',
        };

        const WINS = {
            easy: [
                'The puzzle came pre-solved. You watched. That counts.',
                'You did literally nothing, and it worked.',
                'Victory through patience. Mostly through the puzzle being done already.',
            ],
            medium: [
                'Three of the four answers were given to you. Still — well played.',
                'The final bit never stood a chance.',
                'One cell. One legend.',
            ],
            hard: [
                'You deduced three entire bits from a single clue. Detective-grade work.',
                'Deduction worthy of a true detective.',
                'The 2×2 grid has met its match.',
            ],
            extreme: [
                'FOUR cells, no clues, solved by hand. Please rest now.',
                'Only 100% of players ever finish this mode. Welcome to the club.',
                'The hardest puzzle binary sudoku has to offer. Demolished.',
            ],
        };

        const FAILS = [
            'Incorrect. It was one of two options.',
            'Somehow... no.',
            'Statistically, that was impressive.',
            'The other one. It was the other one.',
        ];

        // 2×2 binary latin squares (row-major)
        const SQUARES = [[0,1,1,0], [1,0,0,1]];

        const $ = id => document.getElementById(id);
        const gridEl = $('grid'), hintEl = $('hint'), timerEl = $('timer');

        let diff = 'easy';
        let size = 1, solution = [], given = [], entries = [];
        let selected = -1;
        let startTime = 0, timerInterval = null, solvedState = false;

        // ── persistent stats ──
        const store = {
            get(k, d) { try { const v = localStorage.getItem('binary-sudoku-' + k); return v === null ? d : JSON.parse(v); } catch { return d; } },
            set(k, v) { try { localStorage.setItem('binary-sudoku-' + k, JSON.stringify(v)); } catch {} },
        };
        let streak = store.get('streak', 0);
        let solvedCount = store.get('solved', 0);

        function fmtTime(ms) { return (ms / 1000).toFixed(2); }

        function renderStats() {
            $('stat-streak').textContent = streak;
            $('stat-solved').textContent = solvedCount;
            const best = store.get('best-' + diff, null);
            $('stat-best').textContent = best === null ? '—' : fmtTime(best) + 's';
        }

        function newPuzzle() {
            const cfg = DIFFS[diff];
            size = 2;
            solvedState = false;
            selected = -1;

            solution = SQUARES[Math.floor(Math.random() * 2)].slice();

            const n = size * size;
            given = new Array(n).fill(false);
            entries = new Array(n).fill(null);

            // reveal clues
            const idxs = [...Array(n).keys()];
            for (let i = idxs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
            }
            for (let i = 0; i < cfg.clues; i++) {
                given[idxs[i]] = true;
                entries[idxs[i]] = solution[idxs[i]];
            }

            // puzzle number: a proud binary serial
            $('puzzle-num').textContent = 'PUZZLE №' + (Math.floor(Math.random() * 63) + 1).toString(2);

            hintEl.textContent = HINTS[diff];
            hintEl.classList.remove('error');

            gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            gridEl.innerHTML = '';
            for (let i = 0; i < n; i++) {
                const c = document.createElement('div');
                c.className = 'cell' + (given[i] ? ' given' : '');
                c.dataset.idx = i;
                c.textContent = entries[i] === null ? '' : entries[i];
                if (!given[i]) c.addEventListener('click', () => selectCell(i));
                gridEl.appendChild(c);
            }

            // auto-select first empty cell
            const firstEmpty = entries.indexOf(null);
            if (firstEmpty !== -1) selectCell(firstEmpty);

            startTimer();
            renderStats();

            // Easy mode: the puzzle arrives fully solved. Congratulations are inevitable.
            if (entries.every(e => e !== null)) {
                setTimeout(win, 900);
            }
        }

        function selectCell(i) {
            if (solvedState || given[i]) return;
            selected = i;
            [...gridEl.children].forEach((c, idx) => c.classList.toggle('selected', idx === i));
        }

        function enterValue(val) {
            if (solvedState || selected === -1 || given[selected]) return;
            const cell = gridEl.children[selected];

            // With zero clues, both latin squares are valid — the first bit placed
            // decides which one the player is solving.
            if (entries.every(e => e === null) && val !== solution[selected]) {
                solution = SQUARES.find(sq => sq[selected] === val).slice();
            }

            if (val !== solution[selected]) {
                streak = 0;
                store.set('streak', streak);
                renderStats();
                cell.textContent = val;
                cell.classList.remove('wrong');
                void cell.offsetWidth;
                cell.classList.add('wrong');
                hintEl.textContent = FAILS[Math.floor(Math.random() * FAILS.length)];
                hintEl.classList.add('error');
                setTimeout(() => {
                    cell.classList.remove('wrong');
                    if (entries[selected] === null) cell.textContent = '';
                }, 700);
                return;
            }

            entries[selected] = val;
            cell.textContent = val;
            cell.classList.remove('wrong');
            cell.classList.add('correct-flash');
            hintEl.classList.remove('error');
            setTimeout(() => cell.classList.remove('correct-flash'), 350);

            const next = entries.indexOf(null);
            if (next === -1) {
                win();
            } else {
                selectCell(next);
            }
        }

        // ── timer ──
        function startTimer() {
            clearInterval(timerInterval);
            startTime = performance.now();
            timerEl.textContent = '0.00';
            timerInterval = setInterval(() => {
                timerEl.textContent = fmtTime(performance.now() - startTime);
            }, 47);
        }

        // ── victory ──
        function win() {
            if (solvedState) return;
            solvedState = true;
            clearInterval(timerInterval);
            const ms = performance.now() - startTime;
            timerEl.textContent = fmtTime(ms);

            selected = -1;
            [...gridEl.children].forEach(c => c.classList.remove('selected'));

            streak++;
            solvedCount++;
            store.set('streak', streak);
            store.set('solved', solvedCount);
            const bestKey = 'best-' + diff;
            const prev = store.get(bestKey, null);
            const isRecord = prev === null || ms < prev;
            if (isRecord) store.set(bestKey, ms);
            renderStats();

            const msgs = WINS[diff];
            $('victory-sub').textContent = msgs[Math.floor(Math.random() * msgs.length)];
            $('v-time').textContent = fmtTime(ms) + 's' + (isRecord ? ' ★' : '');
            $('v-rank').textContent = '#1';
            $('v-iq').textContent = 180 + Math.floor(Math.random() * 60);
            $('v-pct').textContent = (99 + Math.random()).toFixed(1) + '%';
            $('victory').classList.add('show');

            confetti();
        }

        function confetti() {
            const colors = ['#3ddc84', '#5b9cf6', '#f5c518', '#ff4d6a', '#e8e8f0'];
            for (let i = 0; i < 70; i++) {
                const b = document.createElement('div');
                b.className = 'bit';
                b.textContent = Math.random() < 0.5 ? '0' : '1';
                b.style.left = Math.random() * 100 + 'vw';
                b.style.fontSize = 14 + Math.random() * 22 + 'px';
                b.style.color = colors[Math.floor(Math.random() * colors.length)];
                b.style.animationDuration = 2.2 + Math.random() * 2.5 + 's';
                b.style.animationDelay = Math.random() * 0.9 + 's';
                document.body.appendChild(b);
                setTimeout(() => b.remove(), 6000);
            }
        }

        // ── events ──
        document.querySelectorAll('.tab').forEach(t => {
            t.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                diff = t.dataset.diff;
                $('victory').classList.remove('show');
                newPuzzle();
            });
        });

        document.querySelectorAll('.pad-btn').forEach(b => {
            b.addEventListener('click', () => enterValue(Number(b.dataset.val)));
        });

        $('next-btn').addEventListener('click', () => {
            $('victory').classList.remove('show');
            newPuzzle();
        });

        document.addEventListener('keydown', e => {
            if (e.key === '0' || e.key === '1') enterValue(Number(e.key));
            if (e.key === 'Enter' && solvedState) {
                $('victory').classList.remove('show');
                newPuzzle();
            }
            if (size === 2 && !solvedState) {
                const moves = { ArrowLeft: -1, ArrowRight: 1, ArrowUp: -2, ArrowDown: 2 };
                if (e.key in moves && selected !== -1) {
                    let i = selected + moves[e.key];
                    if (i >= 0 && i < 4 && !given[i]) selectCell(i);
                }
            }
        });

        newPuzzle();
    </script>
</body>
</html>
