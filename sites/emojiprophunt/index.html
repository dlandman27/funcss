<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prop Hunt</title>
    <meta name="description" content="One of them is wanted. Find the exact match — the decoys are in on it.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'><path d='M25 4l5.2 12.4L43 17.6l-9.8 8.9 2.9 13.1L25 32.8l-11.1 6.8 2.9-13.1L7 17.6l12.8-1.2z' fill='%23f7c948' stroke='%23201a17' stroke-width='3' stroke-linejoin='round'/></svg>">
    <style>
        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --coral: #f0563e;
            --gold: #f7c948;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: var(--paper);
            color: var(--ink);
            font-family: Georgia, 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 18px 12px 30px;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .topbar {
            display: flex;
            gap: 18px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .poster {
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 10px;
            box-shadow: 4px 4px 0 var(--ink);
            transform: rotate(-2deg);
            padding: 10px 18px 12px;
            text-align: center;
        }
        .poster .wanted {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 17px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            border-bottom: 2px solid var(--ink);
            padding-bottom: 4px;
            margin-bottom: 6px;
        }
        .poster canvas { display: block; margin: 0 auto; }
        .poster .desc {
            font-style: italic;
            font-size: 12px;
            color: rgba(32, 26, 23, 0.65);
            max-width: 150px;
        }

        .stats {
            text-align: center;
            font-style: italic;
            font-size: 14px;
            line-height: 1.6;
        }
        .stats .big {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-style: normal;
            font-size: 22px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .field-wrap {
            position: relative;
            width: min(860px, 96vw);
        }
        canvas#field {
            display: block;
            width: 100%;
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 12px;
            box-shadow: 5px 5px 0 var(--ink);
            cursor: crosshair;
            touch-action: manipulation;
        }

        .stamp {
            position: absolute;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 30px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #c99a12;
            border: 3px solid #c99a12;
            border-radius: 8px;
            box-shadow: inset 0 0 0 2px var(--cream), inset 0 0 0 4px #c99a12;
            background: rgba(255, 248, 239, 0.75);
            padding: 2px 12px;
            pointer-events: none;
            transform: rotate(-10deg) scale(0);
            z-index: 3;
        }
        .stamp.show { animation: stampIn 0.32s cubic-bezier(0.2, 1.6, 0.4, 1) forwards; }
        @keyframes stampIn {
            0% { transform: rotate(4deg) scale(2); opacity: 0; }
            70% { transform: rotate(-11deg) scale(0.94); opacity: 1; }
            100% { transform: rotate(-10deg) scale(1); opacity: 1; }
        }

        .remark {
            font-style: italic;
            font-size: 15px;
            color: rgba(32, 26, 23, 0.6);
            min-height: 1.3em;
            text-align: center;
            transition: opacity 0.8s ease;
        }

        @keyframes thunk {
            0% { transform: translate(0, 0); }
            25% { transform: translate(2px, 3px); }
            50% { transform: translate(-3px, 1px); }
            75% { transform: translate(1px, -2px); }
            100% { transform: translate(0, 0); }
        }
        body.thunk { animation: thunk 0.22s linear; }

        @media (prefers-reduced-motion: reduce) {
            .stamp.show { animation: none; transform: rotate(-10deg) scale(1); opacity: 1; }
            body.thunk { animation: none; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="poster">
            <div class="wanted">Wanted</div>
            <canvas id="posterCanvas" width="110" height="90"></canvas>
            <div class="desc" id="posterDesc"></div>
        </div>
        <div class="stats">
            <span class="big" id="roundLabel">Round 1</span>
            <span id="statsLine"></span>
        </div>
    </div>

    <div class="field-wrap">
        <canvas id="field"></canvas>
        <div class="stamp" id="stamp">Caught</div>
    </div>
    <div class="remark" id="remark">tap the one on the poster. the exact one.</div>

    <script>
    (() => {
        const INK = '#201a17';
        const CREAM = '#fff8ef';
        const COLORS = [
            { hex: '#f0563e', name: 'coral' },
            { hex: '#5aa0db', name: 'sky' },
            { hex: '#b7ce3c', name: 'lime' },
            { hex: '#a98fd0', name: 'purple' },
            { hex: '#f47b28', name: 'orange' },
            { hex: '#ff7fa5', name: 'pink' },
            { hex: '#2fb0a3', name: 'teal' },
            { hex: '#f7c948', name: 'gold' }
        ];

        // shape drawing: unit coordinate space roughly [-1, 1]
        const SHAPES = {
            star: { sym: true, blurb: 'considered decorative and dangerous',
                path(c) {
                    c.beginPath();
                    for (let i = 0; i < 10; i++) {
                        const a = -Math.PI / 2 + i * Math.PI / 5;
                        const r = i % 2 === 0 ? 1 : 0.45;
                        c[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(a) * r, Math.sin(a) * r);
                    }
                    c.closePath();
                } },
            heart: { sym: true, blurb: 'armed with feelings',
                path(c) {
                    c.beginPath();
                    c.moveTo(0, 0.95);
                    c.bezierCurveTo(-1.15, 0.1, -0.85, -0.95, 0, -0.35);
                    c.bezierCurveTo(0.85, -0.95, 1.15, 0.1, 0, 0.95);
                    c.closePath();
                } },
            flower: { sym: true, blurb: 'blooming without a permit',
                path(c) {
                    c.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const a = i * Math.PI / 3;
                        c.moveTo(0, 0);
                        c.arc(Math.cos(a) * 0.55, Math.sin(a) * 0.55, 0.45, 0, Math.PI * 2);
                    }
                } },
            mug: { sym: false, blurb: 'last seen holding coffee',
                path(c) {
                    c.beginPath();
                    c.moveTo(-0.7, -0.6);
                    c.lineTo(0.45, -0.6);
                    c.lineTo(0.45, 0.7);
                    c.quadraticCurveTo(0.45, 0.85, 0.25, 0.85);
                    c.lineTo(-0.5, 0.85);
                    c.quadraticCurveTo(-0.7, 0.85, -0.7, 0.7);
                    c.closePath();
                    c.moveTo(0.45, -0.25);
                    c.quadraticCurveTo(1.05, -0.35, 1, 0.1);
                    c.quadraticCurveTo(0.95, 0.5, 0.45, 0.4);
                } },
            fish: { sym: false, blurb: 'swims exclusively left',
                path(c) {
                    c.beginPath();
                    c.moveTo(-0.95, 0);
                    c.quadraticCurveTo(-0.2, -0.75, 0.45, -0.2);
                    c.quadraticCurveTo(0.7, 0, 0.45, 0.2);
                    c.quadraticCurveTo(-0.2, 0.75, -0.95, 0);
                    c.closePath();
                    c.moveTo(0.45, 0);
                    c.lineTo(0.95, -0.45);
                    c.lineTo(0.95, 0.45);
                    c.closePath();
                } },
            bolt: { sym: false, blurb: 'moves fast, stands still',
                path(c) {
                    c.beginPath();
                    c.moveTo(0.25, -1);
                    c.lineTo(-0.55, 0.15);
                    c.lineTo(-0.05, 0.15);
                    c.lineTo(-0.3, 1);
                    c.lineTo(0.55, -0.2);
                    c.lineTo(0.05, -0.2);
                    c.closePath();
                } },
            moon: { sym: false, blurb: 'out all night, every night',
                path(c) {
                    c.beginPath();
                    c.arc(0, 0, 0.9, Math.PI * 0.32, Math.PI * 1.68);
                    c.arc(0.5, 0, 0.62, Math.PI * 1.55, Math.PI * 0.45, true);
                    c.closePath();
                } },
            hat: { sym: false, blurb: 'formal but suspicious',
                path(c) {
                    c.beginPath();
                    c.moveTo(-1, 0.55);
                    c.lineTo(1, 0.55);
                    c.lineTo(1, 0.3);
                    c.lineTo(0.5, 0.3);
                    c.lineTo(0.5, -0.75);
                    c.lineTo(0.62, -0.9);
                    c.lineTo(-0.55, -0.9);
                    c.lineTo(-0.5, 0.3);
                    c.lineTo(-1, 0.3);
                    c.closePath();
                } }
        };
        const SHAPE_KEYS = Object.keys(SHAPES);
        const ASYM_KEYS = SHAPE_KEYS.filter(k => !SHAPES[k].sym);

        function drawProp(c, shape, color, mirror, x, y, size, rot) {
            c.save();
            c.translate(x, y);
            c.rotate(rot);
            if (mirror) c.scale(-1, 1);
            c.scale(size, size);
            const lw = Math.max(2, size * 0.11) / size;
            c.save();
            c.translate(0.09, 0.09);
            SHAPES[shape].path(c);
            c.fillStyle = INK;
            c.fill();
            c.restore();
            SHAPES[shape].path(c);
            c.fillStyle = color;
            c.fill();
            c.lineWidth = lw;
            c.lineJoin = 'round';
            c.strokeStyle = INK;
            c.stroke();
            if (shape === 'fish') {
                c.beginPath();
                c.arc(-0.55, -0.12, 0.09, 0, Math.PI * 2);
                c.fillStyle = INK;
                c.fill();
            }
            c.restore();
        }

        // googly eyes for a certain uninvolved bystander
        function drawGerald(c, x, y, size) {
            c.save();
            c.translate(x, y);
            c.scale(size, size);
            c.beginPath();
            c.ellipse(0, 0.1, 0.9, 0.75, 0, 0, Math.PI * 2);
            c.fillStyle = '#b7ce3c';
            c.fill();
            c.lineWidth = 0.12;
            c.strokeStyle = INK;
            c.stroke();
            for (const side of [-1, 1]) {
                c.beginPath();
                c.arc(side * 0.3, -0.25, 0.28, 0, Math.PI * 2);
                c.fillStyle = CREAM;
                c.fill();
                c.lineWidth = 0.08;
                c.stroke();
                c.beginPath();
                c.arc(side * 0.3 + 0.05, -0.2, 0.12, 0, Math.PI * 2);
                c.fillStyle = INK;
                c.fill();
            }
            c.restore();
        }

        // ---- state ----
        const field = document.getElementById('field');
        const fctx = field.getContext('2d');
        const posterCanvas = document.getElementById('posterCanvas');
        const pctx = posterCanvas.getContext('2d');
        const posterDesc = document.getElementById('posterDesc');
        const roundLabel = document.getElementById('roundLabel');
        const statsLine = document.getElementById('statsLine');
        const remark = document.getElementById('remark');
        const stamp = document.getElementById('stamp');
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

        function loadNum(k) { try { return parseInt(localStorage.getItem(k), 10) || 0; } catch (e) { return 0; } }
        function saveNum(k, v) { try { localStorage.setItem(k, String(v)); } catch (e) {} }

        let round = 1;
        let best = loadNum('prophunt-best');
        let captures = loadNum('prophunt-captures');
        let missesThisRound = 0;
        let props = [];        // {shape,color,mirror,x,y,rot,size,isTarget,isGerald,wobble}
        let target = null;
        let state = 'playing'; // playing | celebrating
        let cssW = 0, cssH = 0;

        const MISS_REMARKS = [
            'that one is innocent.',
            'close. also no.',
            'a look-alike. they planned this.',
            'the wanted one remains at large.',
            'an honest citizen. apologize.',
            'wrong. the resemblance is the point.'
        ];

        // ---- layout ----
        function sizeField() {
            const wrap = field.parentElement;
            const w = wrap.clientWidth;
            const h = Math.max(300, Math.min(window.innerHeight - 260, w * 0.72));
            cssW = w; cssH = h;
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            field.width = Math.round(w * dpr);
            field.height = Math.round(h * dpr);
            field.style.height = h + 'px';
            fctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        // ---- round generation ----
        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        // hue-neighbors that read as the same color at crowd sizes —
        // a decoy sharing the target's shape must never wear one of these
        const CLOSE = {
            '#f0563e': ['#f47b28', '#ff7fa5'],            // coral ~ orange, pink
            '#f47b28': ['#f0563e', '#f7c948'],            // orange ~ coral, gold
            '#ff7fa5': ['#f0563e', '#a98fd0'],            // pink ~ coral, purple
            '#f7c948': ['#f47b28', '#b7ce3c'],            // gold ~ orange, lime
            '#b7ce3c': ['#f7c948', '#2fb0a3'],            // lime ~ gold, teal
            '#2fb0a3': ['#b7ce3c', '#5aa0db'],            // teal ~ lime, sky
            '#5aa0db': ['#2fb0a3', '#a98fd0'],            // sky ~ teal, purple
            '#a98fd0': ['#5aa0db', '#ff7fa5']             // purple ~ sky, pink
        };
        function clearlyDifferent(hex) {
            const near = CLOSE[hex] || [];
            return COLORS.filter(c => c.hex !== hex && !near.includes(c.hex));
        }

        function sameProp(a, b) {
            return a.shape === b.shape && a.color === b.color &&
                (!!a.mirror === !!b.mirror || SHAPES[a.shape].sym);
        }

        function makeRound() {
            missesThisRound = 0;
            state = 'playing';
            const useMirrors = round >= 5;
            const targetShape = useMirrors ? pick(ASYM_KEYS) : pick(SHAPE_KEYS);
            const targetColor = pick(COLORS);
            target = { shape: targetShape, color: targetColor.hex, colorName: targetColor.name,
                       mirror: useMirrors && Math.random() < 0.5 };

            const count = Math.min(230, 13 + (round - 1) * 14);
            const size = Math.max(13, Math.min(30, Math.sqrt((cssW * cssH) / count) * 0.34));

            props = [];
            for (let i = 0; i < count - 1; i++) {
                let d;
                let guard = 0;
                do {
                    const roll = Math.random();
                    if (round >= 3 && roll < 0.45) {
                        // same shape, unmistakably different color
                        const c = pick(clearlyDifferent(target.color));
                        d = { shape: target.shape, color: c.hex, mirror: Math.random() < 0.5 };
                    } else if (useMirrors && roll < 0.72) {
                        // same shape, same color, mirrored
                        d = { shape: target.shape, color: target.color, mirror: !target.mirror };
                    } else {
                        d = { shape: pick(SHAPE_KEYS), color: pick(COLORS).hex, mirror: Math.random() < 0.5 };
                        if (d.shape === target.shape && d.color !== target.color) {
                            d.color = pick(clearlyDifferent(target.color)).hex;
                        }
                    }
                } while (sameProp(d, target) && ++guard < 20);
                if (sameProp(d, target)) { d.shape = pick(SHAPE_KEYS.filter(s => s !== target.shape)); }
                props.push(place(d, size));
            }
            const t = place({ ...target }, size);
            t.isTarget = true;
            props.splice(Math.floor(Math.random() * props.length), 0, t);

            if (Math.random() < 0.03) {
                const g = place({ shape: 'star', color: '#b7ce3c', mirror: false }, size * 0.62);
                g.isGerald = true;
                props.push(g);
            }

            roundLabel.textContent = 'Round ' + round;
            updateStats();
            drawPoster();
            render();
        }

        function place(p, size) {
            const m = size + 6;
            p.x = m + Math.random() * (cssW - m * 2);
            p.y = m + Math.random() * (cssH - m * 2);
            p.rot = (Math.random() - 0.5) * 0.85;
            p.size = size * (0.9 + Math.random() * 0.2);
            p.wobble = 0;
            return p;
        }

        function drawPoster() {
            pctx.clearRect(0, 0, posterCanvas.width, posterCanvas.height);
            drawProp(pctx, target.shape, target.color, target.mirror, 55, 42, 30, -0.08);
            posterDesc.textContent = 'one ' + target.colorName + ' ' + target.shape + ' — ' + SHAPES[target.shape].blurb + '.';
        }

        function updateStats() {
            statsLine.textContent = 'best round ' + best + ' · captures to date: ' + captures +
                (missesThisRound ? ' · misses: ' + missesThisRound : '');
        }

        // ---- rendering (rAF sleeps when idle) ----
        let rafId = 0;
        let animating = false;
        let caughtRing = null; // {x,y,r,start}

        function render() {
            fctx.clearRect(0, 0, cssW, cssH);
            const now = performance.now();
            let stillAnimating = false;

            for (const p of props) {
                let rot = p.rot;
                if (p.wobble > now) {
                    rot += Math.sin(now / 30) * 0.22;
                    stillAnimating = true;
                }
                if (p.isGerald) drawGerald(fctx, p.x, p.y, p.size);
                else drawProp(fctx, p.shape, p.color, p.mirror, p.x, p.y, p.size, rot);
            }

            if (caughtRing) {
                const t = (now - caughtRing.start) / 600;
                if (t < 1) {
                    fctx.beginPath();
                    fctx.arc(caughtRing.x, caughtRing.y, caughtRing.r * (1 + t * 0.6), 0, Math.PI * 2);
                    fctx.lineWidth = 5;
                    fctx.strokeStyle = INK;
                    fctx.stroke();
                    fctx.lineWidth = 2.5;
                    fctx.strokeStyle = '#f7c948';
                    fctx.stroke();
                    stillAnimating = true;
                } else {
                    caughtRing = null;
                }
            }

            if (stillAnimating) {
                animating = true;
                rafId = requestAnimationFrame(render);
            } else {
                animating = false;
                rafId = 0;
            }
        }
        function wake() { if (!rafId) rafId = requestAnimationFrame(render); }

        // ---- input ----
        field.addEventListener('pointerdown', e => {
            if (state !== 'playing') return;
            const rect = field.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width * cssW;
            const y = (e.clientY - rect.top) / rect.height * cssH;

            for (let i = props.length - 1; i >= 0; i--) {
                const p = props[i];
                const d = Math.hypot(p.x - x, p.y - y);
                if (d < p.size * 1.2) {
                    if (p.isTarget) caught(p);
                    else miss(p);
                    return;
                }
            }
        });

        function thunk() {
            if (reducedMotion.matches) return;
            document.body.classList.remove('thunk');
            void document.body.offsetWidth;
            document.body.classList.add('thunk');
        }

        function miss(p) {
            if (p.isGerald) {
                remark.textContent = 'that is gerald. gerald is not wanted.';
                props = props.filter(q => q !== p);
                render();
                return;
            }
            missesThisRound++;
            updateStats();
            remark.textContent = MISS_REMARKS[Math.floor(Math.random() * MISS_REMARKS.length)];
            p.wobble = performance.now() + 500;
            thunk();
            wake();
        }

        function caught(p) {
            state = 'celebrating';
            captures++;
            if (round > best) { best = round; saveNum('prophunt-best', best); }
            saveNum('prophunt-captures', captures);
            remark.textContent = 'got them. round ' + (round + 1) + ' incoming.';

            caughtRing = { x: p.x, y: p.y, r: p.size * 1.3, start: performance.now() };
            wake();
            thunk();

            const rect = field.getBoundingClientRect();
            stamp.style.left = Math.min(Math.max(p.x / cssW * rect.width - 60, 4), rect.width - 130) + 'px';
            stamp.style.top = Math.min(Math.max(p.y / cssH * rect.height - 50, 4), rect.height - 50) + 'px';
            stamp.classList.remove('show');
            void stamp.offsetWidth;
            stamp.classList.add('show');

            setTimeout(() => {
                stamp.classList.remove('show');
                round++;
                makeRound();
            }, reducedMotion.matches ? 500 : 950);
        }

        // ---- resize ----
        let resizeTimer = 0;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                const rel = props.map(p => ({ p, rx: p.x / cssW, ry: p.y / cssH }));
                sizeField();
                rel.forEach(({ p, rx, ry }) => { p.x = rx * cssW; p.y = ry * cssH; });
                render();
            }, 150);
        });

        setTimeout(() => { remark.style.opacity = '0'; }, 10000);
        field.addEventListener('pointerdown', () => { remark.style.opacity = '1'; }, { once: false });

        sizeField();
        makeRound();
    })();
    </script>
</body>
</html>
