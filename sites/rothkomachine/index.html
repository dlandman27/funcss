<!DOCTYPE html>
<html lang="en">
<head>
  <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rothko Machine</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #211e1a;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 26px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    /* gallery spotlight */
    #wall {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 90% 75% at 50% 38%,
          rgba(255, 240, 214, 0.10) 0%,
          rgba(255, 240, 214, 0.04) 45%,
          transparent 70%),
        radial-gradient(ellipse at center,
          transparent 55%,
          rgba(0, 0, 0, 0.45) 100%);
    }

    #frame {
      position: relative;
      transition: opacity 0.45s ease;
      line-height: 0;
    }

    #frame.fading { opacity: 0; }

    #painting {
      box-shadow:
        0 30px 70px rgba(0, 0, 0, 0.55),
        0 6px 18px rgba(0, 0, 0, 0.45);
    }

    #plaque {
      font-family: Georgia, 'Times New Roman', serif;
      color: #b8ac99;
      text-align: center;
      transition: opacity 0.45s ease;
      max-width: 86vw;
    }

    #plaque.fading { opacity: 0; }

    #plaque .artist {
      font-size: clamp(12px, 1.5vw, 14px);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #8d8371;
      margin-bottom: 6px;
    }

    #plaque .title {
      font-style: italic;
      font-size: clamp(15px, 2.2vw, 19px);
      color: #d6cab4;
    }

    #plaque .details {
      font-size: clamp(11px, 1.4vw, 13px);
      margin-top: 6px;
      color: #8d8371;
      letter-spacing: 0.05em;
    }

    #hint {
      position: fixed;
      bottom: 3.5vh;
      left: 0;
      right: 0;
      text-align: center;
      font-family: Georgia, serif;
      font-style: italic;
      font-size: clamp(12px, 1.6vw, 14px);
      color: rgba(184, 172, 153, 0.45);
      letter-spacing: 0.08em;
      pointer-events: none;
      transition: opacity 2s ease;
    }

    #hint.hidden { opacity: 0; }
  </style>
</head>
<body>
  <div id="wall"></div>
  <div id="frame"><canvas id="painting"></canvas></div>
  <div id="plaque">
    <div class="artist">The Rothko Machine</div>
    <div class="title" id="title"></div>
    <div class="details" id="details"></div>
  </div>
  <div id="hint">press space or click for the next painting</div>

  <script>
    const canvas = document.getElementById('painting');
    const ctx = canvas.getContext('2d');
    const frame = document.getElementById('frame');
    const plaque = document.getElementById('plaque');
    const titleEl = document.getElementById('title');
    const detailsEl = document.getElementById('details');
    const hint = document.getElementById('hint');

    // name, hex, temperature group
    const COLORS = [
      ['Orange',   '#c25e1c', 'warm'],
      ['Red',      '#a32b1d', 'warm'],
      ['Crimson',  '#8e1f2f', 'warm'],
      ['Maroon',   '#5c1a1b', 'warm'],
      ['Ochre',    '#c8912f', 'warm'],
      ['Yellow',   '#d4a83b', 'warm'],
      ['Rose',     '#c07a68', 'warm'],
      ['Umber',    '#4a3527', 'warm'],
      ['Burgundy', '#6b2233', 'warm'],
      ['Plum',     '#4a2c4a', 'cool'],
      ['Violet',   '#5b3a6e', 'cool'],
      ['Blue',     '#2c3457', 'cool'],
      ['Slate',    '#4a5866', 'cool'],
      ['Teal',     '#2f5d5a', 'cool'],
      ['Green',    '#2e4232', 'cool'],
      ['Black',    '#1b1717', 'dark'],
      ['Charcoal', '#2b2828', 'dark'],
      ['Grey',     '#6e6a61', 'dark'],
      ['White',    '#d8cfba', 'light'],
      ['Cream',    '#cbbd9d', 'light'],
    ];

    const rand = (a, b) => a + Math.random() * (b - a);
    const randInt = (a, b) => Math.floor(rand(a, b + 1));
    const pick = (arr) => arr[(Math.random() * arr.length) | 0];

    function hexToRgb(hex) {
      return [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
    }

    function shade(rgb, amt) {
      // amt > 0 lightens toward warm white, < 0 darkens
      const target = amt > 0 ? [255, 250, 240] : [10, 8, 6];
      const t = Math.abs(amt);
      return rgb.map((c, i) => Math.round(c + (target[i] - c) * t));
    }

    const rgba = (rgb, a) => `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a})`;

    function chooseColors(n) {
      // mostly tonal groupings, like the real ones
      let pool;
      if (Math.random() < 0.65) {
        const temp = pick(['warm', 'warm', 'cool', 'dark']);
        pool = COLORS.filter(c => c[2] === temp || c[2] === 'dark' || (Math.random() < 0.3 && c[2] === 'light'));
      } else {
        pool = COLORS.slice();
      }
      const chosen = [];
      while (chosen.length < n && pool.length) {
        const c = pick(pool);
        pool = pool.filter(x => x !== c);
        chosen.push(c);
      }
      while (chosen.length < n) chosen.push(pick(COLORS));
      return chosen;
    }

    function softBlotches(x, y, w, h, rgb, count, alphaMax) {
      for (let i = 0; i < count; i++) {
        const bx = rand(x, x + w);
        const by = rand(y, y + h);
        const br = rand(Math.min(w, h) * 0.06, Math.min(w, h) * 0.4);
        const tone = shade(rgb, rand(-0.14, 0.14));
        const g = ctx.createRadialGradient(bx, by, 0, bx, by, br);
        g.addColorStop(0, rgba(tone, rand(0.02, alphaMax)));
        g.addColorStop(1, rgba(tone, 0));
        ctx.fillStyle = g;
        ctx.fillRect(bx - br, by - br, br * 2, br * 2);
      }
    }

    function paintBand(x, y, w, h, rgb) {
      // bleed halo, then body, then dry-brush texture
      ctx.filter = 'blur(22px)';
      ctx.fillStyle = rgba(rgb, 0.35);
      ctx.fillRect(x - 8, y - 10, w + 16, h + 20);

      ctx.filter = 'blur(10px)';
      ctx.fillStyle = rgba(rgb, 0.75);
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = rgba(shade(rgb, -0.06), 0.5);
      ctx.fillRect(x + rand(-4, 4), y + rand(-4, 4), w, h);

      ctx.filter = 'blur(4px)';
      ctx.fillStyle = rgba(rgb, 0.55);
      ctx.fillRect(x + w * 0.03, y + h * 0.06, w * 0.94, h * 0.88);
      ctx.filter = 'none';

      softBlotches(x, y, w, h, rgb, 90, 0.09);

      // horizontal dry-brush streaks
      for (let i = 0; i < 26; i++) {
        const sy = rand(y, y + h);
        const sw = w * rand(0.25, 0.95);
        const sx = rand(x, x + w - sw);
        ctx.fillStyle = rgba(shade(rgb, rand(-0.12, 0.16)), rand(0.02, 0.06));
        ctx.fillRect(sx, sy, sw, rand(1.5, 7));
      }
    }

    function grain(W, H) {
      const noise = ctx.createImageData(W, H);
      const d = noise.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = 128 + (Math.random() - 0.5) * 46;
        d[i] = d[i + 1] = d[i + 2] = v;
        d[i + 3] = 255;
      }
      const nc = document.createElement('canvas');
      nc.width = W; nc.height = H;
      nc.getContext('2d').putImageData(noise, 0, 0);
      ctx.globalAlpha = 0.055;
      ctx.globalCompositeOperation = 'overlay';
      ctx.drawImage(nc, 0, 0);
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
    }

    function generate() {
      const ratio = rand(1.12, 1.42);
      const W = 1000;
      const H = Math.round(W * ratio);
      canvas.width = W;
      canvas.height = H;

      const nBands = Math.random() < 0.55 ? 2 : (Math.random() < 0.8 ? 3 : 4);
      const colors = chooseColors(nBands + 1);
      const ground = colors[0];
      const bands = colors.slice(1);

      // ground
      const groundRgb = hexToRgb(ground[1]);
      ctx.fillStyle = ground[1];
      ctx.fillRect(0, 0, W, H);
      softBlotches(0, 0, W, H, groundRgb, 70, 0.06);

      // band layout
      const sideM = W * rand(0.05, 0.09);
      const topM = H * rand(0.045, 0.08);
      const gap = H * rand(0.015, 0.035);
      const avail = H - topM * 2 - gap * (nBands - 1);
      let weights = bands.map(() => 0.5 + Math.pow(Math.random(), 1.4) * 2.2);
      const wSum = weights.reduce((a, b) => a + b, 0);
      weights = weights.map(w => w / wSum);

      let y = topM;
      for (let i = 0; i < nBands; i++) {
        const bh = avail * weights[i];
        paintBand(sideM, y, W - sideM * 2, bh, hexToRgb(bands[i][1]));
        y += bh + gap;
      }

      grain(W, H);

      // vignette + raking gallery light
      let g = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.35, W / 2, H / 2, Math.max(W, H) * 0.75);
      g.addColorStop(0, 'rgba(0,0,0,0)');
      g.addColorStop(1, 'rgba(0,0,0,0.18)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, 'rgba(255,244,220,0.06)');
      g.addColorStop(0.5, 'rgba(255,244,220,0)');
      g.addColorStop(1, 'rgba(0,0,0,0.10)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      fitCanvas(ratio);
      writePlaque(bands, ratio);
    }

    function fitCanvas(ratio) {
      const maxW = window.innerWidth * 0.82;
      const maxH = window.innerHeight * 0.68;
      let w = maxW, h = w * ratio;
      if (h > maxH) { h = maxH; w = h / ratio; }
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
    }

    function writePlaque(bands, ratio) {
      const names = bands.map(b => b[0]);
      let composition;
      if (names.length === 2) {
        composition = `${names[0]} over ${names[1]}`;
      } else if (names.length === 3) {
        composition = `${names[0]}, ${names[1]} over ${names[2]}`;
      } else {
        composition = `${names[0]}, ${names[1]}, ${names[2]} over ${names[3]}`;
      }

      let title;
      const r = Math.random();
      if (r < 0.5) {
        title = `Untitled (${composition})`;
      } else if (r < 0.8) {
        title = `No. ${randInt(1, 68)} (${composition})`;
      } else {
        title = `No. ${randInt(1, 68)}`;
      }

      // years cluster in the mid-50s
      const year = Math.round(1949 + Math.min(20, Math.abs(rand(-4, 24) * 0.9 + rand(0, 4))));
      const wIn = randInt(54, 78);
      const hIn = Math.round(wIn * ratio);

      titleEl.textContent = title;
      detailsEl.textContent = `${year} · oil on canvas · ${hIn} × ${wIn} in`;
      currentRatio = ratio;
    }

    let currentRatio = 1.3;
    let transitioning = false;

    function next() {
      if (transitioning) return;
      transitioning = true;
      hint.classList.add('hidden');
      frame.classList.add('fading');
      plaque.classList.add('fading');
      setTimeout(() => {
        generate();
        frame.classList.remove('fading');
        plaque.classList.remove('fading');
        setTimeout(() => { transitioning = false; }, 450);
      }, 460);
    }

    document.addEventListener('click', next);
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.key === 'ArrowRight' || e.key === 'Enter') {
        e.preventDefault();
        next();
      }
    });

    window.addEventListener('resize', () => fitCanvas(currentRatio));

    generate();
    setTimeout(() => hint.classList.add('hidden'), 9000);
  </script>
</body>
</html>
