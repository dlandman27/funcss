<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noise Machine</title>
    <meta name="description" content="White, pink, brown, rain, thunder, fan — an ambient mixing desk, generated live in your browser.">
    <style>
        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --coral: #f0563e;
            --sky: #5aa0db;
            --lime: #b7ce3c;
            --purple: #a98fd0;
            --orange: #f47b28;
            --pink: #ff7fa5;
            --teal: #2fb0a3;
            --gold: #f7c948;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            background: var(--paper);
            color: var(--ink);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 1.6rem 1rem 3rem;
            font-family: Georgia, 'Times New Roman', serif;
        }

        header {
            text-align: center;
            margin-bottom: 1.3rem;
        }

        header .dept {
            font-style: italic;
            font-size: 0.78rem;
            letter-spacing: 0.18em;
            opacity: 0.45;
        }

        header h1 {
            font-weight: normal;
            font-variant: small-caps;
            letter-spacing: 0.12em;
            font-size: clamp(1.5rem, 5vw, 2.1rem);
            margin: 0.4rem 0 0;
            opacity: 0.9;
        }

        /* ---------- console top row ---------- */
        .console {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.3rem;
            width: min(94vw, 640px);
        }

        #power {
            font-family: Georgia, 'Times New Roman', serif;
            font-style: italic;
            font-size: 1rem;
            letter-spacing: 0.08em;
            padding: 0.7rem 2rem;
            background: var(--cream);
            color: var(--ink);
            border: 1px solid rgba(32, 26, 23, 0.4);
            border-radius: 3px;
            box-shadow: 0 1px 0 rgba(32, 26, 23, 0.15);
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
        }

        #power.on {
            background: #eaf4ee;
            border-color: rgba(32, 26, 23, 0.6);
        }

        #power:hover { background: #fff; border-color: rgba(32, 26, 23, 0.65); }
        #power:active { transform: translateY(1px); }

        .scope-frame {
            background: var(--cream);
            border: 1px solid rgba(32, 26, 23, 0.3);
            border-radius: 3px;
            padding: 6px 8px 2px;
            flex: 1;
            min-width: 180px;
            max-width: 320px;
        }

        #scope {
            width: 100%;
            height: 44px;
            display: block;
        }

        .scope-label {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 0.58rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.5;
            text-align: center;
            padding-bottom: 3px;
        }

        .master-wrap {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            min-width: 130px;
        }

        .master-wrap label {
            font-style: italic;
            font-size: 0.75rem;
            letter-spacing: 0.14em;
            text-align: center;
            opacity: 0.55;
        }

        input[type="range"] {
            accent-color: var(--ink);
            height: 6px;
            width: 100%;
        }

        /* ---------- source cards ---------- */
        .desk {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 0.9rem;
            width: min(94vw, 640px);
        }

        .card {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            background: var(--cream);
            border: 1px solid rgba(32, 26, 23, 0.3);
            border-radius: 3px;
            box-shadow: 0 1px 2px rgba(32, 26, 23, 0.06);
            padding: 0.7rem 0.9rem;
            transition: background 0.4s, border-color 0.4s;
        }

        .card.live {
            background: color-mix(in srgb, var(--live-color, var(--gold)) 14%, var(--cream));
            border-color: rgba(32, 26, 23, 0.5);
        }

        .card canvas {
            width: 46px;
            height: 46px;
            flex-shrink: 0;
        }

        .card .col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .card .name {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-variant: small-caps;
            letter-spacing: 0.1em;
            font-size: 0.95rem;
            opacity: 0.85;
        }

        .card .pct {
            font-size: 0.72rem;
            font-style: italic;
            opacity: 0.45;
            font-variant-numeric: tabular-nums;
        }

        #plaque {
            font-style: italic;
            font-size: clamp(0.78rem, 2.6vw, 0.92rem);
            text-align: center;
            line-height: 1.6;
            max-width: min(94vw, 440px);
            margin-top: 1.6rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <header>
        <div class="dept">bureau of ambient conditions · certified quiet</div>
        <h1>Noise Machine</h1>
    </header>

    <div class="console">
        <button id="power">Power</button>
        <div class="scope-frame">
            <canvas id="scope"></canvas>
            <div class="scope-label">output monitor</div>
        </div>
        <div class="master-wrap">
            <label for="master">master</label>
            <input type="range" id="master" min="0" max="100" value="70">
        </div>
    </div>

    <div class="desk" id="desk"></div>

    <div id="plaque">the machine is off. flip the switch — every sound is synthesized on the spot, nothing is a recording.</div>

    <script>
        (() => {
            const INK = '#201a17';
            const SOURCES = [
                { id: 'white',   name: 'White',   color: '#fff8ef', icon: 'static' },
                { id: 'pink',    name: 'Pink',    color: '#ff7fa5', icon: 'wave' },
                { id: 'brown',   name: 'Brown',   color: '#f47b28', icon: 'lowwave' },
                { id: 'rain',    name: 'Rain',    color: '#5aa0db', icon: 'rain' },
                { id: 'thunder', name: 'Thunder', color: '#f7c948', icon: 'bolt' },
                { id: 'fan',     name: 'Fan',     color: '#2fb0a3', icon: 'fan' }
            ];

            const desk = document.getElementById('desk');
            const powerBtn = document.getElementById('power');
            const masterSlider = document.getElementById('master');
            const plaque = document.getElementById('plaque');
            const scope = document.getElementById('scope');
            const scopeCtx = scope.getContext('2d');

            let ctx = null;
            let masterGain = null;
            let analyser = null;
            let powered = false;
            let scopeRaf = null;
            let dropletTimer = null;
            let thunderTimer = null;
            const chans = {};       // id -> { gain, slider, card, pctEl }

            const curve = v => Math.pow(v / 100, 2);

            // ---------- saved mix ----------
            let saved = {};
            try { saved = JSON.parse(localStorage.getItem('noise-mix')) || {}; } catch (e) {}

            function saveMix() {
                const mix = { master: masterSlider.value };
                for (const id in chans) mix[id] = chans[id].slider.value;
                try { localStorage.setItem('noise-mix', JSON.stringify(mix)); } catch (e) {}
            }

            // ---------- sticker icons (hand-drawn, no emoji) ----------
            function drawIcon(canvas, kind, color) {
                const dpr = Math.min(devicePixelRatio || 1, 2);
                const S = 46;
                canvas.width = S * dpr; canvas.height = S * dpr;
                const c = canvas.getContext('2d');
                c.setTransform(dpr, 0, 0, dpr, 0, 0);
                c.lineJoin = 'round';
                c.lineCap = 'round';

                // quiet register: hairline ring, soft tint, no hard shadow
                c.beginPath(); c.arc(22, 22, 18, 0, Math.PI * 2);
                c.globalAlpha = 0.22;
                c.fillStyle = color; c.fill();
                c.globalAlpha = 1;
                c.lineWidth = 1;
                c.strokeStyle = 'rgba(32,26,23,0.4)'; c.stroke();

                c.strokeStyle = 'rgba(32,26,23,0.75)';
                c.fillStyle = 'rgba(32,26,23,0.75)';
                c.lineWidth = 1.5;

                if (kind === 'static') {
                    for (let i = 0; i < 14; i++) {
                        const a = (i * 137.5) * Math.PI / 180;
                        const r = 3 + (i * 7919 % 11);
                        c.fillRect(22 + Math.cos(a) * r - 1.2, 22 + Math.sin(a) * r - 1.2, 2.4, 2.4);
                    }
                } else if (kind === 'wave') {
                    c.beginPath();
                    for (let x = 0; x <= 24; x++) {
                        const y = 22 - Math.sin(x / 24 * Math.PI * 2) * 6;
                        x === 0 ? c.moveTo(10 + x, y) : c.lineTo(10 + x, y);
                    }
                    c.stroke();
                } else if (kind === 'lowwave') {
                    c.lineWidth = 3.5;
                    c.beginPath();
                    for (let x = 0; x <= 24; x++) {
                        const y = 22 - Math.sin(x / 24 * Math.PI) * 8;
                        x === 0 ? c.moveTo(10 + x, y) : c.lineTo(10 + x, y);
                    }
                    c.stroke();
                } else if (kind === 'rain') {
                    for (let i = 0; i < 4; i++) {
                        c.beginPath();
                        c.moveTo(14 + i * 6, 13 + (i % 2) * 3);
                        c.lineTo(11 + i * 6, 22 + (i % 2) * 3);
                        c.stroke();
                        c.beginPath();
                        c.moveTo(12 + i * 6, 26 + (i % 2) * 3);
                        c.lineTo(10 + i * 6, 32 + (i % 2) * 3);
                        c.stroke();
                    }
                } else if (kind === 'bolt') {
                    c.beginPath();
                    c.moveTo(25, 9); c.lineTo(16, 24); c.lineTo(21, 24);
                    c.lineTo(18, 36); c.lineTo(29, 20); c.lineTo(23, 20);
                    c.closePath();
                    c.stroke();
                } else if (kind === 'fan') {
                    for (let i = 0; i < 3; i++) {
                        c.save();
                        c.translate(22, 22);
                        c.rotate(i * Math.PI * 2 / 3);
                        c.beginPath();
                        c.ellipse(0, -9, 4.5, 8, 0, 0, Math.PI * 2);
                        c.fillStyle = INK;
                        c.fill();
                        c.restore();
                    }
                    c.beginPath(); c.arc(22, 22, 3, 0, Math.PI * 2); c.fill();
                }
            }

            // ---------- build cards ----------
            SOURCES.forEach((src, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.setProperty('--live-color', src.color);

                const icon = document.createElement('canvas');
                drawIcon(icon, src.icon, src.color);

                const col = document.createElement('div');
                col.className = 'col';
                col.innerHTML = '<div class="name"><span>' + src.name + '</span><span class="pct">0%</span></div>';

                const slider = document.createElement('input');
                slider.type = 'range';
                slider.min = 0; slider.max = 100;
                slider.value = saved[src.id] != null ? saved[src.id] : 0;
                slider.setAttribute('aria-label', src.name + ' volume');
                col.appendChild(slider);

                card.appendChild(icon);
                card.appendChild(col);
                desk.appendChild(card);

                chans[src.id] = { slider, card, pctEl: col.querySelector('.pct'), gain: null };

                slider.addEventListener('input', () => {
                    if (chans[src.id].gain) {
                        chans[src.id].gain.gain.setTargetAtTime(curve(+slider.value), ctx.currentTime, 0.06);
                    }
                    refreshCard(src.id);
                    saveMix();
                });
                refreshCard(src.id);
            });

            if (saved.master != null) masterSlider.value = saved.master;

            function refreshCard(id) {
                const ch = chans[id];
                ch.pctEl.textContent = ch.slider.value + '%';
                ch.card.classList.toggle('live', powered && +ch.slider.value > 0);
            }

            function refreshAllCards() {
                for (const id in chans) refreshCard(id);
            }

            // ---------- audio ----------
            function noiseBuffer(kind) {
                const len = ctx.sampleRate * 4;
                const buf = ctx.createBuffer(1, len, ctx.sampleRate);
                const d = buf.getChannelData(0);
                if (kind === 'white') {
                    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
                } else if (kind === 'pink') {
                    // Paul Kellet's economy pink filter
                    let b0 = 0, b1 = 0, b2 = 0;
                    for (let i = 0; i < len; i++) {
                        const w = Math.random() * 2 - 1;
                        b0 = 0.99765 * b0 + w * 0.0990460;
                        b1 = 0.96300 * b1 + w * 0.2965164;
                        b2 = 0.57000 * b2 + w * 1.0526913;
                        d[i] = (b0 + b1 + b2 + w * 0.1848) * 0.22;
                    }
                } else { // brown
                    let last = 0;
                    for (let i = 0; i < len; i++) {
                        const w = Math.random() * 2 - 1;
                        last = (last + 0.02 * w) / 1.02;
                        d[i] = last * 3.5;
                    }
                }
                return buf;
            }

            function looper(buffer) {
                const s = ctx.createBufferSource();
                s.buffer = buffer;
                s.loop = true;
                s.start();
                return s;
            }

            function buildGraph() {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = ctx.createGain();
                masterGain.gain.value = curve(+masterSlider.value);
                analyser = ctx.createAnalyser();
                analyser.fftSize = 512;
                masterGain.connect(analyser);
                analyser.connect(ctx.destination);

                const white = noiseBuffer('white');
                const pink = noiseBuffer('pink');
                const brown = noiseBuffer('brown');

                function chan(id, wire) {
                    const g = ctx.createGain();
                    g.gain.value = curve(+chans[id].slider.value);
                    wire(g);
                    g.connect(masterGain);
                    chans[id].gain = g;
                }

                chan('white', g => looper(white).connect(g));
                chan('pink', g => looper(pink).connect(g));
                chan('brown', g => looper(brown).connect(g));

                // rain: pink noise rounded off with a lowpass, plus scattered droplets
                chan('rain', g => {
                    const lp = ctx.createBiquadFilter();
                    lp.type = 'lowpass';
                    lp.frequency.value = 2200;
                    looper(pink).connect(lp);
                    lp.connect(g);

                    function droplet() {
                        if (powered && +chans.rain.slider.value > 0) {
                            const s = ctx.createBufferSource();
                            s.buffer = white;
                            s.loop = false;
                            const dg = ctx.createGain();
                            const hp = ctx.createBiquadFilter();
                            hp.type = 'highpass';
                            hp.frequency.value = 3500 + Math.random() * 3000;
                            const t = ctx.currentTime;
                            dg.gain.setValueAtTime(0.12 + Math.random() * 0.1, t);
                            dg.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
                            s.connect(hp); hp.connect(dg); dg.connect(g);
                            s.start(t, Math.random() * 3, 0.06);
                        }
                        dropletTimer = setTimeout(droplet, 60 + Math.random() * 240);
                    }
                    droplet();
                });

                // thunder: deep-filtered brown that swells at random intervals
                chan('thunder', g => {
                    const lp = ctx.createBiquadFilter();
                    lp.type = 'lowpass';
                    lp.frequency.value = 110;
                    const env = ctx.createGain();
                    env.gain.value = 0.08;       // distant baseline rumble
                    looper(brown).connect(lp);
                    lp.connect(env);
                    env.connect(g);

                    function rumble() {
                        if (powered) {
                            const t = ctx.currentTime;
                            const peak = 1.2 + Math.random() * 1.4;
                            env.gain.setTargetAtTime(peak, t, 0.35 + Math.random() * 0.4);
                            env.gain.setTargetAtTime(0.08, t + 1.6 + Math.random() * 1.6, 1.4);
                        }
                        thunderTimer = setTimeout(rumble, 7000 + Math.random() * 16000);
                    }
                    thunderTimer = setTimeout(rumble, 2500 + Math.random() * 5000);
                });

                // fan: resonant low band with a slow wobble
                chan('fan', g => {
                    const bp = ctx.createBiquadFilter();
                    bp.type = 'bandpass';
                    bp.frequency.value = 190;
                    bp.Q.value = 0.7;
                    const wob = ctx.createGain();
                    wob.gain.value = 1;
                    const lfo = ctx.createOscillator();
                    lfo.frequency.value = 0.4;
                    const depth = ctx.createGain();
                    depth.gain.value = 0.12;
                    lfo.connect(depth);
                    depth.connect(wob.gain);
                    lfo.start();
                    looper(brown).connect(bp);
                    bp.connect(wob);
                    wob.connect(g);
                });
            }

            // ---------- scope ----------
            function drawScope() {
                if (!powered) return;
                const dpr = Math.min(devicePixelRatio || 1, 2);
                const w = scope.clientWidth, h = scope.clientHeight;
                if (scope.width !== w * dpr) { scope.width = w * dpr; scope.height = h * dpr; }
                scopeCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
                scopeCtx.clearRect(0, 0, w, h);

                const data = new Uint8Array(analyser.fftSize);
                analyser.getByteTimeDomainData(data);
                scopeCtx.beginPath();
                for (let i = 0; i < data.length; i++) {
                    const x = i / data.length * w;
                    const y = (data[i] / 255) * h;
                    i === 0 ? scopeCtx.moveTo(x, y) : scopeCtx.lineTo(x, y);
                }
                scopeCtx.lineWidth = 2;
                scopeCtx.strokeStyle = INK;
                scopeCtx.stroke();
                scopeRaf = requestAnimationFrame(drawScope);
            }

            function flatline() {
                const dpr = Math.min(devicePixelRatio || 1, 2);
                const w = scope.clientWidth, h = scope.clientHeight;
                scope.width = w * dpr; scope.height = h * dpr;
                scopeCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
                scopeCtx.beginPath();
                scopeCtx.moveTo(0, h / 2);
                scopeCtx.lineTo(w, h / 2);
                scopeCtx.lineWidth = 2;
                scopeCtx.strokeStyle = 'rgba(32,26,23,0.3)';
                scopeCtx.stroke();
            }

            // ---------- power ----------
            function powerOn() {
                if (!ctx) buildGraph();
                ctx.resume();
                powered = true;
                powerBtn.classList.add('on');
                powerBtn.textContent = 'On';
                plaque.textContent = 'running. mix to taste — the sliders remember where you left them.';
                refreshAllCards();
                drawScope();
            }

            function powerOff() {
                powered = false;
                if (ctx) ctx.suspend();
                powerBtn.classList.remove('on');
                powerBtn.textContent = 'Power';
                plaque.textContent = 'the machine is off. your mix is held in escrow.';
                cancelAnimationFrame(scopeRaf);
                refreshAllCards();
                flatline();
            }

            powerBtn.addEventListener('click', () => powered ? powerOff() : powerOn());

            masterSlider.addEventListener('input', () => {
                if (masterGain) masterGain.gain.setTargetAtTime(curve(+masterSlider.value), ctx.currentTime, 0.06);
                saveMix();
            });

            flatline();
        })();
    </script>
</body>
</html>
