                0 0 20px rgba(0, 255, 255, 0.4);
        }

        /* Custom scrollbar for the contestants grid */
        .contestants-grid::-webkit-scrollbar {
            width: 12px;
        }

        .contestants-grid::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);

        }

        .contestants-grid::-webkit-scrollbar-thumb {
            background: #00ffff;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .contestants-grid::-webkit-scrollbar-thumb:hover {
            background: #ff00ff;
        }

        .test-controls {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 1002;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border: 3px solid #00ffff;
            transform-style: preserve-3d;
            transform: translateZ(10px) rotateX(5deg);
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.3),
                inset 0 0 10px rgba(0, 255, 255, 0.2),
                0 5px 0 #00ffff;
            animation: floatUI 3s ease-in-out infinite;
        }

        .test-controls::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border: 3px solid #ff00ff;
            transform: translateZ(-5px);
            filter: blur(2px);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }

        .test-button {
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            border: 2px solid #00ffff;
            padding: 10px 15px;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            transition: all 0.2s ease;
            transform-style: preserve-3d;
            transform: translateZ(5px);
            box-shadow: 
                0 2px 0 #0088ff,
                0 0 10px rgba(0, 255, 255, 0.3);
        }

        .test-button:hover {
            background: rgba(0, 255, 255, 0.1);
            transform: translateZ(8px);
        }

        .test-button.active {
            background: rgba(0, 255, 255, 0.2);
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 0 15px rgba(0, 255, 255, 0.4),
                inset 0 0 5px rgba(0, 255, 255, 0.3);
        }

        @keyframes floatUI {
            0%, 100% { transform: translateZ(10px) rotateX(5deg); }
            50% { transform: translateZ(15px) rotateX(5deg); }
        }

        @keyframes buttonShine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        /* Add pulsing effect for active speed */
        .speed-button.active::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 2px solid #00ffff;
            animation: pulseBorder 2s infinite;
        }

        @keyframes pulseBorder {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="game-info" id="gameInfo">
        <p>Countries Remaining: <span id="remainingCountries"></span></p>
        <p style="margin-top:14px;font-size:10px;color:#00ffff">MAP: <span id="mapName" style="display:inline;font-size:10px;color:#ff00ff">—</span></p>
    </div>

    <div class="speed-controls">
        <button class="speed-button active" data-speed="1">x1</button>
        <button class="speed-button" data-speed="2">x2</button>
        <button class="speed-button" data-speed="4">x4</button>
    </div>

    <div class="test-controls">
        <button class="test-button" id="toggleButton" onclick="toggleEngine()">STOP</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="winner-screen" id="winnerScreen">
        <div class="winner-content">
            <h1 class="winner-title">WINNER!</h1>
            <div id="winnerDisplay"></div>
            <div class="rankings" id="rankings"></div>
            <button class="play-again-button" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <div class="start-screen" id="startScreen">
        <div class="start-content">
            <h2>COUNTRIES</h2>
            <h1>MARBLE BATTLE</h1>
            <div class="count-selector">
                <button onclick="adjustCount(-1)">-</button>
                <span id="countDisplay">16</span>
                <button onclick="adjustCount(1)">+</button>
            </div>
            <button id="startButton" class="start-button" onclick="startGame()">VIEW CONTESTANTS</button>
        </div>
    </div>

    <div class="contestants-screen" id="contestantsScreen">
        <div class="contestants-content">
            <h2 class="contestants-title">Contestants</h2>
            <div class="contestants-grid" id="contestantsGrid"></div>
            <button class="ready-button" onclick="startFirstRound()">START THE RACE!</button>
        </div>
    </div>

    <script src="matter.min.js"></script>
    <script>
        // Fixed game dimensions
        const GAME_WIDTH = 1024;
        const GAME_HEIGHT = 768;

        const { Engine, Render, Runner, World, Bodies, Body, Events } = Matter;

        // Self-contained roster — no API. Flags come from flagcdn with a drawn
        // fallback disc, so a network failure can never break the race.
        const COUNTRIES = [
            ['United States','us'],['Canada','ca'],['Mexico','mx'],['Brazil','br'],['Argentina','ar'],
            ['Chile','cl'],['Colombia','co'],['Peru','pe'],['Uruguay','uy'],['Ecuador','ec'],
            ['Bolivia','bo'],['Paraguay','py'],['Venezuela','ve'],['Cuba','cu'],['Jamaica','jm'],
            ['Panama','pa'],['Costa Rica','cr'],['Guatemala','gt'],['Dominican Republic','do'],
            ['United Kingdom','gb'],['Ireland','ie'],['France','fr'],['Germany','de'],['Italy','it'],
            ['Spain','es'],['Portugal','pt'],['Netherlands','nl'],['Belgium','be'],['Switzerland','ch'],
            ['Austria','at'],['Sweden','se'],['Norway','no'],['Denmark','dk'],['Finland','fi'],
            ['Iceland','is'],['Poland','pl'],['Czechia','cz'],['Slovakia','sk'],['Hungary','hu'],
            ['Romania','ro'],['Bulgaria','bg'],['Greece','gr'],['Croatia','hr'],['Serbia','rs'],
            ['Slovenia','si'],['Ukraine','ua'],['Estonia','ee'],['Latvia','lv'],['Lithuania','lt'],
            ['Malta','mt'],['Cyprus','cy'],['Luxembourg','lu'],['Russia','ru'],['Turkey','tr'],
            ['Georgia','ge'],['Armenia','am'],['Azerbaijan','az'],['Kazakhstan','kz'],['Mongolia','mn'],
            ['Japan','jp'],['China','cn'],['South Korea','kr'],['India','in'],['Pakistan','pk'],
            ['Bangladesh','bd'],['Sri Lanka','lk'],['Nepal','np'],['Thailand','th'],['Vietnam','vn'],
            ['Philippines','ph'],['Malaysia','my'],['Singapore','sg'],['Indonesia','id'],['Myanmar','mm'],
            ['Cambodia','kh'],['Laos','la'],['Australia','au'],['New Zealand','nz'],['Fiji','fj'],
            ['Papua New Guinea','pg'],['South Africa','za'],['Nigeria','ng'],['Egypt','eg'],['Morocco','ma'],
            ['Algeria','dz'],['Tunisia','tn'],['Kenya','ke'],['Ethiopia','et'],['Ghana','gh'],
            ['Senegal','sn'],['Cameroon','cm'],['Ivory Coast','ci'],['Tanzania','tz'],['Uganda','ug'],
            ['Zambia','zm'],['Zimbabwe','zw'],['Mozambique','mz'],['Angola','ao'],['Saudi Arabia','sa'],
            ['United Arab Emirates','ae'],['Qatar','qa'],['Kuwait','kw'],['Oman','om'],['Jordan','jo'],
            ['Lebanon','lb'],['Israel','il'],['Iraq','iq'],['Iran','ir'],['Afghanistan','af'],
            ['Haiti','ht'],['Honduras','hn'],['El Salvador','sv'],['Nicaragua','ni'],
            ['Trinidad and Tobago','tt'],['Bahamas','bs'],['Barbados','bb']
        ].map(([name, code]) => ({ name, code }));

        const canvas = document.getElementById('gameCanvas');

        // ---- engine / renderer (one runner, no debug overlays) ----
        const engine = Engine.create();
        engine.positionIterations = 8;
        engine.velocityIterations = 6;
        engine.timing.timeScale = 1;

        const render = Render.create({
            canvas: canvas,
            engine: engine,
            options: {
                width: GAME_WIDTH,
                height: GAME_HEIGHT,
                wireframes: false,
                background: 'transparent',
                pixelRatio: 1
            }
        });

        const runner = Runner.create();
        Runner.run(runner, engine);
        Render.run(render);
        Render.lookAt(render, { min: { x: 0, y: 0 }, max: { x: GAME_WIDTH, y: GAME_HEIGHT } });

        function handleResize() {
            const scale = Math.min(window.innerWidth / GAME_WIDTH, window.innerHeight / GAME_HEIGHT);
            canvas.style.transform = `scale(${scale})`;
            canvas.style.transformOrigin = 'center center';
        }
        window.addEventListener('resize', handleResize);
        handleResize();

        // ---- flag marbles ----
        function fallbackMarble(country, idx) {
            const size = 64;
            const c = document.createElement('canvas');
            c.width = size; c.height = size;
            const x = c.getContext('2d');
            x.beginPath(); x.arc(size/2, size/2, size/2 - 2, 0, Math.PI * 2);
            x.fillStyle = `hsl(${(idx * 47) % 360}, 80%, 45%)`;
            x.fill();
            x.lineWidth = 3; x.strokeStyle = '#fff'; x.stroke();
            x.fillStyle = '#fff';
            x.font = 'bold 22px monospace';
            x.textAlign = 'center'; x.textBaseline = 'middle';
            x.fillText(country.code.toUpperCase(), size/2, size/2 + 1);
            return c.toDataURL();
        }

        function marbleSprite(country, idx) {
            return new Promise(resolve => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                const bail = setTimeout(() => resolve(fallbackMarble(country, idx)), 6000);
                img.onload = () => {
                    clearTimeout(bail);
                    try {
                        const size = 64;
                        const c = document.createElement('canvas');
                        c.width = size; c.height = size;
                        const x = c.getContext('2d');
                        x.save();
                        x.beginPath(); x.arc(size/2, size/2, size/2 - 2, 0, Math.PI * 2); x.clip();
                        const s = Math.max(size / img.width, size / img.height);
                        x.drawImage(img, (size - img.width * s) / 2, (size - img.height * s) / 2,
                                    img.width * s, img.height * s);
                        x.restore();
                        x.beginPath(); x.arc(size/2, size/2, size/2 - 2, 0, Math.PI * 2);
                        x.lineWidth = 3; x.strokeStyle = '#fff'; x.stroke();
                        resolve(c.toDataURL());
                    } catch (e) {
                        resolve(fallbackMarble(country, idx));
                    }
                };
                img.onerror = () => { clearTimeout(bail); resolve(fallbackMarble(country, idx)); };
                img.src = 'https://flagcdn.com/w80/' + country.code + '.png';
            });
        }

        function flagImg(country, px) {
            return '<img src="https://flagcdn.com/w' + px + '/' + country.code + '.png" alt="' +
                   country.name + ' flag" onerror="this.style.visibility=\'hidden\'">';
        }

        // ---- map builder ----
        const NEON = { cyan: '#00ffff', magenta: '#ff00ff', yellow: '#ffee00' };

        function neonRender(color) {
            return {
                fillStyle: '#000000',
                strokeStyle: color || NEON.cyan,
                lineWidth: 2,
                shadowColor: color || NEON.cyan,
                shadowBlur: 10
            };
        }

        class MapBuilder {
            constructor() {
                this.bodies = [];
                this.movers = [];
            }
            addWall(x, y, w, h, opts = {}) {
                this.bodies.push(Bodies.rectangle(x, y, w, h, {
                    isStatic: true,
                    angle: opts.angle || 0,
                    label: opts.label || 'wall',
                    friction: opts.friction !== undefined ? opts.friction : 0.1,
                    frictionStatic: opts.frictionStatic !== undefined ? opts.frictionStatic : 0.5,
                    render: neonRender(opts.color)
                }));
                return this;
            }
            addRamp(x, y, w, angle, color) {
                // frictionless so marbles always keep rolling — no mid-ramp stalls
                return this.addWall(x, y, w, 14, { angle, color, friction: 0, frictionStatic: 0 });
            }
            addPeg(x, y, r = 9, color) {
                this.bodies.push(Bodies.circle(x, y, r, {
                    isStatic: true,
                    label: 'peg',
                    render: neonRender(color)
                }));
                return this;
            }
            addSpinner(x, y, w, speed, color) {
                const bar = Bodies.rectangle(x, y, w, 14, {
                    isStatic: true,
                    label: 'spinner',
                    render: neonRender(color || NEON.magenta)
                });
                this.bodies.push(bar);
                this.movers.push(ts => Body.setAngle(bar, ts * speed));
                this.addPeg(x, y, 6, color || NEON.magenta);
                return this;
            }
            addSweeper(x, y, w, range, hz, phase = 0, color) {
                const bar = Bodies.rectangle(x, y, w, 14, {
                    isStatic: true,
                    label: 'sweeper',
                    render: neonRender(color || NEON.yellow)
                });
                this.bodies.push(bar);
                this.movers.push(ts =>
                    Body.setPosition(bar, { x: x + Math.sin(ts * hz + phase) * range, y }));
                return this;
            }
            addBoundaries() {
                this.addWall(4, GAME_HEIGHT / 2, 8, GAME_HEIGHT * 2);
                this.addWall(GAME_WIDTH - 4, GAME_HEIGHT / 2, 8, GAME_HEIGHT * 2);
                return this;
            }
            addFinishLine() {
                // sensor: marbles fall through and off-screen — nothing can rest on it
                this.bodies.push(Bodies.rectangle(GAME_WIDTH / 2, GAME_HEIGHT - 8, GAME_WIDTH, 16, {
                    isStatic: true,
                    isSensor: true,
                    label: 'finish',
                    render: neonRender(NEON.magenta)
                }));
                return this;
            }
            build(name) {
                const movers = this.movers;
                return { name, bodies: this.bodies, update: ts => movers.forEach(m => m(ts)) };
            }
        }

        // ---- the maps ----
        // Everything starts below y=310 — the mixing drum owns the top of the course.
        const MAPS = [
            function plinko() {
                const b = new MapBuilder().addBoundaries().addFinishLine();
                const cols = 13, rows = 7, margin = 62, top = 330, bottom = 90;
                const hs = (GAME_WIDTH - margin * 2) / (cols - 1);
                const vs = (GAME_HEIGHT - top - bottom) / (rows - 1);
                for (let r = 0; r < rows; r++) {
                    const off = r % 2 ? hs / 2 : 0;
                    for (let c = 0; c < cols; c++) {
                        const x = margin + c * hs + off;
                        if (x > GAME_WIDTH - 20) continue;
                        b.addPeg(x + (Math.random() - 0.5) * 4, top + r * vs + (Math.random() - 0.5) * 4);
                    }
                }
                return b.build('PLINKO PARADISE');
            },
            function zigzag() {
                const b = new MapBuilder().addBoundaries().addFinishLine();
                b.addRamp(300, 350, 580, 0.15)
                 .addRamp(GAME_WIDTH - 300, 490, 580, -0.15)
                 .addRamp(300, 630, 580, 0.15);
                b.addPeg(GAME_WIDTH - 120, 420, 10, NEON.magenta)
                 .addPeg(120, 560, 10, NEON.magenta)
                 .addPeg(GAME_WIDTH - 120, 700, 10, NEON.magenta);
                return b.build('ZIGZAG DESCENT');
            },
            function spinners() {
                const b = new MapBuilder().addBoundaries().addFinishLine();
                b.addSpinner(212, 360, 170, 0.0032)
                 .addSpinner(512, 360, 170, -0.0032)
                 .addSpinner(812, 360, 170, 0.0032)
                 .addSpinner(362, 520, 170, -0.0026)
                 .addSpinner(662, 520, 170, 0.0026)
                 .addSpinner(212, 670, 150, 0.0038)
                 .addSpinner(512, 670, 150, -0.0038)
                 .addSpinner(812, 670, 150, 0.0038);
                return b.build('SPINNER ALLEY');
            },
            function funnels() {
                const b = new MapBuilder().addBoundaries().addFinishLine();
                // tier 1: funnel to a center gap
                b.addRamp(232, 370, 430, 0.28).addRamp(GAME_WIDTH - 232, 370, 430, -0.28);
                // tier 2: a roof splitting to two side gaps
                b.addRamp(GAME_WIDTH / 2 - 185, 530, 350, -0.26)
                 .addRamp(GAME_WIDTH / 2 + 185, 530, 350, 0.26);
                // tier 3: funnel again
                b.addRamp(252, 670, 400, 0.24).addRamp(GAME_WIDTH - 252, 670, 400, -0.24);
                b.addPeg(GAME_WIDTH / 2, 450, 11, NEON.magenta)
                 .addPeg(120, 610, 10).addPeg(GAME_WIDTH - 120, 610, 10);
                return b.build('FUNNEL FACTORY');
            },
            function pistons() {
                const b = new MapBuilder().addBoundaries().addFinishLine();
                b.addSweeper(350, 360, 190, 220, 0.0011, 0)
                 .addSweeper(680, 500, 190, 220, 0.0013, 2.1)
                 .addSweeper(400, 640, 190, 240, 0.0009, 4.2);
                for (let i = 0; i < 5; i++) {
                    b.addPeg(90 + i * 12, 380 + i * 62, 8)
                     .addPeg(GAME_WIDTH - 90 - i * 12, 380 + i * 62, 8);
                }
                b.addPeg(512, 720, 10, NEON.magenta);
                return b.build('PISTON PLAZA');
            },
            function gauntlet() {
                const b = new MapBuilder().addBoundaries().addFinishLine();
                // a forced sequence: funnel -> spinner under the gap -> full-width
                // peg field -> sweeper. nobody skips the gauntlet.
                b.addRamp(217, 360, 420, 0.28).addRamp(GAME_WIDTH - 217, 360, 420, -0.28);
                b.addSpinner(512, 500, 230, 0.0034);
                for (let r = 0; r < 2; r++) {
                    const off = r % 2 ? 47 : 0;
                    for (let x = 110 + off; x <= GAME_WIDTH - 110; x += 94) {
                        b.addPeg(x, 590 + r * 56, 9);
                    }
                }
                b.addSweeper(512, 706, 170, 280, 0.0012, 1, NEON.magenta);
                return b.build('THE GAUNTLET');
            }
        ];

        // ---- the mixing drum: fairness before the drop ----
        const DRUM = { x: GAME_WIDTH / 2, y: 155, r: 125 };
        const MIX_MS = 1900;
        let drumParts = [];
        let mixing = false;
        let mixStart = 0;
        let drumAngle = 0;

        function buildDrum() {
            drumParts = [];
            const segs = 16;
            const segW = (2 * Math.PI * DRUM.r) / segs + 8;
            for (let i = 0; i < segs; i++) {
                const a = (i / segs) * Math.PI * 2;
                const part = Bodies.rectangle(
                    DRUM.x + Math.cos(a) * DRUM.r, DRUM.y + Math.sin(a) * DRUM.r, segW, 12,
                    { isStatic: true, label: 'drum', friction: 0.05, render: neonRender(NEON.cyan) });
                part.plugin = { baseAngle: a, kind: 'seg' };
                drumParts.push(part);
            }
            for (let i = 0; i < 4; i++) {
                const a = (i / 4) * Math.PI * 2 + 0.4;
                const fin = Bodies.rectangle(
                    DRUM.x + Math.cos(a) * DRUM.r * 0.6, DRUM.y + Math.sin(a) * DRUM.r * 0.6,
                    DRUM.r * 0.6, 10,
                    { isStatic: true, label: 'drum', render: neonRender(NEON.magenta) });
                fin.plugin = { baseAngle: a, kind: 'fin' };
                drumParts.push(fin);
            }
            World.add(engine.world, drumParts);
            mixing = true;
            mixStart = engine.timing.timestamp;
            drumAngle = Math.random() * Math.PI * 2;
        }

        function updateDrum() {
            drumAngle += (engine.timing.lastDelta || 16.7) * 0.0035;
            for (const p of drumParts) {
                const a = p.plugin.baseAngle + drumAngle;
                const rad = p.plugin.kind === 'seg' ? DRUM.r : DRUM.r * 0.6;
                Body.setPosition(p, { x: DRUM.x + Math.cos(a) * rad, y: DRUM.y + Math.sin(a) * rad });
                Body.setAngle(p, a + (p.plugin.kind === 'seg' ? Math.PI / 2 : 0));
            }
            if (engine.timing.timestamp - mixStart > MIX_MS) {
                World.remove(engine.world, drumParts);
                drumParts = [];
                mixing = false;
            }
        }

        // ---- game state ----
        let roster = [];            // countries in this game (with sprites)
        let remaining = [];         // still alive
        let eliminatedOrder = [];   // most recent first
        let activeBalls = [];       // Matter bodies in the current round
        let currentMapObj = null;
        let mapQueue = [];
        let roundActive = false;
        let selectedCount = 16;

        function shuffleArray(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function nextMap() {
            if (mapQueue.length === 0) mapQueue = shuffleArray(MAPS.map((_, i) => i));
            return MAPS[mapQueue.pop()]();
        }

        function createCourse() {
            World.clear(engine.world, false);
            activeBalls = [];

            currentMapObj = nextMap();
            World.add(engine.world, currentMapObj.bodies);
            document.getElementById('mapName').textContent = currentMapObj.name;

            // everyone starts locked in the drum — spun hard, then dropped
            const order = shuffleArray([...remaining]);
            const n = order.length;
            const r = n > 40 ? 10 : n > 24 ? 12 : 15;

            order.forEach((country, i) => {
                // golden-angle spiral packs them evenly inside the drum
                const rr = Math.sqrt((i + 0.5) / n) * (DRUM.r - r - 16);
                const a = i * 2.39996;
                const ball = Bodies.circle(
                    DRUM.x + Math.cos(a) * rr,
                    DRUM.y + Math.sin(a) * rr,
                    r,
                    {
                        restitution: 0.7,
                        friction: 0.002,
                        frictionAir: 0.0012,
                        density: 0.002,
                        label: 'marble',
                        render: { sprite: { texture: country.sprite, xScale: r * 2 / 64, yScale: r * 2 / 64 } }
                    }
                );
                ball.plugin = { country, radius: r, still: 0 };
                activeBalls.push(ball);
                World.add(engine.world, ball);
            });
            buildDrum();

            document.getElementById('remainingCountries').textContent = remaining.length;
            roundActive = true;
        }

        // ---- finish detection + anti-stall (position-based: tunnel-proof) ----
        Events.on(engine, 'beforeUpdate', () => {
            if (currentMapObj) currentMapObj.update(engine.timing.timestamp);
            if (mixing) updateDrum();
        });

        // last marble standing: slam the gate shut and end the round early
        function closeGate(trapped) {
            roundActive = false;
            const finish = engine.world.bodies.find(b => b.label === 'finish');
            if (finish) {
                finish.isSensor = false;
                finish.render.strokeStyle = '#ff2244';
                finish.render.shadowColor = '#ff2244';
            }
            setTimeout(() => roundOver(trapped.plugin.country), 1100);
        }

        Events.on(engine, 'afterUpdate', () => {
            if (!roundActive || mixing) return;
            const dt = engine.timing.lastDelta || 16.7;
            for (let i = activeBalls.length - 1; i >= 0; i--) {
                const ball = activeBalls[i];
                // fully below the sensor line = finished
                if (ball.position.y - ball.plugin.radius > GAME_HEIGHT) {
                    activeBalls.splice(i, 1);
                    World.remove(engine.world, ball);
                    if (activeBalls.length === 1) {
                        closeGate(activeBalls[0]);
                        return;
                    }
                    if (activeBalls.length === 0) {
                        roundOver(ball.plugin.country);
                        return;
                    }
                    continue;
                }
                // escaped sideways somehow: teleport back to the top, no ball left behind
                if (ball.position.x < -60 || ball.position.x > GAME_WIDTH + 60) {
                    Body.setPosition(ball, { x: GAME_WIDTH / 2, y: 320 });
                    Body.setVelocity(ball, { x: 0, y: 2 });
                    continue;
                }
                // anti-stall: only a truly parked marble gets a nudge, and a
                // gentle sideways one — no more popping off ramps
                if (ball.speed < 0.25) {
                    ball.plugin.still += dt;
                    if (ball.plugin.still > 3000) {
                        const dir = ball.position.x > GAME_WIDTH / 2 ? -1 : 1;
                        Body.setVelocity(ball, { x: dir * (2.5 + Math.random() * 2), y: -2.5 });
                        ball.plugin.still = 0;
                    }
                } else {
                    ball.plugin.still = 0;
                }
            }
        });

        function roundOver(lastCountry) {
            roundActive = false;
            remaining = remaining.filter(c => c !== lastCountry);
            eliminatedOrder.unshift(lastCountry);

            if (remaining.length <= 1) {
                showWinnerScreen(remaining[0]);
                return;
            }
            const msg = document.createElement('div');
            msg.className = 'elimination-message';
            msg.textContent = lastCountry.name + ' has been eliminated!';
            document.body.appendChild(msg);
            document.getElementById('remainingCountries').textContent = remaining.length;
            setTimeout(() => {
                document.body.removeChild(msg);
                createCourse();
            }, 1600);
        }

        // ---- speed controls ----
        const SPEED_SCALE = { 1: 1, 2: 1.5, 4: 2.1 };
        document.querySelectorAll('.speed-button').forEach(button => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.speed-button').forEach(b => b.classList.remove('active'));
                button.classList.add('active');
                engine.timing.timeScale = SPEED_SCALE[button.dataset.speed] || 1;
            });
        });

        // ---- pause ----
        let isEnginePaused = false;
        window.toggleEngine = function () {
            const button = document.getElementById('toggleButton');
            if (isEnginePaused) {
                Runner.run(runner, engine);
                Render.run(render);
                button.textContent = 'STOP';
                button.classList.remove('active');
            } else {
                Runner.stop(runner);
                Render.stop(render);
                button.textContent = 'START';
                button.classList.add('active');
            }
            isEnginePaused = !isEnginePaused;
        };

        // ---- winner screen ----
        function ordinal(n) {
            const s = ['th', 'st', 'nd', 'rd'], v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        function showWinnerScreen(winner) {
            const winnerScreen = document.getElementById('winnerScreen');
            const winnerDisplay = document.getElementById('winnerDisplay');
            const rankingsDiv = document.getElementById('rankings');
            rankingsDiv.innerHTML = '';
            winnerDisplay.innerHTML =
                '<div class="ranking-item">' +
                '<span class="ranking-position">1st</span>' +
                flagImg(winner, 40) +
                '<span>' + winner.name + '</span></div>';
            eliminatedOrder.forEach((country, i) => {
                rankingsDiv.innerHTML +=
                    '<div class="ranking-item">' +
                    '<span class="ranking-position">' + ordinal(i + 2) + '</span>' +
                    flagImg(country, 40) +
                    '<span>' + country.name + '</span></div>';
            });
            winnerScreen.style.display = 'flex';
        }

        // ---- setup flow ----
        window.adjustCount = function (change) {
            const next = selectedCount + change * 4;
            if (next >= 4 && next <= 64) {
                selectedCount = next;
                document.getElementById('countDisplay').textContent = selectedCount;
            }
        };

        window.startGame = async function () {
            const startButton = document.getElementById('startButton');
            startButton.textContent = 'LOADING...';
            startButton.disabled = true;

            roster = shuffleArray([...COUNTRIES]).slice(0, selectedCount);
            const sprites = await Promise.all(roster.map((c, i) => marbleSprite(c, i)));
            roster.forEach((c, i) => c.sprite = sprites[i]);
            remaining = [...roster];
            eliminatedOrder = [];

            const grid = document.getElementById('contestantsGrid');
            grid.innerHTML = '';
            roster.forEach(country => {
                const div = document.createElement('div');
                div.className = 'contestant-item';
                div.innerHTML = flagImg(country, 40) + '<span>' + country.name + '</span>';
                grid.appendChild(div);
            });

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('contestantsScreen').style.display = 'flex';
            startButton.textContent = 'VIEW CONTESTANTS';
            startButton.disabled = false;
        };

        window.startFirstRound = function () {
            document.getElementById('contestantsScreen').style.display = 'none';
            mapQueue = [];
            createCourse();
        };

        // start-screen tilt flourish (kept from the original)
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('startScreen').style.display = 'flex';
            document.getElementById('countDisplay').textContent = selectedCount;
            const startContent = document.querySelector('.start-content');
            document.addEventListener('mousemove', (e) => {
                if (document.getElementById('startScreen').style.display === 'none') return;
                const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                startContent.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
        });
    </script>
</body>
</html>
