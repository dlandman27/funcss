<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grow Your Garden</title>
  <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      cursor: crosshair;
      user-select: none;
    }

    #garden-canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #instruction {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-style: italic;
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.04em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      pointer-events: none;
      z-index: 10;
    }

    #tooltip {
      position: fixed;
      background: rgba(255,255,255,0.92);
      color: #4a3728;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-family: 'Lora', Georgia, serif;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 20;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      white-space: nowrap;
    }

    #tooltip.visible {
      opacity: 1;
    }

    #clear-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      color: rgba(255,255,255,0.7);
      font-family: 'Lora', Georgia, serif;
      font-size: 12px;
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      z-index: 10;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.03em;
    }
    #clear-btn:hover {
      background: rgba(255,255,255,0.32);
      color: rgba(255,255,255,0.95);
    }

    #full-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.9);
      color: #4a3728;
      font-family: 'Lora', Georgia, serif;
      font-size: 18px;
      padding: 14px 28px;
      border-radius: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #full-msg.show {
      opacity: 1;
    }
  </style>
</head>
<body>

<canvas id="garden-canvas"></canvas>
<div id="instruction">click to plant · come back tomorrow</div>
<div id="tooltip"></div>
<button id="clear-btn">clear garden</button>
<div id="full-msg">your garden is full 🌿</div>

<script>
(() => {
  const STORAGE_KEY = 'growyourgarden_plants';
  const MAX_PLANTS = 20;
  const TYPES = ['flower', 'tree', 'mushroom', 'sunflower'];

  const canvas = document.getElementById('garden-canvas');
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('tooltip');
  const fullMsg = document.getElementById('full-msg');
  const clearBtn = document.getElementById('clear-btn');

  let plants = [];
  let W, H, SOIL_Y, GRASS_Y;
  let hoveredPlant = null;
  let mouseX = 0, mouseY = 0;
  let animFrame;
  let fullMsgTimeout;

  // ---------- Storage ----------
  function loadPlants() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function savePlants() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(plants));
  }

  // ---------- Resize ----------
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    SOIL_Y = H - 120;
    GRASS_Y = H - 140;
  }

  // ---------- Growth ----------
  function getHoursOld(plantedAt) {
    return (Date.now() - plantedAt) / 3600000;
  }

  function getGrowthInfo(hours) {
    // Returns { stage, progress (0-1 within stage), height }
    if (hours < 0.5) {
      return { stage: 'seed', progress: hours / 0.5, height: 4 };
    } else if (hours < 2) {
      const p = (hours - 0.5) / 1.5;
      return { stage: 'sprout', progress: p, height: lerp(6, 16, p) };
    } else if (hours < 8) {
      const p = (hours - 2) / 6;
      return { stage: 'small', progress: p, height: lerp(18, 52, p) };
    } else if (hours < 24) {
      const p = (hours - 8) / 16;
      return { stage: 'medium', progress: p, height: lerp(54, 82, p) };
    } else if (hours < 72) {
      const p = (hours - 24) / 48;
      return { stage: 'full', progress: p, height: lerp(84, 128, p) };
    } else {
      return { stage: 'ancient', progress: 1, height: 128 };
    }
  }

  function lerp(a, b, t) { return a + (b - a) * Math.min(1, Math.max(0, t)); }

  function formatAge(hours) {
    if (hours < 1) {
      const mins = Math.floor(hours * 60);
      return mins <= 1 ? 'just planted' : `${mins} minutes old`;
    } else if (hours < 24) {
      const h = Math.floor(hours);
      return `${h} hour${h !== 1 ? 's' : ''} old`;
    } else {
      const d = Math.floor(hours / 24);
      return `${d} day${d !== 1 ? 's' : ''} old`;
    }
  }

  // ---------- Sky ----------
  function getSkyColors(hour) {
    if (hour >= 5 && hour < 7) {
      // dawn
      const t = (hour - 5) / 2;
      return {
        top: lerpColor('#1a0533', '#f4a460', t),
        bottom: lerpColor('#4a1060', '#ffcba4', t),
        stars: hour < 5.5,
        sun: false,
        dawn: true
      };
    } else if (hour >= 7 && hour < 17) {
      // day
      return { top: '#4a90d9', bottom: '#87ceeb', stars: false, sun: true, dawn: false };
    } else if (hour >= 17 && hour < 19) {
      // dusk
      const t = (hour - 17) / 2;
      return {
        top: lerpColor('#4a90d9', '#1a1040', t),
        bottom: lerpColor('#87ceeb', '#e8703a', t),
        stars: t > 0.5,
        sun: false,
        dawn: false
      };
    } else {
      // night
      return { top: '#0d0d2b', bottom: '#1a1a4a', stars: true, sun: false, dawn: false };
    }
  }

  function lerpColor(c1, c2, t) {
    const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
    const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
    const r = Math.round(lerp(r1,r2,t)).toString(16).padStart(2,'0');
    const g = Math.round(lerp(g1,g2,t)).toString(16).padStart(2,'0');
    const b = Math.round(lerp(b1,b2,t)).toString(16).padStart(2,'0');
    return `#${r}${g}${b}`;
  }

  // Stable star positions (seeded by index)
  const STARS = Array.from({length: 80}, (_, i) => {
    const x = ((i * 1337 + 42) % 997) / 997;
    const y = ((i * 761 + 13) % 883) / 883;
    const r = 0.5 + ((i * 113) % 7) / 7 * 1.2;
    const twinkleOffset = (i * 57) % 100 / 100;
    return { x, y, r, twinkleOffset };
  });

  // ---------- Drawing ----------
  function drawSky(sky) {
    const grad = ctx.createLinearGradient(0, 0, 0, GRASS_Y);
    grad.addColorStop(0, sky.top || sky.bottom);
    grad.addColorStop(1, sky.bottom);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, GRASS_Y + 20);

    if (sky.stars) {
      const now = Date.now() / 1000;
      STARS.forEach(s => {
        if (s.y > 0.85) return; // don't draw stars near soil
        const alpha = 0.4 + 0.6 * Math.abs(Math.sin((now * 0.5 + s.twinkleOffset * Math.PI * 2)));
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * GRASS_Y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,240,${alpha})`;
        ctx.fill();
      });
    }

    if (sky.sun) {
      const hour = new Date().getHours() + new Date().getMinutes() / 60;
      const sunT = (hour - 7) / 10; // 0 at 7am, 1 at 5pm
      const sunX = lerp(W * 0.15, W * 0.85, sunT);
      const sunY = GRASS_Y * (0.15 + 0.2 * Math.sin(sunT * Math.PI));

      // Sun glow
      const glow = ctx.createRadialGradient(sunX, sunY, 10, sunX, sunY, 60);
      glow.addColorStop(0, 'rgba(255,248,180,0.5)');
      glow.addColorStop(1, 'rgba(255,248,180,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, GRASS_Y);

      ctx.beginPath();
      ctx.arc(sunX, sunY, 22, 0, Math.PI * 2);
      ctx.fillStyle = '#fff5a0';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(sunX, sunY, 18, 0, Math.PI * 2);
      ctx.fillStyle = '#ffe44a';
      ctx.fill();
    }

    if (sky.dawn) {
      // horizon glow
      const glow = ctx.createLinearGradient(0, GRASS_Y - 80, 0, GRASS_Y);
      glow.addColorStop(0, 'rgba(255,140,60,0)');
      glow.addColorStop(1, 'rgba(255,140,60,0.25)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, GRASS_Y);
    }
  }

  function drawSoil() {
    // Deep soil
    const deepGrad = ctx.createLinearGradient(0, SOIL_Y, 0, H);
    deepGrad.addColorStop(0, '#3d2410');
    deepGrad.addColorStop(1, '#2a1608');
    ctx.fillStyle = deepGrad;
    ctx.fillRect(0, SOIL_Y, W, H - SOIL_Y);

    // Mid soil band
    const midGrad = ctx.createLinearGradient(0, GRASS_Y + 20, 0, SOIL_Y);
    midGrad.addColorStop(0, '#6b4226');
    midGrad.addColorStop(1, '#4a2c14');
    ctx.fillStyle = midGrad;
    ctx.fillRect(0, GRASS_Y + 20, W, SOIL_Y - GRASS_Y - 20);

    // Topsoil
    ctx.fillStyle = '#7a5230';
    ctx.fillRect(0, GRASS_Y + 10, W, 14);

    // Grass line
    ctx.fillStyle = '#5a8a3c';
    ctx.fillRect(0, GRASS_Y, W, 14);

    // Grass texture — small blades
    ctx.strokeStyle = '#6aaa46';
    ctx.lineWidth = 1.5;
    for (let gx = 4; gx < W; gx += 7 + (gx % 5)) {
      const bladeH = 4 + (gx % 6);
      ctx.beginPath();
      ctx.moveTo(gx, GRASS_Y + 2);
      ctx.quadraticCurveTo(gx + 2, GRASS_Y - bladeH, gx + 1, GRASS_Y - bladeH - 2);
      ctx.stroke();
    }
  }

  // ---- Plant drawers ----

  function drawSeed(px, py) {
    ctx.beginPath();
    ctx.ellipse(px, py - 3, 4, 3, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#7a5230';
    ctx.fill();
  }

  function drawFlower(px, py, g, ancient) {
    const { stage, progress, height } = g;
    const baseY = py;
    const topY = baseY - height;

    if (stage === 'seed') {
      drawSeed(px, py);
      return;
    }

    // Stem
    const stemColor = '#5a8a3c';
    ctx.strokeStyle = stemColor;
    ctx.lineWidth = stage === 'sprout' ? 1.5 : 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(px, baseY);
    ctx.quadraticCurveTo(px + height * 0.08, baseY - height * 0.5, px, topY);
    ctx.stroke();

    if (stage === 'sprout') {
      // small leaf buds
      ctx.fillStyle = '#6aaa46';
      ctx.beginPath();
      ctx.ellipse(px + 4, baseY - height * 0.6, 4, 2, -0.5, 0, Math.PI * 2);
      ctx.fill();
      return;
    }

    // Leaves
    const leafCount = stage === 'small' ? 1 : 2;
    ctx.fillStyle = '#5a8a3c';
    for (let i = 0; i < leafCount; i++) {
      const lf = i % 2 === 0 ? 1 : -1;
      const ly = baseY - height * (0.3 + i * 0.25);
      ctx.beginPath();
      ctx.moveTo(px, ly);
      ctx.quadraticCurveTo(px + lf * 14, ly - 6, px + lf * 10, ly - 14);
      ctx.quadraticCurveTo(px + lf * 4, ly - 4, px, ly);
      ctx.fill();
    }

    if (stage === 'small') return;

    // Bloom
    const bloomR = lerp(4, 12, progress);
    const petalCount = 6;
    const petalColors = ['#e8a0d0', '#d47fba', '#c96ab0', '#b85aa0'];
    const petalColor = petalColors[Math.abs(px | 0) % petalColors.length];

    if (ancient) {
      const glow = ctx.createRadialGradient(px, topY, 0, px, topY, bloomR * 2.5);
      glow.addColorStop(0, 'rgba(230,150,210,0.5)');
      glow.addColorStop(1, 'rgba(230,150,210,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(px, topY, bloomR * 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    for (let i = 0; i < petalCount; i++) {
      const angle = (i / petalCount) * Math.PI * 2;
      const ex = px + Math.cos(angle) * bloomR * 1.8;
      const ey = topY + Math.sin(angle) * bloomR * 1.8;
      ctx.beginPath();
      ctx.ellipse(
        px + Math.cos(angle) * bloomR,
        topY + Math.sin(angle) * bloomR,
        bloomR * 0.7, bloomR * 0.45,
        angle, 0, Math.PI * 2
      );
      ctx.fillStyle = petalColor;
      ctx.fill();
    }

    // Center
    ctx.beginPath();
    ctx.arc(px, topY, bloomR * 0.55, 0, Math.PI * 2);
    ctx.fillStyle = '#f9e04b';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(px, topY, bloomR * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#d4841a';
    ctx.fill();
  }

  function drawTree(px, py, g, ancient) {
    const { stage, progress, height } = g;
    const baseY = py;

    if (stage === 'seed') { drawSeed(px, py); return; }

    const trunkW = lerp(2, 10, Math.min(1, height / 100));
    const trunkH = height * 0.45;

    // Trunk
    const trunkGrad = ctx.createLinearGradient(px - trunkW, 0, px + trunkW, 0);
    trunkGrad.addColorStop(0, '#6b4226');
    trunkGrad.addColorStop(0.5, '#8b5e3c');
    trunkGrad.addColorStop(1, '#5a3418');
    ctx.fillStyle = trunkGrad;
    ctx.beginPath();
    ctx.rect(px - trunkW / 2, baseY - trunkH, trunkW, trunkH);
    ctx.fill();

    if (stage === 'sprout') return;

    // Canopy layers
    const layers = stage === 'small' ? 1 : stage === 'medium' ? 2 : 3;
    const canopyColors = ['#3d7a2c', '#4f9a3a', '#5aaa42'];

    if (ancient) {
      const glow = ctx.createRadialGradient(px, baseY - height * 0.7, 0, px, baseY - height * 0.7, height * 0.5);
      glow.addColorStop(0, 'rgba(100,200,80,0.3)');
      glow.addColorStop(1, 'rgba(100,200,80,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(px, baseY - height * 0.7, height * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }

    for (let i = 0; i < layers; i++) {
      const layerY = baseY - trunkH - (i * height * 0.18);
      const layerW = lerp(10, height * 0.7, progress) * (1 - i * 0.18);
      const layerH = layerW * 0.85;
      ctx.beginPath();
      ctx.moveTo(px, layerY - layerH);
      ctx.lineTo(px + layerW, layerY);
      ctx.lineTo(px - layerW, layerY);
      ctx.closePath();
      ctx.fillStyle = canopyColors[i % canopyColors.length];
      ctx.fill();
    }
  }

  function drawMushroom(px, py, g, ancient) {
    const { stage, progress, height } = g;
    const baseY = py;

    if (stage === 'seed') { drawSeed(px, py); return; }

    const stemH = height * 0.45;
    const stemW = lerp(3, 9, Math.min(1, height / 80));
    const capR = lerp(5, height * 0.55, Math.min(1, height / 80));

    if (ancient) {
      const glow = ctx.createRadialGradient(px, baseY - stemH - capR * 0.5, 0, px, baseY - stemH - capR * 0.5, capR * 2);
      glow.addColorStop(0, 'rgba(180,100,220,0.4)');
      glow.addColorStop(1, 'rgba(180,100,220,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(px, baseY - stemH - capR * 0.5, capR * 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Stem
    ctx.fillStyle = '#e8dcc8';
    ctx.beginPath();
    ctx.moveTo(px - stemW * 0.7, baseY);
    ctx.quadraticCurveTo(px - stemW, baseY - stemH * 0.5, px - stemW * 0.5, baseY - stemH);
    ctx.lineTo(px + stemW * 0.5, baseY - stemH);
    ctx.quadraticCurveTo(px + stemW, baseY - stemH * 0.5, px + stemW * 0.7, baseY);
    ctx.closePath();
    ctx.fill();

    if (stage === 'sprout') return;

    // Cap
    const capY = baseY - stemH;
    ctx.beginPath();
    ctx.ellipse(px, capY, capR, capR * 0.55, 0, Math.PI, 0);
    ctx.fillStyle = '#c0392b';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(px, capY, capR, capR * 0.55, 0, Math.PI, 0);
    ctx.strokeStyle = '#a93226';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Spots
    if (stage !== 'small' || progress > 0.3) {
      const spotCount = stage === 'small' ? 2 : stage === 'medium' ? 3 : 5;
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      const spotPositions = [
        [px, capY - capR * 0.3],
        [px - capR * 0.4, capY - capR * 0.15],
        [px + capR * 0.4, capY - capR * 0.15],
        [px - capR * 0.6, capY - capR * 0.05],
        [px + capR * 0.6, capY - capR * 0.05],
      ];
      for (let i = 0; i < Math.min(spotCount, spotPositions.length); i++) {
        ctx.beginPath();
        ctx.arc(spotPositions[i][0], spotPositions[i][1], capR * 0.1 + 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Veil / gills hint
    ctx.beginPath();
    ctx.ellipse(px, capY, capR * 1.05, capR * 0.18, 0, Math.PI, 0);
    ctx.fillStyle = '#f0e0d0';
    ctx.fill();
  }

  function drawSunflower(px, py, g, ancient) {
    const { stage, progress, height } = g;
    const baseY = py;

    if (stage === 'seed') { drawSeed(px, py); return; }

    const stemColor = '#6b8c3a';
    ctx.strokeStyle = stemColor;
    ctx.lineWidth = stage === 'sprout' ? 2 : lerp(2, 4, Math.min(1, height / 100));
    ctx.lineCap = 'round';

    // Slight sway in stem
    const sway = Math.sin(px * 0.05) * height * 0.04;
    ctx.beginPath();
    ctx.moveTo(px, baseY);
    ctx.quadraticCurveTo(px + sway * 1.5, baseY - height * 0.5, px + sway, baseY - height);
    ctx.stroke();

    if (stage === 'sprout') {
      ctx.fillStyle = '#7aaa46';
      ctx.beginPath();
      ctx.ellipse(px + 5, baseY - height * 0.7, 5, 3, 0.3, 0, Math.PI * 2);
      ctx.fill();
      return;
    }

    // Side leaves
    const topY = baseY - height + sway;
    const leafCount = stage === 'small' ? 1 : stage === 'medium' ? 2 : 3;
    ctx.fillStyle = '#5a8c30';
    for (let i = 0; i < leafCount; i++) {
      const lf = i % 2 === 0 ? 1 : -1;
      const lh = baseY - height * (0.25 + i * 0.22) + sway * i * 0.3;
      const lsway = sway * (i * 0.3);
      ctx.beginPath();
      ctx.moveTo(px + lsway * 0.5, lh);
      ctx.quadraticCurveTo(px + lf * 18, lh - 5, px + lf * 14, lh - 16);
      ctx.quadraticCurveTo(px + lf * 6, lh - 3, px + lsway * 0.5, lh);
      ctx.fill();
    }

    if (stage === 'small') return;

    // Head
    const headR = lerp(8, 20, progress);

    if (ancient) {
      const glow = ctx.createRadialGradient(px + sway, topY, 0, px + sway, topY, headR * 2.5);
      glow.addColorStop(0, 'rgba(255,230,50,0.45)');
      glow.addColorStop(1, 'rgba(255,230,50,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(px + sway, topY, headR * 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Petals
    const petalCount = 14;
    for (let i = 0; i < petalCount; i++) {
      const angle = (i / petalCount) * Math.PI * 2;
      ctx.beginPath();
      ctx.ellipse(
        px + sway + Math.cos(angle) * headR * 1.3,
        topY + Math.sin(angle) * headR * 1.3,
        headR * 0.45, headR * 0.28,
        angle, 0, Math.PI * 2
      );
      ctx.fillStyle = i % 2 === 0 ? '#f9c81a' : '#f0b800';
      ctx.fill();
    }

    // Disc
    ctx.beginPath();
    ctx.arc(px + sway, topY, headR * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = '#7b3f10';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(px + sway, topY, headR * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = '#5a2d0c';
    ctx.fill();

    // Seed pattern dots
    const seedDots = 8;
    ctx.fillStyle = '#8b4a18';
    for (let i = 0; i < seedDots; i++) {
      const a = (i / seedDots) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(px + sway + Math.cos(a) * headR * 0.28, topY + Math.sin(a) * headR * 0.28, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPlant(plant) {
    const hours = getHoursOld(plant.plantedAt);
    const g = getGrowthInfo(hours);
    const ancient = g.stage === 'ancient';
    const px = plant.x;
    const py = GRASS_Y + 8;

    ctx.save();
    switch (plant.type) {
      case 'flower':    drawFlower(px, py, g, ancient); break;
      case 'tree':      drawTree(px, py, g, ancient); break;
      case 'mushroom':  drawMushroom(px, py, g, ancient); break;
      case 'sunflower': drawSunflower(px, py, g, ancient); break;
    }
    ctx.restore();
  }

  // ---------- Hit testing ----------
  function getPlantAt(mx, my) {
    for (let i = plants.length - 1; i >= 0; i--) {
      const p = plants[i];
      const g = getGrowthInfo(getHoursOld(p.plantedAt));
      const px = p.x;
      const py = GRASS_Y + 8;
      const topY = py - g.height;
      const hitW = Math.max(20, g.height * 0.4);
      if (mx >= px - hitW && mx <= px + hitW && my >= topY - 10 && my <= py + 5) {
        return p;
      }
    }
    return null;
  }

  // ---------- Render loop ----------
  function render() {
    ctx.clearRect(0, 0, W, H);

    const hour = new Date().getHours() + new Date().getMinutes() / 60;
    const sky = getSkyColors(hour);
    drawSky(sky);
    drawSoil();

    // Sort by x so overlapping looks natural (slight depth)
    const sorted = [...plants].sort((a, b) => a.x - b.x);
    sorted.forEach(p => drawPlant(p));

    animFrame = requestAnimationFrame(render);
  }

  // ---------- Events ----------
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;

    // Only plant on soil area
    if (cy < GRASS_Y - 5) return;

    if (plants.length >= MAX_PLANTS) {
      showFullMsg();
      return;
    }

    const type = TYPES[Math.floor(Math.random() * TYPES.length)];
    const plant = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      x: cx,
      plantedAt: Date.now(),
      type
    };
    plants.push(plant);
    savePlants();
  });

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;

    const hit = getPlantAt(mouseX, mouseY);
    if (hit) {
      hoveredPlant = hit;
      const hours = getHoursOld(hit.plantedAt);
      const g = getGrowthInfo(hours);
      const label = hit.type.charAt(0).toUpperCase() + hit.type.slice(1);
      let stageLabel = '';
      if (g.stage === 'ancient') stageLabel = ' · ancient ✨';
      tooltip.textContent = `${label} · ${formatAge(hours)}${stageLabel}`;
      tooltip.classList.add('visible');

      let tx = e.clientX + 14;
      let ty = e.clientY - 36;
      if (tx + 200 > W) tx = e.clientX - 180;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
      canvas.style.cursor = 'default';
    } else {
      hoveredPlant = null;
      tooltip.classList.remove('visible');
      canvas.style.cursor = mouseY > GRASS_Y - 5 ? 'crosshair' : 'default';
    }
  });

  canvas.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
    hoveredPlant = null;
  });

  clearBtn.addEventListener('click', () => {
    if (plants.length === 0) return;
    if (confirm('Clear your whole garden? This cannot be undone.')) {
      plants = [];
      savePlants();
    }
  });

  function showFullMsg() {
    clearTimeout(fullMsgTimeout);
    fullMsg.classList.add('show');
    fullMsgTimeout = setTimeout(() => fullMsg.classList.remove('show'), 2200);
  }

  // ---------- Init ----------
  resize();
  window.addEventListener('resize', () => { resize(); });
  plants = loadPlants();
  render();

})();
</script>
</body>
</html>
