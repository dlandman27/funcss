<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <meta name="description" content="Paste anything. The bureau counts it all and files a report.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'><rect x='6' y='4' width='38' height='42' rx='4' fill='%23fff8ef' stroke='%23201a17' stroke-width='3'/><path d='M13 14h24M13 21h24M13 28h18M13 35h22' stroke='%23201a17' stroke-width='3' stroke-linecap='round'/><circle cx='38' cy='38' r='9' fill='%23f7c948' stroke='%23201a17' stroke-width='3'/></svg>">
    <style>
        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --coral: #f0563e;
            --gold: #f7c948;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: var(--paper);
            color: var(--ink);
            font-family: Georgia, 'Times New Roman', serif;
            padding: 28px 16px 50px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        header { text-align: center; margin-bottom: 22px; }
        h1 {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(22px, 6vw, 32px);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            display: inline-block;
            transform: rotate(-1.2deg);
        }
        header p { font-style: italic; font-size: 14px; color: rgba(32,26,23,0.6); margin-top: 4px; }

        .desk {
            display: flex;
            gap: 22px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
            max-width: 980px;
            margin: 0 auto;
        }

        .card {
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 12px;
            box-shadow: 5px 5px 0 var(--ink);
        }

        .worksheet {
            flex: 1 1 380px;
            max-width: 520px;
            padding: 16px;
            transform: rotate(-0.6deg);
        }
        textarea {
            width: 100%;
            height: 320px;
            resize: vertical;
            background: transparent;
            border: 2px dashed rgba(32, 26, 23, 0.35);
            border-radius: 8px;
            padding: 12px;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 16px;
            line-height: 1.5;
            color: var(--ink);
            outline: none;
        }
        textarea:focus { border-color: var(--ink); }
        textarea::placeholder { color: rgba(32, 26, 23, 0.35); font-style: italic; }

        .census {
            flex: 1 1 300px;
            max-width: 400px;
            padding: 18px 20px 20px;
            transform: rotate(0.7deg);
        }
        .census h2 {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 13px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-align: center;
            border-bottom: 2px solid var(--ink);
            padding-bottom: 10px;
            margin-bottom: 6px;
        }

        .stat {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            padding: 7px 0;
            border-bottom: 1px dotted rgba(32, 26, 23, 0.3);
        }
        .stat .lab { font-style: italic; font-size: 14px; color: rgba(32,26,23,0.7); }
        .stat .num {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 20px;
        }
        .num.pop { animation: pop 0.16s ease-out; }
        @keyframes pop {
            0% { transform: scale(1.22); }
            100% { transform: scale(1); }
        }

        .findings {
            margin-top: 12px;
            font-style: italic;
            font-size: 13.5px;
            line-height: 1.65;
            color: rgba(32, 26, 23, 0.75);
            min-height: 5em;
        }
        .findings .specimen {
            display: inline-block;
            background: var(--paper);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 2px 2px 0 var(--ink);
            padding: 1px 10px;
            font-style: normal;
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 12px;
            transform: rotate(-1.5deg);
            margin: 2px 2px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            vertical-align: bottom;
            white-space: nowrap;
        }

        .copy {
            display: block;
            margin: 16px auto 0;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink);
            background: var(--gold);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            transform: rotate(1.2deg);
            padding: 10px 20px;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        .copy:hover { transform: translate(-2px, -2px) rotate(1.2deg); box-shadow: 5px 5px 0 var(--ink); }
        .copy:active { transform: translate(2px, 2px) rotate(1.2deg); box-shadow: 1px 1px 0 var(--ink); }

        @media (prefers-reduced-motion: reduce) {
            .num.pop { animation: none; }
            .copy { transition: none; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Character Counter</h1>
        <p>bureau of textual affairs &middot; walk-ins welcome</p>
    </header>

    <div class="desk">
        <div class="card worksheet">
            <textarea id="text" spellcheck="false"
                placeholder="paste anything. the bureau does not judge."
                aria-label="Text to count"></textarea>
        </div>

        <div class="card census">
            <h2>Official Census</h2>
            <div class="stat"><span class="lab">characters</span><span class="num" id="chars">&mdash;</span></div>
            <div class="stat"><span class="lab">characters, no spaces</span><span class="num" id="charsNs">&mdash;</span></div>
            <div class="stat"><span class="lab">words</span><span class="num" id="words">&mdash;</span></div>
            <div class="stat"><span class="lab">sentences</span><span class="num" id="sentences">&mdash;</span></div>
            <div class="stat"><span class="lab">lines</span><span class="num" id="lines">&mdash;</span></div>
            <div class="findings" id="findings">the bureau is ready.</div>
            <button class="copy" id="copyBtn">Copy Report</button>
        </div>
    </div>

    <script>
    (() => {
        const textEl = document.getElementById('text');
        const findingsEl = document.getElementById('findings');
        const copyBtn = document.getElementById('copyBtn');
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
        const nums = {
            chars: document.getElementById('chars'),
            charsNs: document.getElementById('charsNs'),
            words: document.getElementById('words'),
            sentences: document.getElementById('sentences'),
            lines: document.getElementById('lines')
        };
        const shown = {};
        let lastReport = '';

        function setNum(key, value) {
            const label = value.toLocaleString();
            if (shown[key] === label) return;
            shown[key] = label;
            const el = nums[key];
            el.textContent = label;
            if (!reducedMotion.matches) {
                el.classList.remove('pop');
                void el.offsetWidth;
                el.classList.add('pop');
            }
        }

        function basicCounts(text) {
            const chars = text.length;
            const charsNs = text.replace(/\s/g, '').length;
            const words = (text.match(/\S+/g) || []).length;
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0).length;
            const lines = text.length ? text.split('\n').length : 0;
            return { chars, charsNs, words, sentences, lines };
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // deadpan census findings — the slower stats, debounced
        function findings(text, counts) {
            if (!text.trim()) return { html: 'the bureau is ready.', plain: '' };

            const lower = text.toLowerCase();
            const letterFreq = {};
            let vowels = 0, consonants = 0;
            for (const ch of lower) {
                if (ch >= 'a' && ch <= 'z') {
                    letterFreq[ch] = (letterFreq[ch] || 0) + 1;
                    if ('aeiou'.includes(ch)) vowels++; else consonants++;
                }
            }
            const top = Object.entries(letterFreq).sort((a, b) => b[1] - a[1])[0];

            const wordsArr = text.match(/[A-Za-z][A-Za-z'’-]*/g) || [];
            let longest = '';
            for (const w of wordsArr) if (w.length > longest.length) longest = w;

            const seconds = Math.max(1, Math.round(counts.words * 0.3));
            const readTime = seconds < 60
                ? seconds + ' second' + (seconds === 1 ? '' : 's')
                : Math.round(seconds / 60) + ' minute' + (Math.round(seconds / 60) === 1 ? '' : 's');

            const totalLetters = vowels + consonants;
            const vPct = totalLetters ? Math.round(vowels / totalLetters * 100) : 0;

            const parts = [];
            const plain = [];

            if (top) {
                const aside = top[0] === 'e' ? 'it always does.' : 'the letter e was expected. it did not show.';
                parts.push('the letter ' + top[0] + ' appears ' + top[1].toLocaleString() + ' times. ' + aside);
                plain.push('most used letter: ' + top[0] + ' (' + top[1].toLocaleString() + ')');
            }
            if (longest) {
                const shownWord = longest.length > 34 ? longest.slice(0, 31) + '…' : longest;
                parts.push('longest specimen on file: <span class="specimen">' + escapeHtml(shownWord) + '</span> (' + longest.length + ' letters).');
                plain.push('longest specimen: "' + longest + '" (' + longest.length + ' letters)');
            }
            parts.push('reading it costs ' + readTime + ' of someone’s life.');
            plain.push('reading time: ' + readTime);
            if (totalLetters > 0) {
                let verdict = 'within acceptable limits.';
                if (vPct > 45) verdict = 'suspiciously vowel-heavy.';
                else if (vPct < 25) verdict = 'consonant-dense. please breathe.';
                parts.push('vowels ' + vPct + '% · consonants ' + (100 - vPct) + '% — ' + verdict);
                plain.push('vowels ' + vPct + '% / consonants ' + (100 - vPct) + '% - ' + verdict);
            }

            return { html: parts.join('<br>'), plain: plain.join('\n') };
        }

        function buildReport(counts, plainFindings) {
            return [
                'OFFICIAL CENSUS — CHARACTER COUNTER',
                'characters: ' + counts.chars.toLocaleString(),
                'characters, no spaces: ' + counts.charsNs.toLocaleString(),
                'words: ' + counts.words.toLocaleString(),
                'sentences: ' + counts.sentences.toLocaleString(),
                'lines: ' + counts.lines.toLocaleString(),
                plainFindings,
                'filed by the bureau of textual affairs'
            ].filter(Boolean).join('\n');
        }

        let debounceTimer = 0;
        function update() {
            const text = textEl.value;
            const counts = basicCounts(text);
            setNum('chars', counts.chars);
            setNum('charsNs', counts.charsNs);
            setNum('words', counts.words);
            setNum('sentences', counts.sentences);
            setNum('lines', counts.lines);

            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const f = findings(text, counts);
                findingsEl.innerHTML = f.html;
                lastReport = text.trim() ? buildReport(counts, f.plain) : '';
            }, 150);
        }

        textEl.addEventListener('input', update);

        copyBtn.addEventListener('click', async () => {
            if (!lastReport) {
                const counts = basicCounts(textEl.value);
                lastReport = textEl.value.trim() ? buildReport(counts, findings(textEl.value, counts).plain) : '';
            }
            if (!lastReport) {
                copyBtn.textContent = 'Nothing To File';
                setTimeout(() => { copyBtn.textContent = 'Copy Report'; }, 1500);
                return;
            }
            try {
                await navigator.clipboard.writeText(lastReport);
                copyBtn.textContent = 'Filed.';
            } catch (e) {
                copyBtn.textContent = 'Filing Error';
            }
            setTimeout(() => { copyBtn.textContent = 'Copy Report'; }, 1500);
        });

        update();
    })();
    </script>
</body>
</html>
