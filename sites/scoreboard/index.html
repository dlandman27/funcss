<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard</title>
    <meta name="description" content="A tap-to-score scoreboard for any game — two teams, period, clock, kept safe across refreshes">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --coral: #f0563e;
            --sky: #5aa0db;
            --lime: #b7ce3c;
            --gold: #f7c948;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--paper);
            background-image: radial-gradient(rgba(32, 26, 23, 0.06) 2px, transparent 2.2px);
            background-size: 22px 22px;
            font-family: Georgia, 'Times New Roman', serif;
            color: var(--ink);
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(14px, 3vh, 26px);
            padding: 16px;
        }

        h1 {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(20px, 4vw, 34px);
            transform: rotate(-1.5deg);
            -webkit-text-stroke: 1.2px var(--ink);
            paint-order: stroke fill;
            color: var(--gold);
            text-shadow: 4px 4px 0 var(--ink);
        }

        /* ---- clock & period row ---- */

        .meta-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chip {
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 8px 18px;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(13px, 2.4vw, 18px);
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: transform 0.12s ease;
            font-variant-numeric: tabular-nums;
        }

        .chip:hover { transform: translate(-2px, -2px) rotate(-1.5deg); }
        .chip:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }

        #clock { background: var(--gold); min-width: 120px; text-align: center; }

        #status {
            transform: rotate(2deg);
            background: #d8d3c6;
            font-size: clamp(10px, 1.8vw, 12px);
            padding: 7px 14px;
            cursor: default;
        }

        #status.live { background: var(--lime); }

        /* ---- the board ---- */

        .teams {
            display: flex;
            align-items: stretch;
            gap: clamp(12px, 3vw, 30px);
        }

        .team-card {
            background: var(--cream);
            border: 3px solid var(--ink);
            border-radius: 20px;
            box-shadow: 8px 8px 0 var(--ink);
            padding: clamp(16px, 3vw, 30px) clamp(20px, 4vw, 44px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.1s ease;
            width: clamp(150px, 38vw, 300px);
        }

        .team-card.left { transform: rotate(-1deg); }
        .team-card.right { transform: rotate(1deg); }
        .team-card.left:active { transform: rotate(-1deg) scale(0.97); }
        .team-card.right:active { transform: rotate(1deg) scale(0.97); }

        .team-name {
            background: none;
            border: none;
            border-bottom: 3px dashed rgba(32, 26, 23, 0.3);
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(15px, 2.6vw, 22px);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            padding: 4px 0;
            outline: none;
            color: var(--ink);
            cursor: text;
            -webkit-user-select: text;
            user-select: text;
        }

        .team-name:focus { border-bottom-color: var(--ink); }

        .score {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(70px, 16vw, 140px);
            line-height: 1;
            -webkit-text-stroke: 2px var(--ink);
            paint-order: stroke fill;
            font-variant-numeric: tabular-nums;
        }

        .left .score { color: var(--coral); text-shadow: 5px 5px 0 var(--ink); }
        .right .score { color: var(--sky); text-shadow: 5px 5px 0 var(--ink); }

        .score.bump { animation: bump 0.25s cubic-bezier(0.22, 1.8, 0.36, 1); }

        @keyframes bump {
            0% { transform: scale(1); }
            45% { transform: scale(1.18) rotate(-2deg); }
            100% { transform: scale(1); }
        }

        .minus {
            background: var(--paper);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 2px 2px 0 var(--ink);
            width: 38px;
            height: 38px;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: 18px;
            color: var(--ink);
            cursor: pointer;
            transition: transform 0.12s ease;
        }

        .minus:hover { transform: translate(-1px, -1px); }
        .minus:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }

        .tap-note {
            font-style: italic;
            font-size: 12px;
            color: rgba(32, 26, 23, 0.45);
        }

        .vs {
            display: flex;
            align-items: center;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(18px, 3.4vw, 30px);
            color: rgba(32, 26, 23, 0.35);
        }

        #reset {
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 10px 24px;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 14px;
            color: var(--ink);
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        #reset:hover { transform: translate(-2px, -2px) rotate(-1.5deg); }
        #reset:active { transform: translate(2px, 2px); }

        /* floating +1 sticker */
        .plus-one {
            position: fixed;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: 30px;
            -webkit-text-stroke: 1.2px var(--ink);
            paint-order: stroke fill;
            text-shadow: 3px 3px 0 var(--ink);
            pointer-events: none;
            animation: floatUp 0.9s ease-out forwards;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(-4deg) scale(0.6); opacity: 1; }
            20% { transform: translateY(-16px) rotate(3deg) scale(1.15); }
            100% { transform: translateY(-90px) rotate(-2deg) scale(0.9); opacity: 0; }
        }

        #toast {
            position: fixed;
            top: 7vh;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg) scale(0);
            background: var(--gold);
            border: 3px solid var(--ink);
            border-radius: 14px;
            box-shadow: 5px 5px 0 var(--ink);
            padding: 12px 26px;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(14px, 2.8vw, 22px);
            text-transform: uppercase;
            z-index: 200;
            pointer-events: none;
        }

        #toast.show { animation: toastIn 2.4s cubic-bezier(0.22, 1.6, 0.36, 1) forwards; }

        @keyframes toastIn {
            0% { transform: translateX(-50%) rotate(-2deg) scale(0); }
            12% { transform: translateX(-50%) rotate(-2deg) scale(1.1); }
            18% { transform: translateX(-50%) rotate(-2deg) scale(1); }
            82% { transform: translateX(-50%) rotate(-2deg) scale(1); opacity: 1; }
            100% { opacity: 0; }
        }

        #fx { position: fixed; inset: 0; pointer-events: none; z-index: 150; }

        @media (max-width: 560px) {
            .teams { flex-direction: column; align-items: center; }
            .team-card { width: min(86vw, 340px); flex-direction: row; justify-content: space-between; padding: 14px 22px; }
            .team-card .score { font-size: clamp(48px, 14vw, 70px); }
            .team-name { width: 40%; font-size: 14px; }
            .vs { display: none; }
            .tap-note { display: none; }
        }
    </style>
</head>
<body>
    <h1>SCOREBOARD</h1>

    <div class="meta-row">
        <div class="chip" id="period" title="tap to change period">1ST</div>
        <div class="chip" id="clock" title="tap to start / pause">00:00</div>
        <div class="chip" id="status">PAUSED</div>
    </div>

    <div class="teams">
        <div class="team-card left" id="cardLeft">
            <input class="team-name" id="nameLeft" value="HOME" maxlength="10" spellcheck="false">
            <div class="score" id="scoreLeft">0</div>
            <button class="minus" id="minusLeft">&minus;</button>
            <div class="tap-note">tap the card to score</div>
        </div>

        <div class="vs">VS</div>

        <div class="team-card right" id="cardRight">
            <input class="team-name" id="nameRight" value="AWAY" maxlength="10" spellcheck="false">
            <div class="score" id="scoreRight">0</div>
            <button class="minus" id="minusRight">&minus;</button>
            <div class="tap-note">tap the card to score</div>
        </div>
    </div>

    <button id="reset">new game</button>

    <canvas id="fx"></canvas>
    <div id="toast"></div>

    <script>
        const INK = '#201a17';
        const TEAM_COLOR = { left: '#f0563e', right: '#5aa0db' };
        const CONFETTI = ['#f7c948', '#f0563e', '#5aa0db', '#b7ce3c', '#a98fd0', '#ff7fa5'];
        const jit = (n) => (Math.random() - 0.5) * n;
        const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);

        let scores = { left: 0, right: 0 };
        let periodIdx = 0;
        const periods = ['1ST', '2ND', '3RD', '4TH', 'OT', '2OT'];
        let clockSecs = 0;
        let clockRunning = false;
        let clockInterval = null;

        // ---- persistence: the game survives a refresh ----

        function saveGame() {
            try {
                localStorage.setItem('scoreboard', JSON.stringify({
                    scores, periodIdx, clockSecs,
                    nameLeft: document.getElementById('nameLeft').value,
                    nameRight: document.getElementById('nameRight').value,
                }));
            } catch (e) {}
        }

        function loadGame() {
            try {
                const saved = JSON.parse(localStorage.getItem('scoreboard'));
                if (!saved) return;
                scores = saved.scores || scores;
                periodIdx = saved.periodIdx || 0;
                clockSecs = saved.clockSecs || 0;
                if (saved.nameLeft) document.getElementById('nameLeft').value = saved.nameLeft;
                if (saved.nameRight) document.getElementById('nameRight').value = saved.nameRight;
            } catch (e) {}
            document.getElementById('scoreLeft').textContent = scores.left;
            document.getElementById('scoreRight').textContent = scores.right;
            document.getElementById('period').textContent = periods[periodIdx];
            updateClockDisplay();
        }

        // ---- clock ----

        function updateClockDisplay() {
            const m = String(Math.floor(clockSecs / 60)).padStart(2, '0');
            const s = String(clockSecs % 60).padStart(2, '0');
            document.getElementById('clock').textContent = `${m}:${s}`;
        }

        function toggleClock() {
            clockRunning = !clockRunning;
            const status = document.getElementById('status');
            status.textContent = clockRunning ? 'LIVE' : 'PAUSED';
            status.classList.toggle('live', clockRunning);
            if (clockRunning) {
                clockInterval = setInterval(() => {
                    clockSecs++;
                    updateClockDisplay();
                    if (clockSecs % 5 === 0) saveGame();
                }, 1000);
            } else {
                clearInterval(clockInterval);
                saveGame();
            }
        }

        // ---- scoring ----

        function addScore(side, e) {
            const before = scores.left === scores.right ? null
                : scores.left > scores.right ? 'left' : 'right';
            scores[side]++;
            const el = document.getElementById('score' + cap(side));
            el.textContent = scores[side];
            el.classList.remove('bump');
            void el.offsetWidth;
            el.classList.add('bump');
            spawnPlusOne(side);
            burstAt(e.clientX || null, e.clientY || null, side, 10);

            const after = scores.left === scores.right ? null
                : scores.left > scores.right ? 'left' : 'right';
            if (after && after !== before) {
                const name = document.getElementById('name' + cap(after)).value || after;
                toast(before === null ? `${name} TAKES THE LEAD` : `${name} STEALS THE LEAD`);
            }
            saveGame();
        }

        function subScore(side) {
            if (scores[side] > 0) {
                scores[side]--;
                document.getElementById('score' + cap(side)).textContent = scores[side];
                saveGame();
            }
        }

        function spawnPlusOne(side) {
            const el = document.createElement('div');
            el.className = 'plus-one';
            el.textContent = '+1';
            el.style.color = TEAM_COLOR[side];
            const rect = document.getElementById('score' + cap(side)).getBoundingClientRect();
            el.style.left = (rect.left + rect.width / 2 - 18 + jit(50)) + 'px';
            el.style.top = (rect.top + jit(20)) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 900);
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('show');
            void t.offsetWidth;
            t.classList.add('show');
        }

        // ---- confetti ----

        const fxCanvas = document.getElementById('fx');
        const fxCtx = fxCanvas.getContext('2d');
        const bits = [];
        let raf = null;

        function sizeFx() {
            fxCanvas.width = window.innerWidth;
            fxCanvas.height = window.innerHeight;
        }

        function burstAt(x, y, side, n) {
            if (x === null) {
                const rect = document.getElementById('score' + cap(side)).getBoundingClientRect();
                x = rect.left + rect.width / 2;
                y = rect.top + rect.height / 2;
            }
            for (let i = 0; i < n; i++) {
                const a = Math.random() * Math.PI * 2;
                const v = 2 + Math.random() * 4;
                bits.push({
                    x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v - 2.5, g: 0.15,
                    w: 5 + Math.random() * 4, h: 3 + Math.random() * 3,
                    rot: Math.random() * Math.PI, vrot: jit(0.3),
                    color: Math.random() < 0.5 ? TEAM_COLOR[side] : CONFETTI[(Math.random() * CONFETTI.length) | 0],
                    life: 1, decay: 0.02,
                });
            }
            if (!raf) raf = requestAnimationFrame(loop);
        }

        function loop() {
            raf = null;
            fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
            for (let i = bits.length - 1; i >= 0; i--) {
                const p = bits[i];
                p.life -= p.decay;
                if (p.life <= 0) { bits.splice(i, 1); continue; }
                p.vy += p.g;
                p.x += p.vx;
                p.y += p.vy;
                p.rot += p.vrot;
                fxCtx.save();
                fxCtx.translate(p.x, p.y);
                fxCtx.rotate(p.rot);
                fxCtx.globalAlpha = Math.min(1, p.life * 1.5);
                fxCtx.fillStyle = p.color;
                fxCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                fxCtx.lineWidth = 1.3;
                fxCtx.strokeStyle = INK;
                fxCtx.strokeRect(-p.w / 2, -p.h / 2, p.w, p.h);
                fxCtx.restore();
            }
            fxCtx.globalAlpha = 1;
            if (bits.length) raf = requestAnimationFrame(loop);
        }

        // ---- wiring ----

        for (const side of ['left', 'right']) {
            const card = document.getElementById('card' + cap(side));
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('minus') || e.target.classList.contains('team-name')) return;
                addScore(side, e);
            });
            document.getElementById('minus' + cap(side)).addEventListener('click', (e) => {
                e.stopPropagation();
                subScore(side);
            });
            document.getElementById('name' + cap(side)).addEventListener('input', saveGame);
        }

        document.getElementById('clock').addEventListener('click', toggleClock);
        document.getElementById('period').addEventListener('click', () => {
            periodIdx = (periodIdx + 1) % periods.length;
            document.getElementById('period').textContent = periods[periodIdx];
            saveGame();
        });

        document.getElementById('reset').addEventListener('click', () => {
            scores = { left: 0, right: 0 };
            periodIdx = 0;
            clockSecs = 0;
            clockRunning = false;
            clearInterval(clockInterval);
            document.getElementById('scoreLeft').textContent = '0';
            document.getElementById('scoreRight').textContent = '0';
            document.getElementById('period').textContent = periods[0];
            const status = document.getElementById('status');
            status.textContent = 'PAUSED';
            status.classList.remove('live');
            updateClockDisplay();
            saveGame();
        });

        window.addEventListener('resize', sizeFx);
        sizeFx();
        loadGame();
    </script>
</body>
</html>
