<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's My Resolution?</title>
    <meta name="description" content="Your screen, measured: resolution, viewport, pixel ratio, refresh rate">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            background-color: var(--paper);
            background-image: radial-gradient(rgba(32, 26, 23, 0.06) 2px, transparent 2.2px);
            background-size: 22px 22px;
            font-family: Georgia, 'Times New Roman', serif;
            color: var(--ink);
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 18px 60px;
            gap: 22px;
        }

        h1 {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(24px, 5.5vw, 46px);
            transform: rotate(-1.5deg);
            -webkit-text-stroke: 1.2px var(--ink);
            paint-order: stroke fill;
            color: #5aa0db;
            text-shadow: 4px 4px 0 var(--ink);
            text-align: center;
        }

        .subtitle {
            font-style: italic;
            font-size: clamp(13px, 1.9vw, 16px);
            color: rgba(32, 26, 23, 0.55);
            margin-top: -12px;
            text-align: center;
        }

        /* the star of the show: live viewport */
        .hero-card {
            background: var(--cream);
            border: 3px solid var(--ink);
            border-radius: 18px;
            box-shadow: 8px 8px 0 var(--ink);
            padding: clamp(20px, 4vw, 36px) clamp(28px, 6vw, 60px);
            text-align: center;
            transform: rotate(0.5deg);
        }

        .hero-label {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(32, 26, 23, 0.5);
        }

        #viewport {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(40px, 9vw, 84px);
            line-height: 1.15;
            font-variant-numeric: tabular-nums;
        }

        #viewport.bump { animation: bump 0.25s cubic-bezier(0.22, 1.6, 0.36, 1); }

        @keyframes bump {
            0% { transform: scale(1); }
            40% { transform: scale(1.07); }
            100% { transform: scale(1); }
        }

        .hero-note {
            font-style: italic;
            font-size: 13px;
            color: rgba(32, 26, 23, 0.5);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            width: min(94vw, 760px);
        }

        .card {
            background: var(--cream);
            border: 2.5px solid var(--ink);
            border-radius: 14px;
            box-shadow: 5px 5px 0 var(--ink);
            padding: 18px 20px;
            text-align: center;
            transform: rotate(var(--tilt, 0deg));
        }

        .card .label {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(32, 26, 23, 0.5);
            margin-bottom: 6px;
        }

        .card .value {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: clamp(20px, 3.6vw, 30px);
            font-variant-numeric: tabular-nums;
        }

        .card .note {
            font-style: italic;
            font-size: 12px;
            color: rgba(32, 26, 23, 0.5);
            margin-top: 4px;
        }

        #copyBtn {
            background: #b7ce3c;
            color: var(--ink);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 11px 26px;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        #copyBtn:hover { transform: translate(-2px, -2px) rotate(-1.5deg); }
        #copyBtn:active { transform: translate(2px, 2px); }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg) scale(0);
            background: #f7c948;
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 9px 22px;
            font-style: italic;
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
        }

        #toast.show { animation: toastIn 1.8s ease forwards; }

        @keyframes toastIn {
            0% { transform: translateX(-50%) rotate(-2deg) scale(0); }
            15% { transform: translateX(-50%) rotate(-2deg) scale(1.05); }
            22% { transform: translateX(-50%) rotate(-2deg) scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <h1>WHAT'S MY RESOLUTION?</h1>
    <div class="subtitle">resize the window. it notices.</div>

    <div class="hero-card">
        <div class="hero-label">Viewport, right now</div>
        <div id="viewport">&hellip;</div>
        <div class="hero-note">the part of the page you can actually see</div>
    </div>

    <div class="grid">
        <div class="card" style="--tilt:-0.7deg">
            <div class="label">Screen Resolution</div>
            <div class="value" id="screenRes">&hellip;</div>
            <div class="note">your monitor's full size</div>
        </div>
        <div class="card" style="--tilt:0.6deg">
            <div class="label">Pixel Ratio</div>
            <div class="value" id="dpr">&hellip;</div>
            <div class="note" id="dprNote"></div>
        </div>
        <div class="card" style="--tilt:-0.5deg">
            <div class="label">Refresh Rate</div>
            <div class="value" id="hz">measuring&hellip;</div>
            <div class="note">measured live, just now</div>
        </div>
        <div class="card" style="--tilt:0.8deg">
            <div class="label">Color Depth</div>
            <div class="value" id="depth">&hellip;</div>
            <div class="note" id="depthNote"></div>
        </div>
        <div class="card" style="--tilt:-0.6deg">
            <div class="label">Orientation</div>
            <div class="value" id="orient">&hellip;</div>
            <div class="note">turn your device. go on.</div>
        </div>
        <div class="card" style="--tilt:0.5deg">
            <div class="label">Pixels You Own</div>
            <div class="value" id="totalPx">&hellip;</div>
            <div class="note" id="pxNote"></div>
        </div>
    </div>

    <button id="copyBtn">copy my specs</button>
    <div id="toast"></div>

    <script>
        const viewportEl = document.getElementById('viewport');

        function pxVerdict(n) {
            if (n >= 8000000) return 'an obscene number of pixels.';
            if (n >= 3500000) return 'a very respectable pixel count.';
            if (n >= 1800000) return 'a perfectly honest amount of pixels.';
            return 'every one of them counts.';
        }

        function update() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            viewportEl.textContent = `${vw} × ${vh}`;
            viewportEl.classList.remove('bump');
            void viewportEl.offsetWidth;
            viewportEl.classList.add('bump');

            const sw = window.screen.width;
            const sh = window.screen.height;
            document.getElementById('screenRes').textContent = `${sw} × ${sh}`;

            const dpr = window.devicePixelRatio || 1;
            document.getElementById('dpr').textContent = dpr.toFixed(2) + '×';
            document.getElementById('dprNote').textContent =
                dpr > 1.5 ? 'fancy high-density screen' : dpr > 1 ? 'moderately fancy screen' : 'a good honest 1:1 screen';

            document.getElementById('depth').textContent = window.screen.colorDepth + '-bit';
            document.getElementById('depthNote').textContent =
                `${Math.pow(2, window.screen.colorDepth).toLocaleString()} possible colors`;

            const o = screen.orientation ? screen.orientation.type.split('-')[0] : (vw > vh ? 'landscape' : 'portrait');
            document.getElementById('orient').textContent = o.toUpperCase();

            const total = Math.round(sw * dpr) * Math.round(sh * dpr);
            document.getElementById('totalPx').textContent = total.toLocaleString();
            document.getElementById('pxNote').textContent = pxVerdict(total);
        }

        // measure the real refresh rate from frame timings
        function measureHz() {
            const samples = [];
            let last = performance.now();
            function tick(now) {
                samples.push(now - last);
                last = now;
                if (samples.length < 60) {
                    requestAnimationFrame(tick);
                } else {
                    samples.sort((a, b) => a - b);
                    const median = samples[Math.floor(samples.length / 2)];
                    const hz = Math.round(1000 / median);
                    // snap to common rates when close
                    const common = [60, 75, 90, 120, 144, 165, 240];
                    const snapped = common.find(c => Math.abs(hz - c) <= 3) || hz;
                    document.getElementById('hz').textContent = snapped + ' Hz';
                }
            }
            requestAnimationFrame(tick);
        }

        document.getElementById('copyBtn').addEventListener('click', () => {
            const dpr = window.devicePixelRatio || 1;
            const spec = [
                `viewport: ${window.innerWidth} × ${window.innerHeight}`,
                `screen: ${window.screen.width} × ${window.screen.height}`,
                `pixel ratio: ${dpr.toFixed(2)}`,
                `color depth: ${window.screen.colorDepth}-bit`,
                `refresh: ${document.getElementById('hz').textContent}`,
            ].join('\n');
            navigator.clipboard.writeText(spec).then(() => {
                const t = document.getElementById('toast');
                t.textContent = 'specs copied';
                t.classList.remove('show');
                void t.offsetWidth;
                t.classList.add('show');
            });
        });

        window.addEventListener('resize', update);
        if (screen.orientation) screen.orientation.addEventListener('change', update);
        update();
        measureHz();
    </script>
</body>
</html>
