<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clap-o-Meter</title>
    <meta name="description" content="Ten seconds. Clap anywhere, as fast as you can. The meter decides what you meant by it.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'><rect x='18' y='14' width='14' height='32' rx='4' fill='%23fff8ef' stroke='%23201a17' stroke-width='3'/><rect x='21' y='28' width='8' height='15' fill='%23f0563e'/><circle cx='25' cy='9' r='6' fill='%23f7c948' stroke='%23201a17' stroke-width='3'/></svg>">
    <style>
        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --coral: #f0563e;
            --gold: #f7c948;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            background: var(--paper);
            color: var(--ink);
            font-family: Georgia, 'Times New Roman', serif;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        canvas#stage { position: fixed; inset: 0; width: 100%; height: 100%; cursor: pointer; }

        .chip {
            position: fixed;
            top: 14px;
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 9px 16px;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            pointer-events: none;
            z-index: 5;
        }
        #clapChip { left: 14px; transform: rotate(-2deg); }
        #timeChip { right: 14px; transform: rotate(2deg); background: var(--gold); }

        h1 {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%) rotate(-1.2deg);
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(16px, 4.5vw, 24px);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 4;
            white-space: nowrap;
        }

        .hint {
            position: fixed;
            bottom: 52px;
            left: 0;
            right: 0;
            text-align: center;
            font-style: italic;
            font-size: 16px;
            color: rgba(32, 26, 23, 0.6);
            pointer-events: none;
            transition: opacity 1s ease;
            z-index: 4;
        }
        .hint.gone { opacity: 0; }

        .tally {
            position: fixed;
            left: 14px;
            bottom: 10px;
            font-style: italic;
            font-size: 12px;
            color: rgba(32, 26, 23, 0.45);
            pointer-events: none;
            z-index: 4;
        }

        #verdict {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: rgba(242, 237, 226, 0.82);
            text-align: center;
            padding: 20px;
        }
        #verdict.show { display: flex; }
        .stamp {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(30px, 9vw, 58px);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--coral);
            border: 4px solid var(--coral);
            border-radius: 12px;
            box-shadow: inset 0 0 0 3px var(--cream), inset 0 0 0 6px var(--coral);
            background: rgba(255, 248, 239, 0.85);
            padding: 12px 26px;
            transform: rotate(-7deg) scale(0);
        }
        .stamp.gold { color: #c99a12; border-color: #c99a12; box-shadow: inset 0 0 0 3px var(--cream), inset 0 0 0 6px #c99a12; }
        #verdict.show .stamp { animation: stampIn 0.35s cubic-bezier(0.2, 1.6, 0.4, 1) forwards; }
        @keyframes stampIn {
            0% { transform: rotate(3deg) scale(2.2); opacity: 0; }
            65% { transform: rotate(-8deg) scale(0.95); opacity: 1; }
            100% { transform: rotate(-7deg) scale(1); opacity: 1; }
        }
        .verdict-sub { font-style: italic; font-size: clamp(15px, 4vw, 19px); color: rgba(32, 26, 23, 0.75); }
        .verdict-nums { font-style: italic; font-size: 14px; color: rgba(32, 26, 23, 0.55); }

        button.again {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 15px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--ink);
            background: var(--coral);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            transform: rotate(1.6deg);
            padding: 13px 26px;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        button.again:hover { transform: translate(-2px, -2px) rotate(1.6deg); box-shadow: 5px 5px 0 var(--ink); }
        button.again:active { transform: translate(2px, 2px) rotate(1.6deg); box-shadow: 1px 1px 0 var(--ink); }

        @keyframes thunk {
            0% { transform: translate(0, 0); }
            25% { transform: translate(2px, 3px); }
            50% { transform: translate(-3px, 1px); }
            75% { transform: translate(1px, -2px); }
            100% { transform: translate(0, 0); }
        }
        body.thunk { animation: thunk 0.22s linear; }

        @media (prefers-reduced-motion: reduce) {
            body.thunk { animation: none; }
            #verdict.show .stamp { animation: none; transform: rotate(-7deg) scale(1); opacity: 1; }
            .hint, button.again { transition: none; }
        }
    </style>
</head>
<body>
    <canvas id="stage"></canvas>
    <h1>Clap-o-Meter</h1>
    <div class="chip" id="clapChip">claps: 0</div>
    <div class="chip" id="timeChip">10.0</div>
    <div class="hint" id="hint">clap. anywhere. repeatedly.</div>
    <div class="tally" id="tally"></div>

    <div id="verdict">
        <div class="stamp" id="stampEl">Golf Clap</div>
        <div class="verdict-sub" id="verdictSub"></div>
        <div class="verdict-nums" id="verdictNums"></div>
        <button class="again" id="againBtn">Again</button>
    </div>

    <script>
    (() => {
        const INK = '#201a17';
        const CREAM = '#fff8ef';
        const PAPER = '#f2ede2';
        const CORAL = '#f0563e';
        const GOLD = '#f7c948';
        const SPARK_COLORS = ['#f0563e', '#5aa0db', '#b7ce3c', '#f7c948', '#ff7fa5', '#2fb0a3'];

        const DURATION = 10;
        const TIERS = [
            { min: 0, label: 'Golf Clap', sub: 'polite. possibly british.' },
            { min: 15, label: 'Sincere', sub: 'they seem to mean it.' },
            { min: 30, label: 'Enthusiastic', sub: 'people are standing up.' },
            { min: 50, label: 'Alarming', sub: 'security has been notified.' },
            { min: 75, label: 'Thunderous', sub: 'the weather service called.' },
            { min: 100, label: 'Standing Ovation', sub: 'they will speak of this for years.' }
        ];

        const ZONES = ['polite', 'sincere', 'rowdy', 'alarming', 'DEAFENING'];

        const stage = document.getElementById('stage');
        const ctx = stage.getContext('2d');
        const clapChip = document.getElementById('clapChip');
        const timeChip = document.getElementById('timeChip');
        const hintEl = document.getElementById('hint');
        const tallyEl = document.getElementById('tally');
        const verdictEl = document.getElementById('verdict');
        const stampEl = document.getElementById('stampEl');
        const verdictSub = document.getElementById('verdictSub');
        const verdictNums = document.getElementById('verdictNums');
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

        function loadNum(k) { try { return parseInt(localStorage.getItem(k), 10) || 0; } catch (e) { return 0; } }
        function saveNum(k, v) { try { localStorage.setItem(k, String(v)); } catch (e) {} }
        let best = loadNum('clapometer-best');
        let lifetime = loadNum('clapometer-lifetime');

        function updateTally() {
            tallyEl.textContent = lifetime > 0 ? 'lifetime claps: ' + lifetime + (best > 0 ? ' · best round: ' + best : '') : '';
        }

        // ---- canvas ----
        let W = 0, H = 0, dpr = 1;
        function resize() {
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            W = innerWidth; H = innerHeight;
            stage.width = Math.round(W * dpr);
            stage.height = Math.round(H * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        // ---- state ----
        let running = false;
        let over = false;
        let claps = 0;
        let roundStart = 0;
        let level = 0;          // physics target 0..1
        let disp = 0, dispV = 0; // displayed level (springy)
        let bellSwing = 0;
        let bellCooldown = 0;
        let bellRungThisRound = false;
        let goldRound = false;
        let particles = [];
        let lastT = 0;
        let rafId = 0;

        function wake() { if (!rafId) { lastT = performance.now(); rafId = requestAnimationFrame(frame); } }

        // ---- tower geometry ----
        function geom() {
            const towerH = Math.min(H * 0.62, 560);
            const towerW = Math.min(84, W * 0.2);
            const cx = W / 2;
            const baseY = H - Math.max(90, H * 0.14);
            const topY = baseY - towerH;
            return { cx, baseY, topY, towerW, towerH };
        }

        function roundRect(c, x, y, w, h, r) {
            c.beginPath();
            if (c.roundRect) c.roundRect(x, y, w, h, r);
            else c.rect(x, y, w, h);
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            const { cx, baseY, topY, towerW, towerH } = geom();
            const x = cx - towerW / 2;

            // base pedestal
            ctx.save();
            ctx.translate(4, 4);
            roundRect(ctx, cx - towerW, baseY, towerW * 2, 26, 8);
            ctx.fillStyle = INK; ctx.fill();
            ctx.restore();
            roundRect(ctx, cx - towerW, baseY, towerW * 2, 26, 8);
            ctx.fillStyle = CORAL; ctx.fill();
            ctx.lineWidth = 3; ctx.lineJoin = 'round'; ctx.strokeStyle = INK; ctx.stroke();

            // column shadow + body
            ctx.save();
            ctx.translate(4, 4);
            roundRect(ctx, x, topY, towerW, towerH, 12);
            ctx.fillStyle = INK; ctx.fill();
            ctx.restore();
            roundRect(ctx, x, topY, towerW, towerH, 12);
            ctx.fillStyle = CREAM; ctx.fill();
            ctx.lineWidth = 3; ctx.strokeStyle = INK; ctx.stroke();

            // fill column
            const pad = 7;
            const innerH = towerH - pad * 2;
            const fillH = Math.max(0, Math.min(1, disp)) * innerH;
            if (fillH > 2) {
                roundRect(ctx, x + pad, topY + pad + (innerH - fillH), towerW - pad * 2, fillH, 7);
                ctx.fillStyle = goldRound ? GOLD : CORAL;
                ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = INK; ctx.stroke();
            }

            // zone ticks + labels
            ctx.textBaseline = 'middle';
            for (let i = 0; i < ZONES.length; i++) {
                const zy = baseY - ((i + 1) / ZONES.length) * towerH + towerH / ZONES.length / 2;
                const ty = baseY - ((i + 1) / ZONES.length) * towerH;
                if (i < ZONES.length - 1) {
                    ctx.beginPath();
                    ctx.moveTo(x - 8, ty); ctx.lineTo(x, ty);
                    ctx.lineWidth = 2; ctx.strokeStyle = INK; ctx.stroke();
                }
                const active = disp >= i / ZONES.length && disp < (i + 1.01) / ZONES.length;
                ctx.font = '900 ' + Math.min(15, W * 0.032) + 'px "Arial Black", Arial, sans-serif';
                ctx.textAlign = 'left';
                ctx.save();
                ctx.translate(x + towerW + 12, zy);
                ctx.rotate(-0.03);
                ctx.fillStyle = active ? INK : 'rgba(32,26,23,0.35)';
                ctx.fillText(ZONES[i].toUpperCase(), 0, 0);
                ctx.restore();
            }

            // bell
            const bellR = Math.min(30, towerW * 0.42);
            const bx = cx, by = topY - bellR - 14;
            ctx.save();
            ctx.translate(bx, by);
            ctx.rotate(Math.sin(bellSwing * 14) * bellSwing * 0.5);
            ctx.save();
            ctx.translate(3, 3);
            ctx.beginPath(); ctx.arc(0, 0, bellR, Math.PI, 0); ctx.lineTo(bellR, bellR * 0.28); ctx.lineTo(-bellR, bellR * 0.28); ctx.closePath();
            ctx.fillStyle = INK; ctx.fill();
            ctx.restore();
            ctx.beginPath(); ctx.arc(0, 0, bellR, Math.PI, 0); ctx.lineTo(bellR, bellR * 0.28); ctx.lineTo(-bellR, bellR * 0.28); ctx.closePath();
            ctx.fillStyle = GOLD; ctx.fill();
            ctx.lineWidth = 3; ctx.strokeStyle = INK; ctx.stroke();
            ctx.beginPath(); ctx.arc(0, bellR * 0.42, 5, 0, Math.PI * 2);
            ctx.fillStyle = INK; ctx.fill();
            ctx.restore();

            // pole between bell and column
            ctx.beginPath();
            ctx.moveTo(cx, topY); ctx.lineTo(cx, by + bellR * 0.28 + 3);
            ctx.lineWidth = 3; ctx.strokeStyle = INK; ctx.stroke();

            // particles
            for (const p of particles) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, p.life / p.max);
                if (p.kind === 'spark') {
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot);
                    ctx.fillStyle = p.color;
                    ctx.strokeStyle = INK;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.rect(-p.size / 2, -p.size / 5, p.size, p.size / 2.5);
                    ctx.fill(); ctx.stroke();
                } else {
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot);
                    ctx.font = '900 ' + p.size + 'px "Arial Black", Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.lineWidth = Math.max(3, p.size * 0.18);
                    ctx.strokeStyle = CREAM;
                    ctx.strokeText(p.text, 0, 0);
                    ctx.fillStyle = p.color;
                    ctx.fillText(p.text, 0, 0);
                }
                ctx.restore();
            }
            ctx.globalAlpha = 1;
        }

        // ---- physics loop (sleeps when idle) ----
        function frame(now) {
            const dt = Math.min(0.05, (now - lastT) / 1000);
            lastT = now;

            // decay
            level = Math.max(0, level - (0.16 + level * 0.55) * dt);

            // spring toward level
            if (reducedMotion.matches) {
                disp = level; dispV = 0;
            } else {
                const k = 90, damp = 12;
                dispV += (level - disp) * k * dt;
                dispV -= dispV * damp * dt;
                disp += dispV * dt;
                if (disp < 0) { disp = 0; dispV = 0; }
            }

            // bell
            bellSwing = Math.max(0, bellSwing - dt * 1.4);
            bellCooldown = Math.max(0, bellCooldown - dt);
            if (disp >= 0.985 && bellCooldown === 0 && running) {
                bellCooldown = 1.2;
                bellSwing = 1;
                bellRungThisRound = true;
                if (!goldRound && Math.random() < 0.03) goldRound = true;
                const { cx, topY } = geom();
                spawnText(cx, topY - 90, 'DING', goldRound ? '#c99a12' : CORAL, 34);
                if (!reducedMotion.matches) {
                    document.body.classList.add('thunk');
                    setTimeout(() => document.body.classList.remove('thunk'), 250);
                }
            }

            // particles
            for (const p of particles) {
                p.life -= dt;
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.vy += 500 * dt;
                p.rot += p.vr * dt;
            }
            particles = particles.filter(p => p.life > 0);

            // timer
            if (running) {
                const elapsed = (now - roundStart) / 1000;
                const left = Math.max(0, DURATION - elapsed);
                timeChip.textContent = left.toFixed(1);
                if (left <= 0) endRound();
            }

            draw();

            const idle = !running && particles.length === 0 && disp < 0.004 && bellSwing === 0;
            if (idle) { rafId = 0; disp = 0; draw(); }
            else rafId = requestAnimationFrame(frame);
        }

        function spawnSparks(x, y) {
            if (reducedMotion.matches) return;
            const n = 6;
            for (let i = 0; i < n; i++) {
                const a = Math.random() * Math.PI * 2;
                const sp = 120 + Math.random() * 220;
                particles.push({
                    kind: 'spark', x, y,
                    vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 80,
                    rot: a, vr: (Math.random() - 0.5) * 10,
                    size: 8 + Math.random() * 8,
                    color: SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)],
                    life: 0.45, max: 0.45
                });
            }
            if (particles.length > 240) particles = particles.slice(-240);
        }

        function spawnText(x, y, text, color, size) {
            particles.push({
                kind: 'text', x, y, text, color, size,
                vx: 0, vy: -60, rot: (Math.random() - 0.5) * 0.3, vr: 0,
                life: 1.1, max: 1.1
            });
        }

        // ---- round flow ----
        function clap(x, y) {
            if (over) return;
            if (!running) {
                running = true;
                bellRungThisRound = false;
                goldRound = false;
                claps = 0;
                roundStart = performance.now();
                hintEl.classList.add('gone');
            }
            claps++;
            lifetime++;
            clapChip.textContent = 'claps: ' + claps;
            level = Math.min(1, level + 0.085 + Math.random() * 0.02);
            dispV += 0.4;
            spawnSparks(x, y);
            wake();
        }

        function endRound() {
            running = false;
            over = true;
            saveNum('clapometer-lifetime', lifetime);
            if (claps > best) { best = claps; saveNum('clapometer-best', best); }
            updateTally();

            let tier = TIERS[0];
            for (const t of TIERS) if (claps >= t.min) tier = t;

            stampEl.textContent = goldRound ? 'Carnival Legend' : tier.label;
            stampEl.classList.toggle('gold', goldRound);
            verdictSub.textContent = tier.sub + (bellRungThisRound && !goldRound ? ' also: the bell.' : '');
            verdictNums.textContent = claps + ' claps · ' + (claps / DURATION).toFixed(1) + ' per second' + (claps >= best && claps > 0 ? ' · personal best' : '');
            verdictEl.classList.add('show');
            if (!reducedMotion.matches) {
                document.body.classList.add('thunk');
                setTimeout(() => document.body.classList.remove('thunk'), 250);
            }
        }

        document.getElementById('againBtn').addEventListener('click', e => {
            e.stopPropagation();
            over = false;
            claps = 0;
            level = 0; disp = 0; dispV = 0;
            clapChip.textContent = 'claps: 0';
            timeChip.textContent = DURATION.toFixed(1);
            verdictEl.classList.remove('show');
            wake();
        });

        window.addEventListener('pointerdown', e => {
            if (verdictEl.classList.contains('show')) return;
            clap(e.clientX, e.clientY);
        });
        window.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (verdictEl.classList.contains('show')) return;
                clap(W / 2, H * 0.5);
            }
        });

        setTimeout(() => hintEl.classList.add('gone'), 10000);

        let resizeTimer = 0;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => { resize(); draw(); }, 150);
        });

        resize();
        updateTally();
        draw();
    })();
    </script>
</body>
</html>
