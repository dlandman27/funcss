<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clap-o-Meter</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a0a00 0%, #0a0500 100%);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
        }

        /* Carnival lights */
        .lights-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            padding: 10px 0;
        }

        .bulb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            transition: box-shadow 0.1s;
        }

        /* Gauge */
        .gauge-wrap {
            position: relative;
            width: min(340px, 90vw);
            height: min(200px, 52vw);
            margin: 8px auto;
        }

        #gaugeCanvas {
            width: 100%;
            height: 100%;
        }

        /* Stats row */
        .stats {
            display: flex;
            gap: 28px;
            justify-content: center;
            margin: 10px 0;
            font-size: 13px;
            letter-spacing: 2px;
            color: #aaa;
        }

        .stat-val {
            font-size: 22px;
            display: block;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 8px currentColor;
        }

        /* Big clap button */
        .clap-btn {
            width: min(160px, 44vw);
            height: min(160px, 44vw);
            border-radius: 50%;
            border: 4px solid #ff9500;
            background: radial-gradient(circle at 38% 35%, #ff9500, #b35a00);
            box-shadow: 0 0 30px rgba(255,149,0,0.5), inset 0 4px 12px rgba(255,255,255,0.15);
            cursor: pointer;
            font-size: clamp(28px, 8vw, 42px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.07s, box-shadow 0.07s;
            margin: 12px auto;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .clap-btn:active, .clap-btn.pressed {
            transform: scale(0.91);
            box-shadow: 0 0 12px rgba(255,149,0,0.3), inset 0 4px 12px rgba(0,0,0,0.3);
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            border: 3px solid rgba(255,149,0,0.6);
            animation: rippleOut 0.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes rippleOut {
            0%   { width: 100%; height: 100%; opacity: 1; left: 0; top: 0; }
            100% { width: 200%; height: 200%; opacity: 0; left: -50%; top: -50%; }
        }

        .hint { color: #555; font-size: 13px; letter-spacing: 2px; text-align: center; margin-top: 4px; }

        /* Plus one particles */
        .plus-one {
            position: fixed;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            color: #ff9500;
            text-shadow: 0 0 8px rgba(255,149,0,0.8);
            animation: floatUp 0.8s ease-out forwards;
            z-index: 50;
        }

        @keyframes floatUp {
            0%   { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-70px) scale(0.5); opacity: 0; }
        }

        /* Result overlay */
        .result-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .result-overlay.show { display: flex; }

        .result-tier {
            font-size: clamp(32px, 10vw, 56px);
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 12px;
            animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .result-msg {
            font-size: clamp(16px, 4vw, 22px);
            color: #ccc;
            max-width: 400px;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .result-cps {
            font-size: 14px;
            color: #666;
            letter-spacing: 2px;
            margin-bottom: 32px;
        }

        .play-again {
            background: none;
            border: 2px solid #ff9500;
            color: #ff9500;
            font-family: inherit;
            font-size: 16px;
            letter-spacing: 3px;
            padding: 12px 32px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s, color 0.2s;
        }

        .play-again:hover { background: #ff9500; color: #000; }

        /* Confetti */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confettiFall var(--dur) ease-in forwards;
            z-index: 99;
        }

        @keyframes confettiFall {
            0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="lights-row" id="topLights"></div>

<div class="gauge-wrap">
    <canvas id="gaugeCanvas"></canvas>
</div>

<div class="stats">
    <div>
        <span class="stat-val" id="statCPS">0.0</span>
        CPS
    </div>
    <div>
        <span class="stat-val" id="statClicks">0</span>
        CLICKS
    </div>
    <div>
        <span class="stat-val" id="statTimer">10</span>
        SEC
    </div>
</div>

<div class="clap-btn" id="clapBtn">👏</div>
<div class="hint" id="hint">tap to start</div>

<div class="lights-row" id="bottomLights"></div>

<!-- Result -->
<div class="result-overlay" id="resultOverlay">
    <div class="result-tier" id="resultTier"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-cps" id="resultCps"></div>
    <button class="play-again" onclick="reset()">Play Again</button>
</div>

<script>
    const DURATION = 10;
    const tiers = [
        { min: 0,   label: '👏 Golf Clap',          color: '#4a9eff', msg: 'Polite. Reserved. Possibly British.' },
        { min: 2,   label: '🙌 Polite Applause',     color: '#30d158', msg: 'A solid showing. Your hands work, at least.' },
        { min: 4,   label: '🎉 Enthusiastic Crowd',  color: '#ff9500', msg: 'Now we\'re talking! The crowd is into it.' },
        { min: 7,   label: '🏆 Standing Ovation',    color: '#ff375f', msg: 'On your feet! Absolutely electric performance!' },
        { min: 11,  label: '💀 ARE YOU OK??',        color: '#bf5af2', msg: 'Please see a doctor. That is not normal.' },
    ];

    let clicks = 0, running = false, startTime = null, timerInterval = null, cps = 0;

    const btn = document.getElementById('clapBtn');
    const hint = document.getElementById('hint');
    const statCPS = document.getElementById('statCPS');
    const statClicks = document.getElementById('statClicks');
    const statTimer = document.getElementById('statTimer');

    // Gauge canvas
    const canvas = document.getElementById('gaugeCanvas');
    const dpr = window.devicePixelRatio || 1;
    function resizeCanvas() {
        const w = canvas.offsetWidth, h = canvas.offsetHeight;
        canvas.width = w * dpr; canvas.height = h * dpr;
    }
    resizeCanvas();
    window.addEventListener('resize', () => { resizeCanvas(); drawGauge(0); });

    function drawGauge(fraction) {
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);

        const cx = W / 2, cy = H * 0.88;
        const R = Math.min(W * 0.44, H * 0.84);

        const startAngle = Math.PI, endAngle = 0;

        // Background arc
        ctx.beginPath();
        ctx.arc(cx, cy, R, startAngle, endAngle);
        ctx.strokeStyle = '#222';
        ctx.lineWidth = R * 0.16;
        ctx.lineCap = 'butt';
        ctx.stroke();

        // Color zones
        const zones = [
            { from: 0, to: 0.2, color: '#4a9eff' },
            { from: 0.2, to: 0.4, color: '#30d158' },
            { from: 0.4, to: 0.65, color: '#ff9500' },
            { from: 0.65, to: 0.85, color: '#ff375f' },
            { from: 0.85, to: 1.0, color: '#bf5af2' },
        ];
        zones.forEach(z => {
            ctx.beginPath();
            ctx.arc(cx, cy, R, Math.PI + z.from * Math.PI, Math.PI + z.to * Math.PI);
            ctx.strokeStyle = z.color;
            ctx.lineWidth = R * 0.14;
            ctx.globalAlpha = 0.35;
            ctx.stroke();
            ctx.globalAlpha = 1;
        });

        // Active fill
        if (fraction > 0) {
            ctx.beginPath();
            ctx.arc(cx, cy, R, Math.PI, Math.PI + fraction * Math.PI);
            const grad = ctx.createLinearGradient(cx - R, cy, cx + R, cy);
            grad.addColorStop(0, '#4a9eff');
            grad.addColorStop(0.35, '#30d158');
            grad.addColorStop(0.6, '#ff9500');
            grad.addColorStop(0.8, '#ff375f');
            grad.addColorStop(1, '#bf5af2');
            ctx.strokeStyle = grad;
            ctx.lineWidth = R * 0.14;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        // Needle
        const angle = Math.PI + fraction * Math.PI;
        const nx = cx + (R * 0.78) * Math.cos(angle);
        const ny = cy + (R * 0.78) * Math.sin(angle);
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(nx, ny);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3 * dpr;
        ctx.lineCap = 'round';
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 6;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Center cap
        ctx.beginPath();
        ctx.arc(cx, cy, R * 0.07, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();

        // Tick labels
        const labels = ['0', '3', '6', '9', '12+'];
        ctx.font = `${R * 0.1}px 'Courier New'`;
        ctx.fillStyle = '#555';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        labels.forEach((lbl, i) => {
            const a = Math.PI + (i / (labels.length - 1)) * Math.PI;
            const lr = R * 1.13;
            ctx.fillText(lbl, cx + lr * Math.cos(a), cy + lr * Math.sin(a));
        });
    }

    drawGauge(0);

    // Lights
    function makeLights(containerId, count) {
        const el = document.getElementById(containerId);
        const colors = ['#ff375f','#ff9500','#ffd60a','#30d158','#0a84ff','#bf5af2'];
        for (let i = 0; i < count; i++) {
            const b = document.createElement('div');
            b.className = 'bulb';
            b.style.background = colors[i % colors.length];
            b.style.opacity = '0.25';
            el.appendChild(b);
        }
    }
    makeLights('topLights', 18);
    makeLights('bottomLights', 18);

    let lightPhase = 0;
    function animateLights(speed = 300) {
        const all = document.querySelectorAll('.bulb');
        all.forEach((b, i) => {
            const on = (i + lightPhase) % 3 === 0;
            b.style.opacity = on ? '1' : '0.2';
            b.style.boxShadow = on ? `0 0 8px ${b.style.background}` : 'none';
        });
        lightPhase++;
    }
    let lightInterval = setInterval(() => animateLights(), 350);

    btn.addEventListener('click', handleClick);
    document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); handleClick(e); } });

    function handleClick(e) {
        if (!running) startGame();
        clicks++;
        const elapsed = (Date.now() - startTime) / 1000 || 0.001;
        cps = clicks / elapsed;
        statClicks.textContent = clicks;
        statCPS.textContent = cps.toFixed(1);
        const fraction = Math.min(cps / 13, 1);
        drawGauge(fraction);

        // Ripple
        const r = document.createElement('div');
        r.className = 'ripple';
        btn.appendChild(r);
        setTimeout(() => r.remove(), 500);

        // Floating +1
        const p = document.createElement('div');
        p.className = 'plus-one';
        p.textContent = '+1';
        const rect = btn.getBoundingClientRect();
        p.style.left = (rect.left + rect.width / 2 - 15 + (Math.random() - 0.5) * 40) + 'px';
        p.style.top  = (rect.top + (Math.random() * 20)) + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);

        btn.classList.add('pressed');
        setTimeout(() => btn.classList.remove('pressed'), 100);
    }

    function startGame() {
        running = true;
        startTime = Date.now();
        hint.textContent = 'KEEP GOING!';
        clearInterval(lightInterval);
        lightInterval = setInterval(() => animateLights(), 80);

        timerInterval = setInterval(() => {
            const elapsed = (Date.now() - startTime) / 1000;
            const remaining = Math.max(0, DURATION - elapsed);
            statTimer.textContent = remaining.toFixed(1);
            if (elapsed >= DURATION) {
                clearInterval(timerInterval);
                endGame();
            }
        }, 50);
    }

    function endGame() {
        running = false;
        clearInterval(lightInterval);
        const finalCPS = clicks / DURATION;
        showResult(finalCPS);
    }

    function showResult(finalCPS) {
        let tier = tiers[0];
        for (const t of tiers) { if (finalCPS >= t.min) tier = t; }

        document.getElementById('resultTier').textContent = tier.label;
        document.getElementById('resultTier').style.color = tier.color;
        document.getElementById('resultMsg').textContent = tier.msg;
        document.getElementById('resultCps').textContent = `${finalCPS.toFixed(1)} clicks/sec · ${clicks} total`;
        document.getElementById('resultOverlay').classList.add('show');

        if (finalCPS >= 7) launchConfetti(tier.color);
    }

    function launchConfetti(color) {
        const colors = [color, '#fff', '#ffd60a', '#ff9500'];
        for (let i = 0; i < 80; i++) {
            setTimeout(() => {
                const c = document.createElement('div');
                c.className = 'confetti-piece';
                c.style.setProperty('--dur', (1.5 + Math.random() * 2) + 's');
                c.style.left = (Math.random() * 100) + 'vw';
                c.style.top = '-20px';
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                c.style.transform = `rotate(${Math.random() * 360}deg)`;
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3500);
            }, Math.random() * 600);
        }
    }

    function reset() {
        clicks = 0; cps = 0; running = false;
        startTime = null;
        clearInterval(timerInterval);
        statCPS.textContent = '0.0';
        statClicks.textContent = '0';
        statTimer.textContent = '10';
        drawGauge(0);
        document.getElementById('resultOverlay').classList.remove('show');
        hint.textContent = 'tap to start';
        clearInterval(lightInterval);
        lightInterval = setInterval(() => animateLights(), 350);
    }
</script>
</body>
</html>
