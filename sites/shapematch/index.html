<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Match</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f13;
            --surface: #17171d;
            --border: #26262f;
            --text: #e8e8f0;
            --muted: #5a5a6e;
            --correct: #3ddc84;
            --wrong: #ff4d6a;
            --same: #5b9cf6;
            --mirror: #f59e0b;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* ── LAYOUT ── */
        #game {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            position: relative;
        }

        /* ── TOP BAR ── */
        #topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            border-bottom: 1px solid var(--border);
            background: rgba(15,15,19,0.9);
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        #title-text {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
        }

        #score-display {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            min-width: 60px;
            text-align: center;
        }

        #streak-display {
            font-size: 13px;
            color: var(--muted);
            min-width: 80px;
            text-align: right;
        }

        #streak-display span {
            color: var(--correct);
            font-weight: 700;
        }

        /* ── TIMER BAR ── */
        #timer-wrap {
            position: fixed;
            top: 56px; left: 0; right: 0;
            height: 3px;
            background: var(--border);
            z-index: 10;
        }

        #timer-bar {
            height: 100%;
            background: var(--text);
            width: 100%;
            transform-origin: left;
            transition: background 0.3s;
        }

        /* ── ARENA ── */
        #arena {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(32px, 6vw, 80px);
            padding-top: 56px;
            flex: 1;
            width: 100%;
        }

        .shape-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            width: clamp(160px, 28vw, 320px);
            height: clamp(160px, 28vw, 320px);
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--surface);
            position: relative;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .shape-panel canvas {
            display: block;
        }

        /* Flash feedback */
        .shape-panel.flash-correct {
            border-color: var(--correct);
            box-shadow: 0 0 30px rgba(61,220,132,0.25);
        }
        .shape-panel.flash-wrong {
            border-color: var(--wrong);
            box-shadow: 0 0 30px rgba(255,77,106,0.25);
        }

        /* VS divider */
        #vs {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: var(--border);
            flex-shrink: 0;
        }

        /* ── BUTTONS ── */
        #buttons {
            display: flex;
            gap: 16px;
            padding-bottom: clamp(24px, 4vh, 48px);
            padding-top: 20px;
        }

        .answer-btn {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 14px 36px;
            border: 2px solid;
            border-radius: 10px;
            background: transparent;
            cursor: pointer;
            transition: background 0.12s, box-shadow 0.12s, transform 0.08s;
            position: relative;
        }

        #btn-same {
            color: var(--same);
            border-color: var(--same);
        }
        #btn-same:hover, #btn-same:focus {
            background: rgba(91,156,246,0.12);
            box-shadow: 0 0 20px rgba(91,156,246,0.2);
        }
        #btn-same:active { transform: scale(0.96); }

        #btn-mirror {
            color: var(--mirror);
            border-color: var(--mirror);
        }
        #btn-mirror:hover, #btn-mirror:focus {
            background: rgba(245,158,11,0.12);
            box-shadow: 0 0 20px rgba(245,158,11,0.2);
        }
        #btn-mirror:active { transform: scale(0.96); }

        .btn-key {
            display: block;
            font-size: 9px;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-top: 3px;
            text-transform: uppercase;
        }

        /* ── FEEDBACK TEXT ── */
        #feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(48px, 10vw, 96px);
            font-weight: 700;
            pointer-events: none;
            opacity: 0;
            z-index: 20;
            letter-spacing: -0.02em;
        }

        /* ── START / GAME OVER SCREENS ── */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,15,19,0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 50;
            text-align: center;
            padding: 24px;
        }

        #overlay h1 {
            font-size: clamp(32px, 7vw, 64px);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        #overlay .sub {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.8;
            max-width: 380px;
        }

        #overlay .big-score {
            font-size: clamp(64px, 15vw, 120px);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.03em;
        }

        #overlay .label {
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--muted);
        }

        #btn-play {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding: 16px 48px;
            border: 2px solid var(--text);
            border-radius: 10px;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s, box-shadow 0.15s;
        }
        #btn-play:hover {
            background: rgba(232,232,240,0.08);
            box-shadow: 0 0 30px rgba(232,232,240,0.1);
        }

        .hint-row {
            display: flex;
            gap: 24px;
            font-size: 12px;
            color: var(--muted);
        }

        .hint-key {
            display: inline-block;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 7px;
            font-size: 11px;
            color: var(--muted);
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div id="topbar">
    <div id="title-text">Shape Match</div>
    <div id="score-display">0</div>
    <div id="streak-display">streak <span id="streak-num">0</span></div>
</div>

<div id="timer-wrap">
    <div id="timer-bar"></div>
</div>

<div id="game">
    <div id="arena">
        <div class="shape-panel" id="panel-left">
            <canvas id="canvas-left"></canvas>
        </div>
        <div id="vs">VS</div>
        <div class="shape-panel" id="panel-right">
            <canvas id="canvas-right"></canvas>
        </div>
    </div>
    <div id="buttons">
        <button class="answer-btn" id="btn-same">
            Same
            <span class="btn-key">← or Z</span>
        </button>
        <button class="answer-btn" id="btn-mirror">
            Mirrored
            <span class="btn-key">→ or X</span>
        </button>
    </div>
</div>

<div id="feedback"></div>

<div id="overlay">
    <div id="overlay-content"></div>
</div>

<script>
(() => {

    // ── SHAPE GENERATION ─────────────────────────────────────────────────────

    function generateShape(sides, irregularity, seed) {
        // seeded noise so shapes are reproducible
        const pts = [];
        const angleStep = (Math.PI * 2) / sides;
        for (let i = 0; i < sides; i++) {
            const angle = i * angleStep + rng(seed + i * 7.3) * angleStep * irregularity;
            const r = 0.55 + rng(seed + i * 13.7) * 0.45;
            pts.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
        }
        return pts;
    }

    function rng(seed) {
        const x = Math.sin(seed + 1) * 43758.5453;
        return x - Math.floor(x);
    }

    function rotateShape(pts, angle) {
        const cos = Math.cos(angle), sin = Math.sin(angle);
        return pts.map(p => ({
            x: p.x * cos - p.y * sin,
            y: p.x * sin + p.y * cos
        }));
    }

    function mirrorShape(pts) {
        return pts.map(p => ({ x: -p.x, y: p.y }));
    }

    function drawShape(canvas, pts, color) {
        const size = canvas.width;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, size, size);

        const scale = size * 0.42;
        const cx = size / 2, cy = size / 2;

        ctx.beginPath();
        ctx.moveTo(cx + pts[0].x * scale, cy + pts[0].y * scale);
        for (let i = 1; i < pts.length; i++) {
            ctx.lineTo(cx + pts[i].x * scale, cy + pts[i].y * scale);
        }
        ctx.closePath();

        ctx.fillStyle = color + '22';
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.lineJoin = 'round';
        ctx.stroke();
    }

    // ── STATE ─────────────────────────────────────────────────────────────────

    let score       = 0;
    let streak      = 0;
    let bestStreak  = 0;
    let round       = 0;
    let isMirrored  = false;
    let answered    = false;
    let timerStart  = 0;
    let timerDur    = 3000;  // ms, decreases over time
    let timerRAF    = null;
    let phase       = 'start'; // start | playing | gameover

    const MIN_TIME  = 600;
    const START_TIME = 3000;

    // ── DOM ───────────────────────────────────────────────────────────────────

    const scoreEl    = document.getElementById('score-display');
    const streakEl   = document.getElementById('streak-num');
    const timerBar   = document.getElementById('timer-bar');
    const panelL     = document.getElementById('panel-left');
    const panelR     = document.getElementById('panel-right');
    const canvasL    = document.getElementById('canvas-left');
    const canvasR    = document.getElementById('canvas-right');
    const feedback   = document.getElementById('feedback');
    const overlay    = document.getElementById('overlay');
    const overlayContent = document.getElementById('overlay-content');
    const btnSame    = document.getElementById('btn-same');
    const btnMirror  = document.getElementById('btn-mirror');

    // ── SIZING ────────────────────────────────────────────────────────────────

    function sizeCanvas() {
        const panel = panelL;
        const size  = panel.clientWidth - 32;
        [canvasL, canvasR].forEach(c => {
            c.width  = size;
            c.height = size;
        });
    }

    window.addEventListener('resize', () => {
        sizeCanvas();
        if (phase === 'playing') drawRound();
    });

    // ── ROUND ─────────────────────────────────────────────────────────────────

    let currentPts, currentSeed;

    function newRound() {
        answered = false;
        round++;

        // Difficulty: more sides and more irregularity over time
        const level = Math.min(round, 30);
        const sides = 4 + Math.floor(level / 5);          // 4 → 10
        const irr   = 0.2 + Math.min(level * 0.025, 0.6); // 0.2 → 0.8

        currentSeed = Math.random() * 10000;
        currentPts  = generateShape(sides, irr, currentSeed);
        isMirrored  = Math.random() < 0.5;

        // Timer gets faster
        timerDur = Math.max(MIN_TIME, START_TIME - (round - 1) * 80);

        drawRound();
        startTimer();
        clearPanelFlash();
    }

    function drawRound() {
        sizeCanvas();

        // Left: original shape, random rotation
        const rotA = Math.random() * Math.PI * 2;
        const ptsL = rotateShape(currentPts, rotA);
        drawShape(canvasL, ptsL, '#e8e8f0');

        // Right: same rotation base + more rotation, optionally mirrored
        const rotB = Math.random() * Math.PI * 2;
        let ptsR = rotateShape(currentPts, rotB);
        if (isMirrored) ptsR = mirrorShape(ptsR);
        drawShape(canvasR, ptsR, '#e8e8f0');
    }

    // ── TIMER ─────────────────────────────────────────────────────────────────

    function startTimer() {
        cancelAnimationFrame(timerRAF);
        timerStart = performance.now();
        timerBar.style.transition = 'none';
        timerBar.style.width = '100%';
        timerBar.style.background = 'var(--text)';

        function frame(now) {
            const elapsed = now - timerStart;
            const pct = Math.max(0, 1 - elapsed / timerDur);

            timerBar.style.width = (pct * 100) + '%';

            // Color shift as time runs out
            if (pct < 0.25) timerBar.style.background = 'var(--wrong)';
            else if (pct < 0.5) timerBar.style.background = 'var(--mirror)';
            else timerBar.style.background = 'var(--text)';

            if (pct <= 0) {
                timeUp();
                return;
            }
            timerRAF = requestAnimationFrame(frame);
        }
        timerRAF = requestAnimationFrame(frame);
    }

    function stopTimer() {
        cancelAnimationFrame(timerRAF);
    }

    function timeUp() {
        if (answered) return;
        answered = true;
        stopTimer();
        timerBar.style.width = '0%';
        handleAnswer(null); // null = ran out of time
    }

    // ── ANSWER ────────────────────────────────────────────────────────────────

    function handleAnswer(guess) {
        if (answered && guess !== null) return;
        if (phase !== 'playing') return;
        answered = true;
        stopTimer();

        const correct = guess === null ? false : (guess === isMirrored);

        if (correct) {
            score++;
            streak++;
            if (streak > bestStreak) bestStreak = streak;
            scoreEl.textContent = score;
            streakEl.textContent = streak;
            showFeedback('✓', 'var(--correct)');
            flashPanels('correct');
            setTimeout(newRound, 500);
        } else {
            // game over
            flashPanels('wrong');
            showFeedback(guess === null ? '⏱' : '✗', 'var(--wrong)');
            setTimeout(() => {
                phase = 'gameover';
                showGameOver();
            }, 700);
        }
    }

    // ── FEEDBACK FLASH ────────────────────────────────────────────────────────

    let feedbackTimer = null;
    function showFeedback(text, color) {
        clearTimeout(feedbackTimer);
        feedback.textContent = text;
        feedback.style.color = color;
        feedback.style.opacity = '1';
        feedback.style.transform = 'translate(-50%, -50%) scale(1)';
        feedback.style.transition = 'none';
        feedbackTimer = setTimeout(() => {
            feedback.style.transition = 'opacity 0.3s, transform 0.3s';
            feedback.style.opacity = '0';
            feedback.style.transform = 'translate(-50%, -60%) scale(0.8)';
        }, 200);
    }

    function flashPanels(type) {
        [panelL, panelR].forEach(p => {
            p.classList.remove('flash-correct', 'flash-wrong');
            p.classList.add(type === 'correct' ? 'flash-correct' : 'flash-wrong');
        });
    }

    function clearPanelFlash() {
        [panelL, panelR].forEach(p => {
            p.classList.remove('flash-correct', 'flash-wrong');
        });
    }

    // ── OVERLAY ───────────────────────────────────────────────────────────────

    function showStart() {
        overlay.style.display = 'flex';
        overlayContent.innerHTML = `
            <div style="font-size:13px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;">Shape Match</div>
            <h1 style="margin-bottom:12px;">Same or<br>Mirrored?</h1>
            <p class="sub" style="margin-bottom:28px;">Two shapes appear. Decide if the right one is the same shape (just rotated) or a mirror image. Gets faster every round.</p>
            <div class="hint-row" style="margin-bottom:28px;">
                <div><span class="hint-key">Z</span> or <span class="hint-key">←</span> Same</div>
                <div><span class="hint-key">X</span> or <span class="hint-key">→</span> Mirror</div>
            </div>
            <button id="btn-play">Play</button>
        `;
        document.getElementById('btn-play').addEventListener('click', startGame);
    }

    function showGameOver() {
        stopTimer();
        timerBar.style.width = '0%';
        overlay.style.display = 'flex';
        overlayContent.innerHTML = `
            <div class="label" style="margin-bottom:12px;">Game Over</div>
            <div class="big-score">${score}</div>
            <div class="label" style="margin-bottom:24px; margin-top:8px;">${score === 1 ? 'point' : 'points'}</div>
            <div style="font-size:13px;color:var(--muted);margin-bottom:28px;">Best streak: <strong style="color:var(--text)">${bestStreak}</strong></div>
            <button id="btn-play">Play Again</button>
        `;
        document.getElementById('btn-play').addEventListener('click', startGame);
    }

    function startGame() {
        score   = 0;
        streak  = 0;
        round   = 0;
        phase   = 'playing';
        scoreEl.textContent = '0';
        streakEl.textContent = '0';
        overlay.style.display = 'none';
        sizeCanvas();
        newRound();
    }

    // ── INPUT ─────────────────────────────────────────────────────────────────

    btnSame.addEventListener('click', () => handleAnswer(false));
    btnMirror.addEventListener('click', () => handleAnswer(true));

    document.addEventListener('keydown', e => {
        if (phase !== 'playing') {
            if (e.code === 'Space' || e.code === 'Enter') {
                const btn = document.getElementById('btn-play');
                if (btn) btn.click();
            }
            return;
        }
        if (e.code === 'ArrowLeft'  || e.key === 'z' || e.key === 'Z') handleAnswer(false);
        if (e.code === 'ArrowRight' || e.key === 'x' || e.key === 'X') handleAnswer(true);
    });

    // ── BOOT ──────────────────────────────────────────────────────────────────

    sizeCanvas();
    showStart();

})();
</script>
</body>
</html>
