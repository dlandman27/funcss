<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Match</title>
    <meta name="description" content="Same shape or mirrored? Decide fast. It gets faster. It does not get easier.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'><path d='M10 8l14 6-4 14-12 4z' fill='%235aa0db' stroke='%23201a17' stroke-width='3' stroke-linejoin='round'/><path d='M40 8L26 14l4 14 12 4z' fill='%23a98fd0' stroke='%23201a17' stroke-width='3' stroke-linejoin='round'/></svg>">
    <style>
        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --coral: #f0563e;
            --sky: #5aa0db;
            --purple: #a98fd0;
            --gold: #f7c948;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            background: var(--paper);
            color: var(--ink);
            font-family: Georgia, 'Times New Roman', serif;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #game {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(10px, 2.4vh, 22px);
            padding: 12px;
        }

        #scorebar {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        #score {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(30px, 7vh, 46px);
            min-width: 60px;
            text-align: center;
            transform: rotate(-2deg);
        }
        #streak {
            font-style: italic;
            font-size: 14px;
            color: rgba(32,26,23,0.6);
        }

        #fuse {
            width: min(420px, 82vw);
            height: 16px;
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 99px;
            overflow: hidden;
        }
        #fuse i {
            display: block;
            height: 100%;
            width: 100%;
            background: var(--sky);
            border-right: 2px solid var(--ink);
        }

        #arena {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(10px, 4vw, 40px);
        }
        .panel {
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 14px;
            box-shadow: 5px 5px 0 var(--ink);
            padding: 8px;
            line-height: 0;
        }
        .panel.left { transform: rotate(-1.2deg); }
        .panel.right { transform: rotate(1.2deg); }
        .panel canvas {
            width: clamp(120px, min(38vw, 30vh), 260px);
            height: clamp(120px, min(38vw, 30vh), 260px);
        }

        #vs {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 15px;
            background: var(--coral);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 2px 2px 0 var(--ink);
            padding: 8px 10px;
            transform: rotate(-8deg);
            flex-shrink: 0;
        }

        #buttons {
            display: flex;
            gap: 18px;
            width: min(480px, 92vw);
        }
        .answer {
            flex: 1;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(15px, 4vw, 18px);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--ink);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 4px 4px 0 var(--ink);
            padding: 16px 8px 13px;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .answer small {
            display: block;
            font-family: Georgia, serif;
            font-weight: normal;
            font-style: italic;
            font-size: 11px;
            text-transform: none;
            letter-spacing: 0;
            margin-top: 2px;
            opacity: 0.65;
        }
        #btn-same { background: var(--sky); transform: rotate(-1deg); }
        #btn-mirror { background: var(--purple); transform: rotate(1deg); }
        .answer:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
        .answer:active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--ink); }

        #stampzone {
            position: fixed;
            top: 44%;
            left: 50%;
            z-index: 20;
            pointer-events: none;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(54px, 14vw, 110px);
            text-transform: uppercase;
            -webkit-text-stroke: 3px var(--ink);
            paint-order: stroke fill;
            opacity: 0;
            transform: translate(-50%, -50%) rotate(-7deg) scale(0.3);
        }
        #stampzone.pop { animation: stampPop 0.55s cubic-bezier(0.2, 1.6, 0.4, 1) forwards; }
        @keyframes stampPop {
            0% { opacity: 0; transform: translate(-50%, -50%) rotate(4deg) scale(2); }
            25% { opacity: 1; transform: translate(-50%, -50%) rotate(-8deg) scale(0.95); }
            45% { opacity: 1; transform: translate(-50%, -50%) rotate(-7deg) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -54%) rotate(-7deg) scale(1); }
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(242, 237, 226, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 20px;
        }
        .card {
            position: relative;
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 14px;
            box-shadow: 6px 6px 0 var(--ink);
            transform: rotate(-1deg);
            padding: 30px 34px;
            text-align: center;
            max-width: 420px;
        }
        .card h1 {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(26px, 7vw, 38px);
            text-transform: uppercase;
            line-height: 1.05;
            margin-bottom: 10px;
        }
        .card .sub {
            font-style: italic;
            font-size: 15px;
            color: rgba(32,26,23,0.65);
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .card .bignum {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(64px, 18vw, 110px);
            line-height: 1;
        }
        .card .rec {
            font-style: italic;
            font-size: 14px;
            color: rgba(32,26,23,0.65);
            margin: 10px 0 22px;
        }
        #btn-play {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--ink);
            background: var(--coral);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 4px 4px 0 var(--ink);
            transform: rotate(1.5deg);
            padding: 14px 34px;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        #btn-play:hover { transform: translate(-2px, -2px) rotate(1.5deg); box-shadow: 6px 6px 0 var(--ink); }
        #btn-play:active { transform: translate(3px, 3px) rotate(1.5deg); box-shadow: 0 0 0 var(--ink); }

        .newrec {
            position: absolute;
            top: -16px;
            right: -14px;
            background: var(--gold);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 3px 3px 0 var(--ink);
            padding: 8px 14px;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            transform: rotate(8deg) scale(0);
        }
        .newrec.show { animation: recPop 0.4s cubic-bezier(0.2, 1.6, 0.4, 1) 0.3s forwards; }
        @keyframes recPop {
            0% { transform: rotate(15deg) scale(0.2); }
            70% { transform: rotate(6deg) scale(1.15); }
            100% { transform: rotate(8deg) scale(1); }
        }

        @keyframes thunk {
            0% { transform: translate(0, 0); }
            25% { transform: translate(3px, 4px); }
            50% { transform: translate(-4px, 2px); }
            75% { transform: translate(2px, -3px); }
            100% { transform: translate(0, 0); }
        }
        body.thunk { animation: thunk 0.24s linear; }

        @media (prefers-reduced-motion: reduce) {
            body.thunk { animation: none; }
            #stampzone.pop { animation: none; opacity: 0; }
            .newrec.show { animation: none; transform: rotate(8deg) scale(1); }
            .answer, #btn-play { transition: none; }
        }
    </style>
</head>
<body>

<div id="game">
    <div id="scorebar">
        <div id="score">0</div>
        <div id="streak"></div>
    </div>
    <div id="fuse"><i id="fuse-fill"></i></div>
    <div id="arena">
        <div class="panel left"><canvas id="cl"></canvas></div>
        <div id="vs">VS</div>
        <div class="panel right"><canvas id="cr"></canvas></div>
    </div>
    <div id="buttons">
        <button class="answer" id="btn-same">Same<small>z or left</small></button>
        <button class="answer" id="btn-mirror">Mirrored<small>x or right</small></button>
    </div>
</div>

<div id="stampzone"></div>
<div id="overlay"><div class="card" id="card"></div></div>

<script>
(() => {
    const INK = '#201a17';
    const COLORS = ['#f0563e', '#5aa0db', '#b7ce3c', '#a98fd0', '#f47b28', '#ff7fa5', '#2fb0a3', '#f7c948'];
    const START_TIME = 3000, MIN_TIME = 650;

    const scoreEl = document.getElementById('score');
    const streakEl = document.getElementById('streak');
    const fuseFill = document.getElementById('fuse-fill');
    const cl = document.getElementById('cl');
    const cr = document.getElementById('cr');
    const stamp = document.getElementById('stampzone');
    const overlay = document.getElementById('overlay');
    const card = document.getElementById('card');
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

    function loadNum(k) { try { return parseInt(localStorage.getItem(k), 10) || 0; } catch (e) { return 0; } }
    function saveNum(k, v) { try { localStorage.setItem(k, String(v)); } catch (e) {} }

    let record = loadNum('shapematch-record');
    let bestStreakEver = loadNum('shapematch-beststreak');

    let phase = 'start';
    let score = 0, streak = 0, round = 0;
    let isMirrored = false, answered = false;
    let timerDur = START_TIME, timerStart = 0, timerRAF = 0;
    let pts = null, color = '';

    // ---- shapes ----
    function rng(seed) { const x = Math.sin(seed + 1) * 43758.5453; return x - Math.floor(x); }

    function genShape(sides, irr, seed) {
        const out = [];
        const step = Math.PI * 2 / sides;
        for (let i = 0; i < sides; i++) {
            const a = i * step + rng(seed + i * 7.3) * step * irr;
            const r = 0.55 + rng(seed + i * 13.7) * 0.45;
            out.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
        }
        return out;
    }
    const rot = (p, a) => {
        const c = Math.cos(a), s = Math.sin(a);
        return p.map(q => ({ x: q.x * c - q.y * s, y: q.x * s + q.y * c }));
    };
    const mirror = p => p.map(q => ({ x: -q.x, y: q.y }));

    function sizeCanvas(c) {
        const rect = c.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        c.width = Math.round(rect.width * dpr);
        c.height = Math.round(rect.height * dpr);
    }

    function draw(c, shape, col) {
        sizeCanvas(c);
        const x = c.getContext('2d');
        const W = c.width;
        const s = W * 0.38, cx = W / 2, cy = W / 2;
        const off = W * 0.03;
        x.clearRect(0, 0, W, W);
        const trace = (dx, dy) => {
            x.beginPath();
            x.moveTo(cx + dx + shape[0].x * s, cy + dy + shape[0].y * s);
            for (let i = 1; i < shape.length; i++) x.lineTo(cx + dx + shape[i].x * s, cy + dy + shape[i].y * s);
            x.closePath();
        };
        trace(off, off);
        x.fillStyle = INK;
        x.fill();
        trace(0, 0);
        x.fillStyle = col;
        x.fill();
        x.lineWidth = Math.max(2.5, W * 0.012);
        x.lineJoin = 'round';
        x.strokeStyle = INK;
        x.stroke();
    }

    // ---- rounds ----
    let rotL = 0, rotR = 0;
    function newRound() {
        answered = false;
        round++;
        const level = Math.min(round, 30);
        const sides = 4 + Math.floor(level / 5);
        const irr = 0.2 + Math.min(level * 0.025, 0.6);
        pts = genShape(sides, irr, Math.random() * 10000);
        isMirrored = Math.random() < 0.5;
        color = COLORS[Math.floor(Math.random() * COLORS.length)];
        rotL = Math.random() * Math.PI * 2;
        rotR = Math.random() * Math.PI * 2;
        timerDur = Math.max(MIN_TIME, START_TIME - (round - 1) * 80);
        render();
        startFuse();
    }

    function render() {
        if (!pts) return;
        draw(cl, rot(pts, rotL), color);
        let right = rot(pts, rotR);
        if (isMirrored) right = mirror(right);
        draw(cr, right, color);
    }

    // ---- fuse timer (rAF only while playing) ----
    function startFuse() {
        cancelAnimationFrame(timerRAF);
        timerStart = performance.now();
        function frame(now) {
            const pct = Math.max(0, 1 - (now - timerStart) / timerDur);
            fuseFill.style.width = pct * 100 + '%';
            fuseFill.style.background = pct < 0.25 ? '#f0563e' : pct < 0.5 ? '#f7c948' : '#5aa0db';
            if (pct <= 0) { answer(null); return; }
            timerRAF = requestAnimationFrame(frame);
        }
        timerRAF = requestAnimationFrame(frame);
    }
    function stopFuse() { cancelAnimationFrame(timerRAF); timerRAF = 0; }

    // ---- answers ----
    function showStamp(text, col) {
        stamp.textContent = text;
        stamp.style.color = col;
        stamp.classList.remove('pop');
        void stamp.offsetWidth;
        stamp.classList.add('pop');
    }

    function thunk() {
        if (reducedMotion.matches) return;
        document.body.classList.remove('thunk');
        void document.body.offsetWidth;
        document.body.classList.add('thunk');
    }

    function answer(guess) {
        if (phase !== 'playing' || answered) return;
        answered = true;
        stopFuse();
        const correct = guess !== null && guess === isMirrored;
        if (correct) {
            score++;
            streak++;
            scoreEl.textContent = score;
            streakEl.textContent = 'streak ' + streak;
            showStamp('YES', '#b7ce3c');
            setTimeout(newRound, 420);
        } else {
            showStamp(guess === null ? 'TOO SLOW' : 'NO', '#f0563e');
            thunk();
            fuseFill.style.width = '0%';
            setTimeout(gameOver, 750);
        }
    }

    // ---- screens ----
    function showStart() {
        phase = 'start';
        overlay.style.display = 'flex';
        card.innerHTML =
            '<h1>Same or<br>Mirrored?</h1>' +
            '<div class="sub">two shapes. decide if the right one is just rotated, or flipped.<br>' +
            'it gets faster. it does not get easier.<br>one mistake ends it. no appeals.</div>' +
            (record > 0 ? '<div class="rec">house record: ' + record + '</div>' : '') +
            '<button id="btn-play">Play</button>';
        card.querySelector('#btn-play').addEventListener('click', startGame);
    }

    function gameOver() {
        phase = 'gameover';
        const newRec = score > record;
        if (newRec) { record = score; saveNum('shapematch-record', record); }
        if (streak > bestStreakEver) { bestStreakEver = streak; saveNum('shapematch-beststreak', bestStreakEver); }
        overlay.style.display = 'flex';
        card.innerHTML =
            (newRec ? '<div class="newrec show">New Record</div>' : '') +
            '<h1>' + (score === 0 ? 'Rough.' : 'Done.') + '</h1>' +
            '<div class="bignum">' + score + '</div>' +
            '<div class="rec">' + (score === 1 ? 'point' : 'points') +
            ' &middot; house record: ' + record + '</div>' +
            '<button id="btn-play">Again</button>';
        card.querySelector('#btn-play').addEventListener('click', startGame);
    }

    function startGame() {
        score = 0; streak = 0; round = 0;
        scoreEl.textContent = '0';
        streakEl.textContent = 'streak 0';
        phase = 'playing';
        overlay.style.display = 'none';
        newRound();
    }

    // ---- input ----
    document.getElementById('btn-same').addEventListener('click', () => answer(false));
    document.getElementById('btn-mirror').addEventListener('click', () => answer(true));
    document.addEventListener('keydown', e => {
        if (phase !== 'playing') {
            if (e.code === 'Space' || e.code === 'Enter') {
                const b = card.querySelector('#btn-play');
                if (b) b.click();
            }
            return;
        }
        if (e.code === 'ArrowLeft' || e.key === 'z' || e.key === 'Z') answer(false);
        if (e.code === 'ArrowRight' || e.key === 'x' || e.key === 'X') answer(true);
    });

    let resizeTimer = 0;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => { if (phase === 'playing') render(); }, 150);
    });

    streakEl.textContent = 'streak 0';
    showStart();
})();
</script>
</body>
</html>
