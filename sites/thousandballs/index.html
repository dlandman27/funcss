<!DOCTYPE html>
<html lang="en">
<head>
<script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1,000 Balls</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #f6f3ee;
    background: radial-gradient(120% 100% at 50% 0%, #faf8f4 0%, #f2eee6 100%);
  }
  #c {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
    cursor: crosshair;
  }
  #counter {
    position: fixed;
    left: 18px;
    bottom: 16px;
    font: 12px/1 ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
    color: #9a938a;
    letter-spacing: 0.06em;
    user-select: none;
    -webkit-user-select: none;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="counter">1,000 balls</div>
<script>
(function () {
  'use strict';

  var N = 1000;                 // exactly one thousand balls
  var TAU = Math.PI * 2;
  var GRAVITY = 1900;           // px/s^2
  var WALL_REST = 0.32;         // wall bounce damping
  var BALL_REST = 0.06;         // ball-ball restitution (squishy pit)
  var AIR = 0.9985;             // per-step air drag
  var MAX_SPEED = 3200;
  var STEP = 1 / 60;

  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var counterEl = document.getElementById('counter');

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var W = 0, H = 0;

  // ---- flat state arrays -------------------------------------------------
  var X = new Float32Array(N);
  var Y = new Float32Array(N);
  var VX = new Float32Array(N);
  var VY = new Float32Array(N);
  var R = new Float32Array(N);
  var INVM = new Float32Array(N);
  var SPR = new Uint16Array(N);     // sprite index per ball
  var NEXT = new Int32Array(N);     // spatial-hash linked list

  // ---- palette / sprites -------------------------------------------------
  var PALETTE = ['#ef476f', '#f78c6b', '#ffd166', '#06d6a0', '#118ab2'];
  var BUCKETS = 9;
  var R_MIN = 5, R_MAX = 13;

  function hexToRgb(hex) {
    var n = parseInt(hex.slice(1), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }
  function mix(rgb, target, t) {
    return 'rgb(' +
      Math.round(rgb[0] + (target - rgb[0]) * t) + ',' +
      Math.round(rgb[1] + (target - rgb[1]) * t) + ',' +
      Math.round(rgb[2] + (target - rgb[2]) * t) + ')';
  }

  // Scale ball sizes down on small screens so the pit fits.
  var vw = window.innerWidth, vh = window.innerHeight;
  var sizeScale = 1;
  (function () {
    var idealArea = 0;
    for (var b = 0; b < BUCKETS; b++) {
      var rr = R_MIN + (R_MAX - R_MIN) * b / (BUCKETS - 1);
      idealArea += Math.PI * rr * rr * (N / BUCKETS);
    }
    var budget = vw * vh * 0.34; // pit should cover ~1/3 of the screen
    if (idealArea > budget) sizeScale = Math.max(0.42, Math.sqrt(budget / idealArea));
  })();

  var RADII = new Float32Array(BUCKETS);
  for (var b = 0; b < BUCKETS; b++) {
    RADII[b] = (R_MIN + (R_MAX - R_MIN) * b / (BUCKETS - 1)) * sizeScale;
  }
  var maxR = RADII[BUCKETS - 1];

  // Pre-render one glossy sprite per (color, size bucket).
  var SPRITES = []; // { img, half, size }
  (function buildSprites() {
    for (var c = 0; c < PALETTE.length; c++) {
      var rgb = hexToRgb(PALETTE[c]);
      for (var bb = 0; bb < BUCKETS; bb++) {
        var r = RADII[bb];
        var pad = 2;
        var cssSize = (r + pad) * 2;
        var cv = document.createElement('canvas');
        cv.width = cv.height = Math.max(4, Math.ceil(cssSize * dpr));
        var g = cv.getContext('2d');
        g.scale(cv.width / cssSize, cv.height / cssSize);
        var cx = r + pad;
        var grad = g.createRadialGradient(
          cx - r * 0.35, cx - r * 0.42, r * 0.08,
          cx, cx, r
        );
        grad.addColorStop(0, mix(rgb, 255, 0.55));
        grad.addColorStop(0.55, 'rgb(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ')');
        grad.addColorStop(1, mix(rgb, 0, 0.30));
        g.fillStyle = grad;
        g.beginPath();
        g.arc(cx, cx, r, 0, TAU);
        g.fill();
        // small specular highlight
        g.fillStyle = 'rgba(255,255,255,0.45)';
        g.beginPath();
        g.ellipse(cx - r * 0.38, cx - r * 0.46, r * 0.26, r * 0.16, -0.6, 0, TAU);
        g.fill();
        SPRITES.push({ img: cv, half: cx, size: cssSize });
      }
    }
  })();

  // ---- spatial hash grid -------------------------------------------------
  var CELL = Math.max(12, Math.ceil(maxR * 2) + 2);
  var cols = 1, rows = 1;
  var HEADS = new Int32Array(1);

  function rebuildGridDims() {
    cols = Math.max(1, Math.ceil(W / CELL));
    rows = Math.max(1, Math.ceil(H / CELL));
    if (HEADS.length < cols * rows) HEADS = new Int32Array(cols * rows);
  }

  // ---- resize ------------------------------------------------------------
  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.max(1, Math.round(W * dpr));
    canvas.height = Math.max(1, Math.round(H * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    rebuildGridDims();
    for (var i = 0; i < N; i++) {
      if (X[i] > W - R[i]) X[i] = W - R[i];
      if (X[i] < R[i]) X[i] = R[i];
      if (Y[i] > H - R[i]) Y[i] = H - R[i];
    }
  }
  window.addEventListener('resize', resize);

  // ---- init balls (rain in from above) ------------------------------------
  (function init() {
    W = vw; H = vh;
    for (var i = 0; i < N; i++) {
      var bucket = Math.min(BUCKETS - 1, Math.floor(Math.pow(Math.random(), 1.25) * BUCKETS));
      var color = (Math.random() * PALETTE.length) | 0;
      R[i] = RADII[bucket];
      INVM[i] = 1 / (R[i] * R[i]);
      SPR[i] = color * BUCKETS + bucket;
      X[i] = R[i] + Math.random() * Math.max(1, W - R[i] * 2);
      Y[i] = -Math.random() * H * 1.6 - R[i];
      VX[i] = (Math.random() - 0.5) * 120;
      VY[i] = Math.random() * 80;
    }
    resize();
  })();

  // The counter must always be true: compute it from the actual array.
  counterEl.textContent = N.toLocaleString('en-US') + ' balls';

  // ---- pointer -----------------------------------------------------------
  var px = -1e5, py = -1e5;       // pointer position
  var ppx = px, ppy = py;         // previous frame position
  var pvx = 0, pvy = 0, pSpeed = 0;
  var hasPointer = false, isDown = false;

  function pointerPos(e) {
    px = e.clientX;
    py = e.clientY;
  }
  canvas.addEventListener('pointermove', function (e) {
    pointerPos(e);
    hasPointer = true;
  });
  canvas.addEventListener('pointerdown', function (e) {
    pointerPos(e);
    hasPointer = true;
    isDown = true;
    ppx = px; ppy = py;
    burst(px, py);
    if (canvas.setPointerCapture) {
      try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
    }
    e.preventDefault();
  });
  window.addEventListener('pointerup', function () { isDown = false; });
  window.addEventListener('pointercancel', function () { isDown = false; });
  canvas.addEventListener('pointerleave', function () {
    if (!isDown) { hasPointer = false; px = -1e5; py = -1e5; ppx = px; ppy = py; }
  });

  // Instant scatter on click/touch.
  function burst(bx, by) {
    var RAD = 190;
    for (var i = 0; i < N; i++) {
      var dx = X[i] - bx, dy = Y[i] - by;
      var d2 = dx * dx + dy * dy;
      if (d2 > RAD * RAD) continue;
      var d = Math.sqrt(d2) || 0.001;
      var s = 1 - d / RAD;
      var k = s * (520 + Math.random() * 320);
      VX[i] += (dx / d) * k;
      VY[i] += (dy / d) * k - s * 220;
    }
  }

  // ---- shake detection ----------------------------------------------------
  // Desktop: poll window.screenX/screenY deltas in the rAF loop.
  var lastSX = window.screenX, lastSY = window.screenY;
  var shakeKX = 0, shakeKY = 0;

  function pollWindowShake() {
    var sx = window.screenX, sy = window.screenY;
    var dx = sx - lastSX, dy = sy - lastSY;
    lastSX = sx; lastSY = sy;
    if (dx === 0 && dy === 0) return;
    shakeKX = Math.max(-1600, Math.min(1600, -dx * 14));
    shakeKY = Math.max(-1600, Math.min(1600, -dy * 14));
  }

  // Mobile: devicemotion as the shake input (no permission prompt is shown;
  // on iOS 13+ this stays silent unless permission was already granted).
  var lastMotion = 0;
  window.addEventListener('devicemotion', function (e) {
    var a = e.acceleration;
    if (!a || a.x == null) return;
    var mag = Math.abs(a.x) + Math.abs(a.y || 0);
    var now = performance.now();
    if (mag > 14 && now - lastMotion > 90) {
      lastMotion = now;
      shakeKX = Math.max(-1600, Math.min(1600, -a.x * 90));
      shakeKY = Math.max(-1600, Math.min(1600, (a.y || 0) * 90));
    }
  });

  function applyShake() {
    if (shakeKX === 0 && shakeKY === 0) return;
    for (var i = 0; i < N; i++) {
      var j = 0.4 + Math.random() * 1.1;
      VX[i] += shakeKX * j;
      VY[i] += shakeKY * j - Math.random() * (Math.abs(shakeKX) + Math.abs(shakeKY)) * 0.22;
    }
    shakeKX = 0;
    shakeKY = 0;
  }

  // ---- physics ------------------------------------------------------------
  function fillGrid() {
    var total = cols * rows;
    for (var c = 0; c < total; c++) HEADS[c] = -1;
    for (var i = 0; i < N; i++) {
      var cx = (X[i] / CELL) | 0;
      var cy = (Y[i] / CELL) | 0;
      if (cx < 0) cx = 0; else if (cx >= cols) cx = cols - 1;
      if (cy < 0) cy = 0; else if (cy >= rows) cy = rows - 1;
      var cell = cy * cols + cx;
      NEXT[i] = HEADS[cell];
      HEADS[cell] = i;
    }
  }

  function resolvePair(i, j) {
    var dx = X[j] - X[i];
    var dy = Y[j] - Y[i];
    var rr = R[i] + R[j];
    var d2 = dx * dx + dy * dy;
    if (d2 >= rr * rr) return;
    var d = Math.sqrt(d2);
    var nx, ny;
    if (d < 0.0001) {
      nx = 1; ny = 0; d = 0.0001;
    } else {
      nx = dx / d; ny = dy / d;
    }
    var overlap = rr - d;
    var wSum = INVM[i] + INVM[j];
    // positional separation (soft, ball-pit feel)
    var corr = overlap / wSum * 0.55;
    X[i] -= nx * corr * INVM[i];
    Y[i] -= ny * corr * INVM[i];
    X[j] += nx * corr * INVM[j];
    Y[j] += ny * corr * INVM[j];
    // normal impulse
    var dvn = (VX[j] - VX[i]) * nx + (VY[j] - VY[i]) * ny;
    if (dvn < 0) {
      var p = -(1 + BALL_REST) * dvn / wSum;
      VX[i] -= p * INVM[i] * nx;
      VY[i] -= p * INVM[i] * ny;
      VX[j] += p * INVM[j] * nx;
      VY[j] += p * INVM[j] * ny;
    }
  }

  function collide() {
    for (var i = 0; i < N; i++) {
      var cx = (X[i] / CELL) | 0;
      var cy = (Y[i] / CELL) | 0;
      if (cx < 0) cx = 0; else if (cx >= cols) cx = cols - 1;
      if (cy < 0) cy = 0; else if (cy >= rows) cy = rows - 1;
      var x0 = cx > 0 ? cx - 1 : 0, x1 = cx < cols - 1 ? cx + 1 : cols - 1;
      var y0 = cy > 0 ? cy - 1 : 0, y1 = cy < rows - 1 ? cy + 1 : rows - 1;
      for (var gy = y0; gy <= y1; gy++) {
        var rowBase = gy * cols;
        for (var gx = x0; gx <= x1; gx++) {
          var j = HEADS[rowBase + gx];
          while (j !== -1) {
            if (j > i) resolvePair(i, j);
            j = NEXT[j];
          }
        }
      }
    }
  }

  function applyPointer(h) {
    if (!hasPointer && !isDown) return;
    var RAD = isDown ? 175 : 105;
    var rad2 = RAD * RAD;
    var base = isDown ? 2600 : 0;
    for (var i = 0; i < N; i++) {
      var dx = X[i] - px;
      var dy = Y[i] - py;
      var d2 = dx * dx + dy * dy;
      if (d2 > rad2) continue;
      var d = Math.sqrt(d2) || 0.001;
      var s = 1 - d / RAD;
      // radial push, stronger with pointer speed and while held down
      var f = s * s * (base + pSpeed * 2.0);
      VX[i] += (dx / d) * f * h;
      VY[i] += (dy / d) * f * h;
      // drag-along in the pointer's direction of travel
      VX[i] += pvx * s * s * 0.22;
      VY[i] += pvy * s * s * 0.22;
    }
  }

  function step(h) {
    applyPointer(h);
    var floor = H, right = W;
    for (var i = 0; i < N; i++) {
      VY[i] += GRAVITY * h;
      VX[i] *= AIR;
      VY[i] *= AIR;
      var sp = VX[i] * VX[i] + VY[i] * VY[i];
      if (sp > MAX_SPEED * MAX_SPEED) {
        var sc = MAX_SPEED / Math.sqrt(sp);
        VX[i] *= sc;
        VY[i] *= sc;
      }
      X[i] += VX[i] * h;
      Y[i] += VY[i] * h;
    }
    fillGrid();
    collide();
    collide(); // second relaxation pass keeps the pile settled
    for (var k = 0; k < N; k++) {
      var r = R[k];
      if (X[k] < r) { X[k] = r; if (VX[k] < 0) VX[k] = -VX[k] * WALL_REST; }
      else if (X[k] > right - r) { X[k] = right - r; if (VX[k] > 0) VX[k] = -VX[k] * WALL_REST; }
      if (Y[k] > floor - r) {
        Y[k] = floor - r;
        if (VY[k] > 0) {
          VY[k] = -VY[k] * WALL_REST;
          if (VY[k] > -55) VY[k] = 0; // let them rest instead of jittering
        }
        VX[k] *= 0.96; // floor friction
      } else if (Y[k] < r - H * 2) {
        Y[k] = r - H * 2; // don't let shakes launch balls to infinity
        if (VY[k] < 0) VY[k] = 0;
      }
    }
  }

  // ---- main loop -----------------------------------------------------------
  var last = performance.now();
  var acc = 0;

  function frame(now) {
    var dt = (now - last) / 1000;
    last = now;
    if (dt > 0.05) dt = 0.05; // tab was hidden / hiccup

    pollWindowShake();
    applyShake();

    // smoothed pointer velocity (px/s)
    if (hasPointer || isDown) {
      var ivx = (px - ppx) / Math.max(dt, 0.001);
      var ivy = (py - ppy) / Math.max(dt, 0.001);
      pvx += (ivx - pvx) * 0.5;
      pvy += (ivy - pvy) * 0.5;
      pSpeed = Math.min(6000, Math.sqrt(pvx * pvx + pvy * pvy));
    } else {
      pvx = pvy = pSpeed = 0;
    }
    ppx = px; ppy = py;

    acc += dt;
    var steps = 0;
    while (acc >= STEP && steps < 3) {
      step(STEP);
      acc -= STEP;
      steps++;
    }
    if (steps === 3) acc = 0;

    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < N; i++) {
      var s = SPRITES[SPR[i]];
      ctx.drawImage(s.img, X[i] - s.half, Y[i] - s.half, s.size, s.size);
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
