<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool (and Uncool) Loaders</title>
    <meta name="description" content="48 loading animations, loading nothing. Stamp each one COOL or UNCOOL. Someone has to.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'><circle cx='25' cy='25' r='18' fill='none' stroke='%23201a17' stroke-width='6'/><path d='M25 7a18 18 0 0114.6 7.5' fill='none' stroke='%23f0563e' stroke-width='6' stroke-linecap='round'/></svg>">
    <style>
        :root {
            --ink: #201a17;
            --paper: #f2ede2;
            --cream: #fff8ef;
            --coral: #f0563e;
            --gold: #f7c948;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: var(--paper);
            color: var(--ink);
            font-family: Georgia, 'Times New Roman', serif;
            padding: 30px 16px 60px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        header { text-align: center; margin-bottom: 10px; }
        h1 {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(22px, 6vw, 34px);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            display: inline-block;
            transform: rotate(-1.2deg);
        }
        header .sub { font-style: italic; font-size: 15px; color: rgba(32,26,23,0.6); margin-top: 6px; }
        #score { text-align: center; font-style: italic; font-size: 14px; color: rgba(32,26,23,0.6); margin: 10px 0 24px; }

        #banner {
            display: none;
            margin: 0 auto 26px;
            width: fit-content;
            max-width: 92vw;
            background: var(--gold);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 4px 4px 0 var(--ink);
            transform: rotate(-1.5deg) scale(0);
            padding: 12px 24px;
            text-align: center;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 15px;
            text-transform: uppercase;
        }
        #banner em {
            display: block;
            font-family: Georgia, serif;
            font-weight: normal;
            font-size: 13px;
            text-transform: none;
        }
        #banner .again {
            font-family: Georgia, serif;
            font-weight: normal;
            font-style: italic;
            font-size: 12px;
            text-decoration: underline;
            cursor: pointer;
            text-transform: none;
        }
        #banner.show { display: block; animation: popIn 0.4s cubic-bezier(0.2, 1.6, 0.4, 1) forwards; }
        @keyframes popIn {
            0% { transform: rotate(4deg) scale(0.2); }
            70% { transform: rotate(-2deg) scale(1.12); }
            100% { transform: rotate(-1.5deg) scale(1); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 22px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            position: relative;
            background: var(--cream);
            border: 2px solid var(--ink);
            border-radius: 12px;
            box-shadow: 4px 4px 0 var(--ink);
            padding: 16px 14px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .card:nth-child(3n) { transform: rotate(0.6deg); }
        .card:nth-child(3n+1) { transform: rotate(-0.6deg); }

        .stage {
            height: 96px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .plaque { text-align: center; }
        .plaque .nm {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 13px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .plaque .cap { font-style: italic; font-size: 13px; color: rgba(32,26,23,0.6); margin-top: 2px; }

        .verdicts { display: flex; gap: 10px; margin-top: 4px; }
        .vbtn {
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: 2px 2px 0 var(--ink);
            padding: 6px 14px;
            cursor: pointer;
            background: var(--cream);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .vbtn.cool { background: var(--gold); }
        .vbtn:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
        .vbtn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--ink); }

        .steal {
            font-style: italic;
            font-size: 12px;
            color: rgba(32,26,23,0.5);
            cursor: pointer;
            text-decoration: underline;
            margin-top: 2px;
            background: none;
            border: none;
            font-family: Georgia, serif;
        }
        .steal:hover { color: var(--ink); }

        .stamp {
            position: absolute;
            top: 34px;
            left: 50%;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
            font-size: 26px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 3px 12px;
            border: 3px solid;
            border-radius: 8px;
            background: rgba(255, 248, 239, 0.72);
            pointer-events: none;
            transform: translateX(-50%) rotate(-12deg) scale(0);
            z-index: 2;
        }
        .stamp.cool { color: #c99a12; border-color: #c99a12; box-shadow: inset 0 0 0 2px var(--cream), inset 0 0 0 4px #c99a12; }
        .stamp.uncool { color: var(--coral); border-color: var(--coral); box-shadow: inset 0 0 0 2px var(--cream), inset 0 0 0 4px var(--coral); }
        .stamp.show { animation: stampIn 0.3s cubic-bezier(0.2, 1.6, 0.4, 1) forwards; }
        @keyframes stampIn {
            0% { transform: translateX(-50%) rotate(2deg) scale(2); opacity: 0; }
            70% { transform: translateX(-50%) rotate(-13deg) scale(0.94); opacity: 1; }
            100% { transform: translateX(-50%) rotate(-12deg) scale(1); opacity: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            .stamp.show, #banner.show { animation: none; opacity: 1; }
            .stamp.show { transform: translateX(-50%) rotate(-12deg) scale(1); }
            #banner.show { transform: rotate(-1.5deg) scale(1); }
            .vbtn { transition: none; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Cool (and Uncool) Loaders</h1>
        <div class="sub" id="sub">loading animations, loading nothing. you are the judge.</div>
    </header>
    <div id="score"></div>
    <div id="banner"></div>
    <div class="grid" id="grid"></div>

    <script>
    (() => {
        const LOADERS = [
            { id: 'standard', name: 'The Standard', cap: 'respected, never loved.',
              html: '<div class="l-standard"></div>',
              css: '.l-standard{width:44px;height:44px;border:5px solid #201a17;border-top-color:#f0563e;border-radius:50%;animation:l-standard-spin 1s linear infinite}\n@keyframes l-standard-spin{to{transform:rotate(360deg)}}' },
            { id: 'overachiever', name: 'The Overachiever', cap: 'in a tremendous hurry to load nothing.',
              html: '<div class="l-overachiever"></div>',
              css: '.l-overachiever{width:44px;height:44px;border:5px solid #201a17;border-top-color:#5aa0db;border-radius:50%;animation:l-over-spin .5s cubic-bezier(.68,-0.55,.27,1.55) infinite}\n@keyframes l-over-spin{to{transform:rotate(360deg)}}' },
            { id: 'procrastinator', name: 'The Procrastinator', cap: 'reaches 88%, reflects.',

            { id: 'pessimist', name: 'The Pessimist', cap: 'unloading.',
              html: '<div class="l-pessimist"><i></i></div>',
              css: '.l-pessimist{width:130px;height:20px;background:#fff8ef;border:2px solid #201a17;border-radius:99px;overflow:hidden}\n.l-pessimist i{display:block;height:100%;background:#f0563e;border-right:2px solid #201a17;animation:l-pes 3s linear infinite}\n@keyframes l-pes{0%{width:101%}100%{width:0}}' },
            { id: 'dots', name: 'The Dots', cap: 'the third one has given up.',
              html: '<div class="l-dots"><i></i><i></i><i></i></div>',
              css: '.l-dots{display:flex;gap:8px}\n.l-dots i{width:16px;height:16px;background:#f7c948;border:2px solid #201a17;border-radius:50%;animation:l-dots-b 1s infinite}\n.l-dots i:nth-child(2){animation-delay:.15s;background:#2fb0a3}\n.l-dots i:nth-child(3){animation-delay:.62s;background:#a98fd0}\n@keyframes l-dots-b{0%,100%{transform:translateY(0)}40%{transform:translateY(-16px)}}' },
            { id: 'coin', name: 'The Coin Flip', cap: 'heads means it loaded.',

            { id: 'hourglass', name: 'The Hourglass', cap: 'flips when it feels ready.',

            { id: 'sisyphus', name: 'The Sisyphus', cap: 'almost, every time.',

            { id: 'committee', name: 'The Committee', cap: 'circling the issue.',

              css: '.l-committee{position:relative;width:60px;height:60px}\n.l-committee i{position:absolute;top:50%;left:50%;width:12px;height:12px;margin:-6px;border:2px solid #201a17;border-radius:50%}\n.l-committee i:nth-child(1){background:#f0563e;animation:l-com-a 1.3s linear infinite}\n.l-committee i:nth-child(2){background:#5aa0db;animation:l-com-b 1.8s linear infinite reverse}\n.l-committee i:nth-child(3){background:#b7ce3c;animation:l-com-c 1.1s linear infinite}\n.l-committee i:nth-child(4){background:#f7c948;animation:l-com-a 2.3s linear infinite reverse}\n.l-committee i:nth-child(5){background:#ff7fa5;animation:l-com-b .9s linear infinite}\n@keyframes l-com-a{from{transform:rotate(0) translateX(22px)}to{transform:rotate(360deg) translateX(22px)}}\n@keyframes l-com-b{from{transform:rotate(0) translateX(14px)}to{transform:rotate(360deg) translateX(14px)}}\n@keyframes l-com-c{from{transform:rotate(0) translateX(26px)}to{transform:rotate(360deg) translateX(26px)}}' },
            { id: 'honest', name: 'The Honest One', cap: 'says what it is.',

              css: '.l-honest{font-family:Georgia,serif;font-style:italic;font-size:22px;color:#201a17}\n.l-honest i{font-style:normal;opacity:0;animation:l-hon 1.4s infinite}\n.l-honest i:nth-child(2){animation-delay:.2s}\n.l-honest i:nth-child(3){animation-delay:.4s}\n@keyframes l-hon{30%,70%{opacity:1}0%,100%{opacity:0}}' },
            { id: 'staircase', name: 'The Staircase', cap: 'getting somewhere, step-wise.',
              html: '<div class="l-staircase"><i></i><i></i><i></i><i></i></div>',
              css: '.l-staircase{display:flex;align-items:flex-end;gap:5px;height:46px}\n.l-staircase i{width:13px;height:12px;background:#2fb0a3;border:2px solid #201a17;border-radius:3px;animation:l-st 1.2s infinite}\n.l-staircase i:nth-child(2){animation-delay:.15s}\n.l-staircase i:nth-child(3){animation-delay:.3s}\n.l-staircase i:nth-child(4){animation-delay:.45s}\n@keyframes l-st{0%,100%{height:12px}50%{height:42px}}' },
            { id: 'blinker', name: 'The Blinker', cap: 'on. off. that is the whole act.',

              css: '.l-blinker{width:36px;height:36px;background:#ff7fa5;border:2px solid #201a17;border-radius:6px;animation:l-bl 1s steps(1) infinite}\n@keyframes l-bl{50%{opacity:0}}' },
            { id: 'finished', name: 'The Finished One', cap: '100% complete. it is lying.',
              html: '<div class="l-finished"></div>',
              css: '.l-finished{width:130px;height:20px;background:#b7ce3c;border:2px solid #201a17;border-radius:99px}' },
            { id: 'nervous', name: 'The Nervous Wreck', cap: 'it knows something we do not.',

            { id: 'ouroboros', name: 'The Ouroboros', cap: 'disagrees with itself, forever.',

            { id: 'pulse', name: 'The Pulse', cap: 'medically speaking, fine.',
              html: '<div class="l-pulse"><i></i></div>',
              css: '.l-pulse{position:relative;width:60px;height:60px}\n.l-pulse i{position:absolute;inset:19px;background:#f0563e;border:2px solid #201a17;border-radius:50%;animation:l-pu 1.1s infinite}\n.l-pulse::after{content:"";position:absolute;inset:15px;border:3px solid #201a17;border-radius:50%;animation:l-pu-ring 1.1s infinite}\n@keyframes l-pu{0%,30%,100%{transform:scale(1)}15%{transform:scale(1.3)}}\n@keyframes l-pu-ring{0%{transform:scale(.8);opacity:1}70%,100%{transform:scale(1.9);opacity:0}}' },
            { id: 'metronome', name: 'The Metronome', cap: 'keeping time it does not have.',

            { id: 'wiper', name: 'The Wiper', cap: 'no rain in the forecast.',

            { id: 'traffic', name: 'The Traffic Light', cap: 'green never lasts.',
              html: '<div class="l-traffic"><i></i><i></i><i></i></div>',
              css: '.l-traffic{display:flex;flex-direction:column;gap:5px;padding:7px;background:#fff8ef;border:2px solid #201a17;border-radius:9px}\n.l-traffic i{width:13px;height:13px;border-radius:50%;border:2px solid #201a17;opacity:.22}\n.l-traffic i:nth-child(1){background:#f0563e;animation:l-tl1 3s infinite}\n.l-traffic i:nth-child(2){background:#f7c948;animation:l-tl2 3s infinite}\n.l-traffic i:nth-child(3){background:#b7ce3c;animation:l-tl3 3s infinite}\n@keyframes l-tl1{0%,44%{opacity:1}45%,100%{opacity:.22}}\n@keyframes l-tl2{45%,66%{opacity:1}0%,44%,67%,100%{opacity:.22}}\n@keyframes l-tl3{67%,88%{opacity:1}0%,66%,89%,100%{opacity:.22}}' },

            { id: 'pogo', name: 'The Pogo', cap: 'boing, indefinitely.',

            { id: 'eclipse', name: 'The Eclipse', cap: 'briefly, totally.',

            { id: 'overthinker', name: 'The Overthinker', cap: 'wait. go back.',

            { id: 'drip', name: 'The Drip', cap: 'the sink is fine.',

            { id: 'stack', name: 'The Stack', cap: 'progress, then a policy change.',

            { id: 'wave', name: 'The Wave', cap: 'doing the wave alone.',
              html: '<div class="l-wave"><i></i><i></i><i></i><i></i><i></i></div>',
              css: '.l-wave{display:flex;gap:6px;padding:14px 0}\n.l-wave i{width:13px;height:13px;background:#2fb0a3;border:2px solid #201a17;border-radius:50%;animation:l-wav 1s ease-in-out infinite}\n.l-wave i:nth-child(2){animation-delay:.1s}\n.l-wave i:nth-child(3){animation-delay:.2s}\n.l-wave i:nth-child(4){animation-delay:.3s}\n.l-wave i:nth-child(5){animation-delay:.4s}\n@keyframes l-wav{0%,100%{transform:translateY(7px)}50%{transform:translateY(-9px)}}' },
            { id: 'compass', name: 'The Compass', cap: 'north is a feeling.',
              html: '<div class="l-compass"><i></i></div>',
              css: '.l-compass{position:relative;width:50px;height:50px;background:#fff8ef;border:3px solid #201a17;border-radius:50%}\n.l-compass::before{content:"";position:absolute;top:50%;left:50%;width:6px;height:6px;margin:-3px;background:#201a17;border-radius:50%;z-index:1}\n.l-compass i{position:absolute;top:50%;left:50%;width:4px;height:19px;margin:-19px 0 0 -2px;background:#f0563e;border-radius:2px;transform-origin:50% 100%;animation:l-cmp 2.4s cubic-bezier(.34,1.56,.64,1) infinite}\n@keyframes l-cmp{0%{transform:rotate(0)}25%{transform:rotate(160deg)}50%{transform:rotate(60deg)}75%{transform:rotate(280deg)}100%{transform:rotate(360deg)}}' },
            { id: 'percolator', name: 'The Percolator', cap: 'almost coffee.',
              html: '<div class="l-percolator"><i></i><i></i><i></i></div>',
              css: '.l-percolator{position:relative;width:38px;height:52px;background:#fff8ef;border:2px solid #201a17;border-radius:6px 6px 11px 11px;overflow:hidden}\n.l-percolator i{position:absolute;bottom:-10px;width:9px;height:9px;background:#5aa0db;border:2px solid #201a17;border-radius:50%;animation:l-per 1.4s ease-in infinite}\n.l-percolator i:nth-child(1){left:4px}\n.l-percolator i:nth-child(2){left:14px;animation-delay:.45s}\n.l-percolator i:nth-child(3){left:24px;animation-delay:.9s}\n@keyframes l-per{0%{transform:translateY(0);opacity:0}15%{opacity:1}90%,100%{transform:translateY(-46px);opacity:0}}' },
            { id: 'hypnotist', name: 'The Hypnotist', cap: 'you are getting sleepy.',
              html: '<div class="l-hypnotist"></div>',
              css: '.l-hypnotist{width:48px;height:48px;background:#ff7fa5;border:5px dashed #201a17;border-radius:50%;animation:l-hyp 4s linear infinite}\n@keyframes l-hyp{to{transform:rotate(360deg)}}' },
            { id: 'clock', name: 'The Clock', cap: 'not actual time.',
              html: '<div class="l-clock"></div>',
              css: '.l-clock{position:relative;width:50px;height:50px;background:#fff8ef;border:3px solid #201a17;border-radius:50%}\n.l-clock::before,.l-clock::after{content:"";position:absolute;left:50%;top:50%;border-radius:2px;transform-origin:50% 100%}\n.l-clock::before{width:3px;height:18px;margin:-18px 0 0 -1.5px;background:#201a17;animation:l-clk 1.5s linear infinite}\n.l-clock::after{width:4px;height:12px;margin:-12px 0 0 -2px;background:#f0563e;animation:l-clk 18s linear infinite}\n@keyframes l-clk{to{transform:rotate(360deg)}}' },
            { id: 'pingpong', name: 'The Ping Pong', cap: 'rallying with itself.',
              html: '<div class="l-pingpong"><i></i></div>',
              css: '.l-pingpong{position:relative;width:104px;height:34px}\n.l-pingpong::before,.l-pingpong::after{content:"";position:absolute;top:4px;width:7px;height:26px;background:#201a17;border-radius:4px}\n.l-pingpong::before{left:0}\n.l-pingpong::after{right:0}\n.l-pingpong i{position:absolute;top:11px;left:10px;width:12px;height:12px;background:#f7c948;border:2px solid #201a17;border-radius:50%;animation:l-pp .7s linear infinite alternate}\n@keyframes l-pp{from{transform:translateX(0)}to{transform:translateX(68px)}}' },
            { id: 'inchworm', name: 'The Inchworm', cap: 'commuting.',
              html: '<div class="l-inchworm"><i></i></div>',
              css: '.l-inchworm{position:relative;width:120px;height:22px}\n.l-inchworm i{position:absolute;left:0;top:4px;height:12px;width:24px;background:#b7ce3c;border:2px solid #201a17;border-radius:99px;animation:l-inch 2.2s ease-in-out infinite}\n@keyframes l-inch{0%{left:0;width:24px}25%{left:0;width:66px}50%{left:42px;width:24px}75%{left:42px;width:66px}100%{left:84px;width:24px}}' },
            { id: 'firefly', name: 'The Firefly', cap: 'not lost. wandering.',
              html: '<div class="l-firefly"><i></i></div>',
              css: '.l-firefly{position:relative;width:76px;height:52px}\n.l-firefly i{position:absolute;width:11px;height:11px;background:#f7c948;border:2px solid #201a17;border-radius:50%;animation:l-ffm 4.5s ease-in-out infinite,l-ffb 1.1s infinite}\n@keyframes l-ffm{0%,100%{transform:translate(6px,32px)}25%{transform:translate(52px,8px)}50%{transform:translate(20px,2px)}75%{transform:translate(58px,36px)}}\n@keyframes l-ffb{0%,100%{opacity:1}50%{opacity:.25}}' },
            { id: 'barber', name: 'The Barber Pole', cap: 'work is being performed, allegedly.',
              html: '<div class="l-barber"></div>',
              css: '.l-barber{width:120px;height:20px;border:2px solid #201a17;border-radius:99px;background:repeating-linear-gradient(45deg,#f0563e 0 10px,#fff8ef 10px 20px);animation:l-bar .8s linear infinite}\n@keyframes l-bar{to{background-position:28.28px 0}}' },
            { id: 'roulette', name: 'The Roulette', cap: 'always lands on loading.',
              html: '<div class="l-roulette"></div>',
              css: '.l-roulette{width:52px;height:52px;border:3px solid #201a17;border-radius:50%;background:conic-gradient(#f0563e 0 45deg,#fff8ef 45deg 90deg,#5aa0db 90deg 135deg,#fff8ef 135deg 180deg,#f7c948 180deg 225deg,#fff8ef 225deg 270deg,#2fb0a3 270deg 315deg,#fff8ef 315deg);animation:l-rou 2.6s cubic-bezier(.12,.8,.25,1) infinite}\n@keyframes l-rou{0%{transform:rotate(0)}85%,100%{transform:rotate(1440deg)}}' },
            { id: 'seesaw', name: 'The Seesaw', cap: 'physics, roughly.',
              html: '<div class="l-seesaw"><i></i></div>',
              css: '.l-seesaw{position:relative;width:104px;height:46px}\n.l-seesaw::before{content:"";position:absolute;bottom:0;left:50%;width:0;height:0;margin-left:-8px;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:12px solid #201a17}\n.l-seesaw::after{content:"";position:absolute;bottom:10px;left:2px;right:2px;height:5px;background:#201a17;border-radius:3px;transform-origin:center;animation:l-ssw 1.6s ease-in-out infinite alternate}\n.l-seesaw i{position:absolute;bottom:16px;left:6px;width:15px;height:15px;background:#a98fd0;border:2px solid #201a17;border-radius:50%;animation:l-ssb 1.6s ease-in-out infinite alternate}\n@keyframes l-ssw{from{transform:rotate(-8deg)}to{transform:rotate(8deg)}}\n@keyframes l-ssb{from{transform:translate(0,6px)}to{transform:translate(66px,6px)}}' },
            { id: 'sprinter', name: 'The Sprinter', cap: 'bursts of productivity.',
              html: '<div class="l-sprinter"><i></i></div>',
              css: '.l-sprinter{position:relative;width:120px;height:26px;overflow:hidden}\n.l-sprinter i{position:absolute;top:5px;left:-20px;width:16px;height:16px;background:#f47b28;border:2px solid #201a17;border-radius:4px;animation:l-spr 3s infinite}\n@keyframes l-spr{0%,58%{transform:translateX(0) skewX(0)}62%{transform:translateX(40px) skewX(-18deg)}70%,100%{transform:translateX(160px) skewX(0)}}' },
            { id: 'ghost', name: 'The Ghost', cap: 'it comes and goes.',
              html: '<div class="l-ghost"></div>',
              css: '.l-ghost{position:relative;width:34px;height:38px;background:#fff8ef;border:2px solid #201a17;border-radius:17px 17px 5px 5px;animation:l-gho 2.6s ease-in-out infinite}\n.l-ghost::before{content:"";position:absolute;top:12px;left:8px;width:5px;height:5px;background:#201a17;border-radius:50%;box-shadow:12px 0 0 #201a17}\n@keyframes l-gho{0%{transform:translateY(14px);opacity:0}30%,60%{transform:translateY(-2px);opacity:1}100%{transform:translateY(-18px);opacity:0}}' }
        ];

        document.getElementById('sub').textContent =
            LOADERS.length + ' loading animations, loading nothing. you are the judge.';

        // inject all loader CSS from the same source the "steal it" links copy
        const styleTag = document.createElement('style');
        styleTag.textContent = LOADERS.map(l => l.css).join('\n');
        document.head.appendChild(styleTag);

        // ---- verdicts ----
        let verdicts = {};
        try { verdicts = JSON.parse(localStorage.getItem('coolloaders-verdicts')) || {}; } catch (e) {}
        function saveVerdicts() {
            try { localStorage.setItem('coolloaders-verdicts', JSON.stringify(verdicts)); } catch (e) {}
        }

        const grid = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        const bannerEl = document.getElementById('banner');
        const stamps = {};

        LOADERS.forEach(l => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML =
                '<div class="stage">' + l.html + '</div>' +
                '<div class="plaque"><div class="nm">' + l.name + '</div><div class="cap">' + l.cap + '</div></div>' +
                '<div class="verdicts">' +
                '<button class="vbtn cool">Cool</button>' +
                '<button class="vbtn uncool">Uncool</button>' +
                '</div>' +
                '<button class="steal">steal it</button>' +
                '<div class="stamp"></div>';
            grid.appendChild(card);

            const stamp = card.querySelector('.stamp');
            stamps[l.id] = stamp;

            card.querySelector('.vbtn.cool').addEventListener('click', () => judge(l.id, 'cool'));
            card.querySelector('.vbtn.uncool').addEventListener('click', () => judge(l.id, 'uncool'));

            const stealBtn = card.querySelector('.steal');
            stealBtn.addEventListener('click', async () => {
                const snippet = '<!-- ' + l.name + ' -->\n' + l.html + '\n\n<style>\n' + l.css + '\n</style>';
                try {
                    await navigator.clipboard.writeText(snippet);
                    stealBtn.textContent = 'stolen.';
                } catch (e) {
                    stealBtn.textContent = 'it resisted.';
                }
                setTimeout(() => { stealBtn.textContent = 'steal it'; }, 1600);
            });

            if (verdicts[l.id]) showStamp(l.id, verdicts[l.id], false);
        });

        function showStamp(id, verdict, animate) {
            const stamp = stamps[id];
            stamp.textContent = verdict;
            stamp.className = 'stamp ' + verdict;
            if (animate) {
                void stamp.offsetWidth;
                stamp.classList.add('show');
            } else {
                stamp.classList.add('show');
            }
        }

        function judge(id, verdict) {
            if (verdicts[id] === verdict) return;
            verdicts[id] = verdict;
            saveVerdicts();
            showStamp(id, verdict, true);
            updateScore();
        }

        function updateScore() {
            const ids = LOADERS.map(l => l.id);
            const judged = ids.filter(id => verdicts[id]);
            const cool = judged.filter(id => verdicts[id] === 'cool').length;
            const uncool = judged.length - cool;
            scoreEl.textContent = 'judged ' + judged.length + ' of ' + ids.length + ' · cool ' + cool + ' · uncool ' + uncool;

            if (judged.length === ids.length) {
                let title, line;
                if (uncool === 0) { title = 'Easy Crowd'; line = 'they suspect flattery.'; }
                else if (cool === 0) { title = 'Tough Crowd'; line = 'they will try harder.'; }
                else { title = 'Judging Complete'; line = 'the loaders thank you for your honesty.'; }
                bannerEl.innerHTML = title + '<em>' + line + '</em><span class="again">judge again</span>';
                bannerEl.querySelector('.again').addEventListener('click', () => {
                    verdicts = {};
                    saveVerdicts();
                    bannerEl.classList.remove('show');
                    Object.values(stamps).forEach(s => s.className = 'stamp');
                    updateScore();
                });
                if (!bannerEl.classList.contains('show')) {
                    void bannerEl.offsetWidth;
                    bannerEl.classList.add('show');
                }
            } else {
                bannerEl.classList.remove('show');
            }
        }

        updateScore();
    })();
    </script>
