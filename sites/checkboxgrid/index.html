<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox Grid</title>

    <meta name="description" content="Create and save patterns with an interactive checkbox grid">
    <meta name="keywords" content="checkbox grid, interactive grid, pattern maker">
    <meta name="author" content="Random Sites On The Web">
    <link rel="icon" type="image/png" href="/favicon.png">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://randomsitesontheweb.com/sites/checkboxgrid/">
    <meta property="og:title" content="Checkbox Grid - Interactive Pattern Maker">
    <meta property="og:description" content="Create and save patterns with an interactive checkbox grid">
    <meta property="og:image" content="https://randomsitesontheweb.com/og-image.jpg">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://randomsitesontheweb.com/sites/checkboxgrid/">
    <meta property="twitter:title" content="Checkbox Grid - Interactive Pattern Maker">
    <meta property="twitter:description" content="Create and save patterns with an interactive checkbox grid">
    <meta property="twitter:image" content="https://randomsitesontheweb.com/og-image.jpg">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            flex: 0 0 auto;
        }

        button {
            padding: 8px 18px;
            cursor: pointer;
            border: 1px solid #bbb;
            border-radius: 6px;
            background: #fff;
            font-size: 14px;
        }

        button:hover { background: #e9e9e9; }

        #count {
            margin-left: auto;
            font-size: 13px;
            color: #666;
            font-variant-numeric: tabular-nums;
        }

        #hint {
            font-size: 13px;
            color: #999;
            font-style: italic;
        }

        #grid {
            flex: 1 1 auto;
            display: grid;
            align-content: center;
            justify-content: center;
            touch-action: none;
            cursor: crosshair;
            overflow: hidden;
        }

        #grid input[type="checkbox"] {
            width: 12px;
            height: 12px;
            margin: 0;
            pointer-events: none;   /* the grid handles all input — dragging paints */
        }
    </style>
</head>
<body>
    <div class="controls">
        <button id="save">Save</button>
        <button id="clear">Clear</button>
        <span id="hint">click and drag to paint</span>
        <span id="count"></span>
    </div>
    <div id="grid"></div>

    <script>
        const CELL = 14;   // px per checkbox cell

        const grid = document.getElementById('grid');
        const countEl = document.getElementById('count');
        const hintEl = document.getElementById('hint');

        let cols = 0, rows = 0;
        let state = new Uint8Array(0);
        let boxes = [];
        let checkedCount = 0;

        function updateCount() {
            countEl.textContent = `${checkedCount.toLocaleString()} / ${(cols * rows).toLocaleString()} checked`;
        }

        // ---- build a grid that fills the window ----

        function buildGrid(preserve) {
            const old = preserve ? { cols, rows, state } : null;

            const rect = grid.getBoundingClientRect();
            cols = Math.max(8, Math.floor(rect.width / CELL));
            rows = Math.max(8, Math.floor(rect.height / CELL));
            state = new Uint8Array(cols * rows);
            checkedCount = 0;

            grid.style.gridTemplateColumns = `repeat(${cols}, ${CELL}px)`;
            grid.style.gridAutoRows = `${CELL}px`;

            const frag = document.createDocumentFragment();
            boxes = new Array(cols * rows);
            for (let i = 0; i < cols * rows; i++) {
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                boxes[i] = cb;
                frag.appendChild(cb);
            }
            grid.textContent = '';
            grid.appendChild(frag);

            // carry the old pattern over by row/column
            if (old) {
                for (let r = 0; r < Math.min(rows, old.rows); r++) {
                    for (let c = 0; c < Math.min(cols, old.cols); c++) {
                        if (old.state[c + r * old.cols]) setCell(c + r * cols, 1);
                    }
                }
            }
            updateCount();
        }

        function setCell(i, v) {
            if (i < 0 || i >= state.length || state[i] === v) return;
            state[i] = v;
            boxes[i].checked = !!v;
            checkedCount += v ? 1 : -1;
        }

        // ---- painting ----

        let painting = false;
        let paintValue = 1;
        let lastCell = null;

        function cellAt(x, y) {
            const rect = grid.getBoundingClientRect();
            // the grid tracks are centered inside the container
            const originX = rect.left + (rect.width - cols * CELL) / 2;
            const originY = rect.top + (rect.height - rows * CELL) / 2;
            const c = Math.floor((x - originX) / CELL);
            const r = Math.floor((y - originY) / CELL);
            if (c < 0 || r < 0 || c >= cols || r >= rows) return null;
            return { c, r };
        }

        function paintTo(x, y) {
            const cell = cellAt(x, y);
            if (!cell) { lastCell = null; return; }
            if (lastCell) {
                // walk the line so fast drags don't leave gaps
                const steps = Math.max(Math.abs(cell.c - lastCell.c), Math.abs(cell.r - lastCell.r), 1);
                for (let s = 1; s <= steps; s++) {
                    const c = Math.round(lastCell.c + ((cell.c - lastCell.c) * s) / steps);
                    const r = Math.round(lastCell.r + ((cell.r - lastCell.r) * s) / steps);
                    setCell(c + r * cols, paintValue);
                }
            } else {
                setCell(cell.c + cell.r * cols, paintValue);
            }
            lastCell = cell;
            updateCount();
        }

        grid.addEventListener('pointerdown', (e) => {
            const cell = cellAt(e.clientX, e.clientY);
            if (!cell) return;
            painting = true;
            // paint the opposite of whatever you started on
            paintValue = state[cell.c + cell.r * cols] ? 0 : 1;
            lastCell = null;
            paintTo(e.clientX, e.clientY);
            grid.setPointerCapture(e.pointerId);
            if (hintEl) hintEl.remove();
        });

        grid.addEventListener('pointermove', (e) => {
            if (!painting) return;
            if (e.getCoalescedEvents) {
                for (const ev of e.getCoalescedEvents()) paintTo(ev.clientX, ev.clientY);
            } else {
                paintTo(e.clientX, e.clientY);
            }
        });

        function stopPainting() {
            if (!painting) return;
            painting = false;
            lastCell = null;
            save(true);
        }
        grid.addEventListener('pointerup', stopPainting);
        grid.addEventListener('pointercancel', stopPainting);

        // ---- save / load (also autosaves after every stroke) ----

        function save(silent) {
            let data = '';
            for (let i = 0; i < state.length; i++) data += state[i] ? '1' : '0';
            try {
                localStorage.setItem('checkboxGridState', JSON.stringify({ cols, rows, data }));
            } catch (err) {}
            if (!silent) {
                const btn = document.getElementById('save');
                const label = btn.textContent;
                btn.textContent = 'Saved!';
                setTimeout(() => { btn.textContent = label; }, 900);
            }
        }

        function load() {
            let saved = null;
            try { saved = JSON.parse(localStorage.getItem('checkboxGridState')); } catch (err) {}
            if (!saved || !saved.data || !saved.cols) return;
            const oldRows = Math.floor(saved.data.length / saved.cols);
            for (let r = 0; r < Math.min(rows, oldRows); r++) {
                for (let c = 0; c < Math.min(cols, saved.cols); c++) {
                    if (saved.data[c + r * saved.cols] === '1') setCell(c + r * cols, 1);
                }
            }
            updateCount();
        }

        document.getElementById('save').addEventListener('click', () => save(false));
        document.getElementById('clear').addEventListener('click', () => {
            state.fill(0);
            boxes.forEach(cb => { cb.checked = false; });
            checkedCount = 0;
            updateCount();
            try { localStorage.removeItem('checkboxGridState'); } catch (err) {}
        });

        let resizeTimer = null;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => buildGrid(true), 200);
        });

        buildGrid(false);
        load();
    </script>
</body>
</html>
