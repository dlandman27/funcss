<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://randomsitesontheweb.com/globals/global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Phone Has a Crack in It</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #fdfdfb;
            font-family: Georgia, 'Times New Roman', serif;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            position: fixed;
            inset: 0;
            display: block;
            touch-action: none;
            cursor: pointer;
        }

        #plaque {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-style: italic;
            font-size: 14px;
            color: #6a6a70;
            pointer-events: none;
            white-space: nowrap;
            transition: opacity 0.4s;
        }

        #repair {
            position: fixed;
            bottom: 16px;
            right: 16px;
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 12px;
            color: #9a9aa0;
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            padding: 4px;
        }
        #repair:hover { color: #55555c; }

        #flash {
            position: fixed;
            inset: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
        }
        #flash.go { animation: flash 0.18s ease-out; }
        @keyframes flash {
            0% { opacity: 0.85; }
            100% { opacity: 0; }
        }

        body.shake { animation: pageshake 0.22s; }
        @keyframes pageshake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 3px); }
            50% { transform: translate(4px, -4px); }
            75% { transform: translate(-3px, -2px); }
        }
        @media (prefers-reduced-motion: reduce) {
            body.shake { animation: none; }
            #flash.go { animation: none; }
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="flash"></div>
    <div id="plaque">screen integrity: 100%</div>
    <button id="repair">replace screen ($329)</button>

    <script>
        'use strict';

        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const plaque = document.getElementById('plaque');
        const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

        let W = 0, H = 0;
        let cracks = []; // {x, y, seed} — x/y as fractions of the screen

        const store = {
            get() { try { return JSON.parse(localStorage.getItem('yourphone-cracks')) || []; } catch { return []; } },
            set(v) { try { localStorage.setItem('yourphone-cracks', JSON.stringify(v)); } catch {} },
        };

        function mulberry32(a) {
            return function () {
                a |= 0; a = a + 0x6D2B79F5 | 0;
                let t = Math.imul(a ^ a >>> 15, 1 | a);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        // ── the crack itself: spokes, spiderweb rings, branches, crushed center ──
        function drawCrack(fx, fy, seed) {
            const rng = mulberry32(seed);
            const cx = fx * W, cy = fy * H;
            const scale = Math.min(W, H) * (0.16 + rng() * 0.22);

            // each spoke is a jagged polyline wandering outward
            const nSpokes = 8 + Math.floor(rng() * 6);
            const spokes = [];
            for (let s = 0; s < nSpokes; s++) {
                let a = (s / nSpokes) * Math.PI * 2 + (rng() - 0.5) * 0.5;
                const len = scale * (0.45 + rng() * 1.15);
                const pts = [[cx, cy]];
                let x = cx, y = cy, d = 0;
                while (d < len) {
                    const step = 7 + rng() * 13;
                    a += (rng() - 0.5) * 0.42;
                    x += Math.cos(a) * step;
                    y += Math.sin(a) * step;
                    d += step;
                    pts.push([x, y]);
                }
                spokes.push({ pts, len });

                // a branch peeling off near the tip
                if (rng() < 0.55 && pts.length > 4) {
                    const i0 = Math.floor(pts.length * (0.55 + rng() * 0.3));
                    let ba = a + (rng() < 0.5 ? 1 : -1) * (0.4 + rng() * 0.5);
                    let bx = pts[i0][0], by = pts[i0][1];
                    const bpts = [[bx, by]];
                    const blen = len * (0.2 + rng() * 0.3);
                    let bd = 0;
                    while (bd < blen) {
                        const step = 6 + rng() * 10;
                        ba += (rng() - 0.5) * 0.5;
                        bx += Math.cos(ba) * step;
                        by += Math.sin(ba) * step;
                        bd += step;
                        bpts.push([bx, by]);
                    }
                    spokes.push({ pts: bpts, len: blen, branch: true });
                }
            }

            // spiderweb rings: bowed connectors between neighboring spokes
            const rings = [];
            const nRings = 2 + Math.floor(rng() * 3);
            for (let r = 0; r < nRings; r++) {
                const frac = 0.14 + (r / nRings) * 0.55 + rng() * 0.08;
                for (let s = 0; s < nSpokes; s++) {
                    if (rng() < 0.3) continue;
                    const A = spokes[s].pts, B = spokes[(s + 1) % nSpokes].pts;
                    const pa = A[Math.min(Math.floor(A.length * frac) + 1, A.length - 1)];
                    const pb = B[Math.min(Math.floor(B.length * frac) + 1, B.length - 1)];
                    const mx = (pa[0] + pb[0]) / 2 + (rng() - 0.5) * 14;
                    const my = (pa[1] + pb[1]) / 2 + (rng() - 0.5) * 14;
                    rings.push([pa, [mx, my], pb]);
                }
            }

            // draw: a soft pale halo pass under a thin dark pass makes glass
            function trace(pts, quad) {
                ctx.beginPath();
                ctx.moveTo(pts[0][0], pts[0][1]);
                if (quad) ctx.quadraticCurveTo(pts[1][0], pts[1][1], pts[2][0], pts[2][1]);
                else for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
            }

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            for (const pass of [
                { style: 'rgba(150,165,185,0.30)', w: 3.2 },
                { style: 'rgba(38,42,50,0.60)', w: 1.05 },
            ]) {
                ctx.strokeStyle = pass.style;
                for (const s of spokes) {
                    // taper: split the polyline in half, thin the outer half
                    ctx.lineWidth = pass.w * (s.branch ? 0.75 : 1);
                    trace(s.pts.slice(0, Math.ceil(s.pts.length / 2) + 1));
                    ctx.stroke();
                    ctx.lineWidth = pass.w * (s.branch ? 0.5 : 0.6);
                    trace(s.pts.slice(Math.ceil(s.pts.length / 2)));
                    ctx.stroke();
                }
                ctx.lineWidth = pass.w * 0.55;
                for (const ring of rings) {
                    trace(ring, true);
                    ctx.stroke();
                }
            }

            // crushed glass at the impact point
            const dust = 14 + Math.floor(rng() * 18);
            for (let i = 0; i < dust; i++) {
                const a = rng() * Math.PI * 2;
                const d = rng() * rng() * scale * 0.09;
                ctx.fillStyle = rng() < 0.5 ? 'rgba(120,130,145,0.5)' : 'rgba(200,210,225,0.8)';
                ctx.beginPath();
                ctx.arc(cx + Math.cos(a) * d, cy + Math.sin(a) * d, 0.5 + rng() * 1.4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = 'rgba(40,44,52,0.75)';
            ctx.beginPath();
            ctx.arc(cx, cy, 1.6 + rng() * 1.2, 0, Math.PI * 2);
            ctx.fill();
        }

        function redrawAll() {
            ctx.clearRect(0, 0, W, H);
            for (const c of cracks) drawCrack(c.x, c.y, c.seed);
        }

        function integrity() {
            return Math.max(0, Math.round((100 - cracks.length * 3.7) * 10) / 10);
        }

        function updatePlaque(override) {
            if (override) { plaque.textContent = override; return; }
            const n = cracks.length;
            let line = 'screen integrity: ' + integrity() + '%';
            if (n >= 30) line = 'the warranty was void ' + (n - 1) + ' cracks ago.';
            else if (n >= 15) line = 'screen integrity: ' + integrity() + '%. please stop.';
            plaque.textContent = line;
        }

        function shatter(fx, fy, quiet) {
            cracks.push({ x: fx, y: fy, seed: Math.floor(Math.random() * 2 ** 31) });
            store.set(cracks);
            drawCrack(cracks[cracks.length - 1].x, cracks[cracks.length - 1].y, cracks[cracks.length - 1].seed);
            if (!quiet) {
                if (!reduceMotion) {
                    document.body.classList.remove('shake');
                    void document.body.offsetWidth;
                    document.body.classList.add('shake');
                    const flash = document.getElementById('flash');
                    flash.classList.remove('go');
                    void flash.offsetWidth;
                    flash.classList.add('go');
                }
                if (navigator.vibrate) { try { navigator.vibrate(35); } catch {} }
            }
            // a rare moment of honesty
            if (Math.random() < 0.04) {
                updatePlaque('ow.');
                setTimeout(updatePlaque, 1800);
            } else {
                updatePlaque();
            }
        }

        canvas.addEventListener('pointerdown', e => {
            shatter(e.clientX / W, e.clientY / H);
        });

        document.getElementById('repair').addEventListener('click', () => {
            cracks = [];
            store.set(cracks);
            ctx.clearRect(0, 0, W, H);
            updatePlaque('good as new. for now.');
            setTimeout(updatePlaque, 2500);
        });

        let resizeT = null;
        function resize() {
            const dpr = Math.min(devicePixelRatio || 1, 2);
            W = innerWidth; H = innerHeight;
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            redrawAll();
        }
        addEventListener('resize', () => {
            clearTimeout(resizeT);
            resizeT = setTimeout(resize, 100);
        });
        resize();

        // your phone is already cracked. it has always been cracked.
        cracks = store.get();
        if (cracks.length) {
            redrawAll();
            updatePlaque('still cracked. glass does not heal.');
            setTimeout(updatePlaque, 3000);
        } else {
            setTimeout(() => {
                shatter(0.32 + Math.random() * 0.36, 0.22 + Math.random() * 0.4);
            }, 700);
        }
    </script>
</body>
</html>
