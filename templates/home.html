        .sticker-fall {

        .click-splat {

            0%   { transform: rotate(var(--a)) translateY(-4px) scaleY(0.3); opacity: 1; }

    <div class="history-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-history"></i> History</h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button class="close-modal" onclick="toggleHistoryModal()">×</button>
                </div>
            </div>
            <div id="visitedSites"></div>
            <button class="clear-cookies-toggle" onclick="clearAllData()">
                <i class="fas fa-cookie-bite"></i> Clear History
            </button>
        </div>
    </div>

    <script>
        const folders = [
{{FOLDERS}}
        ];

        // Close modal when clicking outside of it
        document.querySelector('.history-modal').addEventListener('click', (e) => {
            if (e.target.classList.contains('history-modal')) {
                hideModal();
            }
        });

        function hideModal() {
            const modal = document.querySelector('.history-modal');
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.style.display = 'none';
                modal.style.opacity = '1';
            }, 300);
        }

        function showModal() {
            const modal = document.querySelector('.history-modal');
            modal.style.opacity = '0';
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.style.opacity = '1';
            }, 10);
        }

        function toggleHistoryModal() {
            const modal = document.querySelector('.history-modal');
            if (modal.style.display === 'flex') {
                hideModal();
            } else {
                showModal();
            }
        }

        // Add weights for each folder
        let weights = {};
        folders.forEach(folder => {
            // Initialize from localStorage or set to 1 if not found
            weights[folder] = parseFloat(localStorage.getItem(`weight_${folder}`)) || 1;
        });

        function getSites() {
            document.querySelector('.loading').style.display = 'block';
            try {
                // Calculate total weight
                const totalWeight = Object.values(weights).reduce((a, b) => a + b, 0);
                let random = Math.random() * totalWeight;
                
                // Select folder based on weights
                let selectedFolder;
                for (const folder of folders) {
                    random -= weights[folder];
                    if (random <= 0) {
                        selectedFolder = folder;
                        break;
                    }
                }
                
                // Reduce weight of selected folder
                weights[selectedFolder] *= 0.5; // Reduce by half each time
                localStorage.setItem(`weight_${selectedFolder}`, weights[selectedFolder].toString());
                
                saveSiteVisit(selectedFolder);
                window.open(window.location.origin + '/sites' + selectedFolder, '_blank');
            } finally {
                document.querySelector('.loading').style.display = 'none';
            }
        }

        function resetWeights() {
            folders.forEach(folder => {
                weights[folder] = 1;
                localStorage.setItem(`weight_${folder}`, '1');
            });
        }

        // Sparkle trail — skip on touch devices and when motion is reduced
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (!('ontouchstart' in window) && !prefersReducedMotion) {
            const sparkChars = ['✦', '✧', '★', '✳', '❋', '+'];
            const sparkColors = ['#f47b28', '#f0563e', '#5aa0db', '#a98fd0', '#b7ce3c', '#ff7fa5'];
            let lastSpark = 0;

            document.addEventListener('mousemove', (e) => {
                const now = performance.now();
                if (now - lastSpark < 55) return; // throttle so it's a trail, not a smear
                lastSpark = now;

                const spark = document.createElement('span');
                spark.className = 'spark';
                spark.textContent = sparkChars[Math.floor(Math.random() * sparkChars.length)];
                spark.style.left = e.clientX + (Math.random() * 16 - 8) + 'px';
                spark.style.top = e.clientY + (Math.random() * 16 - 8) + 'px';
                spark.style.color = sparkColors[Math.floor(Math.random() * sparkColors.length)];
                spark.style.fontSize = (Math.random() * 12 + 10) + 'px';
                document.body.appendChild(spark);
                spark.addEventListener('animationend', () => spark.remove());
            });
        }

        function saveSiteVisit(folder) {
            fetch(window.location.origin + '/sites' + folder + 'index.html')
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const title = doc.title || folder.replace(/\//g, '');
                    
                    let visited = JSON.parse(localStorage.getItem('visitedSites') || '[]');
                    const newSite = {
                        title: title,
                        path: folder,
                        timestamp: Date.now(),
                        favorite: false
                    };
                    
                    visited.unshift(newSite);
                    visited = visited.slice(0, 50);
                    localStorage.setItem('visitedSites', JSON.stringify(visited));
                    updateHistoryPanel();
                });
        }

        function updateHistoryPanel() {
            const visited = JSON.parse(localStorage.getItem('visitedSites') || '[]');
            const container = document.getElementById('visitedSites');
            container.innerHTML = '';

            visited.forEach(site => {
                const entry = document.createElement('div');
                entry.className = 'site-entry';
                
                const favBtn = document.createElement('button');
                favBtn.className = `favorite-btn ${site.favorite ? 'active' : ''}`;
                favBtn.innerHTML = '⭐';
                favBtn.onclick = () => toggleFavorite(site.path);

                const link = document.createElement('a');
                link.href = window.location.origin + '/sites' + site.path;
                link.target = '_blank';
                link.textContent = site.title;

                entry.appendChild(favBtn);
                entry.appendChild(link);
                container.appendChild(entry);
            });
        }

        function toggleFavorite(path) {
            const visited = JSON.parse(localStorage.getItem('visitedSites') || '[]');
            const site = visited.find(s => s.path === path);
            if (site) {
                site.favorite = !site.favorite;
                localStorage.setItem('visitedSites', JSON.stringify(visited));
                updateHistoryPanel();
            }
        }

        updateHistoryPanel();

        function clearAllData() {
            if (confirm('Are you sure you want to clear all data? This will reset your history and weights.')) {
                localStorage.removeItem('visitedSites');
                resetWeights();
                updateHistoryPanel();
                alert('All data has been cleared!');
            }
        }

        function generateQRCode() {
            // Open in a new window/tab
            const qrWindow = window.open('', '_blank', 'width=300,height=300');
            qrWindow.document.write(`
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: white;">
                    <div id="qrcode"></div>
                    <p style="font-family: Arial; color: #34495e; margin-top: 1rem;">Scan to visit Random Sites On The Web</p>
                </div>
                <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script>
                <script>
                    new QRCode(document.getElementById("qrcode"), {
                        text: "${window.location.href}",
                        width: 256,
                        height: 256,
                        colorDark: "#3498db",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                <\/script>
            `);
        }
    </script>

    <!-- ============================================================

    <script>
        (function () {
            const searchInput = document.getElementById('search');

            const categoryPanel = document.getElementById('categoryPanel');
            const categoryFilters = document.getElementById('categoryFilters');
            const sortSelect = document.getElementById('sortSelect');
            const toggleCategories = document.getElementById('toggleCategories'); // may be null

            // The directory cards use folder-relative links (e.g. "pi/").
            // Now that they live on the root page, point them at /sites/.
            siteCards.forEach(card => {
                const link = card.querySelector('a');
                if (link) {
                    const href = link.getAttribute('href');
                    if (href && !href.startsWith('/') && !href.startsWith('http')) {
                        link.setAttribute('href', '/sites/' + href);
                    }
                }
            });

            // Keep the "over N experiences" count honest — and count up to it.
            const countEl = document.querySelector('.site-count');
            if (countEl) {
                const target = siteCards.length;
                if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                    countEl.textContent = target;
                } else {
                    const duration = 1400;
                    let start = null;
                    countEl.textContent = '0';
                    requestAnimationFrame(function tick(now) {
                        if (start === null) start = now;
                        const t = Math.min((now - start) / duration, 1);

                    if (!countsBySlug) return;
                    document.querySelectorAll('.site-card a').forEach(link => {
                        const slug = (link.getAttribute('href') || '')
                            .replace('/sites/', '').replace(/\/$/, '').toLowerCase();
                        const n = countsBySlug[slug];
                        if (!n || n < 5) return; // hide sparse counts
                        const el = document.createElement('div');
                        el.className = 'plays';
                        el.textContent = '▶ ' + (n >= 1000
                            ? (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k'
                            : n) + ' plays';
                        el.title = n + ' plays';
                        link.appendChild(el);
                    });
                })
                .catch(() => {}); // local dev / API down → no counts, no errors

            const rickrollTerms = ['rickroll', 'rick roll', 'rick astley', 'never gonna give you up'];

            // Collect all unique categories and build the (hidden) filter checkboxes
            const categories = new Set();
            siteCards.forEach(card => {
                card.dataset.categories.split(' ').forEach(cat => categories.add(cat));
            });
            categories.forEach(category => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" value="${category}" checked>
                        ${category.charAt(0).toUpperCase() + category.slice(1)}
                    </label>
                `;
                categoryFilters.appendChild(div);
            });

            function createConfetti() {
                for (let i = 0; i < 100; i++) {
                    const confetti = document.createElement('div');
                    confetti.style.cssText = `
                        position: fixed;
                        top: -10px;
                        left: ${Math.random() * 100}vw;
                        width: 10px;
                        height: 10px;
                        background: ${['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'][Math.floor(Math.random() * 6)]};
                        transform: rotate(${Math.random() * 360}deg);
                        z-index: 1001;
                        pointer-events: none;
                        animation: fall ${Math.random() * 3 + 2}s linear forwards;
                    `;
                    document.body.appendChild(confetti);
                    confetti.addEventListener('animationend', () => confetti.remove());
                }
            }

            const confettiStyle = document.createElement('style');
            confettiStyle.textContent = `
                @keyframes fall {
                    to { transform: translateY(100vh) rotate(960deg); opacity: 0; }
                }
            `;
            document.head.appendChild(confettiStyle);

            function filterCards() {
                const searchTerm = searchInput.value.toLowerCase();

                if (searchTerm.includes('confetti')) createConfetti();
                if (searchTerm.includes('invert')) document.body.classList.add('invert');

                if (rickrollTerms.some(term => searchTerm.includes(term))) {
                    window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
                    return;
                }

                if (!document.querySelector('#filter-styles')) {
                    const s = document.createElement('style');
                    s.id = 'filter-styles';
                    s.textContent = `
                        .greyscale { filter: grayscale(100%); }
                        .invert * { filter: invert(100%); }
                        .greyscale.invert * { filter: grayscale(100%) invert(100%); }
                    `;
                    document.head.appendChild(s);
                }

                const activeCategories = Array.from(categoryFilters.querySelectorAll('input:checked'))
                    .map(input => input.value);

                siteCards.forEach(card => {
                    const title = card.querySelector('h2').textContent.toLowerCase();
                    const description = card.querySelector('p').textContent.toLowerCase();
                    const cardCategories = card.dataset.categories.split(' ');

                    const matchesSearch = title.includes(searchTerm) || description.includes(searchTerm);
                    const matchesCategories = cardCategories.some(cat => activeCategories.includes(cat));

                    card.classList.toggle('hidden', !matchesSearch || !matchesCategories);
                });

                document.querySelectorAll('.category-title').forEach(title => {
                    const nextGrid = title.nextElementSibling;
                    const hasVisibleCards = Array.from(nextGrid.children)
                        .some(card => !card.classList.contains('hidden'));
                    title.style.display = hasVisibleCards ? 'block' : 'none';
                    nextGrid.style.display = hasVisibleCards ? 'grid' : 'none';
                });
            }

            function sortCards() {
                const grids = document.querySelectorAll('.site-grid');
                const sortValue = sortSelect.value;
                const customOrder = "THEBIGRYFOXJUMPSCKLVWDAN";

                grids.forEach(grid => {
                    const cards = Array.from(grid.children);
                    cards.sort((a, b) => {
                        const titleA = a.querySelector('h2').textContent.toUpperCase();
                        const titleB = b.querySelector('h2').textContent.toUpperCase();

                        if (sortValue === 'newest') {
                            const dateA = a.dataset.created || '0000-00-00';
                            const dateB = b.dataset.created || '0000-00-00';
                            if (dateA !== dateB) return dateB.localeCompare(dateA);
                            return titleA.localeCompare(titleB);
                        } else if (sortValue === 'chaos') {
                            const indexA = customOrder.indexOf(titleA.charAt(0));
                            const indexB = customOrder.indexOf(titleB.charAt(0));
                            if (indexA === -1 && indexB === -1) return titleA.localeCompare(titleB);
                            if (indexA === -1) return 1;
                            if (indexB === -1) return -1;
                            return indexA - indexB;
                        } else if (sortValue === 'az') {
                            return titleA.localeCompare(titleB);
                        } else if (sortValue === 'za') {
                            return titleB.localeCompare(titleA);
                        } else if (sortValue === 'lza') {
                            const isAInLZ = titleA.charAt(0) >= 'L';
                            const isBInLZ = titleB.charAt(0) >= 'L';
                            if (isAInLZ !== isBInLZ) return isBInLZ ? 1 : -1;
                            return titleA.localeCompare(titleB);
                        }
                        return 0;
                    });
                    cards.forEach(card => grid.appendChild(card));
                });
            }

            function initializeFilters() {
                if (localStorage.getItem('greyscale') === 'true') document.body.classList.add('greyscale');
                if (localStorage.getItem('invert') === 'true') document.body.classList.add('invert');
            }

            function clearFilters() {
                document.body.classList.remove('greyscale', 'invert');
                localStorage.removeItem('greyscale');
                localStorage.removeItem('invert');
            }

            searchInput.addEventListener('input', filterCards);
            categoryFilters.addEventListener('change', filterCards);
            sortSelect.addEventListener('change', sortCards);

            // Floating back-to-top button visibility
            const backToTop = document.getElementById('backToTop');
            if (backToTop) {
                const toggleBackToTop = () => {
                    backToTop.classList.toggle('show', window.scrollY > window.innerHeight * 0.6);
                };
                window.addEventListener('scroll', toggleBackToTop, { passive: true });
                toggleBackToTop();
            }

            document.addEventListener('click', (e) => {
                if (categoryPanel && !categoryPanel.contains(e.target) &&
                    (!toggleCategories || !toggleCategories.contains(e.target))) {
                    categoryPanel.style.display = 'none';
                }
            });

            initializeFilters();
            document.addEventListener('dblclick', clearFilters);
        })();
    </script>

                    line.style.setProperty('--d', (28 + Math.random() * 26) + 'px');

                    if (Math.random() < 0.35) line.style.background = pick();
                    splat.appendChild(line);
                }

                const star = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                star.setAttribute('viewBox', '0 0 100 100');
                star.setAttribute('class', 'splat-star');
                star.innerHTML = '<path d="M50 2 C56 36 64 44 98 50 C64 56 56 64 50 98 C44 64 36 56 2 50 C36 44 44 36 50 2 Z" fill="' + pick() + '" stroke="#201a17" stroke-width="7" stroke-linejoin="round"/>';
                splat.appendChild(star);

                document.body.appendChild(splat);
                setTimeout(() => splat.remove(), 600);

        })();
    </script>

    <!-- Scrollbar thumb blends through the palette as you scroll down -->
    <script>
        (function () {
            const STOPS = [
                [244, 123, 40],  // orange
                [240, 86, 62],   // coral
                [169, 143, 208], // purple
                [90, 160, 219],  // sky
                [183, 206, 60],  // lime
            ];
            let ticking = false;

            function update() {
                ticking = false;
                const max = document.documentElement.scrollHeight - window.innerHeight;
                const t = max > 0 ? Math.min(window.scrollY / max, 1) : 0;
                const pos = t * (STOPS.length - 1);
                const i = Math.min(Math.floor(pos), STOPS.length - 2);
                const f = pos - i;
                const c = STOPS[i].map((v, ch) => Math.round(v + (STOPS[i + 1][ch] - v) * f));
                document.documentElement.style.setProperty('--scroll-thumb', 'rgb(' + c.join(',') + ')');
            }

            window.addEventListener('scroll', function () {
                if (!ticking) { ticking = true; requestAnimationFrame(update); }
            }, { passive: true });
            update();
        })();
    </script>

    <!-- Draggable logo: grab it, fling it, it bounces and wobbles back home -->
    <script>
        (function () {
            const logo = document.querySelector('.logo-img');
            if (!logo) return;
            logo.draggable = false;

            let x = 0, y = 0, vx = 0, vy = 0;
            let dragging = false, physicsId = null;
            let lastX = 0, lastY = 0, lastT = 0;

            function setTransform(rot) {
                logo.style.transform = 'translate(' + x + 'px,' + y + 'px) rotate(' + (rot || 0) + 'deg)';
            }

            logo.addEventListener('pointerdown', function (e) {
                e.preventDefault();
                dragging = true;
                cancelAnimationFrame(physicsId);
                logo.classList.remove('logo-return', 'logo-wobble');
                logo.setPointerCapture(e.pointerId);
                logo.style.cursor = 'grabbing';
                lastX = e.clientX; lastY = e.clientY; lastT = performance.now();
                vx = vy = 0;
            });

            logo.addEventListener('pointermove', function (e) {
                if (!dragging) return;
                const now = performance.now();
                const dx = e.clientX - lastX, dy = e.clientY - lastY;
                x += dx; y += dy;
                const dt = Math.max(now - lastT, 1);
                vx = 0.8 * vx + 0.2 * (dx / dt * 16);
                vy = 0.8 * vy + 0.2 * (dy / dt * 16);
                lastX = e.clientX; lastY = e.clientY; lastT = now;
                setTransform(Math.max(-12, Math.min(12, vx)));
            });

            function release() {
                if (!dragging) return;
                dragging = false;
                logo.style.cursor = 'grab';
                fly();
            }
            logo.addEventListener('pointerup', release);
            logo.addEventListener('pointercancel', release);

            function fly() {
                function step() {
                    vy += 0.5;                 // gravity
                    vx *= 0.99; vy *= 0.995;   // air drag
                    x += vx; y += vy;
                    const r = logo.getBoundingClientRect();
                    if (r.left < 0 && vx < 0)              { vx = -vx * 0.7; x -= r.left; }
                    if (r.right > innerWidth && vx > 0)    { vx = -vx * 0.7; x -= r.right - innerWidth; }
                    if (r.top < 0 && vy < 0)               { vy = -vy * 0.7; y -= r.top; }
                    if (r.bottom > innerHeight && vy > 0)  { vy = -vy * 0.7; vx *= 0.85; y -= r.bottom - innerHeight; }
                    setTransform(Math.max(-15, Math.min(15, vx * 1.5)));
                    const resting = r.bottom >= innerHeight - 3 && Math.abs(vy) < 1 && Math.abs(vx) < 0.4;
                    if (resting || (Math.abs(vx) < 0.05 && Math.abs(vy) < 0.05)) {
                        goHome();
                        return;
                    }
                    physicsId = requestAnimationFrame(step);
                }
                physicsId = requestAnimationFrame(step);
            }

            function goHome() {
                x = 0; y = 0; vx = 0; vy = 0;
                logo.classList.add('logo-return');
                setTransform(0);
                setTimeout(function () {
                    logo.classList.remove('logo-return');
                    logo.style.transform = '';
                    logo.classList.add('logo-wobble');
                    setTimeout(() => logo.classList.remove('logo-wobble'), 600);
                }, 900);
            }
        })();
    </script>

    <!-- Count badge: click for a +1 that doesn't stick -->
    <script>
        (function () {
            const badge = document.querySelector('.site-count');
            if (!badge) return;
            badge.title = 'add a site';
            const realCount = () => document.querySelectorAll('.site-card').length;
            let bonus = 0, resetTimer = null;

            badge.addEventListener('click', function () {
                bonus++;
                badge.textContent = realCount() + bonus;
                badge.classList.remove('badge-pop');
                void badge.offsetWidth;
                badge.classList.add('badge-pop');

                const r = badge.getBoundingClientRect();
                const plus = document.createElement('span');
                plus.className = 'plus-one';
                plus.textContent = '+1';
                plus.style.left = (r.left + r.width / 2 + (Math.random() * 24 - 12)) + 'px';
                plus.style.top = (r.top - 6) + 'px';
                document.body.appendChild(plus);
                setTimeout(() => plus.remove(), 850);

                clearTimeout(resetTimer);
                resetTimer = setTimeout(function () {
                    bonus = 0;
                    badge.textContent = realCount();
                    badge.classList.remove('badge-pop');
                    badge.classList.add('badge-wobble');
                    setTimeout(() => badge.classList.remove('badge-wobble'), 550);
                }, 1200);
            });
        })();
    </script>

    <!-- Konami code: ↑↑↓↓←→←→BA and everything falls off the sheet -->
    <script>
        (function () {
            const SEQ = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown',
                         'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
            let i = 0, done = false;

            document.addEventListener('keydown', function (e) {
                const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
                i = (k === SEQ[i]) ? i + 1 : (k === SEQ[0] ? 1 : 0);
                if (i === SEQ.length) {
                    i = 0;
                    if (!done) { done = true; collapse(); }
                }
            });

            function collapse() {
                const els = document.querySelectorAll(
                    '.site-card, .logo-img, .container h1, .description, .button-group, ' +
                    '.scroll-hint, .sites-header-inner, .back-to-top, .made-by'
                );
                els.forEach(function (el) {
                    el.style.setProperty('--rot', (Math.random() * 140 - 70) + 'deg');
                    el.style.animationDelay = (Math.random() * 1.3) + 's';
                    el.classList.add('sticker-fall');
                });
                const toast = document.createElement('div');
                toast.className = 'konami-toast';
                toast.textContent = 'oops. refresh to re-stick everything.';
                document.body.appendChild(toast);
            }
        })();
    </script>
